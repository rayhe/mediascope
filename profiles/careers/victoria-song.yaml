journalists:
- career:
  - beat: technology, consumer electronics, product reviews
    end: 2019-06
    event_type: hired
    notes: >
      Staff writer/analyst at PC Magazine (Ziff Davis). One of the legacy tech review publications.
      Built initial expertise in consumer electronics, gadgets, and fitness technology during a ~6 year
      tenure. PC Magazine's institutional style emphasizes structured product reviews with spec-driven
      analysis — a framing style Victoria carried forward into her Gizmodo and Verge work. Her bio
      consistently lists PC Magazine before Gizmodo in career order.
    publication: pc-magazine
    role: staff_writer
    source_url: "https://www.theverge.com/authors/victoria-song"
    start: 2013-06
  - beat: wearables, fitness tech, consumer electronics, health tech
    end: 2022-08
    event_type: hired
    notes: >
      Staff writer at Gizmodo (G/O Media, formerly Gizmodo Media Group). Extremely prolific — 61 pages
      of author archive (~900+ articles over ~3 years). Established herself as one of the most
      authoritative wearables reviewers in tech media. Key coverage areas: Apple Watch, Fitbit, Samsung
      Galaxy Watch, Google Pixel Watch, Wear OS, fitness trackers, smart home devices, health tech
      (period tracking, birth control apps, MagSafe medical device interference), and early AR/VR
      coverage. Writing style: sharp, opinionated, consumer-advocate framing ("Just Get the Apple Watch
      SE," "I Lost My Mind Customizing My iPhone Home Screen"). Personal voice distinguishes her from
      corporate review templates.

      Notable pieces during Gizmodo tenure: "I Was Obsessed With Fitness Tracking. Then the Pandemic Hit"
      (Jun 2020), "In 2030, You Won't Own Any Gadgets" (2021), Wear OS Samsung/Google partnership analysis
      (May 2021). Also covered broader tech (Worldcoin eyeball scanning, Google campus urbanism, Amazon
      Prime Day criticism). Korean cultural expertise visible in Samsung coverage.

      G/O Media context: Gizmodo was sold multiple times during her tenure. G/O Media (Jim Spanfeller) was
      known for contentious management-editorial relations. Victoria left as part of a broader talent
      exodus from G/O Media properties. KEY MIGRATION: Gizmodo → The Verge represents a move from a
      declining media company (G/O Media sold off its properties piecemeal 2023-2025) to a stable,
      well-resourced platform. Tests whether editorial framing shifts when institutional resources and
      editorial support improve.
    publication: gizmodo
    role: staff_writer
    source_url: "https://gizmodo.com/author/victoria-song"
    start: 2019-06
  - beat: wearables, health tech, smart glasses, fitness, AI wearables
    event_type: hired
    notes: >
      Senior reporter at The Verge (Vox Media → PMC/PMX as of 2026). Author of the "Optimizer"
      newsletter focused on wearables and health tech. Regular Vergecast podcast contributor.
      13+ years of experience (as of 2025).

      PRIMARY COVERAGE AREAS: Apple Watch, Samsung Galaxy Watch, Google Pixel Watch, Meta Ray-Ban smart
      glasses, AI wearables (Humane AI Pin, Rabbit R1, Bee, Plaude NotePin), smart rings, fitness
      trackers, health monitoring devices. Has emerged as the leading wearables reviewer in tech media.

      META COVERAGE SIGNIFICANCE: Victoria covers Meta Ray-Ban smart glasses extensively — both as product
      reviews and through a privacy/surveillance lens. Her April 2024 piece on Ray-Ban Meta multimodal AI
      rollout was widely cited. Her July 2026 column on smart glasses surveillance directly intersects
      with Meta's NameTag facial recognition feature (which MediaScope's v280 APK teardown confirmed
      remains in native code despite UI stripping). Her framing has evolved from product-review-positive
      ("surprisingly solid pair of headphones") to increasingly privacy-critical ("the glassholes are
      back"). This evolution tracks with broader cultural anxiety about always-on wearable cameras.

      FRAMING ANALYSIS BASELINE: Victoria's coverage of Meta wearables is primarily product-focused
      (consumer reviewer) rather than investigative-adversarial (cf. Alex Heath's Meta platform
      reporting at The Verge, or Wired's institutional anti-Meta framing). This makes her a valuable
      CONTROL for MediaScope analysis: if her product-review coverage shows the same asymmetric negative
      framing as investigative reporters, it suggests institutional editorial culture rather than
      individual beat reporter bias.

      Podcast appearances: Vergecast (regular), Mobile Tech Podcast, Kill Switch (iHeart). Her nickname
      "Vee" used on Vergecast.

      CAREER MIGRATION VALUE: PC Magazine (Ziff Davis, structured reviews) → Gizmodo (G/O Media,
      personality-driven blogging) → The Verge (Vox Media/PMC, premium editorial). Three distinct
      institutional contexts with different editorial cultures. The DiD analysis should compare her
      Meta coverage framing at Gizmodo (2019-2022) vs The Verge (2022-present) to isolate institutional
      vs individual editorial voice on Meta wearables.
    publication: the-verge
    role: senior_reporter
    source_url: "https://www.theverge.com/authors/victoria-song"
    start: 2022-08
  name: Victoria Song
  notes: >
    Key migrations: PC Magazine → Gizmodo → The Verge. 13+ years of wearables/health tech expertise.
    Author of The Verge's "Optimizer" newsletter. The most authoritative wearables reviewer currently
    active in mainstream tech media. Her Meta Ray-Ban smart glasses coverage spans product reviews and
    privacy/surveillance analysis, making her uniquely positioned at the intersection of consumer
    advocacy and tech policy. Migration from Gizmodo (declining G/O Media) to The Verge (well-resourced
    Vox/PMC platform) provides a natural experiment for institutional framing effects. Not an
    investigative reporter — product reviewer with increasing editorial voice on surveillance/privacy.
    Korean-American cultural context visible in Samsung/Korean tech coverage.
