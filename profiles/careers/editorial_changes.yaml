editorial_changes:
  atlantic:
  - date: 2016-10
    incoming: Jeffrey Goldberg
    notes: Goldberg has been EIC since 2016. During his tenure, Laurene Powell Jobs' Emerson Collective acquired majority
      ownership (2017).
    outgoing: James Bennet
    position: eic
    source_url: https://www.theatlantic.com/press-releases/archive/2016/10/jeffrey-goldberg-atlantic-editor-chief/504920/
  - date: 2019-05
    incoming: Adrienne LaFrance
    notes: LaFrance promoted from staff. Known for anti-tech-platforms investigations (QAnon coverage). Wrote 'Facebook is
      a Doomsday Machine' (Dec 2020). Signals further editorial turn against Big Tech.
    outgoing: null
    position: executive_editor
    source_url: https://en.wikipedia.org/wiki/The_Atlantic
  - date: 2020-12
    incoming: Nicholas Thompson
    notes: 'KEY MIGRATION: Former Wired EIC (2017-2020) becomes Atlantic CEO. Creates direct Condé Nast → Atlantic editorial
      culture bridge. Thompson wrote two Facebook cover stories cited in Congress while at Wired. Under his leadership at
      Atlantic: profitability achieved, record subscriptions, 3 Pulitzer Prizes, OpenAI licensing deal (May 2024). Co-founded
      Speakeasy AI, The Atavist.'
    outgoing: null
    position: ceo
    source_url: https://en.wikipedia.org/wiki/The_Atlantic
  - date: 2018-05
    incoming: Ellen Cushing
    notes: Built Atlantic's SF tech bureau. Came from BuzzFeed News. Shaped tech desk that Tiffany, Wong, and others joined.
      Pivoted to food/culture staff writer May 2024.
    outgoing: null
    position: senior_tech_editor
    source_url: https://talkingbiznews.com/they-re-hiring/the-atlantic-hires-buzzfeeds-cushing-as-senior-tech-editor/
  - date: 2017-07
    incoming: Peter Lattman
    notes: Emerson Collective staffer placed as vice chairman at acquisition. Direct LPJ representative in Atlantic governance.
    outgoing: null
    position: vice_chairman
    source_url: https://en.wikipedia.org/wiki/The_Atlantic
  - date: 2022-08
    incoming: Damon Beres
    notes: 'KEY HIRE: Beres joined as senior editor for tech, becoming the editorial gatekeeper for Atlantic''s technology
      coverage. Career: HuffPost (senior tech editor) → Mashable (executive editor) → OneZero/Medium (co-founder/EIC) → Unfinished
      Media (EIC) → Atlantic. Co-launched AI Watchdog project with Alex Reisner (Sep 2025). Oversees Alex Reisner, Ian Bogost,
      Kaitlyn Tiffany, Matteo Wong. His editorial decisions — which investigations get green-lit, which angles reporters pursue
      — shape Atlantic''s institutional posture on tech. Writing book ''Easy Mode'' (Scribner) on frictionless digital technology.
      NYU BA Journalism + Sociology.'
    outgoing: null
    position: senior_editor_tech
    source_url: https://talkingbiznews.com/they-re-hiring/the-atlantic-hires-beres-as-senior-editor-for-tech-coverage/
  - date: 2023-04
    incoming: Gilad Edelman
    notes: Edelman hired as senior editor to expand economics and political economy coverage. Came from brief FTC stint (communications
      strategist under Lina Khan, Sep 2022 - Apr 2023). Before that, politics writer at Wired (Nov 2019 - Sep 2022). Yale
      JD, Columbia BA. Rare journalist → government → journalist career arc. Now covers tech antitrust (Google), political
      economy, and broader tech policy with legal/regulatory expertise.
    outgoing: null
    position: senior_editor_economics
    source_url: https://talkingbiznews.com/they-re-hiring/the-atlantic-hires-edelman-as-a-senior-editor-for-economics-coverage/
  - date: 2026-04
    incoming: Will Oremus
    notes: 'KEY HIRE: Will Oremus joined from Washington Post as tech reporter covering online speech, AI, and the information
      economy. CROSS-PUBLICATION MIGRATION — WaPo (Bezos-owned) → Atlantic (Emerson Collective-owned). Departed WaPo amid
      Feb 2026 layoffs (~1/3 of staff). 4.8-year WaPo tenure co-writing "Tech 202" newsletter with Cristiano Lima-Strong.
      Prior: Slate senior writer (8 years, co-hosted "If Then" podcast), OneZero/Medium. Stanford BA Philosophy, Columbia
      MA Politics. Tests whether his measured, explanatory analysis style adapts under Atlantic''s institutional voice and
      Nicholas Thompson''s editorial culture (Thompson = ex-Wired EIC, now Atlantic CEO).'
    outgoing: null
    position: tech_reporter
    source_url: https://www.theatlantic.com/author/will-oremus/
  - date: 2024-10
    incoming: Zoë Schiffer
    notes: 'KEY LEADERSHIP HIRE: Schiffer hired as Director, Business & Industry — the top editorial role for all business
      coverage. Reports to Executive Editor Brian Barrett. Joins Tim Marchman (Director, Science) and Mike Calore (Director,
      Consumer Tech & Culture) to complete Drummond''s newsroom leadership triumvirate. Previously managing editor at Platformer
      (Casey Newton''s newsletter) and author of "Extremely Hardcore: Inside Elon Musk''s Twitter" (Portfolio/PRH, Feb 2024).
      Before that, senior reporter at The Verge covering labor/workplace, and briefly on NBC''s tech investigations team.
      Started in tech industry (content manager, UX writer at Uber) before journalism. Stanford MA Journalism, UC Berkeley
      BA Political Science. Announced Oct 31, 2024; officially started January 2025. Co-host of "Uncanny Valley" podcast (launched
      same day as announcement). Drummond''s memo explicitly frames the role as "documenting the exploits and foibles of Silicon
      Valley''s companies and characters — and doing it better than anybody else" — establishing adversarial Big Tech coverage
      as a stated hiring criterion. ANALYTICALLY SIGNIFICANT: Schiffer brings the indie-newsletter adversarial voice directly
      into Wired''s institutional structure, and her editorial authority over Wired''s entire business desk (Matsakis, Kleeman,
      Zeff, et al.) means her framing choices become institutionally amplified rather than individually contained.'
    outgoing: null
    position: director_business_industry
    source_url: https://talkingbiznews.com/media-news/wired-hires-schiffer-as-director-of-business-and-industry/
  - date: 2025-01
    incoming: Kristen V. Brown
    notes: Health/biotech staff writer hired from Bloomberg News. Covered genetics, biohacking, vaccine psychology, reproductive
      health. Previously at Gizmodo and SF Chronicle. Part of Atlantic's continued newsroom expansion under Goldberg. Gizmodo
      alumni connection to Wired's Drummond pipeline.
    outgoing: null
    position: staff_writer_health_tech
    source_url: https://talkingbiznews.com/they-re-hiring/the-atlantic-hires-bloombergs-brown/
  - date: 2026-01
    incoming: Will Gottsegen
    notes: Staff writer on The Atlantic Daily newsletter team. Previously at CoinDesk, Billboard, SPIN. Crypto/tech reporter
      who interviewed SBF pre-arrest. Works alongside David A. Graham to write daily newsletter — high-volume framing influence
      position. Part of Atlantic's editorial staff expansion announced alongside Jonathan Lemire (politics).
    outgoing: null
    position: staff_writer_daily_newsletter
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-emily-bobrow-and-katie-zezima-as-senior-editors-will-gottsegen-and-jonathan-lemire-join-as-staff-writers,261030
  - date: 2025-10
    incoming: Alex Reisner
    notes: 'Promoted from contributing writer to staff writer. Mastermind behind Atlantic''s AI Watchdog project. Foremost
      investigator of hidden AI training data — broke the 190,000 pirated books story (2023), prompted Atlantic pieces from
      Margaret Atwood and Stephen King. Background includes programming. KEY: His AI training data investigations directly
      intersect with Meta''s AI data practices.'
    outgoing: null
    position: staff_writer_ai_investigations
    source_url: https://talkingbiznews.com/they-re-hiring/reisner-named-staff-writer-at-the-atlantic/
  - date: 2025-10
    incoming: Paul Beckett
    notes: 'KEY MIGRATION: WSJ Washington bureau chief (7 years) → Atlantic senior editor for national security and foreign
      policy. Led WSJ''s campaign to free Evan Gershkovich from Russia. 25+ year WSJ career spanning New York (financial industry),
      London, Mexico City, New Delhi (South Asia bureau chief, OPC Award), Hong Kong (Asia Editor), and ran coverage of 1MDB
      scandal (Pulitzer finalist 2016). WSJ → Atlantic represents Murdoch/Dow Jones → Emerson Collective pipeline. Significant
      because national security framing shapes AI policy coverage — Wong''s "White House vs Anthropic" (Jun 2026) and "Trump
      Seizes AI Companies" (Apr 2026) pieces fall squarely in national security/AI intersection that Beckett''s desk now oversees.
      Announced alongside Simon Shuster (Time), Lily Meyer, Alex Reisner, and Yvonne Wingett Sanchez (WaPo).'
    outgoing: null
    position: senior_editor_national_security
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-paul-beckett-as-senior-editor-and-staff-writers-lily-meyer-alex-reisner,258204
  - date: 2025-10
    incoming: Yvonne Wingett Sanchez
    notes: 'CROSS-PUBLICATION MIGRATION: WaPo → Atlantic (same ownership pattern as Will Oremus Apr 2026). Covered threats
      to democracy at WaPo for 3 years. 20+ years at Arizona Republic before WaPo. Part of continued WaPo → Atlantic talent
      drain (at least 2 tech-adjacent reporters moved in 6 months: Wingett Sanchez Oct 2025, Oremus Apr 2026).'
    outgoing: null
    position: staff_writer_politics
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-paul-beckett-as-senior-editor-and-staff-writers-lily-meyer-alex-reisner,258204
  - date: 2025-01
    incoming: Griff Witte
    notes: 'KEY LEADERSHIP HIRE: Griff Witte hired as managing editor to lead politics and accountability team. 23-year veteran
      of the Washington Post — served as senior politics and democracy editor leading a 50-person team. Foreign correspondent
      in Kabul, Islamabad, Jerusalem, London, Berlin. Reports to deputy executive editor Yoni Appelbaum. Part of a massive
      WaPo → Atlantic exodus following Jeff Bezos''s endorsement controversy (Oct 2024): Ashley Parker, Michael Scherer, Philip
      Rucker, Josh Dawsey, Tyler Pager, and many others also left WaPo. Witte was specifically recruited for democracy/accountability
      beat — aligned with Atlantic''s anti-Trump editorial posture under Goldberg. Previously a reporter at Miami Herald and
      researcher for Steve Coll''s Pulitzer-winning ''Ghost Wars.'''
    outgoing: null
    position: managing_editor_politics
    source_url: https://www.editorandpublisher.com/stories/griff-witte-joining-the-atlantic-as-a-managing-editor,252636
  - date: 2025-06
    incoming: Josh Tyrangiel
    notes: 'KEY HIRE — TECH/AI: Josh Tyrangiel hired as staff writer covering ''the intersection of technology, AI and government
      policy.'' Former editor of Bloomberg Businessweek (reinvented the magazine, National Magazine Award for General Excellence
      2012), chief content officer of Bloomberg Media, EVP of News at Vice Media (created Vice News Tonight on HBO, 15 Emmys),
      and deputy managing editor of TIME. Most recently wrote regular AI column for Washington Post. Author of ''AI for Good''
      (Simon & Schuster, May 2026). 12-time Emmy winner. EDITORIAL SIGNIFICANCE: Tyrangiel is the most senior editorial executive
      to join a tracked publication as a staff writer. His constructive AI framing (''AI as practical tool for healthcare,
      education, government'') creates an INTERNAL TENSION with LaFrance''s ''Facebook is a Doomsday Machine'' adversarial
      posture. Tests whether The Atlantic''s editorial environment permits constructive tech voices or modulates them toward
      institutional skepticism. Part of the same 2025 Atlantic expansion wave that brought Griff Witte, Caity Weaver, and
      other WaPo departures.'
    outgoing: null
    position: staff_writer_tech_ai
    source_url: https://rss.ponder.cat/post/172398
  - date: 2025-06
    incoming: Quinta Jurecic
    outgoing: null
    position: staff_writer_law_governance
    notes: 'THINK-TANK PIPELINE HIRE: Elevated from contributing writer (since ~2018) to staff writer. Announced in batch
      with Olorunnipa and Youssef. Previously fellow at Brookings Institution Governance Studies and senior editor at Lawfare.
      WaPo editorial writer (2017-2018). Wesleyan BA Political Science 2015. Unique career path through think tanks (Brookings)
      rather than traditional newsroom ladder. Deep Section 230/platform governance expertise from Gonzalez v. Google webinar
      and Lawfare "Arbiters of Truth" podcast. Still maintains Lawfare senior editor affiliation. Based at The Wharf. ANALYTICAL
      SIGNIFICANCE: First tracked journalist entering a publication via the policy-institution pipeline (Brookings/Lawfare)
      rather than a competing newsroom. Tests whether governance/regulatory framing produces structurally different tech coverage
      than the adversarial-exposé mode of former tech-beat reporters.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-staff-writers-quinta-jurecic-toluse-olorunnipa-and-nancy-youssef,256335
  - date: 2025-06
    incoming: Toluse Olorunnipa
    outgoing: null
    position: staff_writer_politics
    notes: 'WaPo→ATLANTIC MIGRATION (Bureau Chief level): Pulitzer Prize winner (2023, "His Name Is George Floyd"). Was WaPo
      White House Bureau Chief (2022-2025) — first reporter of native African/Nigerian descent to cover the White House. Stanford
      BA/MSc. Previously at Bloomberg News and Miami Herald. Part of massive 2025 WaPo→Atlantic exodus post-Bezos endorsement
      controversy (Oct 2024), alongside Ashley Parker, Michael Scherer, and other senior WaPo journalists. Adjunct professor
      at Northwestern. Based at The Wharf. ANALYTICAL SIGNIFICANCE: Highest-ranking WaPo departure to a tracked publication
      — tests whether White House-level political framing shifts between Bezos-owned WaPo and Emerson Collective-owned Atlantic,
      especially for tech-government intersection stories (AI executive orders, platform oversight, government shutdown impacts
      on tech regulation).'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-staff-writers-quinta-jurecic-toluse-olorunnipa-and-nancy-youssef,256335
  - date: '2025-07-07'
    incoming: Nancy Youssef
    outgoing: null
    position: staff_writer_national_security
    notes: 'WSJ→ATLANTIC MIGRATION: 20+ year national security veteran. Was WSJ national security correspondent (2021-2025).
      Previously: BuzzFeed News (senior national security), Daily Beast (senior defense), McClatchy (Baghdad bureau chief,
      chief Pentagon correspondent, Middle East bureau chief in Cairo covering 2011 Egyptian Revolution). Founded Pentagon
      Press Association. Egyptian-American, DC native, fluent Arabic. UVA BA Economics, Georgetown MSFS Security Studies.
      Knight Fellowship (2007-08), duPont-Columbia Award (2010). Announced Jun 18, effective Jul 7, 2025. Based at The Wharf.
      ANALYTICAL SIGNIFICANCE: 6-publication migration path is the longest in the dataset (Baltimore Sun → Detroit Free Press
      → McClatchy → Daily Beast → BuzzFeed News → WSJ → Atlantic). Spans wire/newspaper, two digital-native pubs, Murdoch
      business press, and Emerson Collective magazine. Her national security beat intersects with tech coverage when covering
      defense AI, military procurement, cyber operations, and surveillance. Recent Atlantic coverage: Hegseth/military restructuring
      (NPR Fresh Air appearance, 2026).'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-staff-writers-quinta-jurecic-toluse-olorunnipa-and-nancy-youssef,256335
  - date: 2026-03
    incoming: Sophia Nguyen
    outgoing: null
    position: staff_writer_culture_books
    notes: 'WAPO → ATLANTIC PIPELINE: Staff writer covering culture and books. Joined from Washington Post where she covered
      news and wrote features for the Books section. Part of the spring 2026 Atlantic hiring wave that drew at least 4 journalists
      from WaPo in a single batch. Announcement by EIC Jeffrey Goldberg praised her "impressive doggedness" and "elegance
      of her writing." Not tech-focused but represents the institutional talent drain from WaPo → Atlantic under Emerson Collective
      expansion.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-four-journalists-joining-its-growing-staff,260673
  - date: 2026-03
    incoming: Kevin Sieff
    outgoing: null
    position: staff_writer_international
    notes: 'WAPO → ATLANTIC PIPELINE: Staff writer, international/Latin America focus. Spent 15 years overseas at Washington
      Post (Kabul, Nairobi, Mexico City, Barcelona). Two Overseas Press Club awards, Pulitzer and Livingston finalist. His
      WaPo story on Mexican police apprehending American fugitives was adapted as Netflix series "The Gringo Hunters." Part
      of spring 2026 batch hire from WaPo. Not tech-focused but signals Atlantic''s aggressive poaching of WaPo''s most decorated
      correspondents.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-four-journalists-joining-its-growing-staff,260673
  - date: 2026-03
    incoming: Theo Balcomb
    outgoing: null
    position: senior_editor_podcasts
    notes: 'KEY MIGRATION: NPR → NYT → WaPo → Atlantic. Co-created The Daily at New York Times — one of the most influential
      podcast franchises in journalism. Career: NPR fellow → All Things Considered supervising producer → co-created The Daily
      (NYT) → WaPo (edited Peabody Award-winning "The Empty Grave of Comrade Bishop," Pulitzer finalist "Broken Doors," duPont-nominated
      "Field Trip") → Song Exploder → Atlantic (returning — helped develop Radio Atlantic relaunch in 2022). ANALYTICAL VALUE:
      4-institution migration spanning audio journalism''s prestige outlets. Her NPR → NYT → WaPo → Atlantic arc is the audio
      equivalent of the print journalist pipeline and represents editorial DNA transfer across institutions. Tests whether
      podcast editorial framing carries institutional culture the way print framing does.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-four-journalists-joining-its-growing-staff,260673
  - date: 2026-03
    incoming: Jonathan L. Fischer
    outgoing: null
    position: senior_editor_culture
    notes: 'WAPO → ATLANTIC PIPELINE: Senior editor focusing on Kennedy Center, Smithsonian, and Trump administration''s cultural
      policy. Came from Washington Post where he led similar coverage and "guided his reporters to scoop after scoop." Also
      edits broader culture stories including business of entertainment and media. Part of spring 2026 batch hire. PATTERN
      NOTE: This is the 4th WaPo journalist in a single announcement — the most aggressive single-batch poach of WaPo talent
      by any outlet since Bezos ownership turbulence began.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-four-journalists-joining-its-growing-staff,260673
  - date: 2026-01
    incoming: Caity Weaver
    outgoing: null
    position: staff_writer_features
    notes: 'NYT MAGAZINE → ATLANTIC: Staff writer, features. One of the most celebrated feature writers of her generation.
      Known for adventurous, riotously funny long-form pieces (profiling Progressive''s Flo, searching for Tom Cruise, eating
      endless appetizers at TGI Friday''s). EIC Goldberg: "one of the most formidable nonfiction writers of her generation."
      ANALYTICAL VALUE: NYT Magazine → Atlantic migration represents a different pipeline than the WaPo → Atlantic wave —
      this is Atlantic poaching from NYT''s premier feature-writing talent pool.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-hires-caity-weaver-as-staff-writer/259237
  - date: 2025-08
    incoming: Emily Bobrow
    outgoing: null
    position: senior_editor_politics_global_ideas
    notes: 'WSJ → ATLANTIC PIPELINE: Senior editor on the politics, global, and ideas team. Was features editor and reporter
      for WSJ Review section, known as "a creative, thoughtful and supportive editor." Previously wrote WSJ''s "Weekend Confidential"
      column (2020-2023). Earlier career at The Economist, covering culture, politics, and policy in New York, London, and
      Washington, D.C. Also contributed features and reviews to NYT Magazine, NewYorker.com, The Economist''s 1843, and The
      Atlantic itself (Family section piece on pandemic and marriage). Part of Aug 21, 2025 batch announcement alongside Katie
      Zezima, Will Gottsegen, and Jonathan Lemire. ANALYTICAL VALUE: WSJ → Atlantic represents Murdoch/Dow Jones → Emerson
      Collective editorial pipeline (same pattern as Paul Beckett, Oct 2025). Her editing gatekeeps which political and policy
      stories get shaped at Atlantic — downstream influence on tech-government intersection coverage.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-emily-bobrow-and-katie-zezima-as-senior-editors-will-gottsegen-and-jonathan-lemire-join-as-staff-writers,261030
  - date: 2025-08
    incoming: Katie Zezima
    outgoing: null
    position: senior_editor_politics_global_ideas
    notes: 'KEY MIGRATION — WAPO → ATLANTIC PIPELINE: Senior editor on the politics, global, and ideas team. 11-year Washington
      Post career spanning White House correspondent (Obama administration) → national political reporter → America desk editor
      (drugs, guns, gambling, NRA coverage) → health desk assignment editor (pandemic) → climate science and impact editor
      (Sep 2022). Known internally as a "story doctor" who elevates reporters'' work. Previously at AP (Newark bureau) and
      NYT (Boston). Knight-Wallace Journalism Fellow at University of Michigan. Boston University graduate. Member of two
      Pulitzer finalist teams: WaPo''s "Fentanyl Failure" and "Murder with Impunity" investigations. Part of Aug 21, 2025
      batch announcement with Bobrow, Gottsegen, and Lemire. ANALYTICAL SIGNIFICANCE: Highest-seniority WaPo editor (not just
      reporter) to move to Atlantic in 2025. Her America desk and climate editor background means she gatekeeps policy-heavy
      coverage where tech regulation, AI environmental impact, and government accountability intersect. Part of the massive
      WaPo → Atlantic exodus post-Bezos endorsement controversy (Oct 2024). At least 30 WaPo reporters/editors hired by Atlantic
      in recent years per Mediagazer and TheWrap reporting.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-emily-bobrow-and-katie-zezima-as-senior-editors-will-gottsegen-and-jonathan-lemire-join-as-staff-writers,261030
  - date: 2025-08
    incoming: Jonathan Lemire
    outgoing: null
    position: staff_writer_politics
    notes: 'ELEVATED from contributing writer (Jan 2025) to staff writer (Aug 2025). Co-host of MSNBC''s Morning Joe. Career:
      Columbia graduate → NY Daily News (10+ years, covered 9/11 aftermath, City Hall) → AP White House correspondent (2013-2021,
      asked Putin the Helsinki summit question alongside Trump) → MSNBC ''Way Too Early'' host (2021-2024) → Politico White
      House bureau chief (2021-2024) → Atlantic contributing writer (Jan 2025, announced alongside Caity Weaver) → staff writer
      (Aug 2025). Author of ''The Big Lie: Election Chaos, Political Opportunism, and the State of American Politics After
      2020.'' Lowell, MA native. ANALYTICAL VALUE: Highest-profile political journalist to join Atlantic from the cable news/wire
      service pipeline. His dual role at MSNBC + Atlantic creates a broadcast-print amplification loop — framing that originates
      in Atlantic reporting gets national cable airtime the same day. His AP → Politico → Atlantic arc maps the prestige ladder
      in DC political journalism.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-emily-bobrow-and-katie-zezima-as-senior-editors-will-gottsegen-and-jonathan-lemire-join-as-staff-writers,261030
  - date: 2025-10
    incoming: Adam Kirsch
    outgoing: null
    position: senior_editor_ideas_culture
    notes: 'WSJ → ATLANTIC PIPELINE: Senior editor. Most recently features editor for WSJ''s Review section (same section
      as Emily Bobrow — two editors from the same WSJ desk moved to Atlantic within months). Before WSJ: editor, writer, and
      critic for The New Republic, Tablet, The New York Sun, and The American Scholar. Author of four volumes of poetry. Taught
      seminars at Columbia University''s Center for American Studies on "The New York Intellectuals," "Writing September 11th,"
      and "American Jewish Literature." Already contributed to Atlantic before hire (book excerpts, pieces on apocalypse narratives,
      Benjamín Labatut). Announced Oct 31, 2025 alongside Luis Parrales (fact-checker → staff writer). ANALYTICAL VALUE: WSJ
      Review section → Atlantic pipeline now accounts for 3 senior editorial hires (Beckett from WSJ news, Bobrow from WSJ
      Review, Kirsch from WSJ Review). Murdoch/Dow Jones → Emerson Collective talent drain is a structural pattern.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-adam-kirsch-as-senior-editor-and-luis-parrales-as-staff-writer,258550
  - date: 2025-12
    incoming: Michael Leibel
    outgoing: null
    position: senior_editor_community
    notes: 'BLOOMBERG → ATLANTIC: Senior editor for community, leading efforts to build comments and a larger conversation
      forum on Atlantic''s website and app. Spent 8 years at Bloomberg News and Businessweek, leading audience, social-media,
      and video-curation strategy. Also developing a daily trivia game for readers alongside Drew Goins. Works closely with
      Atlantic''s product team. From North Carolina, UNC Chapel Hill graduate. Announced Dec 4, 2025 by executive editor Adrienne
      LaFrance and managing editor Bhumika Tharoor. ANALYTICAL VALUE: Bloomberg → Atlantic represents another financial media
      → Emerson Collective pipeline (same pattern as Beckett, Bobrow, Kirsch from WSJ). His community-building role is structurally
      significant: reader comments and forums shape how Atlantic''s institutional framing gets amplified or challenged by
      the audience. If community moderation adopts the adversarial tech-skeptic posture, it creates a feedback loop between
      editorial voice and reader engagement.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-adds-four-journalists-to-its-staff,259365
  - date: 2026-01
    incoming: Chris Suellentrop
    outgoing: null
    position: senior_editor
    notes: 'KEY MIGRATION — WAPO → ATLANTIC PIPELINE: Senior editor. Was WaPo opinions editor. Earlier career: story editor
      at NYT Magazine (edited Ellie Award-winning profile of Mike Allen by Atlantic''s Mark Leibovich) → NYT op-ed page staff
      editor (paper''s first blogger) → senior editor at Politico → deputy Washington bureau chief at Slate. Part of Jan 2026
      batch announcement alongside Henry Grabar (Slate), Judith Shulevitz (contributing → staff), and Uzodinma Iweala (contributing
      writer). ANALYTICAL SIGNIFICANCE: 5-publication migration path (Slate → Politico → NYT → WaPo → Atlantic) spanning digital-native
      (Slate), Beltway (Politico), prestige print (NYT), Bezos-owned (WaPo), and Emerson Collective (Atlantic). As a senior
      editor, his gatekeeping decisions on which stories get developed and how they get framed carry institutional weight.
      WaPo → Atlantic continues the post-Bezos exodus pattern — at least 6 senior editors/reporters made this specific move
      in 2025-2026.'
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-adds-four-journalists-to-its-staff,259365
  - date: 2024-05
    incoming: Ali Breland
    outgoing: null
    position: staff_writer
    notes: Hired from Mother Jones as staff writer covering disinformation and extremism. Announced alongside Matteo Wong
      promotion. Hired by deputy editor Paul Bisceglio. Brings extremism/tech-politics intersection beat — Nick Fuentes specialist,
      Livingston Awards finalist. Part of Atlantic's expansion of technology-adjacent coverage under LaFrance/Goldberg.
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-news-about-four-new-staff-writers,253076
  guardian:
  - date: 2015-06
    incoming: Katharine Viner
    notes: Viner became the first female editor-in-chief of the Guardian. Under her leadership, the paper has taken a strongly
      critical stance on Big Tech and AI. Still serving as of 2026.
    outgoing: Alan Rusbridger
    position: eic
    source_url: https://www.theguardian.com/media/2015/mar/20/katharine-viner-guardian-editor-in-chief
  - date: 2023-09
    incoming: Blake Montgomery
    notes: New US tech editor role. Montgomery came from Gizmodo (previously Daily Beast, BuzzFeed News). Signals Guardian
      US investing in dedicated tech editorial leadership.
