  guardian:
  - date: 2015-06
    incoming: Katharine Viner
    notes: Viner became the first female editor-in-chief of the Guardian. Under her leadership, the paper has taken a strongly
      critical stance on Big Tech and AI. Still serving as of 2026.
    outgoing: Alan Rusbridger
    position: eic
    source_url: https://www.theguardian.com/media/2015/mar/20/katharine-viner-guardian-editor-in-chief
  - date: 2023-09
    incoming: Blake Montgomery
    notes: New US tech editor role. Montgomery came from Gizmodo (previously Daily Beast, BuzzFeed News). Signals Guardian
      US investing in dedicated tech editorial leadership.
    outgoing: null
    position: us_tech_editor
    source_url: https://talkingbiznews.com/they-re-hiring/guardian-hires-montgomery-to-be-us-tech-editor/
  - date: 2022-09
    incoming: Betsy Reed
    notes: 'KEY LEADERSHIP CHANGE: Betsy Reed became Guardian US EIC, succeeding John Mulholland. Reed''s career arc (The
      Nation exec editor 2006-2014 → The Intercept EIC 2015-2022 → Guardian US EIC 2022-) is a pipeline from the institutional
      American left: The Nation (oldest weekly progressive magazine), The Intercept (adversarial investigative, founded by
      Glenn Greenwald/Jeremy Scahill/Laura Poitras with Omidyar funding), Guardian US. Under Reed: major expansion adding
      50+ journalists, 60% growth in supporting readers, new coverage areas (investigations, US soccer, wellness). Launched
      ''The Whole Picture'' US marketing campaign (fall 2025) emphasizing Guardian independence vs US press''s declining capacity.
      Harvard BA (1990, history and literature). Edited Scahill''s ''Blackwater'' and ''Dirty Wars''. CUNY Newmark J-School
      2025 commencement speaker. ANALYTICAL VALUE: Her Intercept background is the most adversarial institutional origin of
      any EIC in our dataset. The Intercept was built on the Snowden disclosures — surveillance, government overreach, corporate
      complicity. This editorial DNA directly shapes Guardian US coverage of Big Tech surveillance, data practices, and government-tech
      relationships during the entire study period.'
    outgoing: John Mulholland
    position: us_eic
    source_url: https://en.wikipedia.org/wiki/Betsy_Reed
  - date: 2025-10
    incoming: Jeremy Barr
    notes: 'KEY STRUCTURAL CHANGE: Guardian''s first-ever dedicated US media reporter. Barr came from Washington Post (5 years
      covering media industry, including Smartmatic v. Fox News). Reports to US business editor Dominic Rushe. Beat: media,
      politics, corporate influence — how powerful institutions shape information flows. Works closely with UK media editor
      Michael Savage. Previously: AdAge, Hollywood Reporter (media/politics), Politico Media. Emory BA + U Maryland MA journalism.
      ANALYTICAL VALUE: This hire signals Guardian US expanding beyond tech coverage into structural media criticism — ownership,
      regulation, lawsuits. His beat is precisely what MediaScope studies. The irony: a reporter covering media conflicts
      at other institutions, working for a publication with its own undisclosed OpenAI/Google licensing deals.'
    outgoing: null
    position: us_media_power_reporter
    source_url: https://editorandpublisher.com/stories/jeremy-barr-joins-the-guardian-as-its-first-media-reporter-in-the-us,256127
  - date: 2026-02
    incoming: Samantha Oltman
    notes: Hired to lead 'Reworked' year-long AI/work series. Former Recode EIC, Vox editorial director.
    outgoing: null
    position: ai_series_editor
    source_url: https://www.editorandpublisher.com/stories/guardian-launches-reporting-initiative-ai-work-power,262263
  - date: 2026-06
    incoming: null
    notes: 'KEY EVENT: Oltman departed after only ~4 months for Bloomberg (editor for AI/VC/startups under Sarah Frier). Reworked
      series lost its founding editor mid-run. Tests Guardian''s editorial resilience when a key hire departs quickly.'
    outgoing: Samantha Oltman
    position: ai_series_editor
    source_url: https://talkingbiznews.com/they-re-hiring/bloomberg-hires-oltman-as-editor-for-ai-vc-and-startups/
  - date: 2024-01
    incoming: Caspar Llewellyn Smith
    notes: 'KEY STRUCTURAL CHANGE: Guardian among first major UK newspapers to appoint a dedicated Chief AI Officer. Llewellyn
      Smith is a 20+ year Guardian veteran: joined from Daily Telegraph (2003) to launch Observer Music Monthly, then Head
      of Culture → editor of theguardian.com → Director of Digital Strategy → executive committee (2015) → Chief Product Officer
      (~5 years) → CAIO. Four focus areas: (1) external AI licensing agreements, (2) internal AI tool deployment, (3) strategic
      thinking about AI/journalism future, (4) org-wide AI training. Set up Guardian AI Council (senior editors + technologists).
      Participated in Globe and Mail Foundation ''Editing Democracy'' panel (2026). ANALYTICAL VALUE: The CAIO role creates
      institutional AI strategy at the executive level — separate from editorial coverage of AI. This dual positioning (covering
      AI critically while commercially licensing content to AI companies) is the central tension in the Guardian''s AI posture.'
    outgoing: null
    position: chief_ai_officer
    source_url: https://theorg.com/org/guardian-media-group/org-chart/caspar-llewellyn-smith
  - date: 2024-10
    incoming: Robert Booth
    notes: 'KEY EDITORIAL SIGNAL: Guardian replaced an 11-year tech-specialist editor (Hern: economics→tech pipeline, TechScape
      newsletter founder, Technology Journalist of the Year 2020) with a 24-year housing/homelessness investigative reporter
      who had zero tech journalism experience. This is a deliberate institutional choice: investigative instincts and accountability
      framing over subject-matter expertise. Booth''s Grenfell Tower coverage (exposing systemic corporate dishonesty and
      government failure that killed 72 people) is the template he brings to tech accountability. Tests the hypothesis that
      tech coverage quality depends more on investigative methodology than tech fluency.'
    outgoing: Alex Hern
    position: uk_technology_editor
    source_url: https://talkingbiznews.com/they-re-hiring/guardian-tech-editor-hern-is-departing/
  - date: 2024-12
    incoming: Dara Kerr
    notes: 'Kerr replaced Kari Paul (departed mid-2024 for art school) as Guardian''s West Coast/Bay Area tech reporter. Career
      arc: CNET → The Markup → NPR → Guardian — consistent move toward accountability-focused, public-interest journalism
      models. Each institution operates outside traditional advertising-revenue dependency. Labor/surveillance specialist.'
    outgoing: Kari Paul
    position: us_technology_reporter
    source_url: https://talkingbiznews.com/media-news/guardian-hires-kerr-as-a-tech-reporter/
