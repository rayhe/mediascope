editorial_changes:
  wired:
  - position: eic
    outgoing: Chris Anderson
    incoming: Scott Dadich
    date: 2012-07
    notes: Anderson left to run 3D Robotics. Dadich was Wired's creative director.
  - position: eic
    outgoing: Scott Dadich
    incoming: Nicholas Thompson
    date: 2017-02
    source_url: https://www.nytimes.com/2017/01/17/business/media/wired-nicholas-thompson-editor.html
    notes: Thompson came from The New Yorker (another CN title). Expanded Wired's political coverage significantly.
  - position: eic
    outgoing: Nicholas Thompson
    incoming: Gideon Lichfield
    date: 2020-09
    source_url: https://www.wired.com/story/gideon-lichfield-new-editor-wired/
    notes: Thompson left for The Atlantic. Lichfield came from MIT Technology Review (Quartz before that).
  - position: platforms_power_reporter
    outgoing: null
    incoming: Vittoria Elliott
    date: 2022-07
    source_url: https://talkingbiznews.com/they-re-hiring/wired-hires-elliott-to-cover-platforms-and-power/
    notes: 'Hired from Rest of World to cover technology platforms and their power. Background: international development
      (Ghana, Kenya, India) → freelance (Al Jazeera, ProPublica, The New Humanitarian) → Rest of World → Wired. Non-traditional
      pipeline into Wired tech journalism. Led Wired''s AI Elections Project (2024). Promoted to senior writer by 2025-2026.
      Tufts BA, Columbia Journalism MS.'
  - position: editorial_director
    outgoing: Gideon Lichfield
    incoming: Katie Drummond
    date: 2023-09
    source_url: https://www.nytimes.com/2023/09/11/business/media/wired-katie-drummond.html
    notes: 'KEY EVENT: Drummond became Global Editorial Director. Previously ran VICE''s digital reporting globally (SVP,
      2019-2023), was Gizmodo EIC (2015-2017), and started career as Wired intern (2009). Explicitly adversarial framing:
      ''If you do wrong, I want the world to know.'' Created first-ever Wired politics team (Nov 2023). DOGE coverage drove
      62,500 new US subs in 2 weeks (Feb 2025). Won Sidney Hillman Prize. Launched ''Story Zero'' newsroom ethos. Reports
      to Anna Wintour. Freedom of the Press Foundation board (2024). This is the most important leadership change for detecting
      Wired''s adversarial editorial shift — her entire career (Gizmodo → Vice → Wired) is an adversarial-journalism pipeline.'
  - position: senior_editor_security_investigations
    outgoing: null
    incoming: Andrew Couts
    date: 2022-04
    source_url: https://theorg.com/org/wired/org-chart/andrew-couts
    notes: 'FOUNDATIONAL HIRE: Couts joined as Senior Editor, Security & Investigations ~18 months before Drummond arrived.
      Previously executive editor at Gizmodo (4+ years), politics editor at The Daily Dot (3.5 years). Oversees cybersecurity,
      privacy, surveillance, policing, crime, and national security — PLUS all cross-desk investigations. His security desk
      manages Andy Greenberg, Lily Hay Newman, Dell Cameron, Dhruv Mehrotra, Matt Burgess (UK). His Gizmodo executive editorship
      overlapped with Tim Marchman, Dell Cameron, and Dhruv Mehrotra — all of whom he would later work with again at Wired.
      The Daily Dot overlap with William Turton creates a mentor-protégé lineage. Title upgraded to "Director, Security &
      Investigations" by 2025-2026, paralleling other Director promotions under Drummond. Awards with teams: 2024 Sigma Award,
      2023 Philip Meyer Journalism Award, 2022 Edward R. Murrow Award.'
  - position: politics_editor
    outgoing: null
    incoming: Leah Feiger
    date: 2023-11
    source_url: https://talkingbiznews.com/they-re-hiring/wired-is-launching-a-political-coverage-team/
    notes: 'KEY STRUCTURAL CHANGE: First-ever Wired politics editor. Feiger hired from Vice News (where she overlapped with
      Drummond). Team also included William Turton (Bloomberg, cybersecurity) and David Gilbert (online extremism). Initially
      reported to Meg Marco (exec editor of news, Mar-Dec 2023); after Marco''s rapid departure, reports to Brian Barrett
      (exec editor of news, Jan 2024-present). Promoted to ''Director of Politics & Science'' by 2025-2026. Feiger on Drummond:
      ''I cannot state enough how farsighted Katie Drummond was.'' This hire represents Wired''s institutional pivot from
      tech-centric publication to tech-politics hybrid.'
  - position: politics_team_writer
    outgoing: null
    incoming: Makena Kelly
    date: '2023-11-27'
    source_url: https://talkingbiznews.com/they-re-hiring/wired-hires-kelly-for-politics-team/
    notes: 'POLITICS TEAM EXPANSION: Kelly hired as senior writer from The Verge, same month as Leah Feiger (politics editor)
      and alongside William Turton (Bloomberg) and David Gilbert. Kelly covers intersection of politics, power, and technology.
      Writes Politics Lab newsletter. Background: CQ Roll Call (Congress reporter) → The Verge (politics reporter) → Wired.
      Part of Drummond''s unprecedented creation of Wired''s first politics team.'
  - position: director_consumer_tech_culture
    outgoing: null
    incoming: Michael Calore
    date: 2024-01
    source_url: https://talkingbiznews.com/they-re-hiring/wired-names-barrett-its-executive-editor/
    notes: Promoted to Director, Consumer Tech & Culture — first of three Director positions Drummond created to restructure
      Wired's newsroom. Oversees all Wired Gear, Culture, and Service coverage across US and UK. Longtime Wired editor. Announced
      alongside Barrett's executive editor hire.
  - position: executive_editor_news
    outgoing: null
    incoming: Meg Marco
    date: 2023-03
    source_url: https://talkingbiznews.com/they-re-hiring/wired-hires-marco-as-executive-editor-of-news/
    notes: 'KEY HIRE: Drummond''s first executive editor of news. Marco came from Observer (EIC, 2 years) and before that
      ProPublica (senior editor, Pulitzer finalist 2021 for COVID coverage), WSJ (masthead editor, founded Media Science Lab),
      Axios (Deep Dive editor), Consumerist (Gawker Media → Consumer Reports). Consumer advocacy and audience strategy background
      — not a traditional newsroom operator. Her Gawker Media connection (Consumerist) links her to the adversarial media
      ecosystem that later populated Wired''s senior ranks. Oversaw launch of politics team (Feiger, Turton, Gilbert).'
  - position: executive_editor_news
    outgoing: Meg Marco
    incoming: null
    date: 2023-12
    source_url: https://talkingbiznews.com/media-news/executive-editor-marco-is-leaving-wired/
    notes: 'RAPID DEPARTURE: Marco left after only ~9 months. "I''m proud of the all the amazing work we accomplished in what
      felt like an instant, and can''t thank everyone enough." Departed to Harvard Berkman Klein Center (Applied Social Media
      Lab). Her departure so soon after launching the politics team raises questions: editorial alignment issues, strategic
      disagreement with Drummond, or planned short-term engagement? The politics team she built was immediately handed to
      Barrett (a more adversarial-journalism-native leader). SUCCESSION: Brian Barrett rehired as executive editor of news
      Jan 16, 2024 — Barrett''s Gizmodo adversarial DNA aligned more closely with Drummond''s editorial vision than Marco''s
      audience-strategy background.'
  - position: executive_editor_news
    outgoing: Meg Marco
    incoming: Brian Barrett
    date: '2024-01-16'
    source_url: https://talkingbiznews.com/they-re-hiring/wired-names-barrett-its-executive-editor/
    notes: 'KEY STRUCTURAL HIRE: Barrett returned to Wired as executive editor of news, REPLACING Meg Marco who departed after
      only ~9 months. Barrett had a prior ~8 year stint at Wired (2014-2022) and was EIC of Gizmodo before/after. Recruited
      by Drummond to oversee US and UK news teams. Drummond''s announcement: ''his humor, compassionate leadership style,
      general appreciation of weirdness, and proven track record writing and editing stories that are smart, thoughtful, and
      often painfully clever, make him the perfect person for this role.'' Same announcement promoted Michael Calore to Director,
      Consumer Tech & Culture. MARCO → BARRETT SUCCESSION: The transition from an audience-strategy-focused exec editor (Marco:
      ProPublica/WSJ/Axios) to an adversarial-journalism-native exec editor (Barrett: Gizmodo EIC) represents a course correction
      — Drummond chose editorial-DNA alignment over operational expertise.'
  - position: senior_writer_china
    outgoing: null
    incoming: Zeyi Yang
    date: 2025-01
    source_url: https://law.yale.edu/yls-today/yale-law-school-events/paul-tsai-china-center-conversation-poynter-fellow-zeyi-yang
    notes: 'KEY HIRE: Zeyi Yang joined from MIT Technology Review as senior writer covering China technology and business.
      CROSS-PUBLICATION MIGRATION — second MIT TR → Wired migration after Will Knight (2018). 2024 ASME NEXT Award winner.
      Created MIT TR''s China Report newsletter. Yale Poynter Fellow (Mar 2026). Only tracked journalist who can read primary
      Chinese-language sources. Tests whether MIT TR''s nuanced China coverage framing changes under Wired''s Drummond-era
      adversarial editorial posture.'
  - position: politics_team_departure
    outgoing: William Turton
    incoming: null
    date: 2026-02
    source_url: https://propublica.org/article/william-turton-joins-propublica-as-national-reporter
    notes: 'FIRST POLITICS TEAM DEPARTURE: Turton left for ProPublica as national reporter covering FBI/DOJ after ~2.3 years
      at Wired. The first departure from Drummond''s Nov 2023 politics team (Feiger, Turton, Gilbert). His exit is analytically
      significant: he moved from tech-politics intersection to pure federal law enforcement, suggesting his beat evolved beyond
      Wired''s tech-first editorial framing. Also breaks the Drummond orbit — Turton had followed Drummond through Gizmodo
      → The Outline → Wired. Wired''s DOGE coverage likely continues through Feiger (now Director of Politics & Science) but
      loses Turton''s cybersecurity + political campaigns hybrid expertise.'
  - position: uk_print_edition
    outgoing: null
    incoming: null
    date: '2026-01-01'
    source_url: https://talkingbiznews.com/media-news/wired-pulls-plug-on-uk-print-edition/
    notes: 'STRUCTURAL: Wired pulled UK print edition for 2026. 7 editorial staff left London office at end of 2025. Team
      rebuilt to focus on audience development roles and some UK/Europe-focused reporting. Global editorial director Katie
      Drummond: "creating a sustainable and growing subscription business is the future of Wired." Digital-only subscribers
      doubled in 2025, direct-to-publisher subscribers up 20%. Significant because it reduces Wired''s London editorial capacity
      while Joel Khalili and Matt Burgess still report from UK. Signals Condé Nast cost-cutting that may affect editorial
      independence.'
  - position: senior_editor_science
    outgoing: null
    incoming: Brian Kahn
    date: '2026-05-04'
    source_url: https://talkingbiznews.com/media-news/wired-hires-editors-from-business-insider-bloomberg/
    notes: Brian Kahn hired as senior editor on science desk, reports to Tim Marchman. Previously at Bloomberg (climate team
      editor, flagship newsletter), Protocol (climate coverage), Earther. Based in San Francisco office. Oversaw clean tech
      coverage, decommissioning satellites, Australia-Singapore power cable, firefighting planes competition. Climate/clean
      tech expertise adds to Wired's science desk capacity.
  - position: senior_editor_business
    outgoing: null
    incoming: Sophie Kleeman
    date: '2026-05-11'
    source_url: https://talkingbiznews.com/media-news/wired-hires-editors-from-business-insider-bloomberg/
    notes: 'Sophie Kleeman hired as senior editor on business desk, reports to Zoë Schiffer. Previously deputy enterprise
      editor at Business Insider — edited award-winning stories on data centers, C-sections, transgender violence, Elon Musk''s
      Tesla empire. Also followed Pelosi''s ice-cream-and-hot-dog diet for a week. Before BI: reporter and editor at Gizmodo,
      freelance. Based in New York office. KEY: reports to Zoë Schiffer, who herself migrated from The Verge → Platformer
      → Wired. Business desk editorial hierarchy now has Drummond → Schiffer → Kleeman for enterprise tech.'
  - position: director_science_politics_security
    outgoing: null
    incoming: Tim Marchman
    date: 2024-01
    source_url: https://thebulletin.org/2025/03/staring-into-the-doge-abyss-with-wireds-tim-marchman/
    notes: 'KEY STRUCTURAL HIRE: Marchman recruited by Katie Drummond as Director of Science, Politics, and Security — the
      second of three Director positions created. Oversees politics desk (Leah Feiger), science desk (Brian Kahn), and security
      coverage. Career: sportswriter (Chicago baseball) → Deadspin EIC (Gawker Media) → Gizmodo Media special projects editor
      (2018-2019, overlapping with Drummond''s Gizmodo tenure) → Vice Media features director (2019-2024, during Vice''s bankruptcy)
      → Wired. Philadelphia-based. Led Wired''s DOGE scoops that consistently beat NYT/WaPo. His Gizmodo → Vice → Wired trajectory
      parallels Drummond''s own adversarial-journalism pipeline (Wired intern → Gizmodo EIC → Vice SVP → Wired editorial director).
      Third Gizmodo/Vice alumnus in Wired leadership alongside Drummond and Leah Feiger.'
  - position: senior_writer_climate
    outgoing: null
    incoming: Molly Taft
    date: '2025-03-24'
    source_url: https://talkingbiznews.com/media-news/wired-hires-taft-as-senior-writer/
    notes: 'Molly Taft hired as senior writer covering climate on science desk. Reports to Tim Marchman. Previously reporter/editor
      at Drilled Media (climate investigative outlet), contributing senior editor at The New Republic (climate vertical),
      staff writer at Earther/Gizmodo (won 2023 SEAL Environmental Award), Center for Public Integrity fellow. Columbia Journalism
      MS. New York office. Focus: new energy technologies, who profits, and impact on average people. Another Earther/Gizmodo
      alumnus — the fourth Earther connection at Wired alongside Brian Kahn, plus broader Gizmodo network (Drummond, Marchman,
      Schiffer via Vice overlap).'
  - position: senior_writer_culture
    outgoing: null
    incoming: Miles Klee
    date: '2026-02-02'
    source_url: https://editorandpublisher.com/stories/wired-adds-senior-writer-to-the-culture-desk/
    notes: Miles Klee hired as senior writer on culture desk. Reports to Michael Calore (Director, Consumer Tech & Culture).
      Previously culture writer at Rolling Stone (~3.5 years), senior staff writer at MEL Magazine (~5 years), staff writer
      at The Daily Dot. Also written for Washington Post, Vanity Fair, Slate, Vulture. Los Angeles-based. Covers internet
      culture, conspiracy theories, memes, digital subcultures. Announced by executive editor Brian Barrett. Author of novels
      and story collections. Unusual hire — non-traditional pipeline from cultural criticism and internet culture journalism,
      not from tech reporting. Signals Wired's editorial expansion beyond pure tech coverage under Drummond.
  - position: senior_writer_beat_shift
    outgoing: null
    incoming: Kate Knibbs
    date: '2026-02-11'
    source_url: https://talkingbiznews.com/they-re-hiring/wired-senior-reporter-knibbs-moves-to-prediction-market-beat/
    notes: 'BEAT SHIFT: Kate Knibbs moved from AI copyright/media beat to prediction markets. Previously covered "the human
      side of the generative AI boom" and AI copyright litigation — the exact intersection of Condé Nast''s undisclosed AI
      licensing conflicts. Now covers Polymarket, Kalshi, insider trading in prediction markets, regulatory battles. Beat
      shift may reduce Wired''s dedicated AI copyright coverage capacity — significant given the Richner v. Microsoft 400-newspaper
      lawsuit filed Jun 24, 2026. Tests: did editorial leadership reassign her because AI copyright was getting too close
      to Condé Nast''s own licensing deals?'
  - position: chief_business_correspondent_open
    outgoing: null
    incoming: null
    date: '2026-03-17'
    source_url: https://talkingbiznews.com/they-re-hiring/wired-seeks-a-chief-business-correspondent/
    notes: 'OPEN POSITION: Wired seeking a chief business correspondent — 12+ years experience, "break high-impact news,"
      "deep and extensive sourcing within the tech world," "authority on the business of tech" for video, events, podcasts.
      Must "work closely with the Executive Editor and the Senior Director to define and shape editorial strategy for the
      business desk." Guild position. Reports to Zoë Schiffer (Director, Business & Industry). This is the most senior open
      editorial position at Wired as of mid-2026 — whoever fills it shapes business/Big Tech coverage framing.'
  - position: acting_business_editor_uk
    outgoing: Peter Guest
    incoming: null
    date: '2025-12-01'
    source_url: https://talkingbiznews.com/media-news/guest-departs-wired-for-coda-story/
    notes: Peter Guest departed Wired London for Coda Story as senior editor. Was acting business editor for Wired UK. Previously
      enterprise editor at Rest of World (Singapore), features editor at Nikkei Asia (Tokyo). Written for Bloomberg Businessweek,
      The Atlantic, GQ, FT, WSJ, MIT Tech Review. Won Society of Publishers in Asia award (2022). Departure part of broader
      Wired UK contraction — his exit + 7 other UK staff departures at end of 2025 coincide with UK print edition cancellation.
  - position: senior_correspondent_politics
    outgoing: null
    incoming: Hugo Lowell
    date: '2026-04-27'
    source_url: https://talkingbiznews.com/they-re-hiring/wired-hires-lowell-as-senior-correspondent/
    notes: 'GUARDIAN → WIRED MIGRATION: Hugo Lowell hired as senior correspondent on politics desk, replacing William Turton
      (departed Feb 2026 for ProPublica). Previously Guardian US White House correspondent (2021-2026) — broke major stories
      on Trump classified documents, Jan 6 committee. Won National Press Club Sandy Hume Memorial Award 2022. Before Guardian:
      sports politics/doping reporter at i newspaper (London), private equity analyst at Zetland Capital (London). Born 1999,
      NYC. Dalton School + St Paul''s School (London) + BSc Economics & Philosophy, University of Bristol. Reports to Leah
      Feiger (Director, Politics & Science). Takes over Wired politics newsletter. Regular MSNBC/CNN/BBC analyst. DC-based.
      ANALYTICAL VALUE: Second Guardian → Wired migration in 2026 (alongside Rosie Swash). Brings pure political investigative
      DNA rather than tech journalism background — tests whether Wired''s politics desk is becoming a standalone political
      publication that happens to sit inside a tech magazine. His Guardian coverage of Trump-DOJ intersection maps cleanly
      onto Wired''s DOGE coverage (led by Tim Marchman). No prior tech reporting experience whatsoever.'
  - position: deputy_editor_london
    outgoing: null
    incoming: Rosie Swash
    date: '2026-05-05'
    source_url: https://talkingbiznews.com/they-re-hiring/wired-hires-swash-as-deputy-editor-in-london/
    notes: 'GUARDIAN → WIRED MIGRATION: Rosie Swash hired as Deputy Editor in London — a newly created role. Previously 17+
      years at the Guardian (Observer → Guardian, senior news editor leading tech/environment/science/health desks), then
      editor at Mill Media. Reports to Brian Barrett (exec editor of news). Won 2024 Amnesty Media Prize for ''The Mystery
      of Bangladesh''s Missing Children'' investigation. Covered Afghanistan, Iran, Ukraine for Guardian''s ''Rights and Freedoms''
      series. ANALYTICAL VALUE: Third Guardian → Wired pipeline hire in 2025-2026 (after Blake Montgomery as US tech editor
      Sep 2023 via Gizmodo, and Hugo Lowell Apr 2026). The Deputy Editor role is new — Swash shapes UK editorial output directly.
      Paired with a new London general assignment staff writer (TBD hire). Her Guardian investigative and accountability DNA
      (Grenfell-era newsroom, conflict reporting) entering Wired''s London desk mirrors the Robert Booth appointment at Guardian
      (housing investigator → tech editor). Signals Wired UK rebuilding post-print-cancellation with Guardian-trained editorial
      leadership rather than tech-native journalists.'
  - position: senior_editor_business_departure
    outgoing: Tom Simonite
    incoming: null
    date: 2024-06
    source_url: https://editorandpublisher.com/stories/tom-simonite-joins-the-washington-post-as-tech-companies-editor,256005
    notes: 'DEPARTURE: Simonite left for Washington Post as Tech Companies Editor. Had been at Wired since Jun 2017 (7 years),
      rising from senior writer (AI/ML) to senior editor for business coverage. Launched Fast Forward AI newsletter. His departure
      removed a senior Silicon Valley business editor during Drummond''s restructuring — a knowledge/source network loss for
      Wired''s Big Tech coverage.'
  - position: contributing_editor
    outgoing: null
    incoming: Noah Shachtman
    date: 2024-03
    source_url: https://mediapost.com/publications/article/394143/former-rolling-stone-eic-noah-shachtman-reunites.html
    notes: 'RETURN: Shachtman returned to Wired as contributing editor, announced personally by Katie Drummond. Previously
      at Wired 1998-2014 (freelancer, then contributing editor; co-founded Danger Room blog). Interim career: Foreign Policy
      exec editor → Daily Beast EIC (2018-2021) → Rolling Stone EIC (2021-2024, departed over brand direction dispute with
      Gus Wenner). Joins Brendan Koerner, Lauren Smily, Virginia Heffernan, Samanth Subramanian as contributing editors. Writes
      features, enterprise, assists with politics coverage talent scouting.'
  - position: senior_writer_europe
    outgoing: Morgan Meaker
    incoming: null
    date: 2024-09
    source_url: https://talkingbiznews.com/media-news/wired-senior-writer-meaker-is-departing/
    notes: 'DEPARTURE: Meaker left after 3 years covering Europe. Joined Bloomberg Weekend as senior writer. Won BSME ''best
      of best'' 2023 during Wired tenure. Her departure leaves Wired without a dedicated Europe correspondent — significant
      gap given EU tech regulation (DSA, DMA, AI Act) is increasingly relevant to Meta/Big Tech coverage. No replacement announced
      as of Jun 2026.'
  - position: staff_writer_business
    outgoing: Paris Martineau
    incoming: null
    date: 2020-06
    source_url: https://talkingbiznews.com/media-news/wired-hires-martineau-as-a-staff-writer/
    notes: 'DEPARTURE: Martineau left Wired''s business desk after ~2 years to join The Information as tech/investigative
      reporter. Part of a broader pattern of Wired reporters leaving for paywalled or specialized outlets during the Thompson-to-Drummond
      editorial transition period. She was hired Oct 2018 (Thompson era) and departed before Drummond''s arrival (Jan 2023).'
  nytimes:
  - position: executive_editor
    outgoing: Dean Baquet
    incoming: Joseph Kahn
    date: 2022-06
    source_url: https://www.nytimes.com/2022/04/13/business/media/joseph-kahn-new-york-times-executive-editor.html
    notes: Kahn previously served as managing editor. Known for emphasizing investigative and explanatory journalism. Under
      his leadership, NYT sued OpenAI (Dec 2023).
  - position: managing_editor
    outgoing: Joseph Kahn
    incoming: Marc Lacey
    date: 2022-06
    notes: Lacey became managing editor when Kahn was promoted.
  - position: technology_editor
    incoming: Pui-Wing Tam
    date: 2015-01
    source_url: https://nytco.com/press/pui-wing-tam-named-deputy-business-editor/
    notes: Tam joined from Bloomberg (US tech coverage chief 2013-2015). Previously WSJ reporter/editor — HP hired PIs to
      surveil her phone/text records and trash in 2006. Promoted to deputy Business editor (2018). Built NYT's tech team —
      recruiters love her. Responsible for hiring Mike Isaac, Sheera Frenkel, Kashmir Hill, Karen Weise, Nico Grant, Tripp
      Mickle, and most of the SF tech bureau. 'The strength of our tech team is largely a testament to her.'
  - position: editorial_director_ai
    incoming: Zach Seward
    date: 2024-02
    source_url: https://wan-ifra.org/insight/divining-data-how-ai-invigorates-the-new-york-times-approach-to-investigative-reporting/
    notes: First editorial director of AI initiatives. Co-founded Quartz. Built Echo (AI summarization), Stet (AI quality
      evaluation), Cheat Sheet (AI investigations tool). Pro-AI-for-journalism within strict editorial guardrails.
  - position: technology_reporter_meta
    incoming: Eli Tan
    date: 2026-01
    source_url: https://nytco.com/press/staff-news-from-business/
    notes: Second dedicated Meta reporter alongside Mike Isaac. Promoted from NYT fellowship. Signals NYT's continued investment
      in Meta beat coverage.
  - position: technology_reporter_google
    outgoing: Nico Grant
    date: 2025-05
    source_url: https://talkingbiznews.com/they-move/ny-times-biz-reporter-grant-departs/
    notes: 'DEPARTURE: Grant left journalism entirely after 3 years covering Google/Alphabet. ''Working there was a dream
      come true, but now, it''s time to chase other dreams outside of journalism.'' Creates gap on NYT''s Google beat.'
  guardian:
  - position: eic
    outgoing: Alan Rusbridger
    incoming: Katharine Viner
    date: 2015-06
    source_url: https://www.theguardian.com/media/2015/mar/20/katharine-viner-guardian-editor-in-chief
    notes: Viner became the first female editor-in-chief of the Guardian. Under her leadership, the paper has taken a strongly
      critical stance on Big Tech and AI. Still serving as of 2026.
  - position: us_tech_editor
    outgoing: null
    incoming: Blake Montgomery
    date: 2023-09
    source_url: https://talkingbiznews.com/they-re-hiring/guardian-hires-montgomery-to-be-us-tech-editor/
    notes: New US tech editor role. Montgomery came from Gizmodo (previously Daily Beast, BuzzFeed News). Signals Guardian
      US investing in dedicated tech editorial leadership.
  - position: us_eic
    outgoing: John Mulholland
    incoming: Betsy Reed
    date: 2022-09
    source_url: https://en.wikipedia.org/wiki/Betsy_Reed
    notes: 'KEY LEADERSHIP CHANGE: Betsy Reed became Guardian US EIC, succeeding John Mulholland. Reed''s career arc (The
      Nation exec editor 2006-2014 → The Intercept EIC 2015-2022 → Guardian US EIC 2022-) is a pipeline from the institutional
      American left: The Nation (oldest weekly progressive magazine), The Intercept (adversarial investigative, founded by
      Glenn Greenwald/Jeremy Scahill/Laura Poitras with Omidyar funding), Guardian US. Under Reed: major expansion adding
      50+ journalists, 60% growth in supporting readers, new coverage areas (investigations, US soccer, wellness). Launched
      ''The Whole Picture'' US marketing campaign (fall 2025) emphasizing Guardian independence vs US press''s declining capacity.
      Harvard BA (1990, history and literature). Edited Scahill''s ''Blackwater'' and ''Dirty Wars''. CUNY Newmark J-School
      2025 commencement speaker. ANALYTICAL VALUE: Her Intercept background is the most adversarial institutional origin of
      any EIC in our dataset. The Intercept was built on the Snowden disclosures — surveillance, government overreach, corporate
      complicity. This editorial DNA directly shapes Guardian US coverage of Big Tech surveillance, data practices, and government-tech
      relationships during the entire study period.'
  - position: us_media_power_reporter
    outgoing: null
    incoming: Jeremy Barr
    date: 2025-10
    source_url: https://editorandpublisher.com/stories/jeremy-barr-joins-the-guardian-as-its-first-media-reporter-in-the-us,256127
    notes: 'KEY STRUCTURAL CHANGE: Guardian''s first-ever dedicated US media reporter. Barr came from Washington Post (5 years
      covering media industry, including Smartmatic v. Fox News). Reports to US business editor Dominic Rushe. Beat: media,
      politics, corporate influence — how powerful institutions shape information flows. Works closely with UK media editor
      Michael Savage. Previously: AdAge, Hollywood Reporter (media/politics), Politico Media. Emory BA + U Maryland MA journalism.
      ANALYTICAL VALUE: This hire signals Guardian US expanding beyond tech coverage into structural media criticism — ownership,
      regulation, lawsuits. His beat is precisely what MediaScope studies. The irony: a reporter covering media conflicts
      at other institutions, working for a publication with its own undisclosed OpenAI/Google licensing deals.'
  - position: ai_series_editor
    outgoing: null
    incoming: Samantha Oltman
