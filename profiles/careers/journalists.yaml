    notes: 'Senior editor for AI. 11-year tenure — one of the longest-serving AI beat reporters at any major publication.
      Joined from New Scientist in 2008. Also served as online managing editor. Covered fundamental advances in AI, machine
      learning, automated driving, and robotics. Wrote extensively about China''s AI boom. Witnessed the transition from AI
      winter to the deep learning revolution: was already covering the beat when AlexNet (2012), AlphaGo (2016), and early
      transformer work happened. MIT Tech Review''s institutional culture (academic-adjacent, MIT affiliation, research-focused)
      reinforced evidence-based skepticism about AI claims. This 11-year foundation means Knight arrived at Wired with deeper
      AI domain knowledge than almost any journalist in the field.'
    publication: mit-tech-review
    role: senior_editor
    source_url: https://www.technologyreview.com/author/will-knight/
