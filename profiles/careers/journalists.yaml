  - beat: AI, robotics, machine learning, China tech
    end: 2019-09
    event_type: hired
    notes: 'Senior editor for AI. 11-year tenure — one of the longest-serving AI beat reporters at any major publication. Joined from New Scientist in 2008.
      Also served as online managing editor. Covered fundamental advances in AI, machine learning, automated driving, and robotics. Wrote extensively about
      China''s AI boom. Witnessed the transition from AI winter to the deep learning revolution: was already covering the beat when AlexNet (2012), AlphaGo
      (2016), and early transformer work happened. MIT Tech Review''s institutional culture (academic-adjacent, MIT affiliation, research-focused) reinforced
      evidence-based skepticism about AI claims. This 11-year foundation means Knight arrived at Wired with deeper AI domain knowledge than almost any journalist
      in the field.'
    publication: mit-tech-review
    role: senior_editor
    source_url: https://www.technologyreview.com/author/will-knight/
    start: 2008-01
  - beat: AI, machine learning, robotics, military tech, computing
    event_type: hired
    notes: 'Senior writer covering artificial intelligence. Hired September 2019 (TalkingBizNews announcement Sep 17, 2019: "he starts next week"). Writes
      the AI Lab newsletter, "a weekly dispatch from the cutting edge of AI." Based in Cambridge, Massachusetts. Notable work includes: major feature on
      autonomous military systems and Navy AI testing in Gulf of Oman (praised by Carnegie Council), coverage of ChatGPT/LLM hype cycle with persistent
      skepticism about AGI timelines, EUV lithography and Moore''s Law feature. Poynter Fellowship in Journalism speaker at Yale (2024/25, on AI in journalism).
      Carnegie Council for Ethics podcast (Oct 2023, "Tales from the Hype Beat"). News Literacy Project featured guest (S3E1, on AI chatbots and search).
      KEY MIGRATION: MIT Tech Review → Wired represents academic-adjacent → Condé Nast pipeline. His 20+ year career covering AI (since the AI winter through
      deep learning revolution) makes him Wired''s most experienced AI reporter. Tests whether long beat experience produces different framing than journalists
      who arrived during the hype. Carnegie interview reveals his framing approach: explicitly skeptical of AGI extrapolation, focused on immediate harms
      (AI persuasion, subtle bias) over existential risk theater. Notably calls for more transparency from AI companies, not less regulation. Self-describes
      covering AI as "outsider perspective." Signal handle: wak.01. @wiredunion member.'
    publication: wired
    role: senior_writer
    source_url: https://www.wired.com/author/will-knight/
    start: 2019-09
  name: Will Knight
  notes: 'Key migration: New Scientist → CNET (brief) → MIT Tech Review → Wired. One of the longest-serving AI beat reporters in journalism — covering AI
    since the early 2000s AI winter through the deep learning revolution and LLM hype cycle. Studied anthropology and journalism in the UK. Based in Cambridge,
    Massachusetts. 11 years at MIT Tech Review gave him deep technical grounding; 20+ year total AI coverage makes him Wired''s most experienced AI reporter.
    Writes the AI Lab newsletter at Wired. Poynter Fellowship lecturer at Yale. Framing signature: persistent AGI skepticism, focus on immediate AI harms
    over existential risk, calls for transparency. KEY for MediaScope: his New Scientist science-journalism training and MIT Tech Review academic-adjacent
    institutional norms provide a strong control for measuring whether Wired''s Condé Nast editorial culture shifts his framing. Unlike most Wired AI writers
    who arrived during the hype, Knight has covered every AI cycle since the winter.'
