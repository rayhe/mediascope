  name: Eli Tan
  notes: 'Key migration: CoinDesk → Columbia → Washington Post → NYT. NYT''s newest dedicated Meta reporter (2026), assigned
    alongside Mike Isaac. Represents a new generation of tech journalism that arrived through the crypto/Web3 pipeline rather
    than the traditional Wired/Verge → NYT path. His CoinDesk tenure (2021-2023) covering NFTs, gaming, and the metaverse
    during the boom/bust cycle gives him firsthand experience with the hype dynamics around ''the metaverse'' — the same narrative
    Meta bet its corporate identity on. KEY for MediaScope: his assignment signals NYT''s institutional doubling-down on Meta
    as a coverage priority. Having two dedicated Meta reporters (Isaac since 2014, Tan since 2026) is unusual — comparable
    to having two dedicated Apple reporters. DiD analysis opportunity: compare his early Meta coverage tone against his CoinDesk/WaPo
    baseline to measure how quickly NYT''s institutional framing shapes a new reporter.'
- analytical_notes: 'Korean American (child of Korean immigrants, grew up in Seattle where family ran a burger joint). Career:
    AP-Dow Jones Seoul → San Jose Mercury News → Seattle Post-Intelligencer → Washington Post (~9 years) → NYT (late 2015).
    Based in Bethesda, Maryland. Twitter: @ceciliakangf. Contact: via NYT.


    AWARDS: 2019 Pulitzer Prize finalist (National Reporting, team coverage of Facebook). George Polk Award (National Reporting).
    Gerald Loeb Award (Investigative Reporting). All for Facebook coverage at NYT.


    BOOK: "An Ugly Truth: Inside Facebook''s Battle for Domination" (Crown/Random House, Jul 13 2021, ISBN 9780062960696).
    NYT Bestseller. 400+ interviews. Co-authored with Sheera Frenkel. Goodreads 4.22/5, 362 ratings.


    INSTITUTIONAL ROLES: Whitman College Board of Trustees (appointed ~2024). Whitman 2024 Commencement Speaker + honorary
    degree recipient. President''s Advisory Board + Whitman Wire advisory board. Georgetown University IOP discussion group
    leader ("AI: Democracy and the Race for Global Domination"). Aspen Ideas Festival participant. Berkeley Law Executive
    Education guest (Feb 2024, "Future of AI Regulations").


    ANALYTICAL VALUE: Kang is the NYT''s primary tech policy/regulation reporter and the lead reporter on the FTC v. Meta
    antitrust trial (2025) — the most aggressive antitrust case the US government has brought against a tech company. Her
    framing of whether Meta should be broken up directly shapes public understanding. Her earlier WaPo investigation into
    children''s in-app purchases showed her capacity to generate regulatory action (FTC charged Apple, Google, Amazon). KEY
    QUESTION for MediaScope: Does her framing of tech regulation reflect genuine policy analysis, or is it influenced by NYT''s
    own financial ties to AI licensing deals (Google $100M+, Apple, Amazon)? She reports on the companies NYT has revenue
    relationships with.


    Kang-Frenkel partnership is the most productive policy-cybersecurity collaboration in tech journalism — Kang provides
    DC regulatory access + policy expertise, Frenkel provides Silicon Valley source network + cybersecurity depth. Together
    they produced "An Ugly Truth" (the definitive anti-Facebook book of the 2020s) and the "Delay, Deny and Deflect" investigation
    (Nov 2018). Cross-reference with Sheera Frenkel entry.


    DiD FRAMEWORK: The WaPo → NYT migration (same beat, same city, different institutional context) creates a natural experiment:
    did Kang''s regulatory skepticism toward Big Tech intensify, moderate, or stay constant when she moved from Bezos-owned
    WaPo to Sulzberger-family NYT? The timing (~2 years post-Bezos acquisition) raises the question of whether WaPo''s tech
    coverage direction was shifting under tech-billionaire ownership, potentially pushing reporters like Kang toward NYT where
    editorial independence from tech money was perceived as stronger. However, NYT itself has growing AI licensing revenue
    dependencies with Google, Apple, and Amazon — the same companies Kang covers on the regulation beat.'
