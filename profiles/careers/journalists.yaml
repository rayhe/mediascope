      — disinformation during Ukraine war, tariff effects, TikTok Shop tagging Gaza videos. (3) Elon Musk/Twitter/X takeover
      and Trump administration. (4) Chinese factory worker videos. (5) Content creator economy. (6) Charlie Kirk meme/arrest
      story. Notable for pioneering TikTok as a journalism distribution channel — creates 15-20 min front-facing videos discussing
      her reporting, reaching audiences who may not read the article. Strict 30-min time cap per TikTok to manage ROI. Left
      X/Twitter entirely; uses Bluesky as primary social channel. Reports to features editor (who was the editor she originally
      cold-pitched as a freelancer). Part of Vox Media Union (WGA East). Contact: mia@theverge.com, Signal: miasato.11. Also
      writes ''mia buys things'' fashion/shopping newsletter on Beehiiv. ANALYTICALLY SIGNIFICANT: Her platform beat is the
      primary editorial position at The Verge covering Meta/Instagram as a platform governance story (distinct from Alex Heath''s
      corporate strategy angle or David Pierce''s product reviews angle). Her framing tends toward user-impact and community-effects
      rather than corporate strategy or product evaluation — a deliberate editorial choice that positions platform decisions
