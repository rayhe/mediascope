  name: Lauren Goode
  notes: 'Key migration chain: ESPN → A&E Networks → Wall Street Journal → AllThingsD → Recode → The Verge → Wired. Protégé
    of Walt Mossberg and Kara Swisher — followed them through every entity transition. Clark University BA English (class
    of 2003), Stanford MA Communication. NorCal Emmy Award winner 2018 (Next Level video series at The Verge, technology reporting
    category). Currently Senior Correspondent at WIRED (promoted from Senior Writer ~2025). Co-hosts WIRED''s Gadget Lab,
    Get WIRED, and Uncanny Valley podcasts. Beat evolved from pure consumer tech/product reviews to AI, semiconductors, Silicon
    Valley culture, and tech-humanity intersection. 15+ years covering technology as of 2026. KEY for MediaScope: (1) Her
    entire career was shaped inside the Mossberg/Swisher talent pipeline — a lineage that includes Mike Isaac (now NYT), Peter
    Kafka, Ina Fried, and others who went through AllThingsD/Recode. This cohort shares editorial DNA forged in the WSJ''s
    tech orbit before Vox Media absorption. (2) Her migration to Wired (Condé Nast) represents a clean break from the Vox/Recode
    lineage into a different institutional frame — the longest single-publication tenure of her career suggests deep institutional
    assimilation. (3) Title upgrade to Senior Correspondent signals growing editorial authority — she now moderates major
    industry panels (HumanX, Big Technology AI Summit) alongside C-suite executives, which complicates a pure "reporter" classification.
    (4) Beat expansion from consumer products to AI infrastructure parallels Wired''s broader editorial pivot under Drummond,
    making her coverage evolution a proxy for institutional editorial strategy changes. (5) Her career arc — TV production
    (ESPN/A&E) → video journalism (WSJ) → multimedia editor (Verge) → writer/podcaster (Wired) — is unusually multi-format,
    giving her an instinct for narrative packaging that shapes how her text articles frame complex topics.'
