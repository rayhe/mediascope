  - name: "Karen Hao"
    notes: "Key migration: MIT Tech Review → Atlantic. Known for adversarial AI coverage. Her viral 'How Facebook got addicted to spreading misinformation' (2021) set the template for anti-Meta AI reporting."
    career:
      - publication: "mit-tech-review"
        event_type: "hired"
        role: "staff_writer"
        beat: "AI"
        start: "2018-01"
        end: "2022-05"
        source_url: "https://www.technologyreview.com/author/karen-hao/"
        notes: "AI reporter. Wrote viral 'How Facebook got addicted to spreading misinformation' (Mar 2021). Known for adversarial AI beat."
      - publication: "atlantic"
        event_type: "hired"
        role: "staff_writer"
        beat: "AI, technology"
        start: "2022-06"
        source_url: "https://www.theatlantic.com/author/karen-hao/"
        notes: "Continued AI ethics/harms focus. Key test case for portable bias — did her adversarial tone carry to a new outlet?"

