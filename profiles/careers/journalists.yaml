  name: Jeff Horwitz
  notes: 'The most consequential single journalist for Meta coverage. Led the 2021 Facebook Files investigation at WSJ — the
    largest leak-driven exposé in social media history, based on documents from whistleblower Frances Haugen. Won George Polk
    Award for Business Reporting, Gerald Loeb Award for Beat Reporting (x2: 2022 for Facebook Files, 2024 shared for "The
    Dark Side of Meta''s Algorithms"), 2026 Pulitzer Prize for Beat Reporting (with Engen Tham at Reuters for "The Secrets
    of Meta''s Success"), SABEW award, and Christopher J. Welles Memorial Prize. Author of ''Broken Code: Inside Facebook
    and the Fight to Expose Its Harmful Secrets'' (Doubleday, Nov 2023, 336pp) — NYT Book Review Editors'' Choice, Porchlight
    Best Business Book. Basis for Aaron Sorkin film ''The Social Reckoning'' (Sony/Columbia, Oct 9, 2026) starring Jeremy
    Allen White as Horwitz, Mikey Madison as Haugen, Jeremy Strong as Zuckerberg. Education: The College Preparatory School
    (Oakland, 1999), Pomona College (BA), Columbia University (MA Business Journalism, 2009), Knight-Bagehot Fellow (2013-14).
    Born ~1982 (was 31 in 2013 Knight-Bagehot listing). Also freelanced for Slate, Washington Post, Portfolio, The Atlantic,
    Dallas Morning News, Sacramento Bee, and from East Africa (Rwanda). NOT at a tracked publication (WSJ → Reuters), but
    his reporting is the single largest external source of negative Meta coverage framing across ALL publications. His Facebook
    Files directly sourced stories at NYT, Guardian, Wired, and Atlantic — making him an upstream influence on all 5 tracked
    outlets. His 2025-26 Reuters work on Meta AI chatbots and scam ads continued this pattern, prompting FTC inquiries, Congressional
    calls for investigation, and direct Meta policy changes. ANALYTICAL VALUE: Horwitz is the canonical example of how a single
    investigative reporter can set industry-wide framing. His leaked documents became the raw material for derivative coverage
    across every tracked publication. His WSJ→Reuters migration (May 2025) is a key natural experiment for the DiD methodology
    — did his framing posture change when moving from Murdoch-owned WSJ to Thomson Reuters? Tracking his output allows MediaScope
    to measure how upstream investigative work propagates into institutional framing. The Social Reckoning film (Oct 2026)
    will likely generate a second wave of Facebook Files-derived coverage across all tracked publications, creating a natural
    experiment in narrative recycling.'
