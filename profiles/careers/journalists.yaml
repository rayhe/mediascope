    beat: platforms and power, AI governance, elections, DOGE, content moderation
    start: 2022-07
    event_type: hired
    notes: 'Hired as platforms and power reporter at Condé Nast''s Wired (July 2022). Beat covers technology''s implications
      for policy, disinformation, labor, human rights, and conflict. Major coverage arcs: (1) Twitter/Musk purchase (Oct 2022-2023)
      — spoke to fired trust and safety staff, covered ''Fork in the Road'' email parallels with later DOGE operations. (2)
      Meta Oversight Board — broke stories on deepfake porn investigations involving unnamed celebrities, Meta ad enforcement
      failures (PragerU Kids political ads), and trust & safety outsourcing to startups like Sero AI after Big Tech cut thousands
      of T&S staff. (3) AI Elections Project (2024) — led Wired''s coverage of AI in 50+ global elections during the biggest
      election year in modern history. Appeared on TED AI Show (Sep 2024, 283K+ plays) discussing AI election interference.
      (4) DOGE coverage (2025-2026) — Wired''s DOGE reporting team was described by On the Media as ''beating the New York
      Times, the Washington Post, NBC'' on the story. Elliott personally credited Wired''s years of covering tech executives''
      views on government as preparation: ''We understand how they like to run their companies... Now they are in a position
      to make the world run that way.'' Wired gained 62,500 new US subscribers in the first two weeks of February 2025 alone
      during this coverage. Regularly appears on Wired''s PoliticsLab podcast. Speaker at 2024 Concordia Annual Summit. Co-bylines
      with Matt Burgess on EU-Big Tech coverage. Regular TV/radio: PBS NewsHour, Al Jazeera, BBC, NPR, NBC. Guest lecturer
      at NYU. Member of @wiredunion (CWA). KEY ANALYTICAL VALUE for MediaScope: (1) Her beat ''platforms and power'' directly
      maps onto Meta coverage territory — content moderation, Oversight Board, AI governance, privacy. (2) Rest of World →
      Wired migration (nonprofit Global South outlet → Condé Nast institutional) is a high-value DiD candidate for measuring
      how institutional framing environment affects coverage posture. (3) Her international development background gives her
      a structural/power-dynamics lens on tech platforms that differs markedly from the Silicon Valley insider perspective
      of most Wired tech reporters (cf. Lauren Goode''s consumer tech lens, Paresh Dave''s wire-service neutrality). (4) Her
      experience as a NewsGuard Contributing Analyst means she has direct, professional experience evaluating media credibility
      — a meta-awareness of editorial bias that could either sharpen or bias her own platform coverage.'
