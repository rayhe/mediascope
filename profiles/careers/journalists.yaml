    editor before Drummond reshaped the masthead; (3) Her return to NYT (a boomerang migration) after Condé Nast is the kind
    of career arc that the DiD regression framework was designed to study; (4) 30+ year career across American Lawyer, Fortune,
    NYT, New Yorker, and Wired makes her one of the most experienced editors in the tracked database. Currently at NYT — no
