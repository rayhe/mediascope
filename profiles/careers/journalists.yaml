- name: Jeff Horwitz
  notes: 'The most consequential single journalist for Meta coverage. Led the 2021 Facebook Files investigation at WSJ — the
    largest leak-driven exposé in social media history. Won George Polk Award, Gerald Loeb Award (x2), Pulitzer Prize (2026
    with Engen Tham). Author of ''Broken Code: Inside Facebook and the Fight to Expose Its Toxic Secrets'' (2023) — basis
    for upcoming Aaron Sorkin film ''The Social Reckoning.'' Education: The College Preparatory School (Oakland, 1999), Pomona
    College (BA), Knight Bagehot fellow at Columbia University. NOT at a tracked publication (WSJ → Reuters), but his reporting
    is the single largest external source of negative Meta coverage framing across ALL publications. His Facebook Files directly
    sourced stories at NYT, Guardian, Wired, and Atlantic — making him an upstream influence on all 5 tracked outlets. ANALYTICAL
    VALUE: Horwitz is the canonical example of how a single investigative reporter can set industry-wide framing. His leaked
    documents became the raw material for derivative coverage across every tracked publication. Tracking his output allows
    MediaScope to measure how upstream investigative work propagates into institutional framing.'
