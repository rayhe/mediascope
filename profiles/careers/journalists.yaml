    notes: 'Director, Business & Industry (editorial leadership, NOT staff writer). Reports to Executive Editor Brian Barrett. Leads WIRED business desk
      across US and UK. Team includes Louise Matsakis (senior editor), Sophie Kleeman (senior editor), Natasha Tiku, Maxwell Zeff. Co-host of "Uncanny Valley"
      flagship podcast (launched Oct 31, 2024 — same day as hire announcement). Recruited by Katie Drummond (Global Editorial Director). Drummond''s announcement
      explicitly frames the role as "documenting the exploits and foibles of Silicon Valley''s companies and characters — and doing it better than anybody
      else" — establishing adversarial Big Tech coverage as a hiring criterion. Already breaking major scoops: reported Zuckerberg offering AI talent up
      to $300M/4yr packages (Jul 2025). 252+ articles per Muck Rack. Threads: @reporterzoe.'
    publication: wired
    role: director_business_industry
    source_url: https://talkingbiznews.com/media-news/wired-hires-schiffer-as-director-of-business-and-industry/
