      Scientist''s technology team gave him broad science-tech coverage before he specialized in AI. The magazine''s UK science-weekly
      institutional norms (evidence-based, skeptical of hype) shaped his reporting style — visible in his persistent skepticism
      about AGI claims at Wired.'
