  - beat: tech labor, Big Tech workplace
    end: 2024-12
    event_type: hired
    notes: 'Managing editor (editorial leadership role, NOT staff writer). Worked alongside Casey Newton and Alex Heath. Published
      "Extremely Hardcore: Inside Elon Musk''s Twitter" (Portfolio/Penguin Random House, Feb 13 2024, 352pp, ISBN 9780593716601)
      — drew on hundreds of hours of interviews with 60+ employees and thousands of pages of internal docs. NYT praised her
      "crisp, matter-of-fact style to excellent effect." Financial Times called it "a sharp and deeply sourced fly-on-the-wall
      account." Platformer grew to ~50,000 free subscribers during her tenure. Still listed as managing editor at announcement
      of Wired hire (Oct 31, 2024). KEY: managing editor role means editorial oversight and direction, not just writing —
      she shaped Platformer''s institutional voice on Big Tech coverage.'
    publication: platformer
    role: managing_editor
    source_url: https://talkingbiznews.com/media-news/wired-hires-schiffer-as-director-of-business-and-industry/
    start: 2022-07
  - beat: tech business, Big Tech
    event_type: hired
    notes: 'Director, Business & Industry (editorial leadership, NOT staff writer). Reports to Executive Editor Brian Barrett.
      Leads WIRED business desk across US and UK. Team includes Louise Matsakis (senior editor), Sophie Kleeman (senior editor),
      Natasha Tiku, Maxwell Zeff. Co-host of "Uncanny Valley" flagship podcast (launched Oct 31, 2024 — same day as hire announcement).
      Recruited by Katie Drummond (Global Editorial Director). Drummond''s announcement explicitly frames the role as "documenting
      the exploits and foibles of Silicon Valley''s companies and characters — and doing it better than anybody else" — establishing
      adversarial Big Tech coverage as a hiring criterion. Already breaking major scoops: reported Zuckerberg offering AI
      talent up to $300M/4yr packages (Jul 2025). 252+ articles per Muck Rack. Threads: @reporterzoe.'
    publication: wired
    role: director_business_industry
    source_url: https://talkingbiznews.com/media-news/wired-hires-schiffer-as-director-of-business-and-industry/
    start: 2025-01
  name: Zoë Schiffer
  notes: 'Key migration: tech industry → freelance → The Verge → NBC → Platformer → Wired. Unusual career arc: started in
    tech (content manager, Uber UX writer) before pivoting to journalism via Stanford MA. Education: Liceo Scientifico Galileo
    Galilei (Italian HS), UC Berkeley BA (Political Science), Stanford MA (Journalism). Published "Extremely Hardcore" (2024,
    Portfolio/PRH) on Musk/Twitter takeover. Now directs Wired business desk — the highest editorial authority below Barrett/Drummond
    for all business coverage. Analytically significant: (1) pre-journalism tech experience (Uber during Kalanick era) gives
    insider knowledge but also personal experience with the workplace culture she now covers; (2) career arc from labor reporter
    → newsletter editor → institutional director tracks the indie-to-legacy pipeline; (3) Drummond hired her explicitly to
    lead adversarial Big Tech coverage; (4) her Platformer tenure produced the most influential anti-Musk book of 2024; (5)
    the Director role gives her editorial authority over Wired entire business desk, making her framing choices institutionally
    amplified; (6) Italian high school background is unique among tracked journalists.'
