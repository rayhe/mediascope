  - beat: Big Tech, social media platforms, platform governance, AI
    end: 2024-01
    event_type: hired
    notes: 'Founded Platformer October 2020 on Substack. Grew free list to 30,000 in first weeks (carried over from The Interface);
      ~1,000 paying at $10/month within weeks. Turned down Substack advances, accepted healthcare stipends. Year 1: ~25,000
      free. Year 2: ~50,000 free. Hired Zoë Schiffer as managing editor (became co-author of "Extremely Hardcore: Inside Elon
      Musk''s Twitter," Penguin, Sep 2024). Had third staff member. By January 2024: 170,000 free subscribers. KEY SCOOPS:
      Twitter/X employees during Musk''s takeover learned of their layoffs from Platformer, not internal channels — defining
      moment for the newsletter''s influence. Also April 2021: co-founded Sidechannel, a "virtual newsroom" on Discord with
      seven other independent journalists; hosted Mark Zuckerberg interview on Sidechannel Discord server. SUBSTACK DEPARTURE
      (Jan 2024): left over Substack''s handling of pro-Nazi publications. Migrated to Ghost. Statement: "if Substack can
      grow a publication like ours that quickly, it can grow other kinds of publication, too." Schiffer left Platformer in
      October 2024 to join Wired as Director of Business & Industry.'
    publication: platformer
    role: founder_editor
    source_url: https://www.platformer.news/
    start: 2020-11
  - beat: Big Tech, social media platforms, AI
    event_type: editorial_role_change
    notes: 'Platformer on Ghost (self-hosted, open source). Solo editorial control again after Schiffer''s departure to Wired.
      2026 strategic pivot: announced plans to focus on original reporting and scoops, reducing aggregation and link roundups,
      to compete with AI. "We''re betting that the value in tech journalism is moving away from aggregation and predictability
      and toward original reporting and surprise." Nieman Lab (Apr 29, 2026) profiled this shift. KEY for MediaScope: the
      post-Substack, post-Schiffer Platformer is the purest test of individual editorial framing — sole editorial control,
      independent platform, no institutional employer. Continues breaking stories: Jun 2026 scoop on OpenAI disbanding its
      mission alignment team and transferring employees (Joshua Achiam to "chief futurist" role).'
    publication: platformer
    role: founder_editor
    source_url: https://web.archive.org/web/20260429/https://www.niemanlab.org/2026/04/more-scoops-less-aggregation-and-analysis-how-casey-newton-is-revamping-his-newsletter-to-compete-with-ai/
    start: 2024-01
  - beat: technology, AI, platform governance
    end: 2026-08
    event_type: hired
    notes: 'Co-host of "Hard Fork" with Kevin Roose, launched late September 2022 as a weekly NYT podcast about "the future
      that''s already here." TOP 0.05% globally on Listen Notes. ~403 episodes over nearly 4 years. Video-first expansion
      in 2026 (hired Vjeran Pavic from The Verge as editor). Hard Fork Live events (San Francisco). NOTABLE: Newton is the
      only non-NYT employee co-hosting a major NYT podcast — he remains independent (Platformer) while co-hosting under the
      NYT brand. ENDING (Jun 2026): Roose announced leaving NYT in August 2026 to start a new independent media venture with
      Newton focused on AI. Hard Fork ending as an NYT show. KEY for MediaScope: Newton will co-host a show with Roose outside
      institutional control — an independent AI journalism venture that removes the last NYT editorial oversight from his
      work.'
    publication: nytimes
