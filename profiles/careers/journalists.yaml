    does his Big Tech coverage framing change after Drummond''s arrival? His Reuters background (wire service neutrality norms)
    is the opposite of the Gizmodo/Vice adversarial DNA that Drummond, Barrett, Marchman, and Feiger share. ANALYTICAL VALUE:
    As the sole Wired reporter covering ALL five Big Tech companies, his framing decisions have outsized influence on how
    Wired''s readers perceive each company''s relative accountability. Compare his Meta coverage against his Google coverage
    (his original beat at Reuters) to test for company-specific framing bias.'
