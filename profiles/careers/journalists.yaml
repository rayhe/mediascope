  - event_type: departed
    notes: 'FIRED Nov 6, 2025 — part of the "Fired Four" at Condé Nast. On Nov 5, ~20 Condé United union members confronted
      CPO Stan Duncan outside his 34th-floor office at 1 World Trade Center over Teen Vogue restructuring/layoffs and Wired
      layoffs. Duncan directed them to return to work. TheWrap obtained video — did NOT show "extreme misconduct" as Condé
      Nast claimed, showed tense but non-threatening confrontation. The four fired: Jake Lahut (Wired), Jasper Lo (New Yorker
      senior fact-checker), Alma Avalle (Bon Appétit), Ben Dewey (Condé Nast Entertainment). Five additional union members
      suspended. Lahut was ONE WEEK shy of his probationary period ending. He had appeared on MSNBC representing Wired the
      morning of his termination and was pulled from a scheduled evening appearance. Condé Nast filed own NLRB complaint against
      NewsGuild, claimed "extreme misconduct." NY AG Letitia James threatened legal action, called firings "union-busting."
      Settlement reached May 27, 2026: Lo/Avalle/Dewey received $400K+ combined, converted to voluntary resignation with letters
      of recommendation, suspended workers got back pay and records expunged. LAHUT DECLINED LESSER SETTLEMENT OFFER — pursuing
      independent NLRB unfair labor practice charge against Condé Nast. Now freelancing and working as breaking news editor
      at Sherwood News. Newsletter: "Straight From The Hut" (Substack). Still appearing on MSNBC. ANALYTICALLY SIGNIFICANT:
      Wired politics desk hired an adversarial political reporter who then turned that same adversarial energy against Condé
      Nast management itself. The firing during his probationary period (more vulnerable than guild-protected staff) raises
      questions about whether Wired values adversarial reporting directed outward but not inward. This is relevant to understanding
      Wired institutional culture.'
