  notes: 'NYT Global Technology Correspondent, now based in Taipei (relocated from Seoul ~2023-2024, previously expelled from China in 2020). Mandarin speaker.
    Has worked as a journalist in Asia since 2007. Covers technology and geopolitics — surveillance, AI weapons, chip smuggling, data center geopolitics,
    authoritarian tech. Most frequent co-author with Adam Satariano — together they produce NYT''s most impactful tech-geopolitics investigations. Previously
    at Wall Street Journal, The Standard (Hong Kong), and Far Eastern Economic Review. AWARDS: Two-time Pulitzer Prize finalist (2019 Xinjiang surveillance;
    second unknown year/topic), part of team that won Pulitzer Prize for Public Service (2020, Covid China censorship), two Gerald Loeb Awards (2018 Myanmar/Facebook
    disinformation; 2023 China propaganda/social media manipulation), George Polk Award (2018 Myanmar coverage). Multi-pub journalist tracked for his authorship
    pattern with Satariano and for independent coverage of AI, surveillance, chip export controls, and authoritarian technology that shapes NYT''s framing
    of tech-state power dynamics. KEY MEDIASCOPE VALUE: Mozur''s career arc — Hong Kong tabloid → Dow Jones Asia business press → WSJ → NYT — represents
    a migration through increasingly prestigious outlets, all Asia-focused, with growing institutional power behind his tech-geopolitics framing.'
