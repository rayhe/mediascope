    event_type: hired
    notes: 'Hired November 19, 2021 to cover tech companies and their platforms. Title progression: reporter → senior reporter
      → features writer. Now one of The Verge''s most prominent platform beat reporters. Beat encompasses: platform governance
      and content moderation, online communities (Etsy sellers, Reddit, TikTok creators), AI-generated content flooding platforms,
