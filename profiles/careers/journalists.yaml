        notes: "Global Editorial Director. Announced Aug 10, 2023; started Aug 28. Replaced Gideon Lichfield. Second woman to lead Wired after Katrina Heron. Reports to Anna Wintour. Key achievements: (1) Created Wired's first politics team (Nov 2023), (2) DOGE coverage breakthrough — 62,500 new US subs in 2 weeks (Feb 2025), (3) 'Story Zero' newsroom ethos (reporters break stories that set news agendas), (4) Won Sidney Hillman Prize for DOGE coverage, (5) Launched Uncanny Valley podcast franchise + KQED radio partnership, (6) First politics issue in Wired history (2025), (7) Freedom of the Press Foundation board member (2024). Queen's University BA in Philosophy (2008), born Calgary, Alberta. Married, one daughter, Brooklyn. ANALYTICAL NOTE: her career arc (Gizmodo EIC → Vice SVP → Wired GED) creates an adversarial-journalism pipeline. Gizmodo and Vice both have reputations for confrontational tech coverage. Her stated philosophy — 'Right and wrong is a big one for me. If you do wrong, I want to find out, and then I want the world to know' — explicitly frames journalism as accountability/adversarial rather than neutral observation."

