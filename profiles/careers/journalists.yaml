      BuzzFeed → NYT represents digital-native platform → paper of record transition. Tests whether framing formality and citation patterns shift in institutional
      prestige context. His Opinion placement (not News) gave him editorial freedom but also positioned his tech coverage as explicitly subjective/interpretive
      rather than straight reporting.'
