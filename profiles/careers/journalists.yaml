  notes: 'Key migration: Cornell literary magazines → The Verge → Vox (The Goods) → The Atlantic. Cornell University BA (~2015).
    Author of three books: (1) "Everything I Need I Get from You: How Fangirls Created the Internet as We Know It" (MCD/FSG
    Originals, Jun 14, 2022, 320 pages, ISBN 978-0-374-53918-4 — praised by Gawker, Bookforum, TIME, Slate, Pitchfork, Glamour,
    Chicago Tribune), (2) "On Nobody Famous: Guesting, Gossiping, Gallivanting" (co-authored with Lizzie Plaugic, collection),
    (3) "The Housewives Underground: The Untold Story of the Women Who Made the JFK Assassination Our Most Enduring Mystery"
    (Crown, Jun 23, 2026, 512 pages, ISBN 978-0-593-72862-8, $35 — Publishers Weekly starred review: "an extraordinary account
    of a relentless search for truth"; praised by Liza Mundy, Garrett Graff, Kathryn Olmsted, Booklist). Former co-host of
    "Why''d You Push That Button?" podcast (The Verge, 49 episodes, Oct 2017 – Jul 2020, 2018 Podcast Award). Lives in Brooklyn,
    NY. KEY for MediaScope: (1) Her Vox Media → Emerson Collective pipeline (Verge → Vox → Atlantic) is a distinct editorial
    migration path. (2) She approaches tech platforms through a cultural anthropology lens — subcultures, communities, conspiracy
    movements — rather than investigative/corporate or policy/legal frameworks. This produces a different framing signature:
    platform impact framed through collective human behavior rather than corporate malfeasance. (3) Her QAnon expertise (cited
    in academic papers by name) gives her deep authority on how platforms facilitate radicalization — this colors her Meta
    coverage (Instagram trial, QAnon on Facebook/Instagram). (4) She reports under Damon Beres (senior editor tech), who co-launched
    the AI Watchdog project, placing her work within Atlantic''s explicit tech-accountability editorial mandate. (5) Her second
    and third books reveal an intellectual pattern: communities of passionate outsiders (fangirls, Warren Commission housewives)
    who create alternative information ecosystems — a framework she applies to her platform coverage. This makes her a valuable
    natural experiment subject for DiD analysis: does her distinctive cultural lens shift when applied to Meta vs. other platforms?'
