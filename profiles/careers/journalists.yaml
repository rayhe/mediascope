  - beat: technology, Silicon Valley, internet
    end: 2013-12
    event_type: hired
    notes: 'San Francisco bureau. Created and wrote "BoomTown" column — front page of Marketplace section and WSJ.com. Also
      wrote "Home Economics" weekly column on home tech. Co-launched D: All Things Digital conference with Walt Mossberg (2003)
      — premiered as the country''s leading tech conference, interviewing Gates, Jobs, Zuckerberg, Bezos, Cook, Dorsey. Co-founded
      AllThingsD.com blog with Mossberg (2007). Gerald Loeb Award for Blogging (2011) for liveblogging Yahoo earnings calls.
      Wrote sequel book "There Must Be a Pony in Here Somewhere: The AOL Time Warner Debacle" (Crown Business, 2003). KEY:
      16-year WSJ tenure established her as Silicon Valley''s most feared/respected reporter. Her adversarial style was already
      fully formed here — Sheryl Sandberg once said "It is a constant joke in the Valley when people write memos for them
      to say, I hope Kara never sees this."'
    publication: wsj
