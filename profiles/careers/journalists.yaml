    notes: 'Senior reporter at Gizmodo (G/O Media) covering tech policy and national security. 5.5-year tenure. KEY INVESTIGATIONS:
      (1) "Prediction: Bias" — joint investigation with The Markup (published Dec 2, 2021) exposing Geolitica/PredPol predictive
      policing software that disproportionately directed officers to patrol Black and Latino neighborhoods. Analyzed millions
      of crime predictions left on an unsecured server. Won Edward R. Murrow Award for Investigative Reporting (2022). Investigation
