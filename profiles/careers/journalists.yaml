  - name: Mike Isaac
    publication: nytimes
    topics: Meta, Facebook internal affairs
    notes: Occasional co-author on Meta-specific stories. Isaac is NYT's primary Meta beat reporter based in SF.
  framing_analysis:
    regulatory_positioning: Satariano's London base and EU regulatory beat mean his primary sources are EU officials, regulators (DPC, CNIL, EC), and European
      advocacy groups (noyb, CCDH, Foxglove). This naturally positions EU enforcement as the protagonist in his narratives. When he covers a new DSA/DMA
      action, the EU's framing typically leads and industry response follows as rebuttal. However, he has produced notably balanced work — the 2021 piece
      on EU hate speech laws threatening free expression gave genuine weight to civil liberties concerns.
    meta_coverage_pattern: 'Covers Meta through EU regulatory lens: DSA children''s safety, WhatsApp antitrust, content moderator labor (Accenture investigation),
      GDPR fines. Not primarily a Meta beat reporter — covers all major platforms equally through regulatory enforcement actions. His content moderator
      exposé (2020) was genuinely investigative — 40+ interviews, internal documents. Not a "Meta critic" by disposition but a regulation reporter whose
      beat generates adversarial coverage.'
    beat_expansion_2024_2026: 'Significant beat expansion beyond pure regulation: AI weapons (Ukraine), geopolitical tech tensions (ASML, Kyndryl, Trump
      travel bans), platform accountability (Telegram/Durov). This broader scope suggests NYT is using Satariano as a generalist tech-geopolitics correspondent,
      not just a regulation reporter.'
