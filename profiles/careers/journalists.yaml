  - beat: Apple, then Google/Alphabet, Nvidia, AI business
    event_type: hired
    notes: 'Hired alongside Nico Grant in May 2022 by technology editor Pui-Wing Tam (with Jim Kerstetter, Joe Plambeck, Ellen
      Pollock). Initially covered Apple exclusively. Published debut book ''After Steve: How Apple Became a Trillion-Dollar
      Company and Lost Its Soul'' (William Morrow, May 2022, 512 pages, narrated by Will Damron for Audible, 14h42m) — based
      on 200+ interviews with current/former Apple executives, Trump administration officials, and fashion figures (Anna Wintour).
      Book thesis: Apple''s shift from innovation to operational excellence under Cook, with Ive''s 2019 departure as the
      culmination. Washington Post: ''an engrossing narrative that''s impressively reported.'' Kirkus Reviews praised his
      piercing of Apple''s ''culture of omertà.'' By ~2024, expanded to also cover Nvidia and the business of AI (wrote about
      McKinsey/BCG profiting from AI rush, AI consulting economics). Wrote investigative piece on Apple''s App Store contempt
      ruling in Epic v. Apple (May 2025) — revealed Apple commissioned a ''sham report'' and lied on the stand. MAJOR BEAT
      CHANGE (~May 2025): After Nico Grant''s departure, took over the Google/Alphabet beat while continuing Apple coverage
      until a replacement is found. NYT posted a job listing for the Apple reporter position (April 24, 2025, SF-based, Guild
      position, 7+ years required). As of late 2025, also reviewed iPhone Air with Brian X. Chen (thin-is-not-enough critique).
      Covered Meta Arena/Polymarket story (June 2026). KEY ANALYTICAL VALUE: Now covers both Apple AND Google — two of Meta''s
      primary competitors. His ''soul lost to operations'' thesis maps directly onto how he frames corporate identity. His
      sports-business → sin-beat → tech pipeline gives him supply-chain and corporate-deal fluency that most tech reporters
      lack. The fact that NYT trusted him with TWO major tech beats simultaneously (Apple + Google) signals institutional
      confidence and source-network depth, but also creates bandwidth constraints that may affect coverage depth.'
    publication: nytimes
    role: technology_reporter
    source_url: https://talkingbiznews.com/they-move/mickle-to-take-on-google-alphabet-beat-at-ny-times/
    start: 2022-05
  name: Tripp Mickle
  notes: 'NYT tech reporter covering Google/Alphabet, Apple, Nvidia, and AI business. Key migrations: Newsday (intern) → Sports
    Business Journal (8 yrs, Olympics/motorsports) → WSJ (8 yrs, alcohol/tobacco then Apple/Google/Musk) → NYT. Wake Forest
    University BA (''03, WFU legacy family: parents ''72/''74, sister/BIL both MD ''10/''11). Columbia University Graduate
    School of Journalism (MS). From Charlotte, North Carolina. Lives in San Francisco with wife and German shorthaired pointer.
    Professor mentor: Justin Catanoso (MALS ''93) at Wake Forest — ''opened my eyes to the things in journalism I''d never
    come across.'' Author of ''After Steve: How Apple Became a Trillion-Dollar Company and Lost Its Soul'' (William Morrow,
    May 2022, 200+ interviews, 512 pages). Appeared on CNBC, NPR. Sonoma Valley Authors Festival speaker. #GoDeacs. Email:
    tripp.mickle@nytimes.com. KEY for MediaScope: covers BOTH of Meta''s primary competitors (Apple + Google) simultaneously
    since May 2025. His ''operations eclipsed creativity'' thesis is a recurring framing device — watch for it in Google coverage
    too. His sports-business background (8 years of IOC sponsorship deals and broadcast rights) gives him unusually strong
    financial literacy for a tech reporter — he reads supply chains and corporate deal structures the way sports business
    reporters read broadcast contracts. This makes his Apple/Google coverage more focused on margin economics and corporate
    strategy than the average tech correspondent. The ''culture of corporate omertà'' phrase is his signature and has been
    adopted widely in Apple journalism.'
