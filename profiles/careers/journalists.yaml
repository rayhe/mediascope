  name: Lauren Feiner
  notes: 'Senior policy reporter at The Verge covering the intersection of Silicon Valley and Capitol Hill. Full career arc:
    Daily Pennsylvanian EIC → Boston Globe/Philly Inquirer/Forbes freelance → Indicative (podcast startup) → CNBC (2018–2023,
    laid off in Nov 2023 cuts) → The Verge (Jan 2024–present). Based in Washington, D.C. University of Pennsylvania BA Communication
    (Annenberg School, ~Class of 2018). Editor-in-Chief of The Daily Pennsylvanian, the 200-person student newspaper at UPenn
    — led daily production and spearheaded digital transformation. KEY for MediaScope: The CNBC → Verge migration is an analytically
    valuable framing-shift case study. At CNBC, her policy coverage was oriented toward investor-relevant regulatory risk
    (how does antitrust affect stock price? what does lobbying spend signal?). At The Verge, the same policy beat shifts toward
    consumer/civil liberties framing (how does regulation affect user rights? platform governance and government overreach).
    Her Google antitrust coverage spans both institutions — CNBC (trial opening, Pichai testimony, $26B default payment revelation,
    Oct 2023) and The Verge (ad tech trial remedy phase, Oct 2025) — enabling before/after comparison of the same reporter
    covering the same ongoing case from different institutional contexts. Her Meta coverage similarly evolved: from financial
    scandal framing at CNBC (Cambridge Analytica stock impact, Facebook "worst year" 2018) to platform governance framing
    at The Verge (Facebook ICE tracking removal, child safety legislation, content moderation under political pressure). Appeared
    on CNN, NPR, MSNBC, SiriusXM, NBC News NOW, NBC LX. Guest on CAFE''s Stay Tuned with Preet Bharara (TikTok ban, March
    2024) and The Vergecast (Google antitrust remedy, Nov 2024). Moderated at State of the Net conference. National Press
    Foundation fellowship: "Your Body, Their Data? Reporting on Privacy, Tech and Biometrics." Pronouns: she/her. Signal handle:
