  name: Elizabeth Lopatto
  notes: 'Career arc: Kenyon Review (blog founder, literary criticism) → Bloomberg News (7 years, pharma/biotech/science)
    → The Verge (science editor → deputy editor → senior reporter). 20+ years in journalism spanning literary criticism, science,
    pharma, tech, corporate fraud, and Silicon Valley culture. Based in Oakland, California. Known as Liz Lopatto. KEY ANALYTICAL
    VALUE: (1) Literary criticism background → science journalism → corporate fraud courtroom reporting is a unique career
    pipeline among tracked journalists. Her Kenyon Review literary criticism training is visible in her prose style — more
    essayistic and voice-driven than typical tech reporting. (2) 7 years at Bloomberg covering pharma/biotech gave her scientific
    claims evaluation skills that make her Theranos/Holmes coverage analytically sharper than reporters who came to health-tech
    fraud from a pure tech background. (3) Within The Verge''s institutional structure, she occupies a unique position: former
    deputy editor who voluntarily returned to reporting. This means she understands The Verge''s editorial decision-making
    from the inside but now operates as an independent voice. (4) Her "chaos beat" — money, internet, culture of business
    — positions her as The Verge''s primary voice on corporate accountability and Silicon Valley hypocrisy. Post-Heath departure,
    she and Mia Sato are the two strongest individual voices shaping The Verge''s institutional posture on tech power. (5)
    Courtroom journalism specialization is rare in tech media: most tech reporters cover companies through PR, product launches,
    and interviews. Lopatto covers them through discovery documents, testimony, and cross-examinations. This creates a fundamentally
    different evidence base for her framing choices — she frames from legal proceedings, not press releases. FRAMING PORTABILITY
    NOTE: Unlike journalists who migrated between publications (Cade Metz, David Pierce), Lopatto has spent her entire digital
    media career at Vox Media/The Verge, making her a pure institutional case study for how The Verge''s editorial culture
    shapes framing over a 10+ year tenure.'
