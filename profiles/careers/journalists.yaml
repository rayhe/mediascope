    event_type: fellowship
    notes: 'Knight Science Journalism fellow at MIT (2021-22 cohort). Fellowship project: investigating historical parallels
      between the Cold War push for physics education in U.S. high schools in the 1950s and current efforts by tech companies
      and nonprofits to normalize computer science education in American public schools. This research became the foundation
      for her book ''Coding Kids'' (W.W. Norton, September 2026). NOTABLE: Fellow alongside Karen Hao (then MIT Technology
      Review senior AI editor, now freelance, author of ''Empire of AI''). The Singer-Hao fellowship overlap creates a rare
      controlled comparison: two journalists covering tech accountability from the same KSJ cohort, but arriving from different
      pipelines (Singer: NYT institutional reporter via Russia/Outside; Hao: MIT TR specialist editor via engineering) and
      covering different sectors (Singer: ed-tech; Hao: AI labs). Both received national journalism awards within the same
      year (2019). Both are now book authors published by major houses.'
