  name: Ashley Feinberg
  notes: 'Key migration: Gizmodo/Gawker → Wired (5 months) → HuffPost → Slate. One of the most distinctive voices in the Gawker
    Media orbit — internet sleuth who uncovered public figures'' secret social media accounts (James Comey, Mitt Romney, Pete
    Buttigieg). Trinity University BA (English and Communication, 2012). Forbes 30 Under 30. Dallas native. KEY FOR MEDIASCOPE:
    (1) One of the EARLIEST Gizmodo → Wired pipeline hires (May 2017), predating Drummond era (Shachtman was EIC). Her 5-month
    tenure is the shortest documented Wired stint after Kylie Robison (6-7 months). (2) Her career arc (Gawker → Gizmodo →
    Wired → HuffPost → Slate) traces the post-Gawker diaspora that seeded adversarial internet-culture journalism across mainstream
    publications. (3) John Cook — who wrote her Gizmodo farewell — went on to become executive editor of The Intercept and
    later returned to the Gawker-successor ecosystem; his editorial network is a significant vector for framing culture. (4)
    Her ironized, anti-institutional persona is the purest expression of what Drummond later institutionalized at Wired —
    but she preceded Drummond by 4 years. (5) The brevity of her Wired stint (even under the less adversarial Shachtman) suggests
    Condé Nast corporate culture and Gawker-style internet journalism were already a poor fit, which makes Drummond''s subsequent
    success in hiring from the same pipeline all the more notable as a deliberate editorial strategy rather than a natural
    talent flow.'
