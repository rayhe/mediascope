      (2020) — part of package winning Pulitzer Prize for Public Service. (4) China''s propaganda and social media manipulation (2022) — Gerald Loeb Award.
      (5) China surveillance state investigation with Muyi Xiao (2022, NYT Visual Investigations) — analyzed cache of 100,000+ government bidding documents
      to reveal police automated racial profiling in video surveillance, phone trackers, and mass DNA databases. OPC "How I Did It" program Nov 2022. KEY
      MEDIASCOPE VALUE: Mozur''s Facebook/Myanmar coverage (2018) is a foundational piece in anti-Meta coverage genealogy — it was among the earliest high-impact
      investigations into how Facebook''s platform enabled real-world violence in a developing country. His surveillance reporting naturally frames tech
      companies as enablers of authoritarian power.'
