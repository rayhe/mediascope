  - beat: Silicon Valley, social media, platform governance, content moderation
    end: 2020-10
    event_type: hired
    notes: 'Joined March 2013 as senior reporter. Promoted to Silicon Valley editor (~2017 — Nilay Patel, then newly EIC,
      formalized Newton''s existing leadership: "What I realized was that Casey had been actually in charge for some time").
      Authored "The Interface," a daily newsletter (launched 2017, 20,000+ subscribers) on platforms and democracy. Hosted
      "Converge" podcast with Silicon Valley entrepreneurs. KEY INVESTIGATION (2019): Series of investigative reports on Facebook
      content moderators at Cognizant (Phoenix and Tampa offices) — exposed PTSD, depression, addiction among moderators reviewing
      graphic content. Scola v. Facebook resulted in $52M preliminary settlement (San Mateo Superior Court, May 2020) covering
      11,250+ moderators. Cognizant subsequently exited the content moderation market entirely. 2020 National Magazine Award
      (Ellie) finalist for reporting. NPR interview (All Things Considered): "I''ve talked to more than a hundred moderators
      who worked for companies big and small." 7.5-year tenure — his longest institutional stint. Left October 2020 with his
      Verge mailing list (unusual concession by Vox Media). Newton self-described the departure: "It should have felt like
      a really exciting day. But honestly, mostly, it just felt very scary."'
    publication: the-verge
    role: silicon_valley_editor
    source_url: https://poynter.org/business-work/2017/the-verge-appoints-a-silicon-valley-editor/
    start: 2013-03
  - beat: Big Tech, social media platforms, platform governance, AI
    end: 2024-01
    event_type: hired
    notes: 'Founded Platformer October 2020 on Substack. Grew free list to 30,000 in first weeks (carried over from The Interface);
      ~1,000 paying at $10/month within weeks. Turned down Substack advances, accepted healthcare stipends. Year 1: ~25,000
      free. Year 2: ~50,000 free. Hired Zoë Schiffer as managing editor (became co-author of "Extremely Hardcore: Inside Elon
      Musk''s Twitter," Penguin, Sep 2024). Had third staff member. By January 2024: 170,000 free subscribers. KEY SCOOPS:
      Twitter/X employees during Musk''s takeover learned of their layoffs from Platformer, not internal channels — defining
      moment for the newsletter''s influence. Also April 2021: co-founded Sidechannel, a "virtual newsroom" on Discord with
      seven other independent journalists; hosted Mark Zuckerberg interview on Sidechannel Discord server. SUBSTACK DEPARTURE
      (Jan 2024): left over Substack''s handling of pro-Nazi publications. Migrated to Ghost. Statement: "if Substack can
      grow a publication like ours that quickly, it can grow other kinds of publication, too." Schiffer left Platformer in
      October 2024 to join Wired as Director of Business & Industry.'
    publication: platformer
    role: founder_editor
    source_url: https://www.platformer.news/
    start: 2020-11
  - beat: Big Tech, social media platforms, AI
