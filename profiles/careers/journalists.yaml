  name: Cecilia Kang
  notes: 'Korean American (child of Korean immigrants, grew up in Seattle where family ran a burger joint). 30+ year career
    spanning 5 publications across 3 countries. Career arc: AP-Dow Jones Seoul bureau chief (1994-2000, Asian financial crisis)
    → San Jose Mercury News (2000-03, Silicon Valley tech) → Seattle Post-Intelligencer (2003-06) → Washington Post senior
    technology correspondent (~9 years, 2006-2015, tech policy/FCC/FTC/net neutrality) → New York Times national technology
    correspondent (2015-present, tech regulation/antitrust/AI policy). Based in Bethesda, Maryland. Whitman College BA English
    (1994). Co-author of ''An Ugly Truth: Inside Facebook''s Battle for Domination'' (Crown/Random House, Jul 13 2021, ISBN
    9780062960696) with Sheera Frenkel — NYT Bestseller, based on 400+ interviews. 2019 Pulitzer Prize finalist (National
    Reporting, team Facebook coverage), George Polk Award (National Reporting), Gerald Loeb Award (Investigative Reporting).
    KEY RECENT COVERAGE (2025-2026): Lead NYT reporter on FTC v. Meta antitrust trial (Apr-May 2025) — the most aggressive
    antitrust case brought against a tech company, seeking to break up Meta by unwinding Instagram/WhatsApp acquisitions.
    Covered Zuckerberg testimony (Apr 14-17 2025), Kevin Systrom testimony (Apr 22 2025), Sheryl Sandberg testimony, trial
    conclusion (May 27 2025). Guest on NYT The Daily podcast (Apr 17 2025) discussing the trial. Also covers DOJ v. Google
    ad tech monopoly remedies hearing (2025), Google AI cybercrime lawsuit (Jun 2026), and Big Tech-Trump regulatory relationship.
    Lead reporter on upcoming Meta youth safety bellwether trial (Aug 2026, Judge Yvonne Gonzalez Rogers, 29 state AGs, $1.4T
    penalty demand). Regular NYT The Daily and Hard Fork podcast contributor. Interviewed Tim Cook, Mark Zuckerberg, Reed
    Hastings. KEY for MediaScope: (1) NYT''s primary tech regulation/antitrust reporter — her framing of whether Meta should
    be broken up directly shapes public understanding of the antitrust case. (2) Her WaPo → NYT migration (same beat, same
    city, 2015) is a clean natural experiment for DiD analysis of institutional framing effects. (3) The Kang-Frenkel partnership
    is the most productive policy-cybersecurity collaboration in tech journalism — Kang provides DC regulatory access + policy
    expertise, Frenkel provides Silicon Valley source network + cybersecurity depth. (4) Her WaPo in-app purchases investigation
    generated direct regulatory action (FTC charged Apple $32.5M, Google $19M, Amazon liable), demonstrating capacity to move
    policy. (5) NYT has AI licensing deals with Google, Apple, Amazon — the same companies Kang covers on the regulation beat
    — creating an undisclosed institutional conflict parallel to the Wired/Condé Nast conflicts MediaScope tracks.'
