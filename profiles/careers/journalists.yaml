    notes: 'Founded Platformer October 2020 on Substack. Grew free list to 30,000 in first weeks (carried over from The Interface);
      ~1,000 paying at $10/month within weeks. Turned down Substack advances, accepted healthcare stipends. Year 1: ~25,000
      free. Year 2: ~50,000 free. Hired Zoë Schiffer as managing editor (became co-author of "Extremely Hardcore: Inside Elon
      Musk''s Twitter," Penguin, Sep 2024). Had third staff member. By January 2024: 170,000 free subscribers. KEY SCOOPS:
      Twitter/X employees during Musk''s takeover learned of their layoffs from Platformer, not internal channels — defining
      moment for the newsletter''s influence. Also April 2021: co-founded Sidechannel, a "virtual newsroom" on Discord with
      seven other independent journalists; hosted Mark Zuckerberg interview on Sidechannel Discord server. SUBSTACK DEPARTURE
      (Jan 2024): left over Substack''s handling of pro-Nazi publications. Migrated to Ghost. Statement: "if Substack can
      grow a publication like ours that quickly, it can grow other kinds of publication, too." Schiffer left Platformer in
      October 2024 to join Wired as Director of Business & Industry.'
