  - beat: tech, platforms, disinformation, information warfare
    end: 2019-02
    event_type: hired
    notes: 'Joined BuzzFeed ~2012-2013 per his own account ("2012, 2013, when I joined" — Big Technology podcast). Started
      as deputy tech editor of BuzzFeed FWD (per about.me), then FWD Editor by July 2014 (confirmed by BuzzFeed/CBS video
      event). Later became senior technology writer. Part of BuzzFeed''s original tech team with John Herman, Matt Buchanan
      under Ben Smith, which reimagined tech reporting from gadgets → platform accountability. Covered Twitter''s harassment
      failures, pro-Trump media ecosystem (profiled Bill Mitchell, Alex Jones), conspiracy theories, attention hacking, bots,
      data voids. Featured in Netflix''s "Follow This" (2018), episode "The Future of Fakes" on deepfakes and audio/video
      manipulation. 2019 Mirror Award for Facebook privacy reporting. Relocated from NYC to Missoula, Montana during later
      BuzzFeed years. TV appearances on MSNBC, CNN, Good Morning America. KEY for MediaScope: BuzzFeed was the incubator for
      his platform-as-threat framing — the "first time I ever thought critically about Facebook" happened here.'
    publication: buzzfeed-news
    role: senior_writer
    source_url: https://about.me/charliewarzel
    start: 2013-01
  - beat: technology, media, online extremism, politics, privacy
    end: 2021-04
    event_type: hired
    notes: 'Opinion writer-at-large (new role created for him). Announced January 2019, started March 2019. Led the Privacy
      Project. Co-authored "One Nation Tracked," a 7-part investigative series on smartphone location tracking data — revealed
      massive location data set and its security/privacy dangers. 2020 Livingston Award finalist for National Reporting. Part
      of NYT tech opinion team with Farhad Manjoo, Sarah Jeong, Susan Fowler Rigetti, Alex Kingsbury, Kara Swisher, contributors
      Zeynep Tufekci and Tim Wu. Based in Missoula, Montana (remote from NYC). Departed ~April 2021 for Substack. KEY MIGRATION:
      BuzzFeed → NYT represents digital-native platform → paper of record transition. Tests whether framing formality and
      citation patterns shift in institutional prestige context. His Opinion placement (not News) gave him editorial freedom
      but also positioned his tech coverage as explicitly subjective/interpretive rather than straight reporting.'
    publication: nytimes
    role: opinion_writer_at_large
    source_url: https://nytco.com/press/charlie-warzel-to-join-the-new-york-times-opinion-pages/
    start: 2019-03
  - beat: technology, media, internet culture, politics
    end: 2021-11
    event_type: freelance
    notes: 'Launched Galaxy Brain newsletter on Substack ~April 12, 2021 (Mediagazer snapshot). 7-month independent run. Grew
      to 16,000 subscribers, 1,400 paid. Cracked six-figure annualized revenue — but "made considerably less" than NYT salary.
      KEY QUOTE on departure from institutional media: "The last two places I worked were big, polarizing brands, which also
      meant that a huge chunk of my readers on a given story were there because they wanted to use what I''d written — usually
      just the headline — as ammunition in a culture war battle... And if I''m honest, it''s burned me out and left me feeling
      grim about the role of mainstream media." ANALYTICAL VALUE: This 7-month Substack period is a natural control for measuring
      institutional influence on framing. Same writer, same topics, no editorial hierarchy. Compare Galaxy Brain (Substack)
      output to Galaxy Brain (Atlantic) for institutional effects on framing.'
    publication: substack
    role: independent_newsletter
    source_url: https://warzel.substack.com/p/welcome-to-galaxy-brain
    start: 2021-04
  - beat: technology, online extremism, platforms, internet culture, media, AI
    event_type: hired
    notes: 'Contributing writer from November 2021, promoted to staff writer (announced by Editor & Publisher, ~mid-2022).
      Writes and hosts Galaxy Brain as both newsletter and podcast for Atlantic subscribers. Deputy editor Paul Bisceglio:
      "a dazzling writer and a profound thinker. He has a remarkable ability to cut through the Silicon Valley hype and deliver
      punchy ideas and real insights." Recent Galaxy Brain podcast guests include Will Knight (Wired senior writer, on AI
      weapons), David Sims (Atlantic film critic, on Netflix). Regular guest on Jon Stewart (The Weekly Show), Peter Kafka
      (Channels), Bill Simmons (The Ringer), Offline (Crooked Media). Formed Galaxy Brain Corp (LLC) for newsletter operations.
      Now lives on island off Washington state coast. KEY MIGRATION: Substack → Atlantic represents independent → institutional
      return. He chose Atlantic''s subscriber infrastructure and editorial brand over Substack independence despite six-figure
      Substack revenue. Operates under Nicholas Thompson (ex-Wired EIC, now Atlantic CEO) editorial chain, which creates a
      structural editorial culture bridge between Wired and Atlantic tech coverage. Tests whether institutional affiliation
      re-introduces framing patterns he identified as problematic (headline weaponization, culture war ammunition) during
      his Substack departure statement.'
    publication: atlantic
    role: staff_writer
    source_url: https://www.editorandpublisher.com/stories/the-atlantic-announces-hire-of-charlie-warzel-as-staff-writer,249102
    start: 2021-11
  name: Charlie Warzel
  notes: 'Key migration chain: NBC News (intern) → InTheCapital → Adweek → BuzzFeed News → NYT Opinion → Substack (Galaxy
    Brain) → Atlantic. The Shipley School (Bryn Mawr, PA, Class of 2006). Hamilton College BA Government (Class of 2010, January
    ''07 admit). Alpha Delta Phi fraternity. Clubs: Adirondack Adventure, Buffers, Sino-American Relations Club, Untitled
    @ Large, Urban Outwitters. Author of "Out of Office: The Big Problem and Bigger Promise of Working From Home" (Dec 2021,
    Knopf/Penguin Random House, co-authored with Anne Helen Petersen). Lives on island off Washington state coast with partner
    Anne Helen Petersen (former BuzzFeed senior culture writer, author of "Can''t Even," Culture Study newsletter). Awards:
    2019 Mirror Award (Facebook privacy reporting at BuzzFeed), 2020 Livingston Award finalist for National Reporting ("One
    Nation Tracked" at NYT). Netflix "Follow This" (2018), "The Future of Fakes." KEY for MediaScope: His career arc uniquely
    tests framing portability across 4 institutional contexts — digital-native (BuzzFeed), institutional prestige (NYT), independent
    (Substack), and subscriber-driven magazine (Atlantic). His explicit identification of burnout from institutional partisan
    readership dynamics (headlines weaponized as "culture war ammunition") is a rare firsthand account of how institutional
    brands shape audience behavior around tech journalism. The 7-month Substack experiment provides a natural control for
    measuring institutional influence on his framing. At the Atlantic, he operates under Nicholas Thompson (ex-Wired EIC,
    now Atlantic CEO), creating an editorial culture bridge between Wired and Atlantic tech coverage. His Galaxy Brain podcast
    amplifies his framing influence beyond text into audio/video. Framing signature: platform-as-threat narrative, skepticism
    of tech industry self-regulation, attention to information warfare and online radicalization dynamics.'
