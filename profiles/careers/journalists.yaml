  - beat: national security, tech policy, surveillance, privacy, content moderation
    event_type: hired
    notes: 'Senior policy writer at Wired (Condé Nast). Hired as senior policy writer, started Jan 9, 2023. Title on BuzzSumo/X
      bio: "Sr. writer @WIRED." Reports within Wired Security desk under executive editor Brian Barrett. Based in Dallas,
      TX — one of Wired''s few non-NYC/SF reporters. Represented by NewsGuild-CWA. KEY INVESTIGATIONS AT WIRED (2023-2026):
      (1) NameTag/Meta face recognition (Jun 2026, with Dhruv Mehrotra): Discovered dormant facial recognition system ("NameTag")
      hidden in Meta AI app code, distributed to 50M+ phones. Three AI models convert faces to biometric faceprints. Investigation
      triggered both legislative action (3 senators) and corporate policy change — Meta deleted the face-recognition code
      after WIRED''s report. Andrew Bosworth (Meta CTO) called reporting "incredibly misleading" and "absolutely dishonest."
      Most consequential Meta investigation by any Wired reporter in 2026. (2) Dialog/Peter Thiel investigation (Jun 2026,
      4-part series with Yulia Almazova): Exposed membership list and internal ranking system of Peter Thiel''s secretive
      "Dialog" society — an invitation-only network of ~1,000+ paying elite members from tech, politics, military, entertainment.
      Revealed Dialog grades members by wealth/fame, uses algorithms for seating/matching. Pentagon investigating the data
      exposure for potential unmasking of national security officials. (3) SignalGate (Apr 2025): Reported on fate of Trump
      administration Signal messages from the national security group chat accidentally shared with Atlantic EIC Jeffrey Goldberg.
      (4) FBI location data purchase (Mar 2023): First FBI acknowledgment of buying US location data. (5) Pentagon phone tracking
      (May 2026). (6) ICE deportation network in Texas (Jul 2026). (7) Spotify drug podcast ranking manipulation (Jun 2026,
      with Mehrotra). (8) Data broker/AI opt-out failures (May 2026). Total article count: ~3,887 across all publications
      (per BuzzSumo). ANALYTICAL SIGNIFICANCE: Cameron-Mehrotra is Wired''s most consequential investigative partnership on
      surveillance/Meta topics. Cameron frames ALL tech policy through surveillance infrastructure lens — connecting commercial
      tech products to Pentagon suppliers, ICE data brokers, and law enforcement databases. When he writes about Meta (e.g.,
      NameTag, account takeovers), the default frame is "surveillance company builds surveillance tool." This framing is analytically
      significant for MediaScope because it provides the most adversarial surveillance-state interpretation of Meta''s consumer
      products, distinct from business-desk or consumer-tech framing.'
    publication: wired
    role: senior_writer
    source_url: https://dellcameron.me/
    start: 2023-01
