  - beat: technology, Big Tech, media
    end: 2022-06
    event_type: hired
    notes: Co-founded Recode (Jan 1, 2014) with Walt Mossberg after leaving WSJ/AllThingsD. Based in San Francisco. Vox Media
      acquired Recode in May 2015. Launched Recode Decode podcast (June 2015) with Stewart Butterfield as first guest. Co-launched
      Pivot podcast with Scott Galloway (Sep 2018) — became one of the most popular tech/business podcasts. Also held inaugural
      Code Conference near LA (spring 2014), succeeding the D conference. Executive producer of Code conference. Anti-Meta,
      anti-Big-Tech editorial stance. By her own admission (May 2020 tweet), had "not been involved in editing or assigning
      stories on Recode for many years." In April 2020, Pivot moved to New York Magazine properties, dropping Recode branding.
      Swisher remained connected to Vox Media throughout NYT period. Founded Revere Digital (holding company for Recode and
      Code). MSNBC "Revolution" special series on technology's impact.
