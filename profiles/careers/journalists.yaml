      that Pai''s office withheld documents from Democratic FCC commissioners on unauthorized sale of US cellphone location
      data (Techmeme lead). (3) Various data breach investigations and cybersecurity reporting. Established working partnership
      with Dhruv Mehrotra (Gizmodo data reporter) that would carry forward to Wired. Represented by Writers Guild of America,
      East (WGA East) at G/O Media. Last day at Gizmodo was in December 2022.'
