      framing — if anyone absorbs Atlantic''s editorial culture, it''s a writer who spent their entire career there; (2) His
      departure-while-contributing creates a natural experiment: does his Substack writing differ in framing from his Atlantic
      writing on the same topics? (3) Co-authored *Abundance* with Ezra Klein (2025, #1 NYT bestseller), which advocates for
      building and growth — a notably more techno-optimist stance than typical Atlantic tech coverage, testing whether individual
      ideology can override institutional framing even after 17 years.'
