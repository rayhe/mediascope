  name: Charlie Warzel
  notes: 'Key migration chain: NBC News (intern) → InTheCapital → Adweek → BuzzFeed News → NYT Opinion → Substack (Galaxy Brain) → Atlantic. The Shipley
    School (Bryn Mawr, PA, Class of 2006). Hamilton College BA Government (Class of 2010, January ''07 admit). Alpha Delta Phi fraternity. Clubs: Adirondack
    Adventure, Buffers, Sino-American Relations Club, Untitled @ Large, Urban Outwitters. Author of "Out of Office: The Big Problem and Bigger Promise of
    Working From Home" (Dec 2021, Knopf/Penguin Random House, co-authored with Anne Helen Petersen). Lives on island off Washington state coast with partner
    Anne Helen Petersen (former BuzzFeed senior culture writer, author of "Can''t Even," Culture Study newsletter). Awards: 2019 Mirror Award (Facebook
    privacy reporting at BuzzFeed), 2020 Livingston Award finalist for National Reporting ("One Nation Tracked" at NYT). Netflix "Follow This" (2018), "The
    Future of Fakes." KEY for MediaScope: His career arc uniquely tests framing portability across 4 institutional contexts — digital-native (BuzzFeed),
    institutional prestige (NYT), independent (Substack), and subscriber-driven magazine (Atlantic). His explicit identification of burnout from institutional
    partisan readership dynamics (headlines weaponized as "culture war ammunition") is a rare firsthand account of how institutional brands shape audience
    behavior around tech journalism. The 7-month Substack experiment provides a natural control for measuring institutional influence on his framing. At
    the Atlantic, he operates under Nicholas Thompson (ex-Wired EIC, now Atlantic CEO), creating an editorial culture bridge between Wired and Atlantic
    tech coverage. His Galaxy Brain podcast amplifies his framing influence beyond text into audio/video. Framing signature: platform-as-threat narrative,
    skepticism of tech industry self-regulation, attention to information warfare and online radicalization dynamics.'
