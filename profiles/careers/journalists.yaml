      digital civil liberties. His late 2010 Forbes cover story was the first magazine cover to feature Julian Assange. Published
      "This Machine Kills Secrets: How WikiLeakers, Hacktivists and Cypherpunks Aim to Free the World''s Information" (Dutton/Penguin,
      2012) — NYT Editors'' Choice, later named one of Verge''s top 10 "greatest tech books of all time." Nominated (with
      Ryan Mac) for Gerald Loeb Award (2014) for Forbes article "Big Brother''s Brain." Won "Single Best Blog Post of the
      Year" from Security Bloggers Network (2013) for "Meet The Hackers Who Sell Spies The Tools To Crack Your PC (And Get
      Paid Six-Figure Fees)." Named SANS Institute Top Cybersecurity Journalist (2014). Featured in 2015 documentary "Deep
      Web" about Ross Ulbricht trial. Role described as "senior reporter" by later bios. Forbes is outside the 5 tracked publications
      but provides a pre-Condé Nast baseline for his framing.'
    publication: forbes
    role: staff_writer
    source_url: https://en.wikipedia.org/wiki/Andy_Greenberg
    start: 2007-01
  - beat: security, privacy, hacking, cybercrime, cyberwar
    event_type: hired
    notes: '12+ year tenure (ongoing). Wired''s primary security/privacy/hacking writer. Also contributed to The Atlantic.
      MAJOR INVESTIGATIONS: (1) Jeep hack (Jul 2015) — demonstrated remote vehicle takeover with Charlie Miller and Chris
      Valasek, prompting Chrysler to recall 1.4M vehicles; SPY Car Act bill introduced in Senate same day. (2) "Lights Out"
      (Jul 2017 cover story) — Russia''s hack of Ukraine power grid; won inaugural NYU CSAW Cyber Journalism Award; six months
      of investigative reporting in US and Ukraine. (3) "The Code that Crashed the World" — NotPetya cyberattack; won Gerald
      Loeb Award for International Reporting (2019). BOOKS: "Sandworm: A New Era of Cyberwar" (Doubleday, Nov 2019) — traced
      GRU''s Olympic Destroyer malware; won Gerald Loeb (international), Sigma Delta Chi (SPJ), 3 Deadline Club Awards (NY
      SPJ), Cornelius Ryan Citation for Excellence (Overseas Press Club). "Tracers in the Dark: The Global Hunt for the Crime
      Lords of Cryptocurrency" (Doubleday, Nov 2022) — cryptocurrency tracing/dark web; won second Gerald Loeb Award for Feature
      Reporting (2023). Total: 2 Gerald Loeb Awards, Sigma Delta Chi, Cornelius Ryan Citation, 3 Deadline Club Awards. 2026
      National Magazine Award finalist (Service Journalism) with Lily Hay Newman for government surveillance article. KEY:
      Institutional longevity (~12 years) makes him a control case for Drummond-era editorial drift. Forbes → Wired is a cross-ownership
      test (Forbes independent; Wired = Condé Nast). His security beat gives natural adversarial framing toward Big Tech —
      the question is whether Drummond-era Wired amplifies or simply inherits that posture.'
    publication: wired
    role: senior_writer
    source_url: https://www.wired.com/author/andy-greenberg/
    start: 2014-07
