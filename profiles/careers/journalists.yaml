      Paid Six-Figure Fees)." Named SANS Institute Top Cybersecurity Journalist (2014). Featured in 2015 documentary "Deep
      Web" about Ross Ulbricht trial. Role described as "senior reporter" by later bios. Forbes is outside the 5 tracked publications
