    notes: "Senior writer at Wired (hired Jan 9, 2023 as 'senior policy writer,' title evolved to 'senior writer'). Based\
      \ in Dallas, TX. Represented by NewsGuild-CWA (@wiredunion). Reports to Brian Barrett (Director, Security & Investigations).\
      \ Self-described 'pro-union, Texas-based journalist covering tech policy and regulation, with an eye toward privacy\
      \ law, content moderation, and government/commercial surveillance.' Contact: dell_cameron@wired.com. Social: @dell.bsky.social\
      \ (Bluesky), @dell@journa.host (Mastodon). \n\nKEY WIRED INVESTIGATIONS:\n(1) Meta NameTag/Face Recognition series (Jun\
      \ 4-8, 2026): Co-broke with Dhruv Mehrotra that Meta silently added face-recognition code ('NameTag') to its smart glasses\
      \ companion app, prototyping with Rank One Computing (Pentagon/DHS supplier). Pipeline: face detection → crop → biometric\
      \ signature → database match. 4-article series: 'Meta Silently Added Face-Recognition Code...' (Jun 4), Meta response/deletion\
      \ (Jun 8), wrongful arrest exposing failures in oldest US police face-recognition tools (Jun 10), Meta tapped Pentagon\
      \ supplier to prototype face recognition for glasses (Jun 15). IMPACT: 3 US senators (Markey, Wyden, Merkley) sent formal\
      \ demand letter to Zuckerberg (Mar 18, 2026 based on NYT disclosure, amplified by Cameron's Jun investigation); 70+\
      \ civil liberties organizations (ACLU, EPIC, Fight for the Future, Access Now, Leadership Conference on Civil and Human\
      \ Rights) demanded Meta kill NameTag; Meta deleted face-recognition system from app after Wired report. One of Wired's\
      \ most consequential direct policy outcomes from tech coverage.\n(2) Dialog/Peter Thiel leak series (Jun 16-26, 2026):\
      \ 4-article investigation of data leak from Thiel's secretive 'Dialog' society (co-founded with Auren Hoffman ~2006,\
      \ ~222 registrants for Dublin retreat). Exposed members including Treasury Secretary Scott Bessent, Sen. Ted Cruz, Xbox\
      \ president Sarah Bond, Sam Harris, Bryan Johnson, Google DeepMind executives, ADL CEO Jonathan Greenblatt, Cato Institute\
      \ president, Charles Koch Foundation executive director, Nobel laureate Roger Myerson. Pentagon opened investigation\
      \ after Cameron's reporting exposed intelligence officials. Revealed internal dating app, political leaning data collection,\
      \ retreat sessions titled 'Navigating WWIII' and 'Build-a-Cult.' Airtable database with private access tokens, not published\
      \ by Wired.\n(3) ICE/surveillance reporting (2025-2026): ICE shadow deportation network in Texas, surveillance driving\
      \ patients from medical care (EPIC report, Jan 2026), DHS reconnaissance drones along US-Canada border.\n(4) 41 state\
      \ AGs vs Meta: covered state attorneys general letter demanding Meta address 'dramatic increase' in Facebook/Instagram\
      \ account takeovers.\n(5) License plate surveillance: 'FBI Wants Near Real-Time Access to US License Plate Readers'\
      \ (May 23, 2026), 'Bipartisan Amendment Would End Police License Plate Tracking Nationwide' (May 20, 2026) — directly\
      \ relevant to Flock Safety, LPR policy, and the civilian LPR networks MediaScope tracks.\n(6) Twitter/X ban (2023):\
      \ Banned from Twitter after reporting on Matt Walsh account hack (SIM swap attack by hacker 'Doomed') — Cameron interviewed\
      \ the hacker and reported obtaining Walsh's W2, Crowder messages. Ban for 'distribution of hacked material.' Reported\
      \ by Forbes' Matt Novak.\n(7) Data brokers/AI opt-out failures, Pentagon phone tracking, Spotify drug podcast ranking\
      \ manipulation, Cole Allen Trump assassination attempt.\n\nANALYTICAL SIGNIFICANCE: Cameron-Mehrotra is Wired's most\
      \ consequential investigative partnership on surveillance/Meta topics. Both transferred together from Gizmodo to Wired\
      \ (Cameron: Jan 2023, Mehrotra: tracked). Their Prediction: Bias collaboration at Gizmodo → NameTag investigation at\
      \ Wired represents a decade-long reporting partnership that consistently frames commercial tech through a surveillance-state/civil-liberties\
      \ lens. Cameron's beat (national security/surveillance) + Mehrotra's skills (data analysis, security research) combine\
      \ to produce Wired's most impactful investigations. The NameTag series is the only recent Wired investigation that directly\
      \ triggered both legislative action AND corporate policy change. Their work under Barrett at Wired Security continues\
      \ the Gizmodo → Wired pipeline that also includes Barrett himself."
