      Computing Power Is Splitting the World Into Haves and Have-Nots" / "The Global A.I. Divide" (Jul 2025, with Satariano
      — only 32 nations have AI-specialized data centers, Oxford data). (4) Data centers causing water/power crises abroad
      in Mexico/Chile/Ireland (Oct 2025, with Satariano + Emiliano Rodríguez Mega — Microsoft Querétaro data center causing
      blackouts and water outages). (5) Saudi Arabia AI data center geopolitics — $5B Red Sea data center caught between US
      and Chinese tech giants (2025-2026). (6) Nvidia/Megaspeed Singapore company under US scrutiny for China ties — executive
      Alice Huang (Huang Le) socialized with Jensen Huang, company poised to buy $2B of Nvidia AI tech (2026). (7) UAE Sheikh
