  name: Leah Feiger
  notes: 'KEY HIRE: First-ever Wired politics editor, created under Katie Drummond. Built Wired''s politics team from scratch.
    Career arc: Dartmouth (African/Gender Studies) → UCT (Gender Studies) → Columbia J-School → Segal Family Foundation (Africa
    research) → freelance (Atlantic, NYT, WaPo) → Vice News (senior features editor → managing editor, Emmy award-winning)
    → Wired (politics editor → Director of Politics & Science). Hosts WIRED Politics Lab podcast and Uncanny Valley news segments.
    UNIQUE IN DATASET: Only journalist in the 131-person database whose entire pre-journalism career is in African studies
    and gender studies with zero tech journalism background. Every other Wired editor/director came through the tech journalism
    pipeline (Gizmodo, Verge, Bloomberg tech, etc.). Feiger''s framing instincts were formed in identity politics, social
    justice investigations, and international development — not tech accountability or business journalism. This makes her
    a critical natural experiment case: does a politics-trained editor adopt Wired''s institutional tech framing, or does
    she import her own framing vocabulary? The DiD framework should compare her Wired bylines against her Vice bylines to
    test institutional vs individual framing origin. Her Bocconi lecture language (''digital coup d''état,'' ''too narcissistic
    to last'') suggests she brings her own adversarial frame rather than adopting Wired''s.'
- analytical_notes: 'CRITICAL CROSS-PUBLICATION BRIDGE: The single most important editorial figure connecting two tracked
    publications. As Wired EIC (2017-2020), Thompson personally co-authored the two Facebook cover stories cited in congressional
    hearings — ''Inside the Two Years that Shook Facebook—and the World'' (Feb 2018, with Fred Vogelstein, 11,000 words, 50+
    current/former Facebook employees) and ''15 Months of Fresh Hell Inside Facebook'' (2019). These pieces cemented Wired''s
    adversarial editorial posture toward Meta during the Cambridge Analytica era. Thompson then became CEO of The Atlantic
    (Feb 2021), overseeing its business strategy including AI licensing deals with OpenAI (announced ~2024, union pushback
    from The Atlantic Guild demanding transparency on terms) and Amazon — both Meta competitors.


    CONDÉ NAST PIPELINE: Thompson''s path (New Yorker → Wired, both CN titles) is a pure Condé Nast institutional pipeline.
    He spent 12 years (2005-2017) as senior editor at Wired and then New Yorker web editor before returning to Wired as EIC.
    This means Wired''s editorial direction under Thompson was shaped by someone steeped in Condé Nast institutional culture,
    including CN''s broader financial relationships (AI licensing deals with OpenAI, Amazon noted in MediaScope profiles).


    EMERSON COLLECTIVE OWNERSHIP TIE: Co-founded Speakeasy AI (originally ''Narwhal'') with Raffi Krikorian (CTO of Emerson
    Collective, which owns The Atlantic under Laurene Powell Jobs) and political scientist Ian Bremmer. Backed by Emerson
    Collective directly. Sold to Amplica Labs/Project Liberty (Frank McCourt) April 2024. This creates a direct operational
    tie between the Atlantic CEO and the ownership entity — not just employer-employee but co-venture partners.


    DIALOG CIRCLE (2026): Mentioned in leaks from Peter Thiel''s ''Dialog'' group but declined to comment (Wikipedia, 2026).
    Thiel''s circle includes conservative-libertarian tech figures — Thompson''s participation (or adjacency) raises questions
    about elite tech-media social networks that don''t appear in masthead disclosures.


    FACEBOOK COVERAGE AS EIC: Thompson didn''t just oversee Wired''s Facebook coverage — he personally reported and co-wrote
    the flagship investigations. This is unusual for an EIC and means the editorial posture was author-level, not just directive.
    The Loeb Award finalist (2020) for these stories validated the adversarial framing within the journalism industry''s own
    reward structure.


    DiD FRAMEWORK: The Wired EIC → Atlantic CEO migration is atypical — it''s not a reporter changing newsrooms but an editorial
    leader changing institutional contexts entirely (from Condé Nast editorial to Emerson Collective business leadership).
    Tests whether anti-Big-Tech editorial posture carries through executive leadership transitions. Under Thompson, Atlantic
    has won 3 Pulitzers, 3 NMA General Excellence awards, and reached profitability (~March 2024) and 1M+ subscribers. His
    business success gives him outsized influence over Atlantic editorial direction despite the CEO/EIC separation (EIC is
    Jeffrey Goldberg).


    BROADCAST AMPLIFICATION: CBS News contributor (2015-2021), CNN contributing editor (2010-2016), Bloomberg News contributing
    editor (2010-2014). Thompson''s broadcast presence meant his editorial judgments at Wired reached audiences far beyond
    the magazine''s readership. Cross-reference with Kara Swisher entry for similar broadcast amplification pattern.


    FAMILY: Grandson of Paul Nitze (Cold War arms negotiator, ''the Hawk''). Son of W. Scott Thompson (professor, Ford & Reagan
    administrations) and Nina Nitze. Grew up in Chestnut Hill, MA. Phillips Academy Andover. Married, wife is dance professor
    at The New School. Has sons.'
