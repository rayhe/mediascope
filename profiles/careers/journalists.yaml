    event_type: hired
    notes: 'Contributing opinion writer (2018-2022, not 2020 as previously listed). Wrote on Elon Musk, Kevin Systrom''s Instagram
      departure, Google''s China censorship consideration, Ro Khanna''s internet Bill of Rights. Hosted "Sway" podcast (premiered
      Sep 21, 2020, Salesforce-sponsored) — Nancy Pelosi was first guest. Had weekly NYT newsletter. Left in June 2022 (Bloomberg
      report) to return to Vox Media. Maintained anti-Big-Tech stance. CONCURRENT with Recode/Vox Media roles — she was splitting
      time between NYT and Vox. KEY: NYT Opinion gave her the most prestigious institutional platform for her anti-tech-platform
      views, but she functioned as a columnist rather than a reporter, meaning her framing was explicitly opinion from the
      start.'
    publication: nytimes
    role: columnist
    source_url: https://www.nytimes.com/by/kara-swisher
    start: 2018-01
  - beat: technology, Silicon Valley, longevity
    event_type: hired
    notes: 'Editor-at-large at New York Magazine (Sep 2022-present). Host of "On with Kara Swisher" podcast (premiered Sep
      26, 2022). Co-host of "Pivot" podcast with Scott Galloway (ongoing). Published memoir "Burn Book: A Tech Love Story"
      (Simon & Schuster, Feb 2024) — received criticism for being "anti-worker." CNN Original Series "Kara Swisher Wants to
      Live Forever" (6-part longevity documentary, premiered April 11, 2026) — explored longevity science, tech billionaires''
      anti-aging pursuits, underwent ketamine infusion, hyperbaric chamber, red-light therapy. Livingston Awards judge since
      2014. Appeared as herself in HBO''s "Silicon Valley" (2015). Hosted companion podcast for "Succession" S3 (2021) and
      S4 (2023). Elected to American Academy of Arts and Sciences (2021). Known for wearing dark aviator sunglasses indoors
      ("I have light sensitivity"). Born Dec 11, 1962, grew up in Princeton, NJ (moved from Roslyn Harbor, LI after father''s
      death at age 5). Georgetown SFS (BS 1984), Columbia Journalism (MS 1985). Married Megan Smith (1999, ex-US CTO, divorced
      2017), married Amanda Katz (2020). Four children. Suffered mini-stroke on flight to Hong Kong (2011). Announced plan
      to run for SF mayor in 2023 (announced 2016, never ran). KEY for MediaScope: Swisher is the ultimate test case for PORTABLE
      individual bias vs institutional bias. Her anti-Big-Tech stance has been consistent across FIVE outlets (Washington
      Post, WSJ, Recode, NYT, Vox/NY Mag) spanning 40 years. If her tone doesn''t shift across outlets with different institutional
      cultures, it strongly supports the individual-bias hypothesis in the DiD analysis. Her book "Burn Book" provides a first-person
      account of her framing development.'
    publication: vox-media
    role: editor_at_large
    source_url: https://en.wikipedia.org/wiki/Kara_Swisher
    start: 2022-09
  name: Kara Swisher
  notes: 'Key migration: Washington City Paper → Washington Post → WSJ (16 years) → Recode (co-founder) → NYT Opinion → Vox
    Media/New York Magazine. Born Dec 11, 1962. Georgetown SFS (BS 1984), Columbia Journalism (MS 1985). Anti-Big-Tech stance
    has been consistent across five outlets and 40 years — the ultimate test case for portable individual bias vs institutional
    editorial influence. Co-created the D: All Things Digital conference (2003) and AllThingsD.com (2007) with Walt Mossberg.
    Founded Recode (2014). Co-hosts Pivot podcast with Scott Galloway (since 2018). Author of "aol.com" (1998), "There Must
    Be a Pony" (2003), "Burn Book: A Tech Love Story" (2024). CNN documentary "Kara Swisher Wants to Live Forever" (April
    2026). Gerald Loeb Award (2011). American Academy of Arts and Sciences (2021). Sheryl Sandberg: "It is a constant joke
    in the Valley when people write memos to say, I hope Kara never sees this." KEY for MediaScope DiD analysis: if her framing
    doesn''t modulate across outlets with radically different institutional cultures, it provides strong evidence that individual
    bias dominates institutional bias for established columnists.'
