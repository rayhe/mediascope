  name: Brian X. Chen
  notes: 'Key migrations: Macworld (IDG) → Wired (Condé Nast) → NYT. Author of "Always On" (Da Capo Press, 2011). Co-founded The Wirecutter with Brian Lam
    in 2011 (between Wired and NYT jobs); Wirecutter later acquired by NYT for $30M in 2016. At NYT since November 2011; Lead Consumer Technology Writer
    since July 2015. Writes "Tech Fix" column on social implications of technology. 2019 George Polk Award for National Reporting (team, Facebook/tech coverage).
    National Magazine Award finalist. Email: brian.chen@nytimes.com. Social: @bxchen (Twitter), @bxchen@mstdn.social. KEY FOR MEDIASCOPE: (1) WIRED → NYT
    MIGRATION is the primary DiD signal — tests whether consumer tech framing modulates when moving from Condé Nast editorial culture (Wired under Mat Honan/later
    Drummond) to NYT institutional norms (Business Day desk, subscription model). His Wired tenure was pre-Drummond adversarial pivot, so the comparison
    isolates NYT institutional effects. (2) WIRECUTTER NEXUS: Co-founded Wirecutter, joined NYT, NYT bought Wirecutter — unusual financial-editorial intersection.
    (3) NYT LIFER BASELINE: 14+ years at NYT (2011-present) makes him second only to Steve Lohr (~47 years) as an NYT institutional framing baseline. Unlike
    Lohr (foreign → business → tech), Chen has stayed consumer tech throughout. (4) GRUBER CONTRADICTION TEST: Daring Fireball''s documented factual contradiction
    (2017 vs 2024 on software update slowdowns) provides a rare external falsification signal for institutional framing drift — the NYT''s editorial posture
    shifted from defending tech to critiquing it, and Chen''s positions shifted in parallel, supporting the institutional-framing-dominance hypothesis.
    (5) COLUMN PIVOT: Tech Fix evolved from product troubleshooting (2015-2021) to societal critique (2022+), tracking the broader NYT editorial pivot toward
    adversarial tech coverage. Testable via pre/post tonal analysis anchored to the column''s stated reboot date.'
