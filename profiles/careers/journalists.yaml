    event_type: hired
    notes: 'Member of the founding editorial team of Russian Vogue (Vogue Russia). The magazine launched with its first issue
      in August/September 1998 under Editor-in-Chief Aliona Doletskaya, published by a fully owned Condé Nast International
      subsidiary after a scrapped joint venture with SK Communications International (planned Spring 1998, restructured Oct
      1997). The launch issue was 308 pages, earned $1M from advertisers, and projected 100K+ copies. It launched into the
      August 1998 Russian financial crisis — the ruble crashed to one-third of its dollar value the week the first issue went
      to printers. Singer was a founding editor (not EIC), likely in features/culture. Her Brown BA in Russian literature
      and comparative literature was directly relevant to Condé Nast''s need for bilingual editorial staff who understood
      both Western fashion publishing standards and Russian cultural context. KEY CONTEXT: Russian Vogue was Singer''s first
      traceable journalism role — a Condé Nast publication. Her current employer NYT has no corporate relationship with Condé
      Nast, but the early Condé Nast connection is notable for MediaScope''s institutional framing analysis.'
