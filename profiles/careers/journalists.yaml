  name: Steve Lohr
  notes: 'Key career arc: Bingham Press → NYT (1979–present, ~47 years). NYT''s longest-serving technology reporter. Foreign
    correspondent for a decade (Tokyo, Manila, London) before transitioning to technology beat. Columbia J-School graduate
    (1975). Two Pulitzer Prize nominations; one win (2013, Explanatory Reporting, "iEconomy" series on Apple). Author of three
    books: "Go To" (Basic Books, 2001, history of programming), "U.S. v. Microsoft" with Joel Brinkley (McGraw-Hill, 2001),
    and "Data-ism" (Harper Business, 2015, data science). Also written for NYT Magazine, The Atlantic Monthly, Washington
    Monthly. Based in NYC. KEY for MediaScope: Lohr is the most important baseline journalist in the dataset. His 47-year
    single-institution career at the NYT — spanning foreign correspondence, editing, and technology reporting across every
    tech era — makes him the purest test of NYT institutional framing over time. Unlike the adversarial-investigative cohort
    (Frenkel, Kang, Mac, Isaac) who arrived with pre-formed accountability instincts from other outlets, Lohr''s editorial
    identity was formed entirely within the NYT. His economic-structural lens (tech → automation → jobs → inequality → geographic
    redistribution) is distinct from both the adversarial camp and the product-focused reporters. His coverage of Meta specifically
    (e.g., co-byline on June 2026 "US presses Meta to agree to AI reviews") provides a direct framing comparison with Frenkel/Kang
    on the same subjects. If NYT institutional framing is uniform, Lohr and Frenkel should frame Meta stories similarly; if
    beat-specific variation dominates, their framing should diverge significantly. This is a testable hypothesis for the DiD
    regression.'
