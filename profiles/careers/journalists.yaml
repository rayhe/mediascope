  name: James Vincent
  notes: 'British journalist and author based in London. Cambridge University graduate. Twitter/X: @jjvincent (~20,700 followers).
    One of the most influential AI journalists of the 2015-2023 era — his nine-year Verge tenure coincided with the entire
    modern AI boom from deep learning breakthroughs through the ChatGPT era. His "AI is killing the old web" piece (Jun 2023)
    became one of the most-cited tech journalism articles of the decade, referenced in EU Parliament research, Journal of
    Democracy, Alberta Law Review, and dozens of academic papers. KEY FOR MEDIASCOPE: Vincent''s career represents a high-value
    natural experiment for the editorial migrations DiD framework. He spent ~9 years as The Verge''s primary AI voice, then
    transitioned to freelance work at The Guardian (a tracked publication). This Verge→Guardian migration allows direct comparison
    of how institutional context shapes framing: same journalist, same beat (AI), different publication constraints. His Verge
    work was news-oriented (daily reporting, investigation, explainers); his Guardian output is opinion/commentary (essayistic,
    analytical, explicitly labeled opinion). The LRB essays represent a third register: literary criticism of technology,
    with 5,000+ word pieces that embed AI critique within cultural history. Tracking all three registers from one writer provides
    a control for individual voice when measuring institutional framing bias.'
