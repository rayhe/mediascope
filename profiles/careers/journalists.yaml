      New America, Carnegie Endowment policy papers. Interviewed Yasheng Huang (MIT Sloan) on US-China tech competition. Also
      covered self-driving cars, military AI, and early deep learning breakthroughs. Wrote the "Fast Forward" newsletter.
      KEY for MediaScope: longest continuous AI beat reporter at a major US tech publication — his departure to Wired represented
      a significant talent loss for MIT Tech Review.'
