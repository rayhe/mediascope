  - beat: money, internet, culture of business, prediction markets, corporate fraud, Silicon Valley critique
    event_type: beat_change
    notes: 'Returned to reporting as senior reporter covering "money, the internet and the culture of business" — internally
      called "the chaos beat" by Nilay Patel. Moved from editorial management back to frontline reporting. KEY BODY OF WORK:
      (1) COURTROOM JOURNALISM: Holmes/Theranos trial (complete coverage, 2021-22), Sam Bankman-Fried/FTX trial (2023, in-courtroom
      daily dispatches from NYC — Gary Wang testimony, Caroline Ellison testimony, SBF cross-examination, verdict), Elon Musk
      v. OpenAI trial (2026, jury selection through verdict analysis). (2) SILICON VALLEY CULTURAL CRITIQUE: "Silicon Valley
      has forgotten what normal people want" (viral, MetaFilter discussion, Techmeme), "Marc Andreessen is a philosophical
      zombie" (Mar 2026, widely shared), Zuckerberg/Joe Rogan interview analysis (noted GOP pressure framing omissions), Jeff
      Bezos/Washington Post cancellation analysis (Oct 2024). (3) PREDICTION MARKETS: Multi-piece coverage of Polymarket/Kalshi
      — Polymarket war betting, Maduro capture betting, nuclear detonation betting pulled. Decoder podcast guest on prediction
      market regulation. (4) AI/TECH OVERRELIANCE: "Overreliance on AI is bad for you — whatever is happening to normal people
      has already happened to the ultra-wealthy" (widely quoted by Dave Karpf, others). AI psychosis coverage. FRAMING SIGNATURE:
      Mordant institutional skepticism combined with courtroom-trained evidentiary rigor. Does not speculate — reports what
      she saw. Uses corporate fraud trials as lens for broader tech industry critique. Unlike many tech reporters who cover
      companies from press releases and interviews, Lopatto''s primary reporting method is sitting in courtrooms and reading
      filings. This gives her coverage an unusually evidence-based character. Her writing voice is distinctively dry and acerbic
      — "I''ll spare you the experience of listening to one of the richest men in the world whine" (on Zuckerberg/Rogan).
      Based in Oakland, California. Contact: liz@theverge.com, lopatto@mastodon.xyz. Twitter/X: @mslopatto. Vox Media Union
      (WGA East) member. Cat: Jeeves.'
