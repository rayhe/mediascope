  name: Will Knight
  notes: 'British AI/tech journalist with 20+ years in tech journalism and one of the longest continuous AI beats in the field.
    Based in Cambridge, Massachusetts. Education: University of Kent BA Anthropology (1994-97), University of the Arts London
    Journalism (1998-2000). Studied anthropology and journalism in the UK before turning his attention to machines — his anthropology
    background gives him a distinctive social-science lens on AI''s impact on human societies. X/Twitter: @willknight. Signal:
    wak.01 (no PR pitches). Name pronounced "wee-all" per his own bio. Speaker: Yale Poynter Fellowship in Journalism ("Exploring
    AI in Journalism and Higher Education"), Carnegie Council for Ethics in International Affairs ("Tales from the Hype Beat"),
    News Literacy Project podcast ("Is that a fact?"). KEY for MediaScope: one of only two journalists (with Cade Metz) who
    has worked at BOTH Wired (Condé Nast) and MIT Technology Review, making both DiD candidates for cross-institutional framing
    analysis. His migration MIT Tech Review → Wired (Sep 2019) is the reverse of Metz''s Wired → NYT pipeline — Knight moved
    INTO Condé Nast while Metz moved OUT. Both carried deep AI expertise into their new institutions. His AI Lab newsletter
    is Wired''s primary AI content product, giving him significant agenda-setting power within Condé Nast''s AI coverage ecosystem.
    Unlike Zoë Schiffer (business/labor) or Lauren Goode (consumer tech), Knight covers the fundamental technology — model
    capabilities, research breakthroughs, talent movements — which shapes how Wired frames the underlying AI race that Meta,
    OpenAI, Google, and Anthropic are competing in.'
  source_urls:
