      to Brian Barrett. Oversees all Wired Gear, Culture, and Service coverage across US and UK. Direct reports include Miles
      Klee (culture), Ej Dickson (culture), Manisha Krishnan (culture/online extremism), Julian Chokkattu (reviews), Boone
      Ashworth (service). Co-hosts Uncanny Valley podcast (launched Oct 31, 2024) alongside Lauren Goode and Zoë Schiffer
      — replaced the earlier Gadget Lab podcast as Wired''s flagship. Drummond''s announcement: "I''ve been so impressed by
      Michael''s professionalism, dedication, and deep understanding of all things WIRED — along with his eagerness to move
      us in new directions and try new things." ANALYTICAL VALUE: Calore is the longest-tenured member of Drummond''s leadership
      triumvirate (~18 years at Wired) and the only one promoted from within rather than hired externally from the Gizmodo/Vice/Guardian
      adversarial pipeline. His consumer tech/culture desk is less adversarial in tone than Schiffer''s business desk or Marchman''s
      politics/security desk, but his editorial choices on which "culture" stories to pursue shape how Wired frames tech companies''
      social impact. Tests: does Calore''s institutional Wired DNA moderate Drummond''s adversarial editorial direction, or
