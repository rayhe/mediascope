- name: Mat Honan
  notes: 'Key migration: Wired → BuzzFeed News → MIT Tech Review EIC. Tests editorial influence when a journalist becomes
    the boss. Former Wired monthly columnist and senior writer, then built BuzzFeed News tech desk to Pulitzer Prize level,
    then became MIT TR EIC.'
  career:
  - publication: wired
    event_type: hired
    role: senior_writer
    beat: technology, security, column
    start: 2012-01
    end: 2014-12
    source_url: https://talkingbiznews.com/they-re-hiring/buzzfeed-hires-wireds-honan-to-run-its-silicon-valley-bureau/
    notes: Monthly columnist and senior staff writer. Wrote cover stories and regular features. Known for 'How Apple and Amazon
      Security Flaws Led to My Epic Hacking' (2012). 20+ year tech journalist career overall.
  - publication: buzzfeed-news
    event_type: hired
    role: executive_editor
    beat: tech desk, SF bureau
    start: 2015-01
    end: 2021-07
    source_url: https://chartwellspeakers.com/speaker/mat-honan/
    notes: San Francisco bureau chief → executive editor. Opened BuzzFeed SF office. Launched BuzzFeed Open Lab. Led tech
      desk to Polk Award, Livingston Award, and 2021 Pulitzer Prize.
  - publication: mit-tech-review
    event_type: hired
    role: eic
    beat: overall editorial direction
    start: 2021-08
    source_url: https://www.technologyreview.com/2021/06/22/1026816/mat-honan-joins-mit-technology-review-editor-in-chief/
    notes: Editor-in-chief. $292K + $74K benefits (FY2024 990). Career path Wired → BuzzFeed → MIT TR creates editorial culture
      bridge. Start date August 17, 2021.
- name: Gideon Lichfield
  notes: 'HIGHEST-VALUE MIGRATION IN DATASET: EIC of MIT Tech Review, then EIC of Wired. Same person leading two tracked publications
    sequentially. Can directly compare editorial direction under same individual across different institutional structures
    to decompose individual from institutional effects.'
  career:
  - publication: quartz
    event_type: hired
    role: global_news_editor
    beat: global news, format innovation
    start: 2012-06
    end: 2017-11
    notes: Founding editor at Quartz. Previously at The Economist (15 years). Known for innovative digital news formats.
  - publication: mit-tech-review
    event_type: hired
    role: eic
    beat: overall editorial direction
    start: 2017-12
    end: 2020-09
    source_url: https://www.technologyreview.com/2017/12/05/3720/a-letter-from-mit-technology-reviews-new-editor-in-chief/
    notes: EIC. Shifted MIT TR toward more investigative, critical tech coverage. Led aggressive coverage of MIT-Epstein scandal
      (2019). $269K-$278K compensation (FY2019-2021 990s).
  - publication: wired
    event_type: hired
    role: eic
    beat: overall editorial direction
    start: 2020-09
    end: 2023-09
    source_url: https://www.wired.com/story/gideon-lichfield-new-editor-wired/
    notes: Succeeded Nicholas Thompson as Wired EIC. Replaced by Katie Drummond as Global Editorial Director in Sep 2023.
      The Lichfield MIT-TR→Wired migration is the single most analytically valuable case in the dataset for DiD regression.
- name: Kara Swisher
  notes: Anti-Big-Tech stance across every outlet she's worked at. The ultimate test of portable individual bias.
  career:
  - publication: wsj
    event_type: hired
    role: columnist
    beat: technology
    start: 1997-01
    end: 2014-06
    notes: Long-tenured tech columnist. Co-founded AllThingsD.
  - publication: recode
    event_type: hired
    role: eic
    beat: technology, Big Tech
    start: 2014-07
    end: 2019-12
    notes: Founded Recode (spun off from The Verge/Vox Media). Anti-Meta, anti-Big-Tech editorial.
  - publication: nytimes
    event_type: hired
    role: columnist
    beat: technology opinion
    start: 2020-01
    end: 2023-12
    source_url: https://www.nytimes.com/by/kara-swisher
    notes: Opinion columnist. Maintained anti-Big-Tech stance. Left to focus on Pivot podcast.
- name: Mike Isaac
  notes: 'NYT''s primary Meta/Facebook beat reporter and Silicon Valley institution. Career arc: music journalism → Wired
    → AllThingsD/Re/code → NYT. Key migration from Condé Nast (Wired) to NYT. Author of ''Super Pumped'' (2019, adapted into
    Showtime series 2022). Gerald Loeb Award winner. 10+ year NYT tenure. UC Berkeley 2010, English Lit. From Fort Worth,
    TX.'
  career:
  - publication: forbes
    event_type: hired
    role: contributor
    beat: technology, startups
    start: 2009-01
    end: 2010-06
    notes: Early career. Wrote about tech business and startups. Also wrote for Paste Magazine and Performer Magazine (music
      journalism roots).
    source_url: https://allthingsd.com/20120910/welcome-to-atd-the-very-social-mike-isaac/
  - publication: wired
    event_type: hired
    role: staff_writer
    beat: mobile computing, Google, Apple
    start: 2010-06
    end: 2012-09
    notes: 'Covered rise of mobile computing, Google''s social/mobile efforts, HP mobile empire collapse, Google/Motorola
      acquisition, Facebook pre-IPO. Editor was Brian X. Chen (now NYT). KEY: Condé Nast publication — first position in the
      Advance Publications orbit.'
    source_url: https://allthingsd.com/20120910/welcome-to-atd-the-very-social-mike-isaac/
  - publication: allthingsd
    event_type: hired
    role: senior_editor
    beat: social web, Facebook, Twitter, Google+
    start: 2012-09
    end: 2013-12
    notes: Hired by Kara Swisher and Walt Mossberg to cover the social web. AllThingsD was part of WSJ/Dow Jones. Took over
      social beat from Liz Gannes.
    source_url: https://allthingsd.com/20120910/welcome-to-atd-the-very-social-mike-isaac/
  - publication: recode
    event_type: hired
    role: senior_editor
    beat: social media companies
    start: 2014-01
    end: 2014-09
    notes: Followed Swisher/Mossberg when ATD became Re/code (separated from WSJ). Continued covering Facebook, Twitter, LinkedIn.
      ~2 years combined at ATD/Re/code.
    source_url: https://poynter.org/reporting-editing/2014/recodes-mike-isaac-joins-nyt-as-a-tech-reporter/
  - publication: nytimes
    event_type: hired
    role: technology_reporter
    beat: Meta/Facebook, Uber, Big Tech
    start: 2014-10
    source_url: https://www.nytimes.com/by/mike-isaac
    notes: Hired by Dean Murphy and Suzanne Spector to replace Jenna Wortham. Initially moved to Brooklyn, later returned
      to SF. Uber coverage won Gerald Loeb Award for distinguished business reporting. Travis Kalanick reporting became 'Super
      Pumped' (W.W. Norton, 2019) — NYT and WSJ bestseller. Adapted to Showtime series (2022) starring Joseph Gordon-Levitt;
      Isaac made a cameo. MSNBC on-air tech correspondent. 2018 team coverage of Facebook won Gerald Loeb Award. Has covered
      Meta metaverse pivot, AI race, Musk/Twitter acquisition, OpenAI leadership crisis. Known for deep sourcing inside Meta.
      12+ year tenure as of 2026 — longest-serving current NYT tech reporter.
- name: Sheera Frenkel
  notes: 'NYT cybersecurity and Meta/Facebook reporter. Former Middle East foreign correspondent (decade). Co-wrote ''An Ugly
    Truth'' (2021), the definitive adversarial Facebook book from a NYT journalist. Pulitzer Prize finalist, George Polk Award,
    Gerald Loeb Award, Mirror Award. KEY for MediaScope: her foreign correspondent background gave her an adversarial framing
    toolkit (covert actors, hidden motivations, institutional deception) that she transferred directly to Big Tech coverage.'
  career:
  - publication: mcclatchy
    event_type: hired
    role: foreign_correspondent
    beat: Middle East
    start: 2005-01
    end: 2009-01
    notes: Earliest career phase. Middle East correspondent covering Arab Spring, Iran nuclear program, Syria. Based in Jerusalem,
      Cairo, Tel Aviv. Fluent in Hebrew, conversational Arabic.
    source_url: https://nytco.com/press/sheera-frenkel-to-join-bizday-in-san-francisco/
  - publication: npr
    event_type: hired
    role: correspondent
    beat: Middle East
    start: 2009-01
    end: 2012-01
    notes: Continued Middle East foreign correspondence. Hebrew fluency helped land exclusives. ~10 years total in Middle
      East across McClatchy/NPR/Times of London.
  - publication: times-of-london
    event_type: hired
    role: correspondent
    beat: Middle East
    start: 2012-01
    end: 2015-01
    notes: Final foreign correspondent role before pivoting to tech/cybersecurity.
  - publication: buzzfeed-news
    event_type: hired
    role: cybersecurity_correspondent
    beat: cybersecurity
    start: 2015-01
    end: 2017-05
    notes: 'Originated the cybersecurity beat at BuzzFeed News. Profiled Russian hackers (Fancy Bear), ISIS internet use,
      developing nations coming online (Myanmar). Broke news on Facebook fake news countermeasures. CAREER PIVOT: foreign
      correspondent → tech/cyber. She has said ''her time as a foreign correspondent aids her coverage of cybersecurity: People
      are always speaking different languages and their motivations are often unclear.'''
    source_url: https://talkingbiznews.com/they-move/ny-times-hires-cybersecurity-reporter-frenkel-from-buzzfeed/
  - publication: nytimes
    event_type: hired
    role: cybersecurity_reporter
    beat: cybersecurity, Meta/Facebook, misinformation
    start: 2017-05
    source_url: https://nytco.com/press/sheera-frenkel-to-join-bizday-in-san-francisco/
    notes: 'Hired by Ellen Pollock and Pui-Wing Tam to cover cybersecurity in SF, alongside Nicole Perlroth. Beat quickly
      expanded to encompass Facebook/Meta and social media misinformation. 2018: Part of NYT team reporting ''Delay, Deny
      and Deflect'' Facebook exposé (6 months, 50+ interviews). 2019: Pulitzer Prize finalist (national reporting team), George
      Polk Award (national reporting), Gerald Loeb Award (investigative reporting). 2021: Co-wrote ''An Ugly Truth: Inside
      Facebook''s Battle for Domination'' with Cecilia Kang — NYT and international bestseller. 2022: Mirror Award for misinformation
      reporting. Education: Boston University. Lives in San Francisco Bay Area.'
- name: Kashmir Hill
  notes: 'NYT''s definitive privacy and surveillance reporter. Career arc: legal blogging → Forbes → Fusion → Gizmodo investigative
    → NYT. Author of ''Your Face Belongs to Us'' (2023) on Clearview AI — shortlisted for Royal Society Science Book Prize.
    Her Clearview AI investigation (Jan 2020) changed facial recognition policy nationwide. KEY for MediaScope: her beat (privacy/surveillance)
    puts her in direct analytical contact with Meta''s data practices, face recognition systems, and tracking technology.
    Her coverage directly overlaps with Ray''s Face Watch Space interests.'
  career:
  - publication: above-the-law
    event_type: hired
    role: blogger
    beat: legal news
    start: 2008-01
    end: 2009-06
    notes: 'First journalism role. Legal news blogger. Entry point into journalism. Education: Duke University BA.'
  - publication: forbes
    event_type: hired
    role: writer_editor
    beat: privacy, technology
    start: 2010-01
    end: 2014-06
    notes: '4-year tenure as writer and editor. Started ''The Not-So Private Parts'' blog on privacy in the digital age (launched
      2009 at NYU, brought to Forbes). Pioneered the privacy reporting genre. 2013: Lived on Bitcoin for a week — viral series.
      Reported on Google pressuring Forbes to promote Google+ (2011) — Google hired PIs to surveil her. Won SABEW innovation
      award. Education: NYU MA Magazine Journalism.'
    source_url: https://talkingbiznews.com/they-move/great-reporters-leading-the-way-at-forbes/
  - publication: fusion
    event_type: hired
    role: editor
    beat: technology, privacy
    start: 2014-06
    end: 2017-01
    notes: 'Editor of Fusion''s technology vertical ''Real Future.'' Helped run live journalism events. NOTE: Kevin Roose
      was also at Fusion during this period (VP, co-executive producer of Real Future TV show). When Fusion merged with Gizmodo
      Media Group, Hill transitioned.'
    source_url: https://nytco.com/press/kashmir-hill-bringing-her-distinct-voice-on-tech-to-the-times/
  - publication: gizmodo
    event_type: hired
    role: investigative_reporter
    beat: privacy, Big Tech surveillance
    start: 2017-01
    end: 2019-06
    notes: 'Joined the Special Projects Desk investigative team at Gizmodo Media Group. Executed landmark ''Goodbye Big Five''
      experiment: cut off Amazon, Facebook, Google, Microsoft, and Apple each for a week, then all at once. ''Spoiler: it''s
      not possible.'' Also lived in a smart home and spent a week only using Bitcoin. Experimental journalism with systemic
      privacy critique.'
    source_url: https://nytco.com/press/kashmir-hill-bringing-her-distinct-voice-on-tech-to-the-times/
  - publication: nytimes
    event_type: hired
    role: enterprise_reporter
    beat: privacy, technology, facial recognition
    start: 2019-06
    source_url: https://nytco.com/press/kashmir-hill-bringing-her-distinct-voice-on-tech-to-the-times/
    notes: 'Hired by Ellen Pollock, Pui-Wing Tam, and Carolyn as enterprise reporter in Business. Describes beat as ''the
      looming tech dystopia and how we can try to avoid it.'' Jan 2020: Clearview AI investigation broke open facial recognition
      debate — led to privacy legislation action. 2023: ''Your Face Belongs to Us'' (Random House) — FT ''Best Books 2023
      Technology'', shortlisted Royal Society Trivedi Science Book Prize 2024. Mar 2024: Exposed GM, Honda, Kia, Hyundai sharing
      driver data with LexisNexis — GM ended practice within 11 days. Won National Press Foundation best in technology award.
      Born March 5, 1981. Partner: Trevor Timm (Freedom of the Press Foundation co-founder).'
- name: Kevin Roose
  notes: 'NYT''s most prominent AI/technology columnist. Unique career: NYT (finance) → NYMag → Fusion TV → NYT (tech columnist).
    Author of 3 books, 4th (AGI Chronicles) coming 2026. Co-hosts Hard Fork podcast with Casey Newton. Known for experiential
    journalism — went undercover at Liberty University, lived as a billionaire for a day, had viral Bing Sydney AI conversation.
    Institutional importance: ''The Shift'' column shapes public discourse on AI/automation more than almost any other single
    journalist.'
  career:
  - publication: nytimes
    event_type: hired
    role: finance_reporter
    beat: Wall Street, finance
    start: 2011-06
    end: 2012-06
    notes: First NYT stint. ~1 year covering Wall Street and finance culture. Young reporter straight from Brown University.
      Work led to 'Young Money' (2014). Left for New York Magazine.
    source_url: https://adweek.com/performance-marketing/kevin-roose-leaves-new-york-times-for-new-york/
  - publication: new-york-magazine
    event_type: hired
    role: lead_business_writer
    beat: business, technology, Silicon Valley
    start: 2012-06
    end: 2014-11
    notes: 'Lead business writer for nymag.com''s Daily Intel blog. Covered intersection of New York and Silicon Valley money
      centers. Wrote features for GQ, ESPN: The Magazine, SPIN. Published ''Young Money'' (2014) — NYT bestseller.'
    source_url: https://talkingbiznews.com/they-move/new-york-magazine-hires-nyt-biz-reporter/
  - publication: fusion
    event_type: hired
    role: senior_editor_and_vp
    beat: technology, business
    start: 2014-11
    end: 2017-03
    notes: 'Senior editor, then VP overseeing editorial projects and strategy. Co-executive producer of ''Real Future'' —
      a documentary TV series about technology and innovation. NOTE: Kashmir Hill was also at Fusion during this period (editor
      of Real Future tech vertical). Fusion was a joint venture of ABC News and Univision targeting younger audiences.'
    source_url: https://talkingbiznews.com/they-move/roose-joining-new-york-times-as-biz-columnist/
  - publication: nytimes
    event_type: hired
    role: columnist
    beat: technology, business, culture, AI
    start: 2017-03
    source_url: https://nytco.com/press/kevin-roose-joins-biz-day/
    notes: 'Rejoined NYT (second stint) as Business Day columnist. Hired by Ellen Pollock. ''The Shift'' column examines intersection
      of tech, business, and culture. Created ''Rabbit Hole'' investigative podcast (2020) on internet radicalization. Co-hosts
      ''Hard Fork'' weekly podcast with Casey Newton (since ~2022). Feb 2023: Viral Bing/Sydney conversation — most-discussed
      AI interaction of the year. Published ''Futureproof: 9 Rules for Humans in the Age of Automation'' (2021). Currently
      writing ''The AGI Chronicles'' (coming 2026) on the race to build artificial general intelligence. Forbes ''30 Under
      30.'' Part of team that won 2018 Gerald Loeb Award for breaking news. Regular guest on ''The Daily'' podcast and CNBC.
      Lives in Oakland, CA. Education: Brown University.'
- name: Karen Weise
  notes: 'NYT''s Seattle tech correspondent covering Amazon, Microsoft, and the Pacific Northwest tech ecosystem. Career arc:
    management consulting (briefly) → public radio → ProPublica → Bloomberg Businessweek → NYT. SABEW award winner for Dan
    Price/Gravity Payments exposé at Bloomberg. KEY for MediaScope: her Amazon/Microsoft beat directly intersects with the
    NYT''s Amazon AI licensing deal ($20-25M/yr) — she covers the company that pays her employer.'
  career:
  - publication: propublica
    event_type: hired
    role: intern
    beat: investigative
    start: 2009-01
    end: 2009-06
    notes: 'Early career internship at ProPublica. Previously worked in public radio in Southern California and briefly as
      a management consultant. Education: Yale (BA), UC Berkeley Graduate School of Journalism.'
  - publication: bloomberg-businessweek
    event_type: hired
    role: reporter
    beat: policy, consumer finance, housing, technology
    start: 2010-01
    end: 2018-04
