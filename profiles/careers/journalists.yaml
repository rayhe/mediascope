  framing_analysis:
    beat_expansion_2025_2026: 'Significant beat expansion from surveillance/warfare to global AI infrastructure geopolitics:
      chip smuggling enforcement (Nvidia/Megaspeed, Super Micro), data center environmental impact (water/power in Mexico,
      Chile, Ireland), sovereign AI ambitions (Saudi Arabia, UAE), and the global AI compute divide. The Mozur-Satariano partnership
      has evolved from "tech enables authoritarianism" (2018-2023) to "AI infrastructure IS geopolitics" (2024-2026). This
      shift positions Mozur at the center of NYT''s coverage of the chip war, data center backlash, and AI sovereignty debates.'
    career_pattern: 'Mozur''s career is entirely Asia-rooted: Hong Kong tabloid (The Standard) → Dow Jones Asia business journal
      (FEER) → WSJ Asia tech → NYT Asia tech → NYT Global tech. This unbroken Asia immersion since 2007 gives him exceptionally
      deep source networks in China, SE Asia, and the Middle East. His Mandarin fluency and lived experience (Shanghai resident
      expelled by CCP) make him one of few Western reporters who can work primary Chinese-language sources, government procurement
      databases, and surveillance company documentation directly. This ground-truth access is why his surveillance coverage
      has such high evidentiary density — he builds from documents, not secondhand claims.'
    meta_coverage_pattern: Mozur's Facebook/Myanmar reporting (2018) was foundational in establishing the "platform as enabler
      of violence" narrative that subsequent anti-Meta coverage builds upon. That said, Mozur is NOT a Meta beat reporter
      — he covers tech-state dynamics where Meta/Facebook intersects with authoritarian abuse. His framing is about the POWER
      DYNAMICS between tech platforms and states, not about any single company. When he covers Meta, it's through the lens
      of real-world harm (Myanmar genocide, China propaganda campaigns on Facebook) rather than corporate criticism. His coverage
      is high-evidence, primary-source driven, and less editorialized than typical anti-Meta reporting.
