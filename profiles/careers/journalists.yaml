      "anti-worker." CNN Original Series "Kara Swisher Wants to Live Forever" (6-part longevity documentary, premiered April 11, 2026) — explored longevity
      science, tech billionaires'' anti-aging pursuits, underwent ketamine infusion, hyperbaric chamber, red-light therapy. Livingston Awards judge since
      2014. Appeared as herself in HBO''s "Silicon Valley" (2015). Hosted companion podcast for "Succession" S3 (2021) and S4 (2023). Elected to American
      Academy of Arts and Sciences (2021). Known for wearing dark aviator sunglasses indoors ("I have light sensitivity"). Born Dec 11, 1962, grew up in
      Princeton, NJ (moved from Roslyn Harbor, LI after father''s death at age 5). Georgetown SFS (BS 1984), Columbia Journalism (MS 1985). Married Megan
      Smith (1999, ex-US CTO, divorced 2017), married Amanda Katz (2020). Four children. Suffered mini-stroke on flight to Hong Kong (2011). Announced plan
      to run for SF mayor in 2023 (announced 2016, never ran). KEY for MediaScope: Swisher is the ultimate test case for PORTABLE individual bias vs institutional
      bias. Her anti-Big-Tech stance has been consistent across FIVE outlets (Washington Post, WSJ, Recode, NYT, Vox/NY Mag) spanning 40 years. If her tone
      doesn''t shift across outlets with different institutional cultures, it strongly supports the individual-bias hypothesis in the DiD analysis. Her
      book "Burn Book" provides a first-person account of her framing development.'
