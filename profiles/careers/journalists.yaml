      TV: CNN, MSNBC, PBS NewsHour. CFR panelist (2024 election trade policy episode). Co-runs International China Journalists
      Association. Frequent co-author with Adam Satariano (Brussels) on stories at intersection of trade policy and European
      tech regulation. Recent: co-authored Kyndryl/Solvinity Dutch acquisition block (Jul 2026). AWARD: 2026 Pulitzer Prize
      for Investigative Reporting (team member — Eric Lipton, David Yaffe-Bellany, Ben Protess + 14 contributors including
      Swanson, investigating Trump administration self-enrichment and cronyism). ANALYTICAL VALUE: Swanson is the NYT''s primary
      voice on chip export controls and US-China tech supply chains — the infrastructure layer that determines whether companies
      like Meta can procure the GPUs needed for AI training. Her coverage of semiconductor tariffs, Nvidia restrictions, and
      Middle East AI deals directly shapes the economic context for Meta''s $125-145B capex narrative. Her 8-year China background
      (analyst, EIC, Mandarin speaker) gives her source networks and contextual understanding that most DC trade reporters
      lack. For MediaScope DiD analysis: her unique career arc (China analyst → WaPo data journalist → NYT trade policy) means
      her framing is shaped by deep economic analysis and data visualization instincts rather than the adversarial tech-culture
      lens of reporters like Nitasha Tiku or the investigative-leak methodology of Jeff Horwitz.'
