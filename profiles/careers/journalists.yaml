    Loeb Award finalist (Breaking News, Thiel/Gawker, with Matt Drange; source: newsroom.ucla.edu), 2019 Mirror Award (Facebook
    coverage at BuzzFeed; source: newhouse.syracuse.edu), 2020 George Polk Award (Facebook disinformation at BuzzFeed, with
    Craig Silverman; source: buzzfeed.com/buzzfeednews/buzzfeed-news-wins-george-polk-award). Book: "Character Limit: How
    Elon Musk Destroyed Twitter" with Kate Conger (Penguin Press, Sept 17 2024, hardcover ISBN 9780593656136, ebook ISBN 9780593656143,
    480pp). Named Best of 2024 by Kirkus Reviews, Financial Times, New Statesman. Endorsed by Carreyrou (Bad Blood), Tolentino
    (Trick Mirror), Lorenz (Extremely Online). Goodreads: 4.24/5 avg (3,102 ratings). Personal essay: "At 82, My Grandmother
    Has Lost Her Husband — and the World as She Knows It" (BuzzFeed News, Sept 2020) — rare autobiographical piece about his
    Vietnamese grandmother during COVID. ANALYTICAL VALUE: Mac is the most direct comparison case for tech accountability
    coverage across publications — his beat (billionaire/corporate power scrutiny) stayed constant while his institutional
    context changed three times. At Forbes he tracked wealth; at BuzzFeed he shifted to accountability investigations; at
    NYT he does the same with institutional weight. The Forbes → BuzzFeed → NYT pipeline represents an increasing-prestige
    trajectory where each move amplified the same adversarial instinct with more institutional backing. KEY ANALYTICAL UPDATE
    (Jun 2026): 2026 byline analysis (via BuzzSumo) reveals Mac''s output is now dominated by SpaceX IPO coverage (9+ articles
    Apr-Jun 2026: IPO filing, S-1 financials, Gwynne Shotwell profile, $1.77T valuation skeptics, corporate governance). Meta
    coverage reduced to intermittent scoops (Zuckerberg prediction markets "Arena" app Jun 24-27 2026, Meta AI government
    review Jun 24). This complicates the assumption that Mac = "primary NYT Meta reporter" for DiD analysis — Mike Isaac may
    now carry more consistent Meta coverage volume at NYT. Co-authorship of "Character Limit" with Kate Conger (tracked) creates
    a paired-journalist control: same book, same reporting process, different career pipelines (Conger via Gizmodo → TechCrunch
    → NYT vs Mac via Forbes → BuzzFeed → NYT). Worked under Mat Honan (tracked) at BuzzFeed SF bureau.'
