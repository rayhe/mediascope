- name: Adam Satariano
  notes: 'Key migration: Congressional Quarterly → Bloomberg (11 yrs) → NYT (2018–present). London-based EU tech regulation correspondent — NYT''s primary
    lens for how EU regulatory action against Meta, TikTok, Google, Apple, and X is reported to American readers. Coverage spans DMA, DSA, AI Act, GDPR
    enforcement, content moderation labor, AI in warfare, and US-EU geopolitical tech tensions. Frequent co-authors: Paul Mozur (AI/warfare/surveillance),
    Ana Swanson (trade/geopolitics), Mike Isaac (Meta). His EU-based sourcing naturally positions EU enforcement as justified consumer protection — key
    framing question for MediaScope is whether his pieces adequately represent the counterargument that EU regulation constitutes overreach or anti-American
    protectionism. SF Bay Area native, UC Santa Cruz graduate, lives in south London with wife Nickie and two sons. Giants and 49ers fan. Had a personal
    internet privacy incident (filmed on London subway, video went viral on SubwayCreatures Instagram) that he turned into a Bloomberg Decrypted podcast
    episode about online privacy.'
