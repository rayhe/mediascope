    Life" adapted into film "Arrival" (2016, dir. Denis Villeneuve). Only 18 published fiction works in 35+ years — one of
    the most decorated-per-word writers in genre fiction. Obama 2019 summer reading list. KEY FOR MEDIASCOPE: Chiang is the
    most influential non-journalist voice shaping public discourse about AI through essays. His frames — "blurry JPEG," "new
    McKinsey," "sentence completion" — enter mainstream vocabulary and are cited by other journalists whose work MediaScope
    analyzes. His New Yorker → Atlantic migration in 2026 means his framing influence now directly overlaps with one of the
    6 tracked publications. Unlike staff journalists who produce weekly/daily content, Chiang publishes ~1 essay per year
    but each has outsized impact on how other journalists frame AI stories. His computer science background (Brown CS, Microsoft
    technical writer) gives his criticism technical credibility that most arts/culture critics lack — he cannot be dismissed
    as a humanities outsider misunderstanding the technology. His anti-AI-consciousness essay at The Atlantic directly intersects
    with coverage of Meta AI, Anthropic Claude, and Google DeepMind that MediaScope tracks.'
