  name: Ana Swanson
  notes: 'Key career arc: Dell English (China) → JLM Pacific Epoch (China equity research) → China Economic Review (EIC, Shanghai) → JL Warren Capital (analyst)
    → Washington Post (staff writer, Know More blog) → NYT (trade policy, Washington bureau). One of the most unusual career paths in the journalist database
    — 8 years living in China as an analyst and editor before entering US journalism at age 30+. Education: Northwestern BA Cultural Anthropology (2000-2004),
    University of Iowa non-degree Chinese/Economics (2005), Hopkins-Nanjing Center Certificate (2007-2008), Johns Hopkins SAIS MA International Relations
    with concentrations in International Economics and China Studies (2013-2014). Native of Story City, Iowa; Mandarin speaker; based in Washington DC.
    Co-runs International China Journalists Association. Amateur soccer player. Personal site: anaclaireswanson.com. 2026 Pulitzer Prize for Investigative
    Reporting (team member). ANALYTICAL VALUE: Swanson occupies a unique niche — she is the NYT''s primary chip export controls and trade policy reporter,
    covering the infrastructure economics that underpin Meta''s AI ambitions. Her dual China-analyst/US-journalist background means she frames tech-trade
    stories through supply chain economics rather than the adversarial "Big Tech accountability" lens common at Wired or the culture-war framing of social
    media reporters. For MediaScope: when Swanson covers a Meta-adjacent topic (GPU tariffs, semiconductor restrictions, AI chip deals), her framing tends
    toward macroeconomic analysis and geopolitical context rather than corporate villainy, making her a useful baseline for measuring how other NYT reporters
    frame similar subjects. Key co-authorship: Adam Satariano (Brussels-based, EU tech regulation) — their joint bylines merge trade policy and regulatory
    coverage in a way that shapes how NYT frames US-EU tech tensions.'
