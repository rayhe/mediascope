      California''s Student Online Personal Information Protection Act of 2014 (SOPIPA), a landmark student privacy law. 2019
      George Polk Award (team, privacy). 2019 Pulitzer finalist (National Reporting). Teaching tech accountability journalism
      at The School of The New York Times for high school students. Data & Society Research Institute affiliate. One of NYT''s
      longest-serving tech reporters — 18+ years as of 2026. Over 1,291 published articles (per Muck Rack). Recent coverage
      (2025-2026): Big Tech making Cal State its AI training ground, Amazon AI Camp, Google and OpenAI driving AI adoption
      in K-12 schools, Netflix Reed Hastings $50M Bowdoin AI program gift. Media appearances: Science Friday (facial recognition
      debate), The Brian Lehrer Show, Marketplace Tech, The Takeaway. Speaking: Brown University, Cornell Tech, Columbia,
      NYU, Computer Science Teachers Association, GSV Labs. Author of ''Coding Kids: Big Tech''s Battle to Remake Public Schools''
      (W.W. Norton, September 8, 2026, 352 pages, ISBN 978-0393881943, hardback). Blurbed by Diane Ravitch, Ruha Benjamin,
      and Sherry Turkle. Keynote speaker at 2026 Civics of Technology Conference (August 7). Book chronicles the viral success
      of Code.org (nonprofit backed by Big Tech) and profiles educators fighting for broader CS education vision. Contact:
      nsinger@nytimes.com, DM for Signal.'
