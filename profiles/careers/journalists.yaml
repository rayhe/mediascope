      editorial staff cut as CNBC reduced non-core digital coverage). KEY CNBC STORIES: (1) "Facebook''s worst year ever"
      year-end analysis (Dec 31, 2018) — her first major piece, covering Cambridge Analytica/privacy scandal stock impact.
      (2) US state AG Google antitrust investigation launch (Sept 2019) — covered all 50 states (excl. CA, AL) plus DC and
      PR joining probe. (3) House antitrust committee Big Tech document release — analyzed hundreds of pages from Facebook,
      Amazon, Apple, Google. (4) Google antitrust trial (Sept-Oct 2023) — courtroom coverage including Sundar Pichai testimony,
      DuckDuckGo CEO Gabriel Weinberg testimony, revelation that Google paid $26B in 2021 to be default search engine, Microsoft
      CEO Satya Nadella testimony about competing with Google. (5) Meta whistleblower teen safety testimony (Nov 7, 2023)
      — second whistleblower on Meta failure to protect teens. (6) Gannett/USA Today antitrust suit against Google ad tech
      monopoly. (7) Apple/Amazon/Meta/Google lobbying spend analysis from filings (Jan 2023). (8) Utah TikTok safety lawsuit
      (2023). Appeared on MSNBC, NBC News NOW, NBC LX, SiriusXM. National Press Foundation fellowship: "Your Body, Their Data?
      Reporting on Privacy, Tech and Biometrics." Moderated at State of the Net conference. FRAMING NOTE: CNBC policy coverage
      consistently indexed to investor-relevant regulatory risk — articles typically included stock price reaction, earnings
      impact, market cap context.'
