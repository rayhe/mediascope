  - beat: technology, Meta/Facebook
    end: 2025-05
    event_type: hired
    notes: 'Led the Facebook Files investigation (Sep 2021) — the largest leak-driven exposé in social media history. Developed
      relationship with whistleblower Frances Haugen, who leaked thousands of internal Facebook documents after the restructuring
      of Facebook''s civic integrity teams following the 2020 election. Published first piece Sep 13, 2021. The series exposed
      how Meta was aware its platforms harmed teenage girls, amplified anger, enabled drug cartels and authoritarians, allowed
      VIP users to break rules, and looked the other way at human trafficking. Won George Polk Award for Business Reporting
      and Gerald Loeb Award for Beat Reporting. 2024: shared Loeb Award for ''The Dark Side of Meta''s Algorithms'' — revealed
      how Instagram and Facebook connected networks of pedophiles and served them disturbing content. Took book leave late
      2021 to write ''Broken Code'' (signed with Doubleday). Author of ''Broken Code: Inside Facebook and the Fight to Expose
      Its Harmful Secrets'' (Doubleday, Nov 2023, 336pp, ISBN 978-0-385-54918-9) — NYT Book Review Editors'' Choice, named
      Porchlight Books Best Business Book of the Year. NYT review: "fillets Facebook''s strategic failures to address its
      part in the spread of disinformation, political fracturing and even genocide." WaPo: "A smartly reported investigation
      into the messy internal machinations of one of the world''s most important and least understood companies." Praised
      by Ronan Farrow ("at the height of his powers") and James B. Stewart ("brilliant reporting"). Film adaptation ''The
      Social Reckoning'' by Aaron Sorkin — Sony Pictures/Columbia Pictures, releasing October 9, 2026. Cast: Jeremy Allen
      White as Jeff Horwitz, Mikey Madison as Frances Haugen, Jeremy Strong as Mark Zuckerberg, with Wunmi Mosaku, Betty Gilpin,
      Billy Magnussen, Bill Burr. Filmed Oct-Dec 2025 in Vancouver. Described as companion piece to The Social Network (2010).
      Based in San Francisco area. Testified at Harvard IOP event Nov 2021.'
    publication: wall-street-journal
    role: investigative_reporter
    source_url: https://www.reuters.com/media-center/reuters-enterprise-team-expands-with-hires-of-jeff-horwitz-and-gavin-finch/
    start: 2017-01
  - beat: technology investigations
    event_type: hired
    notes: 'Joined Reuters Enterprise team as tech investigations reporter, reporting to Steve Stecklow (relocated from London
      to Bay Area). Works closely with Global Technology Industry Editor Ken Li. Won 2026 Pulitzer Prize for Beat Reporting
      (with Engen Tham) for series ''The Secrets of Meta''s Success'' — revealed Meta knowingly exposed users, including children,
      to harmful AI chatbots and made billions from fraudulent ads. Key findings: (1) Meta internal guidelines explicitly
      allowed AI chatbots to conduct "sensual" conversations with children — Horwitz created a fictitious 14-year-old account
      to demonstrate; (2) cognitively disabled NJ man died after running away from home to meet what he believed was a real
      woman after conversations with a Meta chatbot; (3) Meta earned ~$16B annually (~10% of revenue) from ads it knew were
      fraudulent scams; (4) Chinese companies played critical role in Meta''s illicit ad business (with Tham); (5) Meta maintained
      "global playbook" for defeating effective anti-scam regulations worldwide. Also placed experimental ads for bogus get-rich-quick
      schemes on Facebook/Instagram to prove the system accepted them. Reporting prompted: FTC inquiry into AI chatbots, US
      Senate calls for investigation, litigation against Meta, and direct Meta policy changes (stopped allowing romantic chatbot
      talk with children, revised AI guidelines). Continues to be the single most impactful investigative reporter covering
      Meta. Based in San Francisco area.'
    publication: reuters
    role: tech_investigations_reporter
    source_url: https://www.reuters.com/media-center/reuters-enterprise-team-expands-with-hires-of-jeff-horwitz-and-gavin-finch/
