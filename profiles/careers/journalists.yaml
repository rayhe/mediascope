  name: Katie Drummond
  notes: 'KEY LEADERSHIP FIGURE: Current Wired Global Editorial Director (Aug 2023–). Career arc: Wired intern → The Verge
    → Bloomberg → Gizmodo EIC → The Outline → Medium → Vice SVP → Wired. Born 1985/86 in Calgary, Alberta. Mother''s death
    when Drummond was 18 was the catalyst for pursuing writing (Wikipedia, mutha life podcast). Queen''s University at Kingston
    BA Philosophy 2008 — moved to New York after graduation. Described herself as a ''straight-edge vegan'' in college (mutha
    life podcast). Early freelance before Wired intern: The New Republic, New York Magazine, Popular Science, Marie Claire.
    The Org bio also lists ''founding reporter for The Daily'' (pre-Verge, unverified dates). Under her leadership, Wired
    established its first-ever politics team, broke DOGE coverage (62,500 new US subs in 2 weeks, Feb 2025; 200K+ new paid
    subs in the year through Mar 2026), won Sidney Hillman Prize March 2025, launched first politics issue Sep 2025 (''All
    Hail the Technocracy''), KQED radio partnership, and Uncanny Valley podcast franchise. Explicitly adversarial editorial
    philosophy: ''If you do wrong, I want the world to know.'' Reports to Anna Wintour. Josh Topolsky orbit — followed him
    from The Verge to Bloomberg (2014), then to The Outline (2017). Freedom of the Press Foundation board member (2024, 3-year
    term). Personal: married to Carl, daughter Edith (~8 as of 2026), lives in Brooklyn. Avid runner. ANALYTICAL VALUE: (1)
    Her career arc (Gizmodo EIC → Vice SVP → Wired GED) creates the most direct adversarial-journalism pipeline of any top
    editor at any tracked publication. (2) The Gizmodo→Vice→Wired pipeline means she hired and was hired by people with confrontational
    editorial instincts — her recruiting of Leah Feiger from Vice is the single most important staffing decision for understanding
    Wired''s post-2023 editorial stance. (3) Her FPF board membership alongside Edward Snowden and Laura Poitras places her
    in explicit press-freedom advocacy infrastructure. (4) The 200K+ subscriber growth validates the adversarial posture commercially
    — Condé Nast has financial incentive to maintain rather than moderate it. (5) The ''Margaux Blanchard'' AI content incident
    (Aug 2025) is a counter-signal: even under Drummond''s accountability-focused leadership, Wired published AI-generated
    freelancer content. Tests whether adversarial posture toward tech coexists with vulnerability to AI in her own newsroom.'
