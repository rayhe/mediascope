  - name: "Steven Levy"
    notes: "America's premier technology journalist (Washington Post). 45+ year career spanning Rolling Stone → Newsweek → Wired → Medium/Backchannel → Wired. Born 1951. Author of 8 books including foundational works on hacker culture (Hackers, 1984), Google (In the Plex, 2011), and Facebook (The Inside Story, 2020). Original contributing writer for Wired from its 1993 founding. Founded Backchannel on Medium (2014), acquired by Condé Nast (2016). Wife is Pulitzer Prize winner Teresa Carpenter. KEY ANALYTICAL VALUE: Levy IS Wired's institutional voice — longest-tenured, most access to tech CEOs (Gates, Bezos, Jobs, Zuckerberg), and his editorial posture toward subjects is effectively Wired's posture. His Facebook book required 3 years of Zuckerberg access — unusual access journalism that shapes whether coverage is adversarial or empathetic."
    career:
      - publication: "freelance"
        event_type: "hired"
        role: "freelance_writer"
        beat: "music, culture, general"
        start: "1975-01"
        end: "1983-12"
        notes: "Started career with a Bruce Springsteen piece for Philadelphia Magazine (1975). Wrote for Rolling Stone, Esquire, Harper's. Became Rolling Stone contributing editor in early 1980s. 'Hackers in Paradise' (Rolling Stone, Apr 1982) was his breakthrough tech piece — commissioned via Jane Fonda's production company (Susan Lyne, later CEO of Martha Stewart Media). Also wrote MTV cover story (Rolling Stone, 1983). In 1978, rediscovered Albert Einstein's brain in a pathologist's office. Education: BA English, Temple University; MA Literature, Penn State University."
        source_url: "https://ubiquity.acm.org/"
      - publication: "newsweek"
        event_type: "hired"
        role: "senior_editor"
        beat: "technology"
        start: "1984-01"
        end: "2008-06"
        source_url: "https://edge.org/memberbio/steven_levy"
        notes: "Chief technology writer and senior editor for ~24 years. Covered the information revolution since 1981 (per Edge.org). During Newsweek tenure, simultaneously served as: editor for Whole Earth Software Catalog (1984), regular columnist for Rolling Stone and Macworld, original contributing writer for Wired from its 1993 founding. Won Computer Press Association Award for Y2K report (1998). Broke iPod 4th gen before Apple's official announcement (Jul 2004 cover story with Steve Jobs interview). Published key books during this period: Hackers (1984), The Unicorn's Secret (1988, adapted as NBC miniseries 'The Hunt for the Unicorn Killer'), Artificial Life (1992), Insanely Great (1994), Crypto (2001, won Frankfurt Book Fair grand e-book prize), The Perfect Thing (2006)."
      - publication: "wired"
        event_type: "hired"
        role: "senior_staff_writer"
        beat: "technology, Silicon Valley"
        start: "2008-07"
        end: "2014-06"
        source_url: "https://www.wired.com/author/steven-levy/"
        notes: "Senior staff writer for 6 years (self-described: 'previous to Backchannel, I spent six years there as senior staff writer'). Inducted as SVForum Visionary (2008, alongside Reed Hastings and Diane Greene). Published In the Plex: How Google Thinks, Works, and Shapes Our Lives (2011, Amazon's best business book of 2011). Wrote Zuckerberg VR/anonymity exclusive (Apr 2014). Already a 'founding writer at WIRED' from 1993, this was his first full-time role there."
      - publication: "medium-backchannel"
        event_type: "founded"
        role: "founder_editor"
        beat: "technology, Silicon Valley business"
        start: "2014-07"
        end: "2016-06"
        source_url: "https://digiday.com/"
        notes: "Left Wired to found Backchannel on Medium, a Silicon Valley-focused business/tech publication. Co-founded with Medium. Hired Sandra Upson as executive editor (late 2014). 'One of the most highly-respected tech business brands' (Condé Nast). Part of Medium's experiment hiring professional journalists to run verticals."
      - publication: "wired"
        event_type: "returned"
        role: "editor_backchannel"
        beat: "technology, Silicon Valley business"
        start: "2016-06"
        end: "2017-06"
        source_url: "https://mnacritique.mergersindia.com/"
        notes: "Condé Nast acquired Backchannel from Medium (Jun 2016). Levy returned to Condé Nast as part of the acquisition. Backchannel became third brand in newly formed Wired Media Group alongside Wired and Ars Technica. Sandra Upson continued as exec editor. Jessi Hempel joined from Wired as head of editorial. Levy: 'Personally, the move is kind of a homecoming: I was a founding writer at WIRED.' Backchannel continued on Medium platform as client."
      - publication: "wired"
        event_type: "promoted"
        role: "editor_at_large"
        beat: "technology, Silicon Valley"
        start: "2017-07"
        source_url: "https://www.wired.com/author/steven-levy/"
        notes: "Backchannel folded into Wired proper (Jun 2017, announced by EIC Nicholas Thompson). Levy became editor at large — effectively Wired's institutional voice and senior-most editorial figure. Published Facebook: The Inside Story (2020, based on 3 years of Zuckerberg access). Washington Post called him 'America's premier technology journalist.' KEY ANALYTICAL POINT: Levy's access-journalism model (deep embed with subject over years) creates inherently more empathetic coverage than adversarial-by-default approach. His Facebook book was 'a tour de force of access journalism' (Natasha Singer, NYT). This positioning contrasts sharply with Katie Drummond's adversarial editorial posture post-2023."

