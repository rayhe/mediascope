    notes: 'LibGen investigation (Mar 20, 2025): "The Unbelievable Scale of AI''s Pirated-Books Problem." Accessed LibGen
      metadata snapshot and built searchable database of 7.5M+ pirated books and 81M research papers used by Meta (LLaMA 3)
      and OpenAI. Court documents revealed Meta employees discussed licensing books lawfully but chose pirated content because
      it was "unreasonably expensive" and "incredibly slow" — with approval from "MZ." Prompted global response: Authors Guild
