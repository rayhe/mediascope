      story strategy and the intersection of chemistry, materials science, energy, manufacturing, and economics. Multiple
      Folio Magazine Eddie Awards: gold for "The Price of Biofuels" (2008), gold/silver for "Can Technology Save the Economy?"
      (2009), gold for "Natural Gas Changes the Energy Map" and "Chasing the Sun" (2010). Featured in FT State of AI partnership
      (Oct 2025): "The Economic Singularity" with FT Columnist Richard Waters. Listed as writer in Hype Correction series
      (Dec 2025). Moderates MIT Technology Review Roundtable events (batteries/materials Feb 2024, AI/climate Dec 2024). 146+
      published articles on technologyreview.com. Notable long-form: "How Technology Is Destroying Jobs" (Jun 2013), "The
      Relentless Pace of Automation" (Mar/Apr 2017, cited in Harvard/MIT AI ethics curricula), "Race and Medicine" (Apr 2005),
      "Why tech didn''t save us from covid-19" (Jun 2020). Twitter: @DavidRotman. ANALYTICAL VALUE: Rotman is the institutional
      memory of MIT Technology Review — his 27-year tenure spans four EIC regimes (Benditt/Buderi, Pontin, Lichfield, Honan).
      His beat evolution from science/biotech to economics/AI-and-jobs mirrors the magazine''s own shift from pure technology
