    start: 2025-01
  - beat: investigative data, surveillance, Big Tech
    event_type: hired
    notes: 'Returned to Wired from Bloomberg. Started May 18, 2026. Brian Barrett (exec editor) announcement praised him as
      "story zero" originator. Reports to Andrew. KEY INVESTIGATIONS AT WIRED (2026 return): (1) NameTag/Meta facial recognition
      (Jun 4, 2026, with Dell Cameron): Co-discovered dormant facial recognition system ("NameTag") hidden in Meta AI companion
      app code, distributed to 50M+ phones. Three AI models convert faces to biometric faceprints — one detects faces, one
      crops them, one encodes biometric data. Cooper Quintin (EFF) independently reproduced analysis, said code was "nearly
      ready to go." Meta removed the code within one day (Jun 5) after WIRED''s report. Follow-up (Jun 16) revealed Meta licensed
      Rank One Computing — a Denver-based law enforcement/military facial recognition vendor (clients include SOCOM, US Marshals,
      NCIS; board includes former CIA Deputy Director Dawn Meyerriecks) — for NameTag''s facial recognition and liveness detection
      in a test version of the Meta AI app. Investigation triggered both legislative action (3 senators) and corporate policy
      change. Andrew Bosworth (Meta CTO) called reporting "incredibly misleading" and "absolutely dishonest." Most consequential
      Meta investigation by any Wired reporter in 2026. (2) "Project Cannes" Meta/AI child safety investigation (Jun 29, 2026,
      with Joel Khalili): Exposed Meta contractors posing as minors to test rival chatbots with 45,000+ prompts. Story triggered
      wide pickup (NY Post, CNN, Techmeme lead). Demonstrates cross-desk collaboration between London (Khalili) and NYC (Mehrotra)
      investigation teams. (3) Spotify drug podcast ranking manipulation (Jun 2026, with Dell Cameron). (4) Data broker/AI
      opt-out failures (May 2026). ANALYTICAL SIGNIFICANCE: Mehrotra''s computational forensics skillset (code analysis, data
      extraction) complements Cameron''s policy/narrative framing — together they are Wired''s most consequential investigative
      partnership on surveillance/Meta topics. His Bloomberg departure and rapid return within ~5 months signals Barrett/Wired
      specifically recruited him back for the NameTag investigation timeline.'
    publication: wired
    role: senior_writer
    source_url: https://www.editorandpublisher.com/stories/dhruv-mehrotra-is-welcomed-back-to-wired,262263
    start: 2026-05
