    event_type: hired
    notes: 'Editor and writer on the technology team. Joined straight out of university (studied anthropology and journalism in the UK). Prolific output:
      ~1,280+ articles across technology, space, and science. Earliest archived articles date to 2002. Covered AI during the "AI winter" period — bought
      grad-school AI textbooks where neural networks were "a small chapter." Covered Deep Blue vs Kasparov (1997), interviewed Kasparov. Also reported on
      early machine learning (Bayesian spam filtering), robotics, cybersecurity, space (Hubble servicing missions, SpaceShipOne), and the dot-com boom.
      New Scientist''s technology team gave him broad science-tech coverage before he specialized in AI. The magazine''s UK science-weekly institutional
      norms (evidence-based, skeptical of hype) shaped his reporting style — visible in his persistent skepticism about AGI claims at Wired.'
    publication: new-scientist
    role: editor
    source_url: https://www.newscientist.com/author/will-knight/
