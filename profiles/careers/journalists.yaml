  name: Chris Stokel-Walker
  notes: 'Career: Freelance journalist since ~2013, contributing to NYT, Guardian, Wired, MIT Tech Review, Fast Company, Scientific
    American, BBC, Economist, New Scientist, Washington Post, Tom''s Hardware, LeadDev, and others. Lecturer at Newcastle
    University (School of Arts and Cultures), holds PhD in journalism. Author of 4 books: YouTubers (2019), TikTok Boom (2021),
    History of the Internet in Byte-Sized Chunks (2023), How AI Ate the World (2024). Hosted BBC Radio 4 documentaries: Everyone''s
    a Star (2020), Artificial Implosion (2023). Host of Techtonic podcast for Article 19. Based in Newcastle, England. KEY
    for MediaScope: (1) HIGHEST CROSS-PUBLICATION COVERAGE of any tracked journalist — writes for 4 of our 5 tracked publications
    (Guardian, Wired, NYT, MIT Tech Review), making him the single most valuable test case for difference-in-differences analysis
    of institutional framing effects; (2) As a freelancer, his personal voice is consistent while institutional editing varies
    — if the same journalist''s tone shifts between Wired and the Guardian, that''s evidence of institutional editorial effect,
    not individual bias; (3) AI/tech platform expertise (author of How AI Ate the World) means his Meta/AI coverage carries
    domain authority; (4) Academic position (PhD, university lecturer) provides additional credibility dimension.'
  source_urls:
