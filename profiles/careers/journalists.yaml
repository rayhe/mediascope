  name: Zoë Schiffer
  notes: 'Key migration: tech industry → freelance → The Verge → NBC → Platformer → Wired. Unusual career arc: started in tech (content manager, Uber UX
    writer) before pivoting to journalism via Stanford MA. Education: Liceo Scientifico Galileo Galilei (Italian HS), UC Berkeley BA (Political Science),
    Stanford MA (Journalism). Published "Extremely Hardcore" (2024, Portfolio/PRH) on Musk/Twitter takeover. Now directs Wired business desk — the highest
    editorial authority below Barrett/Drummond for all business coverage. Analytically significant: (1) pre-journalism tech experience (Uber during Kalanick
    era) gives insider knowledge but also personal experience with the workplace culture she now covers; (2) career arc from labor reporter → newsletter
    editor → institutional director tracks the indie-to-legacy pipeline; (3) Drummond hired her explicitly to lead adversarial Big Tech coverage; (4) her
    Platformer tenure produced the most influential anti-Musk book of 2024; (5) the Director role gives her editorial authority over Wired entire business
    desk, making her framing choices institutionally amplified; (6) Italian high school background is unique among tracked journalists.'
