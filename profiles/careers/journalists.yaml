  notes: 'Key migration chain: ESPN → A&E Networks → Wall Street Journal → AllThingsD → Recode → The Verge → Wired. Protégé of Walt Mossberg and Kara Swisher
    — followed them through every entity transition. Clark University BA English, Stanford MA Communications. Emmy Award winner (Next Level video series,
