  name: Adrienne LaFrance
  notes: 'KEY FIGURE: Atlantic executive editor — first woman in 162-year history. Rose from staff writer to executive editor
    in 5 years (2014-2019). Background in local journalism (Hawaii public radio, alt-weeklies) and digital-first newsrooms,
    including Pierre Omidyar''s Civil Beat. Education: BA Journalism (Michigan State), MS Journalism (Boston University).
    Former Nieman Lab staffer. Known for anti-tech-platforms editorial stance: authored "The Prophecies of Q" (June 2020 cover),
    "Facebook Is a Doomsday Machine" (Dec 2020), and "The Largest Autocracy on Earth" (Sep 2021) — three landmark Facebook/Meta
    pieces forming a coherent ideological arc from broken tool to rival state. Appeared on NPR Fresh Air (2020), WBUR On Point
    (2018, gender in media), Aspen Ideas Festival, Chautauqua Institution. Key role in SignalGate (March 2025): oversaw Goldberg''s
    editorial decisions on publishing Hegseth war plans. Leading aggressive 2025-2026 hiring spree — 20+ hires from WSJ, WaPo,
    Economist, AP, Time, Politico. ANALYTICAL NOTE: Unlike Katie Drummond (Wired GED) whose anti-tech posture is editorial-by-default,
    LaFrance''s is author-specific — she personally wrote the three most influential anti-Facebook pieces in Atlantic history,
    then rose to control the entire editorial operation. Her worldview IS the institution''s worldview in a way that''s more
    complete than at any other tracked publication. Her hiring patterns in 2025-2026 show deliberate acquisition of national
    security and politics reporters (Beckett, Witte, Salama, Youssef, Lemire, Ryan) — building capacity for government accountability
    coverage that often intersects with Big Tech regulatory stories.'
