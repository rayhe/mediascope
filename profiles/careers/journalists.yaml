    event_type: hired
    notes: '8-year tenure. Initially based in Atlanta covering the ''sin beat'' — alcohol and tobacco industries. Documented
      bourbon-barrel shortages, beer industry acquisitions, the rise of vaping, and investigated heavy metal contamination
      in whiskies. This beat gave him experience covering regulated consumer products and corporate supply chains — skills
      that transferred directly to Apple''s hardware supply chain coverage. Transitioned to tech beat covering Apple, Google,
      and Elon Musk. Key Apple stories: Jony Ive''s unexpected departure (2019), Tim Cook''s efforts to court close ties with
      President Trump, the rise of ''the Blevinator'' (a company procurement star), and overextended Airbnb hosts. Also covered
      smartphone anxiety stories and the iPhone''s creation. Published articles in Our State magazine (NC features) during
      this period. Relocated from Atlanta to San Francisco for the tech beat. Appeared on CNBC and NPR. Coined the phrase
      ''culture of corporate omertà'' to describe Apple''s extreme secrecy — a framing device he continues to use at NYT.'
    publication: wall-street-journal
