journalists:
- name: Karen Hao
  notes: 'Key migration: MIT Tech Review → Atlantic. Known for adversarial AI coverage. Her viral ''How Facebook got addicted
    to spreading misinformation'' (2021) set the template for anti-Meta AI reporting.'
  career:
  - publication: mit-tech-review
    event_type: hired
    role: staff_writer
    beat: AI
    start: 2018-01
    end: 2022-05
    source_url: https://www.technologyreview.com/author/karen-hao/
    notes: AI reporter. Wrote viral 'How Facebook got addicted to spreading misinformation' (Mar 2021). Known for adversarial
      AI beat.
  - publication: atlantic
    event_type: hired
    role: staff_writer
    beat: AI, technology
    start: 2022-06
    source_url: https://www.theatlantic.com/author/karen-hao/
    notes: Continued AI ethics/harms focus. Key test case for portable bias — did her adversarial tone carry to a new outlet?
- name: Cade Metz
  notes: 'Key migration: PC Magazine → The Register → Wired → NYT. AI/tech reporter with 30+ years in tech journalism who
    crossed from Condé Nast to Sulzberger orbit. Duke BA English (1994). Father was IBM engineer who helped develop the Universal
    Product Code (barcode). Also wrote freelance for Metro Magazine, Companion to Southern Literature, Microsoft Encarta,
    American Baby; and was a playwright (''The Parlour Game'', ''The Roof''). Author of ''Genius Makers'' (2021, Dutton/Penguin).
    Controversial NYT piece revealing Scott Alexander''s real identity (Slate Star Codex). KEY for MediaScope: one of the
    longest continuous careers in tech journalism — his framing evolution across PC Magazine (product reviews) → Register
    (adversarial British tabloid tech) → Wired (Condé Nast longform) → NYT (institutional prestige) traces the entire arc
    of how AI coverage went from niche to front-page.'
  career:
  - publication: pc-magazine
    event_type: hired
    role: researcher
    beat: technology, product reviews
    start: 1994-07
    end: 2007-01
    source_url: https://english.duke.edu/news/cade-metz-duke-english-alum-technology-correspondent
    notes: 'First job after Duke graduation. Moved to NYC. Started as researcher, became writer after 6 months, promoted to
      Senior Writer and Editor by 1998. Approximately 13-year tenure. PC Magazine was then one of the world''s largest tech
      publications. Also did concurrent freelance writing: Metro Magazine, Companion to Southern Literature, Microsoft Encarta
      encyclopedia, American Baby.'
  - publication: the-register
    event_type: hired
    role: us_editor
    beat: tech giants, cloud, enterprise
    start: 2007-01
    end: 2011-09
    source_url: https://computerhistory.org/profile/cade-metz/
    notes: US Editor (San Francisco bureau chief) of the British science and technology news site. Moved from NYC to West
      Coast for this role. Covered Amazon, Google, Facebook, Yahoo. Known for adversarial Wikipedia coverage — appeared in
      'Truth in Numbers?' documentary (2010). Last bylines September 2011. The Register's tabloid-adversarial house style
      is a notable framing influence.
  - publication: wired
    event_type: hired
    role: senior_writer
    beat: AI, enterprise tech, bitcoin, cloud
    start: 2011-10
    end: 2017-09
    source_url: https://champions-speakers.co.uk/speaker-agent/cade-metz
    notes: Senior Staff Writer at Condé Nast's Wired. Covered Google, Facebook, Microsoft, AI, bitcoin, computer chips, programming
      languages, data centers. Cover stories on Google's AlphaGo race and Zuckerberg's disaster response. Appeared on NPR,
      CNBC, MSNBC. AI beat crystallized here — transitioned from general enterprise tech to AI-focused reporting that would
      define his NYT tenure.
  - publication: nytimes
    event_type: hired
    role: correspondent
    beat: AI, emerging technology
    start: 2017-10
    source_url: https://computerhistory.org/profile/cade-metz/
    notes: 'Technology correspondent in San Francisco bureau covering AI, driverless cars, robotics, VR. Author of ''Genius
      Makers: The Mavericks Who Brought AI to Google, Facebook, and the World'' (2021, Dutton/Penguin). Controversial 2021
      piece revealing Scott Alexander''s identity (Slate Star Codex blog). Lives across the bay from SF with wife Taylor and
      two daughters. KEY MIGRATION: Wired → NYT represents Condé Nast → Sulzberger pipeline for AI coverage framing. Question
      for DiD analysis: did his AI framing shift when he moved from Wired''s tech-enthusiast audience to NYT''s general readership?'
- name: Will Knight
  notes: 'Key migration: MIT Tech Review → Wired. AI reporter moving within the tech-critical pipeline.'
  career:
  - publication: mit-tech-review
    event_type: hired
    role: senior_writer
    beat: AI, robotics
    start: 2005-01
    end: 2018-08
    source_url: https://www.technologyreview.com/author/will-knight/
    notes: 13-year tenure. Senior editor for AI. One of the longest-serving AI beat reporters.
  - publication: wired
    event_type: hired
    role: senior_writer
    beat: AI
    start: 2018-09
    source_url: https://www.wired.com/author/will-knight/
    notes: Continued AI coverage at Wired. Tests whether MIT Tech Review tone carries over.
- name: Zoë Schiffer
  notes: 'Key migration: The Verge → Platformer → Wired. Tech labor reporter tracking workplace culture across outlets.'
  career:
  - publication: the-verge
    event_type: hired
    role: staff_writer
    beat: tech labor, workplace
    start: 2019-09
    end: 2022-06
    source_url: https://www.theverge.com/authors/zoe-schiffer
    notes: Tech labor reporter. Broke multiple Apple and Meta workplace stories.
  - publication: platformer
    event_type: hired
    role: senior_writer
    beat: tech labor, Big Tech workplace
    start: 2022-07
    end: 2024-03
    notes: Co-author with Casey Newton. Wrote 'Extremely Hardcore' (2024) on Musk's Twitter takeover.
  - publication: wired
    event_type: hired
    role: senior_writer
    beat: tech labor, workplace culture
    start: 2024-04
    source_url: https://www.wired.com/author/zoe-schiffer/
    notes: 'Joined Wired''s business team. Key question: does Wired''s institutional culture shape her coverage differently
      than Platformer?'
- name: Lauren Goode
  notes: 'Key migration: The Verge → Wired.'
  career:
  - publication: the-verge
    event_type: hired
    role: senior_writer
    beat: consumer tech
    start: 2012-10
    end: 2017-06
    source_url: https://www.theverge.com/authors/lauren-goode
    notes: Senior editor, consumer tech. Executive producer of Verge video.
  - publication: wired
    event_type: hired
    role: senior_writer
    beat: consumer tech, Big Tech
    start: 2017-07
    source_url: https://www.wired.com/author/lauren-goode/
    notes: Gear/consumer tech coverage. Co-hosts WIRED's 'Have a Nice Future' podcast.
- name: Charlie Warzel
