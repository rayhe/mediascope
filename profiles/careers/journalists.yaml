        source_url: "https://nytco.com/press/sheera-frenkel-to-join-bizday-in-san-francisco/"
      - publication: "npr"
        event_type: "hired"
        role: "correspondent"
        beat: "Middle East"
        start: "2009-01"
        end: "2012-01"
        notes: "Continued Middle East foreign correspondence. Hebrew fluency helped land exclusives. ~10 years total in Middle East across McClatchy/NPR/Times of London."
      - publication: "times-of-london"
        event_type: "hired"
        role: "correspondent"
        beat: "Middle East"
        start: "2012-01"
        end: "2015-01"
        notes: "Final foreign correspondent role before pivoting to tech/cybersecurity."
      - publication: "buzzfeed-news"
        event_type: "hired"
        role: "cybersecurity_correspondent"
        beat: "cybersecurity"
        start: "2015-01"
        end: "2017-05"
        notes: "Originated the cybersecurity beat at BuzzFeed News. Profiled Russian hackers (Fancy Bear), ISIS internet use, developing nations coming online (Myanmar). Broke news on Facebook fake news countermeasures. CAREER PIVOT: foreign correspondent → tech/cyber. She has said 'her time as a foreign correspondent aids her coverage of cybersecurity: People are always speaking different languages and their motivations are often unclear.'"
        source_url: "https://talkingbiznews.com/they-move/ny-times-hires-cybersecurity-reporter-frenkel-from-buzzfeed/"
      - publication: "nytimes"
        event_type: "hired"
        role: "cybersecurity_reporter"
        beat: "cybersecurity, Meta/Facebook, misinformation"
        start: "2017-05"
        source_url: "https://nytco.com/press/sheera-frenkel-to-join-bizday-in-san-francisco/"
        notes: "Hired by Ellen Pollock and Pui-Wing Tam to cover cybersecurity in SF, alongside Nicole Perlroth. Beat quickly expanded to encompass Facebook/Meta and social media misinformation. 2018: Part of NYT team reporting 'Delay, Deny and Deflect' Facebook exposé (6 months, 50+ interviews). 2019: Pulitzer Prize finalist (national reporting team), George Polk Award (national reporting), Gerald Loeb Award (investigative reporting). 2021: Co-wrote 'An Ugly Truth: Inside Facebook's Battle for Domination' with Cecilia Kang — NYT and international bestseller. 2022: Mirror Award for misinformation reporting. Education: Boston University. Lives in San Francisco Bay Area."

  - name: "Kashmir Hill"
    notes: "NYT's definitive privacy and surveillance reporter. Career arc: legal blogging → Forbes → Fusion → Gizmodo investigative → NYT. Author of 'Your Face Belongs to Us' (2023) on Clearview AI — shortlisted for Royal Society Science Book Prize. Her Clearview AI investigation (Jan 2020) changed facial recognition policy nationwide. KEY for MediaScope: her beat (privacy/surveillance) puts her in direct analytical contact with Meta's data practices, face recognition systems, and tracking technology. Her coverage directly overlaps with Ray's Face Watch Space interests."
    career:
      - publication: "above-the-law"
        event_type: "hired"
        role: "blogger"
        beat: "legal news"
        start: "2008-01"
        end: "2009-06"
        notes: "First journalism role. Legal news blogger. Entry point into journalism. Education: Duke University BA."
      - publication: "forbes"
        event_type: "hired"
        role: "writer_editor"
        beat: "privacy, technology"
        start: "2010-01"
        end: "2014-06"
        notes: "4-year tenure as writer and editor. Started 'The Not-So Private Parts' blog on privacy in the digital age (launched 2009 at NYU, brought to Forbes). Pioneered the privacy reporting genre. 2013: Lived on Bitcoin for a week — viral series. Reported on Google pressuring Forbes to promote Google+ (2011) — Google hired PIs to surveil her. Won SABEW innovation award. Education: NYU MA Magazine Journalism."
        source_url: "https://talkingbiznews.com/they-move/great-reporters-leading-the-way-at-forbes/"
      - publication: "fusion"
        event_type: "hired"
        role: "editor"
        beat: "technology, privacy"
        start: "2014-06"
        end: "2017-01"
        notes: "Editor of Fusion's technology vertical 'Real Future.' Helped run live journalism events. NOTE: Kevin Roose was also at Fusion during this period (VP, co-executive producer of Real Future TV show). When Fusion merged with Gizmodo Media Group, Hill transitioned."
        source_url: "https://nytco.com/press/kashmir-hill-bringing-her-distinct-voice-on-tech-to-the-times/"
      - publication: "gizmodo"
        event_type: "hired"
        role: "investigative_reporter"
        beat: "privacy, Big Tech surveillance"
        start: "2017-01"
        end: "2019-06"
        notes: "Joined the Special Projects Desk investigative team at Gizmodo Media Group. Executed landmark 'Goodbye Big Five' experiment: cut off Amazon, Facebook, Google, Microsoft, and Apple each for a week, then all at once. 'Spoiler: it's not possible.' Also lived in a smart home and spent a week only using Bitcoin. Experimental journalism with systemic privacy critique."
        source_url: "https://nytco.com/press/kashmir-hill-bringing-her-distinct-voice-on-tech-to-the-times/"
      - publication: "nytimes"
        event_type: "hired"
        role: "enterprise_reporter"
        beat: "privacy, technology, facial recognition"
        start: "2019-06"
        source_url: "https://nytco.com/press/kashmir-hill-bringing-her-distinct-voice-on-tech-to-the-times/"
        notes: "Hired by Ellen Pollock, Pui-Wing Tam, and Carolyn as enterprise reporter in Business. Describes beat as 'the looming tech dystopia and how we can try to avoid it.' Jan 2020: Clearview AI investigation broke open facial recognition debate — led to privacy legislation action. 2023: 'Your Face Belongs to Us' (Random House) — FT 'Best Books 2023 Technology', shortlisted Royal Society Trivedi Science Book Prize 2024. Mar 2024: Exposed GM, Honda, Kia, Hyundai sharing driver data with LexisNexis — GM ended practice within 11 days. Won National Press Foundation best in technology award. Born March 5, 1981. Partner: Trevor Timm (Freedom of the Press Foundation co-founder)."

