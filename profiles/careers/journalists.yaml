- name: Stuart A. Thompson
  notes: 'NYT misinformation reporter and visual journalist. Canadian origin. Career: Globe and Mail (Toronto, ~2011-2014) → WSJ senior interactive graphics
    editor (2014) → WSJ graphics director → NYT Opinion graphics director (2017) → NYT news desk misinformation reporter (2021). Pulitzer Prize winner (2015,
    WSJ "Medicare Unmasked"). Livingston Awards finalist (2020). Data visualization specialist who brought visual/interactive skills to misinformation beat.
    Created "One Nation, Tracked" / Privacy Project with Charlie Warzel (Dec 2019) — 50 billion location pings, 12 million Americans tracked, cited in Drexel
    law review and FTC privacy proceedings. Also created QAnon chatroom immersive, Trump''s Lies, vaccine rollout tracker. ANALYTICAL VALUE: Unusual background
    — visual/data journalist turned beat reporter. His visual investigation skills (bystander video analysis, AI deepfake detection) give his coverage a
    forensic quality distinct from traditional reporters. In 2026, spending significant time on midterm elections with the NYT politics team. Contact: stuart.thompson@nytimes.com.
    META COVERAGE: Co-authored major 5-byline investigation on Meta/OpenAI/Google AI training data practices (Meta considered buying Simon & Schuster).
    Reported on Meta''s fact-checking partners denying role in content decisions (Jan 2025). Co-authored Canada news block investigation (Meta feeds). His
    misinformation beat inherently intersects Meta''s content moderation decisions. Co-authors: Tiffany Hsu (deepfakes/Sora), Charlie Warzel (Privacy Project),
    Steven Lee Myers (misinformation), Sheera Frenkel (civil war trends), Cade Metz + Cecilia Kang + Nico Grant (AI training data), Matina Stevis-Gridneff
    (Canada/Meta), Yaryna Serkez (climate/opinion).'
