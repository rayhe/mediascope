      Anthropic subsequently sued (Bartz v. Anthropic) for using LibGen/PiLiMi datasets. Tool allowed publishers/authors to
      check if their work was included. Direct Meta implication — company chose pirated content over licensing despite $164.5B
      revenue and $62.4B profit in 2024.'
