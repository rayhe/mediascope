  name: Tim Marchman
  notes: 'DEEP PROFILE: Career arc from Queens sportswriter to Wired''s most consequential editor hire in a decade. Born ~1979,
    grew up Queens/Brooklyn. The Classical co-founder (indie sports journalism, 2011-2018). At Deadspin (2013-2018), he was
    the EIC during the Thiel/Gawker destruction — this institutional trauma of a tech billionaire destroying a media company
    is the emotional foundation of the adversarial pipeline. At Vice (2019-2024), he ran features during bankruptcy while
    producing serious investigations (anti-trafficking, labor abuse, McMahon lawsuit). At Wired (2024-present), he was Drummond''s
    key strategic hire to expand Wired''s mission from tech magazine to tech-AND-politics accountability publication. The
    DOGE coverage under his direction produced Wired''s biggest subscriber growth in years and industry recognition from CJR.
    His title upgrade from Director to Senior Director within 18 months signals institutional success. CROSS-INSTITUTIONAL
    MIGRATION: Marchman is the 3rd Gizmodo/Vice alumnus in Wired leadership (alongside Drummond and Feiger). His hire represents
    the completion of the Gawker-to-Condé Nast talent pipeline that began with Drummond''s appointment as EIC (2023). Unlike
    most Wired editors, Marchman has zero traditional tech journalism background — his expertise is in investigations, features
    editing, and adversarial accountability reporting, applied to any subject. This generalist-investigator archetype is new
    to Wired''s editorial culture.'
