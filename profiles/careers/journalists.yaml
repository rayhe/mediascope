  name: Maxwell Zeff
  notes: 'Born circa late 1990s (based on career timeline). University of Massachusetts graduate (journalism). Based in San
    Francisco. Career arc: MSNBC (production assistant) → Connecticut Public Broadcasting (intern) → Bloomberg News (intern,
    SVB crisis coverage) → Gizmodo (AI/content moderation reporter) → TechCrunch (senior AI reporter) → Wired (senior writer,
    AI business). Entire journalism career occurred during the ChatGPT/generative AI era — started at Gizmodo roughly when
    GPT-4 launched (2023). This makes him a generational contrast with Wired colleagues Will Knight (20+ years covering AI)
    and Steven Levy (40+ years in tech journalism), and with Cade Metz (30+ years). KEY for MediaScope: Zeff is analytically
    valuable in three dimensions. (1) PIPELINE TEST: Third confirmed Gizmodo → Wired migration under Barrett (after Cameron
    and Mehrotra), establishing the Gizmodo → Wired talent pipeline as a systematic pattern, not an anomaly. (2) SPEED TEST:
    Four-outlet career in ~3 years is the fastest multi-outlet arc in the dataset. Each outlet has very different institutional
    norms: Bloomberg (wire service precision, attribution-heavy), Gizmodo (Gawker-descendant adversarial), TechCrunch (startup
    ecosystem booster → accountability), Wired (Condé Nast longform + Drummond-era adversarial pivot). If framing is portable
    and individual, his writing should show consistent patterns across all four; if institutional framing dominates, each
    outlet should show distinct framing fingerprints. (3) GENERATIONAL TEST: As a ChatGPT-era journalist, his baseline AI
    literacy differs from pre-deep-learning veterans. Tests whether journalists who grew up with LLMs frame AI differently
    from those who covered the AI winter through the hype cycle. His reporting scope (AI business at Wired) also enables direct
    comparison with Lauren Goode (consumer tech at Wired) and Leah Feiger (politics at Wired) to test whether beat assignment
    or institutional culture is the stronger framing determinant within a single publication.'
