  name: Fred Vogelstein
  notes: 'Full name: Hans Alfred Vogelstein II (named after paternal grandfather Hans Vogelstein, who was involved with American
    Metal Company/AMAX). Based in Berkeley, CA. Originally from New York City. Pomona College (BA Political Science), Columbia
    University (Knight-Bagehot Fellow, partial MBA). Career spans 30+ years across 6 major publications. Author of ''Dogfight:
    How Apple and Google Went to War and Started a Revolution'' (2013, Farrar Straus and Giroux, published in 17 countries).
    2x Gerald Loeb Award finalist (2010 Wired, plus one earlier). Board member of Columbia Journalism Review. Treasurer of
    San Francisco Writers Grotto. TEDAI San Francisco 2025 speaker. Notable incident: Microsoft PR firm Waggener Edstrom accidentally
    sent internal dossier about him TO him (April 2007, covered by NYT) — described as ''tricky'' who ''looks deeply for any
    dirt.'' Also written about family epilepsy struggles — helped jumpstart development of Epidiolex (FDA approved 2018).
    FAMILY BACKGROUND: Father is John L. Vogelstein (b. 1934), co-founder and former president/vice-chairman of Warburg Pincus
    LLC — one of the world''s largest private equity firms ($100B+ invested in 1,000+ companies across 40+ countries). John
    was partner at Lazard Frères (1954–1966), then built Warburg Pincus with Lionel Pincus (1967–2002). John is also chairman
    of Third Way (Democratic think tank), chairman emeritus of NYC Ballet, chairman emeritus of Prep for Prep, former vice-chairman
    of NYU Stern Board of Overseers, and co-founder/chairman of New Providence Asset Management. Grandfather Hans Vogelstein
    was with American Metal Company. ANALYTICALLY SIGNIFICANT FOR MEDIASCOPE: (1) EARLY FACEBOOK CHRONICLER — authored some
    of the earliest Wired investigations into Facebook''s rise and growing pains, predating the current adversarial coverage
    era. Provides historical baseline for how Wired''s Meta framing evolved from entrepreneurial narrative to accountability
    journalism under Drummond. (2) CONTRIBUTING EDITOR status means he''s not on staff but has long institutional influence
    — survived 4 EIC transitions: Chris Anderson → Scott Dadich → Nicholas Thompson → Gideon Lichfield → Katie Drummond. Tests
    whether contributing editors carry the same institutional framing as staff writers. (3) NEWSLETTER PIVOT — co-founded
    CrazyStupidTech with Om Malik (VC/journalist, founder of GigaOm), part of the broader journalist-to-newsletter migration
    trend. Still listed as Wired contributing editor while running independent newsletter, dual-allegiance model. (4) FAMILY
    PE/FINANCE CONNECTIONS — father''s Warburg Pincus is a major global PE firm; no direct Meta investment identified, but
    the PE ecosystem creates adjacencies worth tracking in the broader ownership mapping. Father''s chairmanship of Third
    Way (centrist Democratic think tank) adds political-network context. This is biographical context, not an accusation of
    conflict.'
