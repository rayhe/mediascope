  name: Matteo Wong
  notes: 'The Atlantic''s lead AI voice and most prolific AI byline. Harvard BA in History and Literature (2022). Rose from assistant editor to staff writer
    in under 2 years — fastest such ascent on the Atlantic tech team. Magazine chair at Harvard Crimson''s Fifteen Minutes; co-hosted "Under Review" diversity
    podcast; also contributed to Harvard Magazine. Twitter/X: @matteo_wong. FRAMING SIGNATURE: Institutional critique with consumer harm focus. Less technical
    skepticism than Will Knight (who has 20+ years on the AI beat); more political-structural analysis. Grok coverage is the most adversarial in his portfolio
    — multiple pieces on racism, anti-Semitism, and erotic content failures. Meta coverage focuses on AI race failure narrative and Zuckerberg-as-follower-not-leader
    thesis. Anthropic coverage more nuanced — explores genuine safety-vs-speed tensions rather than pure adversarial framing. KEY for MediaScope: Wong is
    the primary conduit for The Atlantic''s AI framing. His rapid rise means he shaped the beat as he grew into it — no prior institutional framing habits
    to shed. His "Under Review" podcast at Harvard shows systemic-critique instinct predating AI coverage. META COVERAGE ANALYSIS: "Meta Swears This Time
    Is Different" (Jul 2025) is the definitive Wong/Meta piece — frames FAIR history as wasted potential, Llama 4 as benchmarking failure, and Zuckerberg
    as reactive rather than visionary. Separately, his Zuckerberg-Musk comparison coverage portrays Zuckerberg as "rehearsed and ostentatious" — copying
    Musk''s politics, MMA persona, and anti-establishment posture but "not leading the conversation." This framing aligns with The Atlantic''s broader institutional
    skepticism toward Big Tech leadership but is notably more negative toward Meta than toward Anthropic (which gets sympathetic "caught between pressures"
    framing). For DiD analysis: Wong has never worked at another publication post-graduation, so he offers no migration signal. However, his exclusively-Atlantic
    career means his framing is a clean measurement of Atlantic institutional culture without cross-pollination from other newsrooms. Emerson Collective
    ownership context (Laurene Powell Jobs) relevant — The Atlantic received $100M+ investment in 2017 and majority ownership by 2021.'
