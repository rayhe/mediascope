  - beat: technology, Silicon Valley, longevity
    event_type: hired
    notes: 'Editor-at-large at New York Magazine (Sep 2022-present). Host of "On with Kara Swisher" podcast (premiered Sep 26, 2022). Co-host of "Pivot"
