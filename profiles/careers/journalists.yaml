  name: Lauren Goode
  notes: 'Key migration chain: ESPN → A&E Networks → Wall Street Journal → AllThingsD → Recode → The Verge → Wired. Protégé
    of Walt Mossberg and Kara Swisher — followed them through every entity transition. Clark University BA English, Stanford
    MA Communications. Emmy Award winner (Next Level video series, NorCal 2018). Co-hosts WIRED''s Gadget Lab and Get WIRED
    podcasts. At Wired, covers consumer tech, apps, services, and Big Tech issues. KEY for MediaScope: her entire career was
    shaped inside the Mossberg/Swisher talent pipeline — a lineage that includes Mike Isaac (now NYT), Peter Kafka, Ina Fried,
    and others who went through AllThingsD/Recode. This cohort shares editorial DNA forged in the WSJ''s tech orbit before
    Vox Media absorption. Her migration to Wired (Condé Nast) represents a clean break from the Vox/Recode lineage into a
    different institutional frame.'
