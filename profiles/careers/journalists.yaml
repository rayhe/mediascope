  name: Gideon Lichfield
  notes: 'Born Aug 4, 1971 in London. BSc Physics & Philosophy (University of Bristol), MSc Philosophy of Social Science (London
    School of Economics). British national. Speaks 5 languages: English, Spanish, French, Russian, Hebrew. Edited ''Make Shift:
    Dispatches from the Post-Pandemic Future'' (MIT Press, 2021). Data & Society fellow (2014-15, Science Fiction Writer in
    Residence). NYU adjunct professor (2011, Arthur L. Carter Journalism Institute). Currently Harvard Ash Center for Democratic
    Governance fellow + Futurepolis Substack. Self-described: "polyglot, climber, biker, cocktailer, and vagabond." ANALYTICAL
    SIGNIFICANCE: Dual EIC at two tracked publications (MIT Technology Review 2017-2021, Wired 2021-2023) makes him the single
    most valuable natural experiment for DiD editorial influence analysis. His departure letter explicitly stated wanting
    to return to hands-on journalism and focus on governance — a rare voluntary departure by a top-tier EIC from a Condé Nast
    title.'
