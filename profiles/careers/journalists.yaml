    end: 2018-09
    notes: Brief tenure covering tech labor issues.
  - publication: nytimes
    event_type: hired
    role: correspondent
    beat: tech labor, social media
    start: 2018-10
    source_url: https://www.nytimes.com/by/kate-conger
    notes: 'Co-authored ''Character Limit'' (2024) on Musk''s Twitter/X acquisition with Ryan Mac. (NOTE: Mike Isaac is a
