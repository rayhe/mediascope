    notes: 'Global Editorial Director (NOT just EIC — responsible for content strategy, vision and tone across all Wired editions: US, UK, Italy, Japan).
      Appointed March 22, 2021. Reported to Anna Wintour (CCO, Condé Nast). Succeeded Nicholas Thompson (who left for The Atlantic). Co-hosted "Have a Nice
      Future" podcast with Lauren Goode. Tenure: ~2.5 years. Announced departure May 31, 2023, in internal memo: "I want to begin focusing more of my energies
      on a question that many of you know is important to me... how societies can govern themselves peaceably and for the common good in an era of accelerating
      technological change." Said he missed "committing acts of journalism with my own two hands." Replaced by Katie Drummond (started Aug 28, 2023), who
      came from Vice Media SVP role and had been a 2009 Wired intern. The Lichfield MIT-TR→Wired migration is the single most analytically valuable case
      in the dataset for DiD regression — same person leading two tracked publications sequentially under different institutional structures (MIT-affiliated
      research pub vs Condé Nast commercial media conglomerate).'
    publication: wired
    role: global_editorial_director
    source_url: https://www.wired.com/story/gideon-lichfield-new-editor-wired/
    start: 2021-03
  - beat: democracy, governance, technology and society
    event_type: career_change
    notes: 'Post-Wired career pivot to democracy and governance. Multiple concurrent roles: (1) Writes "Futurepolis" Substack (launched ~Sep 2024) on "reinventing
      democracy, governance, and government for the 21st century" ($5/mo or $50/yr). Covers participatory democracy, AI in governance (Japanese AI politician
      piece), citizens'' assemblies (Lexington experiment). (2) CITRIS Tech Policy Fellow at UC Berkeley Goldman School of Public Policy (2024-present).
      (3) AI Advisory Board member at CUNY Craig Newmark Graduate School of Journalism (2024-present). (4) Harvard Ash Center for Democratic Governance
      (as of Mar 2026 — co-hosted webinar with Kim Stanley Robinson, Baratunde Thurston, Renee DiResta on pro-democracy ideas in popular culture). (5) Co-Founder
      of stealth project (2025-present, per RocketReach). (6) Data & Society affiliate (ongoing). Self-describes as "Democracy Futurist" on LinkedIn. Based
      in Berkeley, CA. Personal: "polyglot, climber, biker, cocktailer, and vagabond" — collects languages, silver rings, and obscure cocktail ingredients.
      Speaker at SXSW, Aspen Ideas Festival, WEF, FWD50. KEY for MediaScope: his post-Wired pivot reveals that his editorial framing at both MIT TR and
      Wired was driven by a consistent personal thesis about technology''s impact on democratic governance — NOT by institutional editorial culture. This
      means the DiD analysis must control for his pre-existing ideological orientation, not just institutional effects.'
    publication: independent
    role: democracy_futurist
    source_url: https://futurepolis.substack.com/
    start: 2023-10
  name: Gideon Lichfield
