  name: Josh Taylor
  notes: 'Career arc: ZDNet Australia → Crikey → BuzzFeed News Australia → Guardian Australia. Based in Sydney. Education:
    Computer Science degree + Masters in Journalism. Award-winning journalist who has covered technology and politics in Australia
    for over a decade (per State of Social 2024 bio). Journalism has focused on holding those in power to account, transparency,
    security, and freedom of information. Increasingly focused on digital platforms. Appears regularly on ABC RN, ABC News,
    Ten News, The Project, and Technogaze podcast (JOY FM). He/him pronouns. @GuardianAus. KEY FOR MEDIASCOPE: (1) Only Guardian
    Australia tech reporter in the database — covers all AU tech regulation stories that become international reference points
    (under-16 social media ban, age verification, Epic v Apple/Google AU, crypto scam ads, anti-encryption laws, COVIDSafe
    app, AI regulation). Australian regulatory actions frequently set global precedents that US/UK outlets then cite — Taylor
    is the primary anglophone source for these stories. (2) His ZDNet → Crikey → BuzzFeed → Guardian pipeline is unique in
    the dataset: each outlet represents a different editorial model (trade/B2B tech → indie political media → viral/engagement-driven
    news → institutional public-interest journalism). Tests whether framing evolves through editorial culture or stays fixed
    with the journalist. (3) Computer Science degree is unusual among Guardian reporters and gives him genuine technical depth
    on encryption, network infrastructure, and platform mechanics that most political journalists lack. (4) His "blank phone
    experiment" — setting up a fresh phone with new social media accounts to empirically audit algorithmic recommendations
    — is a notable methodological innovation that goes beyond interview-based platform reporting. (5) Filed FOI request to
    ACNC (decided Apr 2020) in his own name — demonstrates active use of Australia FOI laws as a reporting tool, consistent
    with transparency beat. (6) Guardian Australia operates under Scott Trust ownership (no commercial owner), making it the
    cleanest ownership-conflict-free comparison outlet for platform coverage among our tracked publications.'
