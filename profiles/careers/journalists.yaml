    notes: 'Asia technology reporter based in Shanghai, then Hong Kong, then expelled from China in March 2020 alongside several other NYT, WSJ, and WaPo
      journalists (part of Chinese government retaliation for Trump limiting Chinese state media employees in US). Relocated to Taiwan, then Seoul. Featured
