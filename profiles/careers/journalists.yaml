  notes: 'Policy reporter at The Verge. Career: The Outline → Vox (The Goods) → VICE News (immigration) → freelance (The Nation, Baffler, Harper''s, NYRB) → The Verge. Co-founded BORDER/LINES immigration newsletter. 2023 Livingston Award finalist. Working on "BLOOD AND SOIL" (Bloomsbury, 2027) on conservation-eugenics history. KEY for MediaScope: Unique pipeline — immigration/surveillance journalism → tech policy. Most Verge policy reporters come from business or tech media (Lauren Feiner from CNBC, Adi Robertson internal). Del Valle came from investigative immigration reporting (VICE News) and critical left publications (The Nation, The Baffler), bringing structural critique of tech-state surveillance apparatus rather than regulatory/business-impact framing.'
