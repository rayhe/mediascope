  name: Nitasha Tiku
  notes: 'Key migration: BuzzFeed → Wired → Washington Post → (laid off Feb 2026, reportedly rehired ~Apr 2026). One of the most important cross-publication
    migrations for DiD analysis because she moved FROM a tracked publication (Wired) to an untracked one (WaPo). Her career is an almost perfect longitudinal
    case: Inc → NYmag → NY Observer → Valleywag/Gawker → BuzzFeed → Verge → Wired → WaPo covers nearly every major digital media era. Columbia BA (English
    & Comp Lit), NYU MA (Journalism). Beat: tech culture, Silicon Valley power dynamics, AI. Laid off from Washington Post in Feb 2026 layoffs (~300 journalists,
    ~1/3 of staff). REPORTED REHIRED at WaPo ~April 2026 (Tomorrow''s Publisher/CJR report: "Others reported to be returning include Jake Spring, Nitasha
    Tiku and Steve Hendrix"). The layoff + rehire cycle is analytically significant: (1) tests whether coverage framing shifts after institutional trauma,
    (2) confirms WaPo''s recognition that tech culture beat is essential despite cost cuts. At Wired under Nicholas Thompson (tracked EIC). Wrote Wired
    magazine cover story on turmoil inside Google during Trump administration. Referenced as Wired business desk colleague in Louise Matsakis hire announcement
    (Nov 2024) — this likely refers to her earlier Wired tenure, NOT a current Wired role. ANALYTICAL VALUE: Tiku''s Wired → WaPo transition (tracked →
    untracked) is a partial natural experiment — we can observe whether her framing patterns changed when she left Wired''s Condé Nast editorial ecosystem
    for WaPo''s Jeff Bezos-owned environment. Her long Gawker/Valleywag background means she entered journalism with an adversarial, culture-focused lens
    — compare to reporters who entered via traditional newspapers. The Feb 2026 layoff + rehire adds another dimension: does institutional loyalty shift
    after being laid off and recalled?'
