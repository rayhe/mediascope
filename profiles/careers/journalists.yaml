    event_type: hired
    notes: 'Rejoined NYT (second stint) as Business Day columnist, hired by editor Ellen Pollock. "The Shift" column examines
      intersection of tech, business, and culture. KEY WORKS: Created "Rabbit Hole" investigative podcast (8-part series,
      2020) on internet radicalization via YouTube — Peabody Award finalist, Vanity Fair "podcasts that defined the 2020s."
      Co-hosts "Hard Fork" weekly podcast with Casey Newton (premiered Oct 7, 2022). Feb 2023: Viral Bing/Sydney conversation
      — most-discussed AI interaction of the year. Created CrowdTangle "Facebook''s Top 10" Twitter account showing right-wing
      content dominated Facebook engagement — became an influential narrative tool in Facebook''s content moderation debate.
      Mar 2021: Sold his own NYT column as an NFT for $560,000 (proceeds to NYT Neediest Cases Fund). BOOKS: Published "Futureproof:
      9 Rules for Humans in the Age of Automation" (2021). Fourth book "The AGI Chronicles" forthcoming 2026 — inside story
      of the race to build AGI. AWARDS: Forbes 30 Under 30 (2015), Gerald Loeb Award (2018, team). Regular guest/host on "The
      Daily" podcast and CNBC. DEPARTURE (Aug 2026): Leaving NYT to launch independent media venture with Casey Newton, extending
      Hard Fork format into new formats. Signed with UTA for representation in all areas. Casey Newton continues Platformer
      alongside the new venture.'
    source_url: https://nytco.com/press/kevin-roose-joins-biz-day/
  multi_publication: true
  notes: 'NYT''s most prominent AI/technology columnist and one of the most influential tech journalists in the US. Unique
    career arc: NYT (finance) → NYMag → Fusion TV → NYT (tech columnist, 9 years). Author of 4 books: The Unlikely Disciple
    (2009, Liberty University undercover — written as Brown sophomore), Young Money (2014, NYT bestseller), Futureproof (2021),
    The AGI Chronicles (2026, forthcoming). Born 1987/1988. Education: Westtown School ''05 (Quaker boarding school, Chester
    County PA) → Brown University ''09 (English major, Brown Daily Herald columnist). Co-hosted Hard Fork podcast with Casey
    Newton (Oct 2022 – Aug 2026) — one of the most popular tech podcasts globally. Known for experiential/participatory journalism:
    undercover at Liberty University, lived as a Wall Streeter, had viral Bing/Sydney AI conversation, went phone-free for
    30 days. Created CrowdTangle "Facebook Top 10" Twitter account that showed right-wing publishers dominated Facebook engagement
    — instrumental in Meta content-moderation discourse. MEDIASCOPE SIGNIFICANCE: Roose''s coverage framing of Meta specifically
    includes the Oct 2021 article "Facebook Is Weaker Than We Knew" (coinciding with Facebook Files) characterizing Facebook
    as in "slow, steady decline" with "frenetic pivots, executive paranoia, and talent attrition." The CrowdTangle Top 10
    project was perhaps the most consequential single journalistic tool in shaping the narrative that Facebook amplifies right-wing
    misinformation. KEY TRANSITION: Leaving NYT Aug 2026 for independent venture with Casey Newton — mirrors Newton''s 2020
    Verge departure. Both testing whether individual brand > institutional platform in the AI journalism era. Lives in Bay
    Area.'
