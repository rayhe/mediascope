  career:
  - publication: the-verge
    event_type: hired
    role: editor
    beat: Silicon Valley, social media
    start: 2013-03
    end: 2020-10
    source_url: https://www.theverge.com/authors/casey-newton
    notes: Silicon Valley editor. The Interface newsletter. Major Meta/Facebook beat reporter.
  - publication: platformer
    event_type: hired
    role: eic
    beat: Big Tech, social media platforms
    start: 2020-11
    source_url: https://www.platformer.news/
    notes: Founded Platformer (Substack, later independent). Sole editorial control — the ultimate test of individual vs.
