  name: Sheera Frenkel
  notes: 'NYT cybersecurity and Meta/Facebook reporter. Former Middle East foreign correspondent (decade — based in Jerusalem,
    Cairo, Tel Aviv, stringing for McClatchy, NPR, and The Times of London simultaneously). Co-wrote "An Ugly Truth: Inside
    Facebook''s Battle for Domination" (2021, Harper) with Cecilia Kang — NYT/international bestseller, SABEW Best in Business
    Award, Book of the Year (Fortune, Foreign Affairs, Times London, Cosmopolitan, TechCrunch, WIRED). Pulitzer Prize finalist,
    George Polk Award, Gerald Loeb Award, Mirror Award. Boston University graduate. KEY for MediaScope: her foreign correspondent
    background gave her an adversarial framing toolkit (covert actors, hidden motivations, institutional deception) that she
    transferred directly to Big Tech coverage. The Muck Rack profile revealing she was a "stringer" for all three Middle East
    outlets simultaneously (not staff) is analytically significant — it means her pre-BuzzFeed career was freelance/contract
    work, with no single institution shaping her editorial identity before she arrived at BuzzFeed in 2015. This makes her
    NYT institutional framing adoption a cleaner natural experiment than journalists who transferred between staff positions.'
  source_urls:
  - https://en.wikipedia.org/wiki/Sheera_Frenkel
  - https://www.nytimes.com/by/sheera-frenkel
