# MediaScope — Journalist Career Histories
#
# Verified career data for journalists tracked across the 5 starter
# publications (Wired, NYT, Guardian, Atlantic, MIT Technology Review).
#
# Each journalist entry contains a chronological career timeline.
# Migrations between tracked publications are auto-detected by the
# CareerTracker module.
#
# DATE FORMAT: YYYY-MM (month precision) or YYYY-MM-DD (day precision).
# Use month precision when exact dates aren't publicly available.
#
# VERIFICATION: Every entry should include a source_url where possible.
# LinkedIn, staff pages, press releases, and byline archives are all valid.

journalists:

