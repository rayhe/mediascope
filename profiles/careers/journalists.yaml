  notes: 'Key migration: American Lawyer → Fortune → NYT (13 years) → New Yorker → Wired → NYT Headway → NYT Business. DOUBLE
    MIGRATION through Condé Nast: NYT → New Yorker (Condé Nast) → Wired (Condé Nast) → back to NYT. Education: Columbia University
