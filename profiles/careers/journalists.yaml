  name: Casey Newton
  notes: 'Born June 19, 1980, La Habra, California. Northwestern University Medill School of Journalism (BSJ, 2002). Editor
    of Sonora High School paper. Worked at The Daily Northwestern starting sophomore year. Gay, lives in San Francisco. Engaged
    (announced Feb 2026 on Hard Fork) — fiancé works at Anthropic. Social: @CaseyNewton (X), @crumbler (Instagram/Threads).
    Speaker rep: Leigh Bureau. KEY CAREER ARC: Arizona Republic political reporter → SF Chronicle tech → CNET → The Verge
    (7.5 years, Silicon Valley editor) → Platformer (independent, Oct 2020). 2020 National Magazine Award finalist for content
    moderation investigation that led to $52M Facebook/Cognizant settlement. Co-hosts Hard Fork (NYT, ending Aug 2026) with
    Kevin Roose — launching independent AI-focused show together. KEY for MediaScope: Newton is the single most important
    test case for individual vs. institutional framing. Career spans: institutional daily newspaper (Arizona Republic, Chronicle),
    institutional digital media (CNET, The Verge/Vox), independent newsletter (Platformer/Substack, then Ghost), and hybrid
    (NYT podcast while independent). Each transition strips one layer of institutional editorial control. His content moderation
    investigation shows he can produce accountability journalism against Meta without institutional backing. His Anthropic
    engagement creates a personal conflict disclosure obligation that mainstream outlets would require — tests whether independent
    journalists hold themselves to the same standard. The Roose/Newton independent venture (post-Aug 2026) will be the first
    fully independent AI journalism operation at scale, with no institutional editorial oversight from either host.'
