  - name: "Sheera Frenkel"
    notes: "NYT cybersecurity and Meta/Facebook reporter. Former Middle East foreign correspondent (decade). Co-wrote 'An Ugly Truth' (2021), the definitive adversarial Facebook book from a NYT journalist. Pulitzer Prize finalist, George Polk Award, Gerald Loeb Award, Mirror Award. KEY for MediaScope: her foreign correspondent background gave her an adversarial framing toolkit (covert actors, hidden motivations, institutional deception) that she transferred directly to Big Tech coverage."
