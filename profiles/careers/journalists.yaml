    event_type: hired
    notes: 'Returned to the Post (where she had interned) in 1986 as a news aide for the Style desk, then became a reporter
      covering the local retail beat. Pivotal period: began extensively using technology ("carried a suitcase cell phone"),
      received national attention for covering AOL and the beginning of the dot-com era in the 1990s. Left the Post to write
      her first book, "aol.com: How Steve Case Beat Bill Gates" (Times Business Books, 1998). Met Walt Mossberg during this
      period — the partnership that would define her career. Also worked at The McLaughlin Group early in her career (later
      alleged host John McLaughlin abused staff and sexually harassed women, in 2018 Slate article). Cited by Industry Standard
      as "most influential reporter covering the internet."'
