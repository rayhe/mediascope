  name: Adi Robertson
  notes: 'The Verge''s longest-tenured editorial staff member (14+ years, joined at founding Nov 2011). Education: Cornell
    University BA in China and Asia-Pacific Studies. Based in New York City. Bluesky: @thedextriarchy.bsky.social. CAREER
    ARC: Single-publication career — no multi-outlet migration, making her a pure institutional sample (no DiD comparison
    available, but valuable as a control for measuring PMC-era editorial posture changes). Transitioned from VR/AR specialist
    reporter (2011-2022) to tech policy editor (2022-present), tracking the industry shift from ''metaverse excitement'' to
    ''AI policy scrutiny.'' Writes ''The Stepback,'' a weekly Verge newsletter on one essential tech story. Guest on Decoder
    podcast with Nilay Patel (AI deepfakes, election misinformation 2024) and Vergecast (Minneapolis AI misinformation, Jan
    2026). NOTABLE WORKS: Co-authored ''Voices from a Virtual Past: An Oral History of a Technology Whose Time Has Come Again''
    with Michael Zelenko (2014) — definitive VR history, cited in academic papers. Created interactive web games about tech
    policy concepts: Wake Word (AI text adventure), Cyberpunkland (VR dystopia), You Have To Ban The President (content moderation).
    Wrote histories of One Laptop Per Child project and Morgantown Personal Rapid Transit System. Covered Magic Leap extensively.
    META COVERAGE POSTURE: Her Quest Pro review (Nov 2022) gave 2/5, calling it ''launched without plan or purpose'' with
    ''irredeemably bad software'' — one of the harshest major-outlet reviews of a Meta product. Also covered: Facebook Face
    Recognition shutdown (Nov 2021), Project Cambria tease (Oct 2021), Horizon Worlds ''personal boundary'' system (Feb 2022),
    Meta accounts replacing Facebook login on Quest (Jul 2022), Meta/Anthropic AI copyright rulings analysis (Jan 2026), Missouri
    AG AI chatbot investigation involving Meta (2025). Her VR/AR expertise makes her the primary voice for Meta Reality Labs
    coverage at The Verge, especially post-Alex Heath departure (Sep 2025). CONFERENCE APPEARANCES: AWE 2024 panelist (''Current
    State and Future Direction of AR Glasses''), TIFF 2016 POP Speaker Series (''Beyond Reality: Creating Real Emotion in
    Imaginary Worlds''), Sundance VR coverage (Voices of VR #312), Silicon Flatirons (CU Boulder). ANALYTICAL VALUE: Cornell
    humanities background (China/Asia-Pacific studies, not CS/engineering) → humanities lens on tech. No tech industry prior
    career — pure journalist. Her games demonstrate creative engagement with policy questions (Wake Word = AI ethics, You
    Have To Ban The President = content moderation dilemmas). This suggests framing is intellectually motivated, not commercially
    driven. Under PMC ownership (Jun 2026), her editorial direction on tech policy and XR is the primary test case for whether
    PMC''s acquisition changes The Verge''s Meta coverage posture.'
