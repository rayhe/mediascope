      Business) on big data, data science, and decision-making. Coverage has expanded to encompass AI, automation, and their
      economic/geographic effects. Notable recent coverage: "A.I. Policy Is Tricky. From Around the World, They Came to Hash
      It Out" (Jan 2019, MIT AI Policy Conference); "Economists Pin More Blame on Tech for Rising Inequality" (Jan 2022, spotlighting
      Daron Acemoglu''s research on excessive automation); "How A.I. Could Reshape the Economic Geography of America" (Dec
      2024, with Frank Levy research on midsize cities); co-byline on June 2026 coverage of the Trump administration pressing
      Meta to submit AI models for government review. Receives 150 emails/day and ~30 story pitches/week. Described by Mission
      North interview as favoring the "active hunt" style of journalism. Lives in New York City. Education: Columbia University
      Graduate School of Journalism (graduated 1975). KEY: His 47-year NYT tenure makes him the longest-serving reporter at
      any of the 5 tracked publications — his framing has evolved across every era of tech coverage (mainframes → PCs → internet
      → mobile → cloud → AI) within a single institutional context. His economic-structural lens (automation → jobs → inequality
      → geographic redistribution) is distinct from the adversarial-investigative framing of the NYT tech-accountability reporters
