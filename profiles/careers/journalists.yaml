    notes: 'Global Editorial Director. Announced Aug 10, 2023; started Aug 28. Replaced Gideon Lichfield. Second woman to
      lead Wired after Katrina Heron. Reports to Anna Wintour. Key achievements: (1) Created Wired''s first politics team
      (Nov 2023), (2) DOGE coverage breakthrough — 62,500 new US subs in 2 weeks (Feb 2025), 200K+ new paid subs in the year
      through Mar 2026 (per NYT profile by Katie Robertson, Mar 17 2026), (3) ''Story Zero'' newsroom ethos (reporters break
      stories that set news agendas), (4) Won Sidney Hillman Prize March 2025 for DOGE coverage (judge Lindsay Beyerstein:
      ''one of the go-to outlets for this moment''), (5) Launched Uncanny Valley podcast franchise (co-hosts: Lauren Goode,
      Michael Calore) + KQED radio partnership (weekly show Saturdays 7 PM PT; first live show Sep 9 2025 at KQED The Commons
      SF with Jack Conte interview), (6) First politics issue in Wired history Sep 2025: ''All Hail the Technocracy'' — covered
      on CBS Mornings Sep 23, Amanpour & Company Sep 29, (7) Freedom of the Press Foundation board member (2024, 3-year term;
      alongside Azmat Khan, Wesley Lowery, Laura Poitras, Edward Snowden), (8) Masters of Scale podcast #584 May 6 2025: ''Musk
      & DOGE: inside 100 days of chaos,'' (9) Channels with Peter Kafka podcast May 28 2025, (10) New Yorker Radio Hour interview
      with David Remnick on TikTok ban, (11) AI-generated content scandal Aug 2025: ''Margaux Blanchard'' freelancer articles
      identified as AI-generated by Jacob Furedi (ex-UnHerd), removed by both Wired and Business Insider (Press Gazette),
      (12) Wired Italian print edition ceased Apr 2026, (13) Wired Middle East launch (per MONIIFY interview 2026), (14) Coverage
      expanded beyond tech-politics to Iran War 2026 and ICE/tech company ties (per NYT profile). NYT''s Katie Robertson called
      Wired ''a bright spot for Condé Nast'' and Drummond''s transformation ''from a fading magazine and website into a buzzy
      brand.'' Elon Musk retaliated: called Wired ''unreadable, far-left wing propaganda mouthpiece.'' Drummond''s response:
      ''If you still don''t understand why Wired covers politics, you are either willfully ignorant or a complete idiot.''
      John Battelle (Wired co-founder) praised Drummond in blog post for ''bringing a bit of the original rebel voice back
      to Wired.'' ANALYTICAL NOTE: her career arc (Gizmodo EIC → Vice SVP → Wired GED) creates an adversarial-journalism pipeline.
      Gizmodo and Vice both have reputations for confrontational tech coverage. Her stated philosophy — ''Right and wrong
      is a big one for me. If you do wrong, I want to find out, and then I want the world to know'' — explicitly frames journalism
      as accountability/adversarial rather than neutral observation. Additional self-description from Depth Perception interview:
      ''As a kid, I was a voyeuristic little weirdo who needed to know everything about everyone, at all times.'' Best career
      advice she received: ''Fake it til you make it'' (from first editor at Wired.com). Her editorial strategy: ''Publish
      the scoop when the scoop is ready to publish! Small scoops beget more scoops.'''
