        notes: "Chief technology writer and senior editor for ~24 years. Covered the information revolution since 1981 (per Edge.org). During Newsweek tenure, simultaneously served as: editor for Whole Earth Software Catalog (1984), regular columnist for Rolling Stone and Macworld, original contributing writer for Wired from its 1993 founding. Won Computer Press Association Award for Y2K report (1998). Broke iPod 4th gen before Apple's official announcement (Jul 2004 cover story with Steve Jobs interview). Published key books during this period: Hackers (1984), The Unicorn's Secret (1988, adapted as NBC miniseries 'The Hunt for the Unicorn Killer'), Artificial Life (1992), Insanely Great (1994), Crypto (2001, won Frankfurt Book Fair grand e-book prize), The Perfect Thing (2006)."
