      as both newsletter and podcast for Atlantic subscribers. Deputy editor Paul Bisceglio: "a dazzling writer and a profound thinker. He has a remarkable
      ability to cut through the Silicon Valley hype and deliver punchy ideas and real insights." Recent Galaxy Brain podcast guests include Will Knight
      (Wired senior writer, on AI weapons), David Sims (Atlantic film critic, on Netflix). Regular guest on Jon Stewart (The Weekly Show), Peter Kafka (Channels),
      Bill Simmons (The Ringer), Offline (Crooked Media). Formed Galaxy Brain Corp (LLC) for newsletter operations. Now lives on island off Washington state
      coast. KEY MIGRATION: Substack → Atlantic represents independent → institutional return. He chose Atlantic''s subscriber infrastructure and editorial
      brand over Substack independence despite six-figure Substack revenue. Operates under Nicholas Thompson (ex-Wired EIC, now Atlantic CEO) editorial
      chain, which creates a structural editorial culture bridge between Wired and Atlantic tech coverage. Tests whether institutional affiliation re-introduces
      framing patterns he identified as problematic (headline weaponization, culture war ammunition) during his Substack departure statement.'
    publication: atlantic
