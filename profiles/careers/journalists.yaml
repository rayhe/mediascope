    notes: '12+ year tenure (ongoing). Wired''s primary security/privacy/hacking writer. Also contributed to The Atlantic. MAJOR INVESTIGATIONS: (1) Jeep
      hack (Jul 2015) — demonstrated remote vehicle takeover with Charlie Miller and Chris Valasek, prompting Chrysler to recall 1.4M vehicles; SPY Car
      Act bill introduced in Senate same day. (2) "Lights Out" (Jul 2017 cover story) — Russia''s hack of Ukraine power grid; won inaugural NYU CSAW Cyber
      Journalism Award; six months of investigative reporting in US and Ukraine. (3) "The Code that Crashed the World" — NotPetya cyberattack; won Gerald
      Loeb Award for International Reporting (2019). BOOKS: "Sandworm: A New Era of Cyberwar" (Doubleday, Nov 2019) — traced GRU''s Olympic Destroyer malware;
      won Gerald Loeb (international), Sigma Delta Chi (SPJ), 3 Deadline Club Awards (NY SPJ), Cornelius Ryan Citation for Excellence (Overseas Press Club).
      "Tracers in the Dark: The Global Hunt for the Crime Lords of Cryptocurrency" (Doubleday, Nov 2022) — cryptocurrency tracing/dark web; won second Gerald
      Loeb Award for Feature Reporting (2023). Total: 2 Gerald Loeb Awards, Sigma Delta Chi, Cornelius Ryan Citation, 3 Deadline Club Awards. 2026 National
      Magazine Award finalist (Service Journalism) with Lily Hay Newman for government surveillance article. KEY: Institutional longevity (~12 years) makes
      him a control case for Drummond-era editorial drift. Forbes → Wired is a cross-ownership test (Forbes independent; Wired = Condé Nast). His security
      beat gives natural adversarial framing toward Big Tech — the question is whether Drummond-era Wired amplifies or simply inherits that posture.'
    publication: wired
    role: senior_writer
    source_url: https://www.wired.com/author/andy-greenberg/
