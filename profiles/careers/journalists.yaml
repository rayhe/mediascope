  name: Jake Lahut
  notes: 'KEY MIGRATION: Daily Beast → Wired (via freelance bridge, 2024-2025) → FIRED Nov 2025 (Condé Nast union dispute)
    → freelance/Sherwood News. Six-month Wired tenure ended by labor dispute, not editorial performance. Career arc: New Yorker
    fact-checker (Trump research) → Politico WH intern → local NH/NY political reporting → Business Insider 2020 election
    → Daily Beast campaigns → Wired politics (6 months) → fired during "march on the boss" union confrontation → independent
    NLRB fight. UNIQUE IN DATASET: (1) Unlike most Wired hires who come from tech journalism (Gizmodo, Verge, Vice), Lahut
    is a pure POLITICAL reporter brought in specifically for tech-politics coverage — his framing instincts were formed in
    campaign trail political reporting, not tech accountability journalism. (2) His co-byline on the massive DOGE federal
    workers investigation (Sep 2025, with Schiffer, Feiger, Elliott, Kelly, Knibbs, Gilbert, Taft, Marshall, Dave) shows Wired
    deployed him on their biggest tech-politics packages during his brief tenure. (3) The firing during the union dispute
    — where Lahut was one of four employees terminated for confronting Condé Nast CPO Stan Duncan about layoffs — adds an
    institutional dimension: Wired/Condé Nast values adversarial reporting directed outward (at tech companies) but fired
    employees who turned that same adversarial energy against management. (4) Lahut was probationary (one week shy of full
    guild protection), making him more vulnerable than established staff. (5) He declined the $400K+ settlement the other
    three fired workers accepted, choosing to pursue an independent NLRB case — demonstrating the same adversarial tenacity
    that made him valuable as a reporter. Reports to Tim Marchman. Newsletter: Politics Lab / Inner Loop → "Straight From
    The Hut" (post-firing Substack). French professional proficiency (Paris fellowship, Wesleyan College of Letters). KEY
    FOR MEDIASCOPE: (1) Tests whether political reporters brought into tech media bring different adversarial framing patterns
    vs tech-native reporters. (2) His New Yorker origin (fact-checking Trump for Mark Singer) and Daily Beast campaign trail
    work mean his source networks are Washington/politics-facing, not Silicon Valley-facing. (3) Acquired via freelance- to-staff
    pipeline Drummond uses to test-drive political reporters. (4) His beat definition — "Silicon Valley billionaires and populist
    MAGA diehards" — explicitly frames tech leaders as one side of a political conflict, distinct from Schiffer business desk
    tech accountability framing. (5) The firing and NLRB case provide a natural experiment: does Lahut coverage of Meta/tech
    at Wired differ from his post-firing freelance coverage of the same companies? If his framing was shaped by Wired institutional
    voice, it should change; if it was personal, it should persist.'
