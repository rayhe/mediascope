      The US crackdown on Chinese economic espionage is a mess. We have the data to show it.\" Co-authored with Jess Aloe & Karen Hao. Searchable database\
      \ of 77 cases, 150+ defendants — most comprehensive accounting of China Initiative prosecutions to date. Data showed 90% of defendants were of Chinese\
      \ heritage, only 25% convicted. Informed DOJ policy review; Initiative officially ended Feb 2022.\n3. Worldcoin (Apr 2022): \"Deception, exploited\
      \ workers, and cash handouts: how Worldcoin recruited its first half a million test users.\" 35 individuals in 6 countries (Indonesia, Kenya, Sudan,\
      \ Ghana, Chile, Norway). 7,000-word investigation. Exposed deceptive marketing, unauthorized data collection, GDPR violations. Led to contract suspensions,\
      \ company policy changes, informed Kenya government suspension and EU regulatory scrutiny.\n4. Amazon/iRobot: Investigation that sparked EU antitrust\
      \ investigation into Amazon's proposed acquisition.\n5. LA superspreader: Exposé of tech entrepreneur's illegal superspreader event.\n6. NIST AI bias:\
      \ Work informed ongoing efforts to develop US government standards to reduce bias in AI.\n7. \"The End of Privacy\" / \"State of AI\" (2025): Co-produced\
      \ with Melissa Heikkilä. Joint FT/MIT TR collaboration covering AI companion privacy risks, Meta AI ads in chatbots, sycophancy, data monetization.\n\
      \nKEY ANALYTICAL VALUE: Her Afghanistan/global-south experience gives her a fundamentally different frame for tech accountability — she's seen how\
      \ technology deployed without oversight affects populations with no recourse. Her investigative fellowship training (Type Investigations) means she's\
      \ not just reporting company statements but building source-heavy investigations. The China Initiative piece co-authored with Karen Hao represents\
      \ a methodological template for data-driven accountability journalism that shapes MIT TR's institutional approach to tech coverage.\nCOLLABORATION\
      \ PATTERN: Builds cross-border reporting teams (6 countries for Worldcoin), works with co-authors on data-intensive pieces (Karen Hao on China Initiative),\
      \ and co-produces with other publications (FT partnership for \"End of Privacy\")."
