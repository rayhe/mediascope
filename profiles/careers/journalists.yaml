      Brother" (OpenAI catching up), "When Claude Met Claude" (Anthropic/Monet sponsorship). (5) Meta-specific — "Meta Swears
      This Time Is Different" (Jul 2025, flagship piece): FAIR history from 2013, Yann LeCun recruitment, Llama 4 benchmarking
      failure (ranked 32nd vs claimed 2nd), Meta trailing OpenAI/Google/Anthropic/xAI/DeepSeek. Also: Zuckerberg-as-Musk-copyist
      analysis (MMA, fact-checking removal, $900K watch, "rehearsed and ostentatious"). (6) Altman-Musk trial coverage — "Sam
      Altman and Elon Musk Sure Dislike Each Other," "Elon Musk Gets a Reality Check." (7) Culture/art — AI vs Ted Chiang
      art debate (Sep 2024), Terence Tao Q&A on AI and mathematics (Oct 2024). (8) AI policy — "Donald Trump''s Gift to AI
      Companies," White House vs Anthropic export controls (Jun 2026).'
