  name: Alex Reisner
  notes: 'Atlantic''s foremost AI training data investigator and programmer-journalist hybrid. Career arc: tech consultant/programmer
    → freelance → Atlantic contributing writer (Aug 2023) → formally announced contributing writer (Jan 2025) → staff writer
    (Oct 2025). Four major searchable database investigations: (1) Books3 (Aug 2023, 190K pirated books, Meta/LLaMA), (2)
    LibGen (Mar 2025, 7.5M books + 81M research papers, Meta/OpenAI), (3) YouTube videos (late 2025, 15.8M+ videos from 2M+
    channels), (4) Music datasets (Jun 2026, 21.2M+ copyrighted songs). Co-created AI Watchdog project with senior editor
    Damon Beres (Sep 2025). Investigations directly implicate Meta — Books3 used by LLaMA, LibGen used by LLaMA 3 with MZ
    approval, YouTube videos used by Meta and others. Authors Guild praised his work; court filings reference his investigations.
    Prompted Atlantic pieces from Margaret Atwood and Stephen King. Also a drummer in Francis and the Lights. ANALYTICAL VALUE:
    Reisner''s investigations are the single highest-impact source of Meta-negative AI training data reporting. His searchable
    database tools turn abstract copyright concerns into personally verifiable grievances, dramatically amplifying public
    outrage. The AI Watchdog series is structured to produce a steady drumbeat of Meta-implicating revelations. Programming
    background makes him uniquely capable of building tools that other journalists cannot replicate. Atlantic has invested
    heavily in his infrastructure (four custom databases), suggesting long-term institutional commitment to this coverage
    line.'
