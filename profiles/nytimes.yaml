      dropped contributory infringement claim against OpenAI post-Cox Communications SCOTUS
      ruling (Mar 25, 2026, 9-0) and fortified direct infringement claims against Microsoft's
      infrastructure role. Discovery contentious: May 12 status conference addressed "Project
      Giraffe" evaluation data, Microsoft Brand Tracker survey (denied w/o prejudice), and
      Microsoft LLM integration license financials. Jun 2: $100/day sanctions threatened
      against OpenAI for withholding deposition exhibits. SJ briefing appears imminent per
