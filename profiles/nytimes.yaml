known_conflicts:
  - type: "litigation"
    description: >
      Actively suing OpenAI and Microsoft for copyright infringement (Case 1:23-cv-11195,
      S.D.N.Y., Judge Sidney Stein, MDL 25-md-03143). Claims billions in damages.
      Simultaneously building internal AI products (Echo, Stet, Cheat Sheet) and licensing
      to Amazon for $20-25M/yr. KEY RULINGS (2025-2026): preservation order forcing OpenAI
      to retain 400M+ users' ChatGPT logs (May 2025); 20M anonymized chat logs production
      ordered (Nov 2025, affirmed Jan 2026); motion to dismiss DENIED on copyright claims
      (Apr 4, 2026 — Judge Stein: 43-page opinion keeping all copyright claims alive,
      rejecting time-bar defense, preserving contributory infringement claims; only DMCA
      distribution claims dismissed as requiring "close to identical" copies). Daily News
      (Tribune Publishing) joined as co-plaintiff with trademark dilution claims.
      
      MDL DISCOVERY DEVELOPMENTS (Apr–Jun 2026):
      - Apr 7 (Dkt. 1492): Judge Wang issued Memorandum & Opinion criticizing OpenAI's
        30(b)(6) witness Jonathan Monaco's deposition preparation as "not sufficient."
        Counsel's objections "unnecessarily delayed and impeded" the deposition. Sanctions
        threatened: monetary or "deemed admissions." Additional 3.5-hour deposition ordered
        for April 8, 2026. "Project Giraffe" internal meeting notes discussed but Monaco
        claimed they were merely "a running document" — court found this evasive.
      - Apr 1 (Dkt. 1488): Judge Stein ordered Gracenote Media Services to show cause why
        its case should not be STAYED pending resolution of summary judgment motions in
        other active MDL cases. This is the FIRST signal that SJ motions are being
        contemplated in the core cases — a major procedural milestone.
      - Apr 21 (Dkt. 1501): Encyclopaedia Britannica action STAYED by stipulation pending
        SJ motions in other MDL cases. Parties must file joint status report within 30 days
        of SJ rulings. Confirms SJ motion schedule is driving the MDL timeline.
      - Mar 30 & Apr 16: Confidential discovery settlement conferences held (Dkt. 1479).
        Judge Wang advanced March 30 conference from 2 PM to 12 PM, suggesting urgency.
      - May 21 (Dkt. 1566): Court ordered OpenAI to produce "deposition materials" from
        four witness depositions in Musk v. Altman (N.D. Cal., 4:24-cv-4722) by May 22.
      - May 12–15 (conference + order): Magistrate Judge Wang held discovery status conference
        May 12, 2026 for ALL MDL actions. Key rulings signed May 15:
        (a) "Project Giraffe" (ECF 1520): Ordered meet-and-confer on "five questions" re
        raw evaluation data; clawed-back data to be LOGGED with OpenAI to confer on providing
        additional info; OpenAI to log evaluations withheld because they post-date litigation.
        (b) Microsoft Brand Tracker Survey (ECF 1506): DENIED without prejudice. Parties
        directed to include third-party Kantar in conferral on data production.
        (c) OpenAI click-through data (ECF 1513): DENIED as moot (resolved per ECF 1542-1).
        (d) Microsoft Financials (ECF 1310): Supplemental briefs ordered by May 15 with
        responses due May 20. Parties to address why production of financial information
        tied to LLM integration licenses is/is not sufficient.
        (e) Protective order amendment (ECF 1518): Parties directed to further meet-and-confer;
        joint status letter or proposed briefing schedule due May 15.
        Source: docs.justia.com (order filed in Authors Guild v. OpenAI, cross-filed in MDL).
      - Jun 2 (Dkt. 1584): Judge Wang ordered OpenAI to produce deposition EXHIBITS
        "FORTHWITH" after OpenAI produced transcripts but withheld exhibits. OpenAI
        claimed exhibits weren't ordered — court disagreed, citing its own language and
        plaintiffs' original request. $100/DAY SANCTIONS imposed if not produced by
        June 3, 2026 at 5 PM EDT. NYT counsel Davida Brook (Susman Godfrey) filed the
        motion. OpenAI had ignored NYT's May 22 inquiry, then on May 26 "incorrectly
        assert[ed]" exhibits weren't required and accused NYT of "mov[ing] the goalposts."
      - Jun 3 (Dkt. 1585): Pro hac vice admission of Ana Mendez-Villamil across all
        MDL cases — suggests expanding legal team for discovery-intensive phase.
      
      PROCEDURAL STATUS (Jul 2026): No trial date set. Discovery ongoing and contentious.
      Summary judgment briefing close date: November 6, 2026 (per conversation data
      stipulation). Stays granted to Gracenote and Britannica (both stayed pending SJ
      motions in core cases) confirm SJ is the critical path. Class certification not
      yet addressed; Authors Alliance assessment (Feb 2026): "several months to a year
      away." SJ rulings on fair use and training-as-copying will set precedent for all
      consolidated cases.
      
      OPENAI PRIVILEGE/SPOLIATION RISK (Jul 2026): Court ordered OpenAI to disclose
      internal communications about deletion of a pirated book dataset. Raises
      privilege waiver and spoliation concerns. Analytically significant because
      Anthropic settled a similar piracy case for $1.5B — establishes a damages
      benchmark if OpenAI's own piracy evidence surfaces. OpenAI's confidential S-1
      filing (late May 2026, targeting ~$1T valuation, possible 2027 listing) adds
      SEC disclosure pressure: any material copyright liabilities must be disclosed
      to prospective investors. Microsoft owns ~27% of OpenAI on an as-converted
      diluted basis (~$135B at target valuation).
      
      CASCADING LEGAL EFFECTS (Jul 2026):
      - Microsoft shareholder derivative suit (Eric Anderson v. Microsoft Corp. et al.,
        W.D. Washington, filed Jul 1, 2026): alleges Satya Nadella, Amy Hood, Jared
        Spataro, Rajesh Jha, and Microsoft directors breached fiduciary duties and
        violated Section 14(a) / Rule 14a-9 by making misleading proxy statements
        about AI strategy, Copilot adoption, and "lawful data sourcing" while exposing
        MSFT to copyright liability through OpenAI. Key allegations: Nadella received
        ~$224M compensation 2023-2025 (480:1 CEO-to-median-employee ratio); Microsoft
        told investors it trained on data "in a manner consistent with global copyright
        laws" and avoided USTR Notorious Markets; only 15M paid Copilot seats vs 450M+
        Microsoft 365 users; Azure capacity constraints concealed. Requests damages,
        disgorgement of exec compensation, and governance reforms including board-level
        copyright compliance reporting. Uses Bartz v. Anthropic as a "red flag event"
        that should have triggered board action. Part of emerging "copyright shareholder
        derivative" theory (Adobe faces 2 similar suits). Most likely first outcome:
        motion to dismiss on demand-futility grounds. Analytically significant because
        it reframes AI copyright risk as board-oversight, securities-disclosure, and
        executive-compensation risk — not just a content-creator complaint.
      - City of St. Clair Shores securities class action (26-cv-02071, W.D. Washington,
        filed June 15, 2026): separate Microsoft securities fraud action re: Copilot/Azure
        misrepresentations. MSFT stock -10% Jan 28-29 (~$357B market cap erasure).
        Lead plaintiff deadline Aug 11, 2026.
