  - name: "Manuel Bronstein"
    title: "Former Chief Product Officer, Roblox Corporation"
    class: "tech_executive"
    since: "2021"
    background: >
      CRITICAL GOOGLE/ALPHABET VETERAN: 7 years at Google parent Alphabet.
      VP Product at YouTube (2014-2018): oversaw mobile, desktop, living room
      apps, live streaming, growth, community. VP Product at Google, leading
      Google Assistant (2018-2021). CPO of Roblox (2021-2025, scaled from $2B
