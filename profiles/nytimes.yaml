    consolidated_mdl_status: >
      Case is part of consolidated pretrial proceedings for 16 copyright lawsuits against OpenAI
      in the U.S. District Court for the Southern District of New York. This multidistrict
      litigation (MDL) represents the largest clump of AI copyright cases. Co-plaintiffs include
      Chicago Tribune Co. LLC and other Alden Global Capital newspapers. NYT is the lead plaintiff
      and the most resource-rich litigant, setting the discovery and legal precedent template for
      all other cases. Sources: Bloomberg Law, Law.com, Reuters.
    status_as_of_jun_2026: >
      ADVANCED DISCOVERY PHASE. 20M anonymized ChatGPT logs produced to plaintiffs. No trial
      date set yet. NYT searching/analyzing the chat log data for evidence of copyrighted content
      reproduction. OpenAI has complied with production order per its public blog statement. Case
      is precedent-setting for all publisher-vs-AI copyright disputes. Microsoft's express license
      affirmative defense is being contested — NYT moved to strike it. Meanwhile, the litigation
      coalition is EXPANDING: on June 24, 2026, nearly 400 local/regional newspapers filed a
      separate SDNY lawsuit (Richner Communications v. Microsoft Corp., No. 1:26-cv-05320) led
