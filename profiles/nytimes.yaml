# ===================================================================
# OWNERSHIP CHAIN — updated 2026-06-22 from SEC filings & proxy data
# ===================================================================
ownership_chain:
  - name: "The New York Times"
    entity_type: "publisher"
    description: >
      Founded 1851, paper of record. Digital-first subscription model.
      FY2025: $2,824.9M total revenue (+9.2% YoY), $431.6M operating profit (+22.9%),
      $344.0M net income. Q1 2026: $712.2M revenue (+12% YoY), $0.61 EPS (beat $0.49 consensus).
      12.52M digital-only subscribers (Q1 2026), 13.08M total subscribers.
      Includes NYT Cooking, Games, Wirecutter, The Athletic, Audio.
  - name: "The New York Times Company"
    entity_type: "parent_company"
    description: >
      Publicly traded (NYSE: NYT). Market cap ~$11.83B (Jun 2026). Stock ~$73/share.
      Dual-class share structure gives Sulzberger family control despite ~11% economic ownership.
      95.37% of Class A stock held by institutional investors.
    sec_filings:
      - type: "10-K"
        period: "FY2025"
        source_url: "https://www.tradingview.com/news/te_press_release:nyt-20250228/"
        notes: "Total revenue $2,824.9M, digital-only subscription revenue +14.3%"
      - type: "10-Q"
        period: "Q1 2026"
        source_url: "https://www.zacks.com/stock/news/2473290/the-new-york-times-q1-earnings-beat-on-digital-ads-subscriber-growth"
        notes: "Revenue $712.2M (+12%), digital ad +31.6%, 310K net new digital subs"
  - name: "Ochs-Sulzberger Family / 1997 Trust"
    entity_type: "controlling_family"
    description: >
      Descended from Adolph S. Ochs (acquired NYT 1896). Control passes through
      the 1997 Trust, which holds 738,810 shares of Class B stock and 1,400,000 shares
      of Class A stock (plus ~4.3M more Class A indirectly). Class B stockholders
      elect ~70% of the Board of Directors. Eight trustees act by supermajority (6 of 8).
      Primary trust objective: "maintain the editorial independence and integrity of
      The New York Times." Family aggregate holdings: ~11% of total outstanding equity.
      A.G. Sulzberger is current publisher and chairman.
    source_url: "https://www.sec.gov/Archives/edgar/data/71691/000119312517102289/d297033ddef14a.htm"
    notes: "From DEF 14A proxy statement; trust indenture structure described therein."
  - name: "Slim Family / Control Empresarial de Capitales"
    entity_type: "major_individual_shareholder"
    description: >
      LARGEST INDIVIDUAL SHAREHOLDER. Control Empresarial de Capitales S.A. de C.V. owns
      29,123,098 Class A Common Shares, constituting approximately 25.1% of the 115,847,488
      issued and outstanding Class A shares (per Form 10-Q filed Oct 30, 2025). The Slim
      Family — Carlos Slim Helú, Carlos Slim Domit, Marco Antonio Slim Domit, Patrick Slim
      Domit, María Soumaya Slim Domit, Vanessa Paola Slim Domit, and Johanna Monique Slim
      Domit — are beneficiaries of a Mexican trust that owns all voting equity securities
      of Control Empresarial. SEC filing signed February 9, 2026 by Marco Antonio Slim Domit
      as Attorney-in-Fact.

      HISTORY: Carlos Slim lent NYT $250M in January 2009 at 14.05% interest during the
      financial crisis, when the NYT was facing bankruptcy and its stock was trading under $4.
      The loan included warrants to purchase 15.9M Class A shares at $6.3572/share. Slim
      converted to equity and built his position to ~17% by 2015. In 2017-2018, Inversora
      Carso (predecessor entity) sold ~1.5M shares at ~$23/share, reducing the holding. The
      position was subsequently consolidated under Control Empresarial de Capitales. Despite
      selling some shares, the Slim Family has INCREASED its percentage ownership to 25.1%
      as NYT repurchased its own shares (NYT bought back ~883K shares in Q4 2025 alone for
      $55.4M, reducing the denominator).

      FILES AS 13G (passive investor — certifies shares "were not acquired for the purpose of
      or with the effect of changing or influencing the control of the issuer"). No board
      representation. No known editorial influence. However, 25.1% is an extraordinary
      concentration for a "passive" holding in a media company.

      VALUE: At $71.22/share (Jun 24, 2026), the position is worth ~$2.07B. Carlos Slim's
      net worth is ~$99.1B (Bloomberg, Jul 2025, 18th richest globally). Core fortune:
      Telmex/América Móvil (Latin American telecom monopoly), Grupo Carso (conglomerate).
    source_urls:
      - "https://www.sec.gov/Archives/edgar/data/1534504/000114036126004396/0001140361-26-004396.txt"
      - "https://en.wikipedia.org/wiki/Carlos_Slim"
    notes: >
      ANALYTICAL SIGNIFICANCE: The Slim Family's 25.1% stake makes them the single largest
      shareholder of NYT Class A stock — larger than Vanguard ($1.09B), T. Rowe Price ($727M),
      or any institutional holder. While the dual-class structure means Class B (Sulzberger
      family) controls ~70% of board seats, the Slim Family's 25.1% of Class A gives them
      the largest economic interest of any non-family entity. Key question: does this
      concentrated ownership from a Mexican telecom oligarch create any coverage conflicts?
      Slim's core businesses (Telmex, América Móvil) do not directly compete with Meta or
      other tech companies in the US market, making this more of a governance observation
      than a direct editorial conflict — but the sheer concentration (25.1%) in a media
      company deserves documentation.

