notes: |
  UPDATED 2026-06-26: BOARD OF DIRECTORS — COMPREHENSIVE GOVERNANCE ANALYSIS.

  THE MOST SIGNIFICANT ADDITION TO THE NYT PROFILE SINCE INCEPTION.

  Four major governance findings:

  7. TECH EXECUTIVE BOARD CONCENTRATION (38% of seats):
  5 of 13 NYT board members are former executives of Big Tech companies:
  Manuel Bronstein (Alphabet/Google, 7 years), Rebecca Van Dyck (Meta, 10 years),
  Brian McAndrews (Microsoft), Rachel Glaser (Yahoo), Amanpal Bhutani (GoDaddy).
  No major media company has this density of former Big Tech executives on its board.
  These individuals bring valuable digital expertise but also institutional affiliations
  with the companies NYT covers most critically.

  8. NOMINATING & GOVERNANCE COMMITTEE — STRUCTURAL CAPTURE:
  ALL FOUR members of the committee that selects future board members have career or
  financial ties to Big Tech companies NYT covers:
  - Rogers (Chair): $254M META + $480M+ GOOGL through Ariel Investments
  - Bronstein: 7-year Google/Alphabet veteran
  - McAndrews: Microsoft veteran (MSFT is co-defendant in NYT lawsuit)
  - Van Dyck: 10-year Meta veteran, former Reality Labs COO
  This creates a self-perpetuating governance structure where no board candidate is
  evaluated by someone free from tech company ties.

  9. ARIEL INVESTMENTS — $1.1B+ IN TECH STOCKS:
  John W. Rogers Jr. chairs both the Nominating & Governance Committee AND the Finance
  Committee. His firm Ariel Investments holds: $254M META, $480M+ Alphabet, $101M Amazon,
  $208M Apple, $96M Netflix. That's over $1.1B in tech company positions. Rogers is
  fiduciarily obligated to manage these holdings for his clients. NYT claims ZERO financial
  relationship with Meta, yet its most powerful independent director has a $254M financial
  interest in Meta's stock price.

  10. REBECCA VAN DYCK — THE META PARADOX:
  A former Meta Reality Labs COO (2020-2022) — who ran operations for the $4B/quarter
  loss-making division — sits on the board of the publication most adversarial toward Meta.
  She also marketed Facebook itself during the Cambridge Analytica era (2012-2017). Now
  helps set CEO pay (Compensation Committee) and choose board members (Nom & Gov). The
  paradox: insider knowledge could sharpen or soften coverage. Either way, it's undisclosed.

  PRIOR UPDATES PRESERVED BELOW:

  UPDATED 2026-06-24: THREE MAJOR ADDITIONS to the NYT ownership & funding profile.
  
  1. CARLOS SLIM / CONTROL EMPRESARIAL (25.1% CLASS A):
  The Slim Family's 25.1% Class A shareholding is the largest individual ownership
  position in any of the 5 tracked publications. Per SEC Schedule 13G/A filed Feb 9,
  2026: Control Empresarial de Capitales S.A. de C.V. holds 29,123,098 Class A shares.
  At $71.22/share (Jun 24, 2026), the position is worth ~$2.07B. This was entirely
  missing from the prior profile. While Slim files as passive (13G) and has no board
  seats, and his core businesses (Telmex/América Móvil) don't directly compete with
  Meta in US markets, the concentration is extraordinary. Historical context: Slim's
  $250M emergency loan in January 2009 at 14.05% interest (when NYT stock was under $4)
  saved the company from potential bankruptcy. The position has grown from ~17% to 25.1%
  partly through NYT's own share buyback program reducing the denominator.
  
  2. COMPOUND AMAZON DEPENDENCY ($70-125M+/yr):
  The prior profile showed only the $20-25M/yr AI licensing deal. The REAL Amazon
  dependency is FAR larger when including Wirecutter affiliate revenue. NYT's FY2025
  "Affiliate, licensing and other revenues" totaled $308.1M (10.9% of total revenue).
  After subtracting the AI licensing deal (~$13-17M partial year in FY2025) and other
  licensing, Wirecutter affiliate revenue through Amazon likely exceeds $50-100M/yr.
  Combined exposure: $70-125M+/yr. This makes Amazon the most financially significant
  tech company relationship for ANY of the 5 tracked publications — dwarfing even
  MIT TR's institutional funding or Wired's indirect Reddit stake.
  
  Karen Weise covers Amazon for the NYT. She covers the company that pays her employer
  $70-125M+ per year. This is the single most direct, testable revenue/coverage conflict
  in the entire 5-publication tracking set.
  
  3. AMAZON AFFILIATE COMMISSION CUTS (MARCH 2026):
  Amazon slashed Associates program commissions by up to 50% starting March 9, 2026.
  Milestone-based incentive tiers eliminated. Year-over-year performance bonuses gutted.
  Never publicly announced. Per Adweek (7 publisher sources): one deal-site publisher
  revised 2026 Amazon revenue forecast down 50%. This directly threatens NYT/Wirecutter's
  largest affiliate revenue stream. The timing creates a fascinating dynamic: as Amazon
  cuts affiliate commissions (reducing NYT's affiliate income), the AI licensing deal
  ($20-25M/yr) becomes an even more critical revenue relationship. Amazon is simultaneously
  squeezing and subsidizing NYT — shifting the financial relationship from transactional
  (affiliate) to strategic (AI licensing). Does this create editorial leverage?
  
  The New York Times is the most analytically interesting case for MediaScope because of
  its MULTI-DIMENSIONAL AI STRATEGY:
  
  1. PLAINTIFF: Suing OpenAI/Microsoft for billions in copyright damages, arguing AI
     training on NYT content is theft. Landmark preservation order forcing OpenAI to
     retain 400M+ users' chat logs.
  
  2. LICENSOR: Signed $20-25M/yr deal with Amazon (May 2025) for the same content it
     claims OpenAI stole. Amazon can train models AND use summaries/excerpts.
  
  3. USER: Approved OpenAI's non-ChatGPT API, GitHub Copilot, Google Vertex AI,
     Amazon AI tools for internal staff use (Feb 2025). Built Echo, Stet, Cheat Sheet.
  
  4. AFFILIATE DEPENDENT: Wirecutter earns $50-100M+/yr through Amazon's affiliate
     program — making Amazon NYT's largest single revenue partner at $70-125M+ combined.
  
  5. ZERO META: No financial relationship with Meta whatsoever. Meta signed AI deals
     with 7 publishers Dec 2025 but not NYT. NYT's adversarial Meta coverage
     (Frenkel, Isaac, new dedicated reporter Eli Tan) has zero commercial counterweight.
  
  6. CARLOS SLIM (25.1%): Largest individual shareholder. Passive filing, no board seats,
     telecom not competing with Meta. But extraordinary concentration for a media company.
  
  KEY ANALYTICAL QUESTIONS (updated):
  - Does Amazon coverage soften after the compound $70-125M+/yr dependency is established?
  - Does the March 2026 affiliate commission cut change Karen Weise's coverage posture?
    (Paradox: Amazon cutting NYT's income could either embitter coverage or make NYT more
    deferential to protect the remaining AI licensing relationship.)
  - Is there measurable asymmetry between NYT's Meta coverage (no revenue) and Amazon
    coverage ($70-125M+/yr)?
  - How does the dual-class Sulzberger control structure (family owns ~11% equity but
    elects ~70% of board) interact with Slim's 25.1% economic interest?
  - Does Q1 2026 reporting show any Wirecutter revenue decline from the Amazon cuts?

  CROSS-PUBLICATION AI COPYRIGHT LITIGATION LANDSCAPE (as of June 26, 2026):
  
  Of the 5 tracked publications, the litigation/licensing divide is now definitive:
  
  LITIGANTS (1 of 5):
  - NYT: Lead plaintiff, SDNY Case 1:23-cv-11195. Advanced discovery. 20M chat logs
    produced. 16-lawsuit MDL. The trailblazer. Also has Amazon AI licensing deal ($20-25M/yr).
  
  LICENSORS (4 of 5):
  - Atlantic: OpenAI licensing (May 2024). ZERO lawsuits. Deepest OpenAI relationship
    (licensing + product access + equity exit via LoveFrom/io Products chain). Conspicuously
    absent from 400-newspaper June 2026 suit.
  - Condé Nast/Wired: OpenAI (Aug 2024), Amazon, Perplexity, Apple (negotiating).
    ZERO lawsuits. EXCLUDED from Meta's Dec 2025 AI licensing round ($0 from Meta).
  - Guardian: OpenAI (Feb 2025), ProRata. ZERO lawsuits. But co-founded SPUR coalition
    for standards-based approach. 'Operation Leaky Bucket' anti-scraping enforcement.
    Third path between pure litigation and pure licensing.
  - MIT Tech Review: No known AI licensing deals or litigation. Institutionally constrained
