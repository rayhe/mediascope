  - type: "plaintiff_perplexity"
    description: >
      SEPARATE DIRECT ACTION: The New York Times Company v. Perplexity AI, Inc.,
      Case No. 1:25-cv-10106, S.D.N.Y., Judge Loretta A. Preska. Filed December 5, 2025.
      
      NYT sued Perplexity after ~2 years of cease-and-desist demands (starting late 2023).
      Claims: copyright infringement (scraping paywalled content, verbatim reproduction)
      AND trademark infringement/dilution (Perplexity hallucinations falsely attributed to
      NYT brand — first time NYT has deployed trademark claims in AI litigation). Also
      claims DMCA violations. Seeks unspecified damages + injunctive relief.
      
      PARALLEL SUIT: Chicago Tribune Co. v. Perplexity AI Inc., No. 1:25-cv-10094 (same
      court, same timeframe). Tribune Publishing's action has similar copyright claims.
      
      PERPLEXITY'S "NO VOLITION" DEFENSE (motion to dismiss, Mar 2026): Perplexity argues
      it cannot be liable for DIRECT copyright infringement because it never made a
      "volitional" choice to copy — the user enters the query, and the system automatically
      executes. Relies on 2nd Circuit's Cartoon Network v. CSC Holdings (2008). This is
      a NOVEL legal theory — no court has evaluated it in the context of a generative AI
      search engine. If successful, eliminates only direct infringement (strict liability);
      leaves secondary liability (requiring knowledge/intent) intact. This defense strategy
      is distinct from OpenAI's fair use defense and tests a different legal boundary.
      
      NYT OPPOSITION TO PARTIAL MTD (ECF No. 59, May 15, 2026): NYT filed opposition
      to Perplexity's partial motion to dismiss, challenging the "no volition" defense.
      Extension was granted March 26, 2026 (ECF No. 56) with motions due by April 17.
      No ruling on the MTD as of July 2026 — decision pending from Judge Preska.
      
      PERPLEXITY'S EXPANDING LEGAL EXPOSURE (as of May 31, 2026): Perplexity now faces
      9 active lawsuits: NYT, News Corp/Dow Jones, NY Post, Chicago Tribune, Encyclopedia
      Britannica, Merriam-Webster, Reddit, Yomiuri Shimbun, and CNN (filed May 28, 2026).
      The CNN suit (May 2026) is the most recent addition.
      
      CASE MANAGEMENT PLAN (Dkt. 66, June 2, 2026, signed Judge Preska):
      - Discovery opened: March 25, 2026 (Rule 26(f) conference held)
      - Motion for leave to amend/join parties: June 17, 2026
      - Fact depositions completion: February 26, 2027
      - Fact discovery close: February 26, 2027
      - Expert discovery close: July 30, 2027
      - Summary judgment motions: September 15, 2027
      - SJ oppositions: October 15, 2027
      - SJ replies: November 8, 2027
      
      ANALYTICAL SIGNIFICANCE: NYT is now fighting on TWO separate AI litigation fronts:
      (1) the massive OpenAI/Microsoft MDL (25-md-3143, Judge Stein) and (2) Perplexity
      (standalone, Judge Preska). The Perplexity case reaches trial/SJ later (Nov 2027 vs
      possible late 2026/early 2027 for OpenAI MDL) but tests different legal theories —
      the "no volition" defense for AI search engines, and trademark claims for AI
      hallucinations. Together they establish NYT as the most aggressive litigant in the
      publisher-vs-AI space — suing both the largest AI company and the leading AI search
      startup, using distinct legal strategies tailored to each defendant's architecture.
      
      NYT spokesperson Graham James: "While we believe in the ethical and responsible use
      and development of AI, we firmly object to Perplexity's unlicensed use of our content
      to develop and promote their products."
      
      Perplexity head of comms Jesse Dwyer: "Publishers have been suing new tech companies
      for a hundred years, starting with radio, TV, the internet, social media and now AI.
      Fortunately it's never worked, or we'd all be talking about this by telegraph."
    case_reference: "1:25-cv-10106, S.D.N.Y."
    judges:
      presiding: "Judge Loretta A. Preska"
    severity: 4
    evidence: "Court docket, Reuters, Bloomberg Law, TheWrap, Lexology"
    source_urls:
      - "https://www.reuters.com/technology/new-york-times-sues-perplexity-ai-illegal-copying-content-2025-12-05/"
      - "https://www.reuters.com/legal/litigation/is-perplexitys-no-volition-copyright-strategy-clever-legal-shield-or-long-shot-2026-03-12/"
