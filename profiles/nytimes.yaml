# ===================================================================
# INTERNAL AI TOOLS — new section, 2026-06-22
# ===================================================================
internal_ai_tools:
  tools:
    - name: "Echo"
      description: "Internal AI summarization tool. Connects NYT content archive to LLMs. Single user-defined prompt summarizes/transforms/extracts from any Times-owned content."
      source_url: "https://ire.org/resource-center/inside-the-new-york-times-ai-toolkit/"
    - name: "Stet"
      description: "AI copy evaluation framework for quality measurement at scale. Ensures AI-generated copy meets editorial standards across parallel processing of hundreds of articles."
      source_url: "https://ire.org/resource-center/inside-the-new-york-times-ai-toolkit/"
    - name: "Cheat Sheet"
      description: "Spreadsheet-based AI tool for investigative journalism. Lets reporters choose LLM models, process massive datasets (10K names, 500 hours of video). Used by several dozen reporters."
      source_url: "https://digiday.com/media/inside-the-new-york-times-ai-newsroom-strategy/"
  approved_external_tools:
    - "GitHub Copilot (coding)"
    - "Google Vertex AI (product development)"
    - "NotebookLM"
    - "Amazon AI products"
    - "OpenAI non-ChatGPT API (via business account)"
  guidelines: >
    AI cannot draft or significantly revise articles. No AI-generated images/videos in stories.
    No confidential source information in AI tools. Journalists ultimately responsible for
    everything published. AI used for: research, brainstorming, suggesting edits, summarization,
    SEO headlines, social copy, code.
  source_url: "https://techcrunch.com/2025/02/17/the-new-york-times-has-greenlit-ai-tools-for-product-and-edit-staff/"

