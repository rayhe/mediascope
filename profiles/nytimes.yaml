      advertising competitor. A Google veteran sits on the committee that selects who joins
      the NYT board (Nominating & Governance), creating structural influence over board
      composition. His product expertise shaped Google Assistant (an AI product) and YouTube
      (a content platform competing for attention with publishers like NYT). NYT covers
      Google critically while depending on Google's ad tech for revenue — and a former Google
      VP helps pick the board members who oversee that coverage.
    source_urls:
      - "https://nytco.com/press/board-of-directors/manuel-bronstein/"
      - "https://pitchbook.com/"
      - "https://globaldatinginsights.com/2026/02/26/match-group-appoints-manuel-bronstein-and-raina-moskowitz-to-board/"

  - name: "Rebecca Van Dyck"
    title: "Chief Marketing Officer, Airbnb, Inc."
    class: "tech_executive"
    since: "unknown"
    background: >
      CRITICAL FORMER META EXECUTIVE: 10 years at Meta/Facebook (2012-2022).
      - COO of Reality Labs at Meta (2020-2022): ran operations for the $4B/quarter
        loss-making division building AR/VR hardware and metaverse.
      - CMO of AR/VR at Meta (2017-2020): marketed Oculus/Quest headsets.
      - VP of Consumer and Brand Marketing at Facebook (2012-2017).
      Before Meta: CMO of Levi's (2009-2012), Senior Director of Worldwide
      Marketing & Communications at Apple. Career started as Nike Global
      Account Director at Wieden+Kennedy. Now CMO of Airbnb (since June 2025).
      Also on boards of Mercy Corps and Bay FC (NWSL franchise, founding investor).
    committee_memberships: ["Compensation", "Nominating & Governance"]
    other_boards:
      - company: "Airbnb, Inc."
        role: "CMO (executive, not board)"
      - company: "Mercy Corps"
        role: "Board member"
      - company: "Bay FC"
        role: "Founding investor and board member"
    conflict_analysis: >
      SEVERITY 5: A FORMER META REALITY LABS COO sits on the board of the publication
      that covers Meta most adversarially in the entire 5-publication tracking set.

      Van Dyck ran operations for Meta's Reality Labs from 2020-2022 — the exact division
      that generates $4B quarterly losses and is the focus of NYT's most critical Meta
      coverage. She was COO of the division building AR glasses, Quest headsets, and the
      metaverse — all regular targets of NYT reporting.

      She also marketed Facebook itself as VP Consumer Marketing (2012-2017), overseeing
      brand campaigns during the Cambridge Analytica era and 2016 election misinformation
      controversies — both of which were extensively covered by NYT's Mike Isaac and Sheera
      Frenkel (who wrote 'An Ugly Truth').

      Structural power: Van Dyck sits on BOTH the Compensation Committee (influencing CEO
      and executive pay) AND Nominating & Governance (selecting future board members). This
      gives a former Meta executive influence over who leads NYT and who joins its board.

      The paradox: NYT portrays itself as having ZERO financial relationship with Meta
      (no licensing, no advertising), yet a former 10-year Meta veteran with deep institutional
      knowledge of Meta's operations helps govern the company. Does her presence temper
      adversarial coverage (she understands Meta's perspective)? Or sharpen it (she knows
      where the bodies are buried)?
    source_urls:
      - "https://civicnews.org/team/rebecca-van-dyck/"
      - "https://nytco.com/press/board-of-directors/"
      - "https://adweek.com/media/airbnb-hires-rebecca-van-dyck-as-cmo/"

  - name: "Amanpal S. Bhutani"
    title: "C.E.O., GoDaddy Inc."
    class: "tech_executive"
    since: "unknown"
    background: >
      CEO of GoDaddy (since 2019, $4.3B revenue web services company). Former
      President of Brand Expedia Group at Expedia (2015-2019), SVP Expedia
      Worldwide Engineering/CTO (2010-2015). Before Expedia: technology roles
      at JPMorgan Chase and Washington Mutual. Angel investor (BookOutdoors,
      Lawtrades, Acquco, Armoire). MBA from Lancaster University, BA Economics
