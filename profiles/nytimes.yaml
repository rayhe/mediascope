notes: |
  The New York Times is the most analytically interesting case for MediaScope because of
  its DUAL AI STRATEGY:
  
  1. PLAINTIFF: Suing OpenAI/Microsoft for billions in copyright damages, arguing AI
     training on NYT content is theft. Landmark preservation order forcing OpenAI to
     retain 400M+ users' chat logs.
  
  2. LICENSOR: Signed $20-25M/yr deal with Amazon (May 2025) for the same content it
     claims OpenAI stole. Amazon can train models AND use summaries/excerpts.
  
  3. USER: Approved OpenAI's non-ChatGPT API, GitHub Copilot, Google Vertex AI,
     Amazon AI tools for internal staff use (Feb 2025). Built Echo, Stet, Cheat Sheet.
  
  4. ZERO META: No financial relationship with Meta whatsoever. Meta signed AI deals
     with 7 publishers Dec 2025 but not NYT. This means NYT's adversarial Meta coverage
     (Frenkel, Isaac) has zero commercial counterweight.
  
  KEY ANALYTICAL QUESTIONS:
  - Does Amazon coverage soften after the $20-25M/yr licensing deal?
  - Does OpenAI coverage shift from "copyright thief" to "litigation opponent" vs
    "technology partner" (since NYT staff use OpenAI API)?
  - Is there measurable asymmetry between NYT's Meta coverage (no revenue) and Amazon
    coverage (licensing revenue)?
  - How does the dual-class Sulzberger control structure (family owns ~11% equity but
    elects ~70% of board) affect editorial independence claims?
  
  The ownership structure is unusually resilient: the 1997 Trust's stated primary objective
  is "to maintain the editorial independence and the integrity of The New York Times."
  This makes NYT's editorial choices more likely to reflect institutional culture and
  journalist ideology than shareholder pressure — but the Amazon deal introduces a new
  commercial vector worth monitoring.
