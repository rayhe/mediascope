# ===================================================================
# WIRECUTTER & AFFILIATE REVENUE — new section, 2026-06-24
# ===================================================================
wirecutter_affiliate_revenue:
  description: >
    NYT acquired Wirecutter (product review site) in October 2016 for ~$30M. Wirecutter
    generates revenue primarily through Amazon Associates affiliate links — readers click
    product recommendations, buy on Amazon, and NYT earns a commission. NYT reports this
    as part of "Affiliate, licensing and other revenues" alongside AI licensing deals and
    miscellaneous income.
  acquisition_price: "$30M (October 2016)"
  revenue_history:
    - period: "FY2018"
      affiliate_licensing_other: "~$20M+ from Wirecutter alone (per NYT disclosures, Ahrefs analysis)"
      notes: "Wirecutter generated $20M+ in 2018, paying back the $30M acquisition within ~3 years."
      source_url: "https://ahrefs.com/blog/wirecutter-seo-case-study/"
    - period: "FY2024"
      affiliate_licensing_other: "$291.4M (total Affiliate, licensing and other — includes Wirecutter + all licensing)"
      source_url: "https://www.sec.gov/Archives/edgar/data/71691/000007169126000008/pressrelease12312025.htm"
    - period: "FY2025"
      affiliate_licensing_other: "$308.1M (total, +5.7% YoY)"
      quarterly_breakdown: "Q1: ~$69.9M, Q2: $70.5M, Q3: ~$67.5M, Q4: $100.2M"
      notes: >
        Q4 spike driven by holiday shopping season (affiliate revenue is highly seasonal).
        FY2025 press release states growth driven by "higher Wirecutter affiliate referral
        revenues and licensing revenues." Amazon AI licensing deal ($20-25M/yr, started May
        2025) contributed ~$13-17M in FY2025 (partial year).
      source_url: "https://www.sec.gov/Archives/edgar/data/71691/000007169126000008/pressrelease12312025.htm"
  revenue_share_of_total: "10.9% of total FY2025 revenues ($308.1M / $2,824.9M)"
  amazon_dependency: >
    Wirecutter's revenue is heavily dependent on Amazon's Associates affiliate program.
    While Wirecutter links to multiple retailers (Best Buy, Target, etc.), Amazon has
    historically been the dominant revenue source — the CJR reported that at NY Magazine's
    Strategist (a Wirecutter competitor), "more than 80 percent" of affiliate revenue came
    from Amazon. Wirecutter has diversified more than competitors, but Amazon remains
    the largest single affiliate partner by a wide margin due to Amazon's catalog breadth,
    conversion rates, and (until March 2026) generous commission structure.
  source_urls:
    - "https://www.sec.gov/Archives/edgar/data/71691/000007169126000008/pressrelease12312025.htm"
    - "https://ahrefs.com/blog/wirecutter-seo-case-study/"
    - "https://cjr.org"
    - "https://digiday.com/media/wirecutter-tests-new-content-on-different-platforms-to-increase-affiliate-revenue/"

amazon_affiliate_commission_cuts_2026:
  description: >
    CRITICAL RISK FACTOR: Amazon quietly restructured its Associates program in early 2026,
    slashing commission rates by up to 50%, eliminating milestone-based bonus tiers, and
    degrading reporting tools. Changes began rolling out in Asia-Pacific markets in late 2025
    and hit the U.S. around March 9, 2026. NEVER publicly announced — publishers learned
    from individual Amazon account manager conversations.
  key_changes:
    - "Premium commission rates (up to 10%) reset to 4-5%"
    - "Milestone-based incentive tiers eliminated for most publishers"
    - "Year-over-year performance bonuses gutted in some categories"
    - "Reporting tools degraded (less data for optimization)"
  impact: >
    One deal-site publisher revised its 2026 Amazon revenue forecast down by 50%.
    Seven publishers and partners confirmed the changes to Adweek. Amazon spokesperson:
    "We value our affiliate partnerships and provide highly competitive commissions—these
    changes affect a tiny fraction of associates."
  nyt_exposure: >
    NYT/Wirecutter is among the world's largest Amazon affiliate publishers. If Wirecutter
    generates ~$50-100M+ annually in Amazon affiliate revenue (estimated from the $308.1M
    "Affiliate, licensing and other" line minus licensing), a 30-50% cut in Amazon
    commissions could cost NYT $15-50M+ per year. This would make the Amazon AI licensing
    deal ($20-25M/yr) an even more critical revenue relationship — potentially the ONLY
    growing Amazon revenue stream as affiliate income declines. The timing is notable:
    Amazon signed the AI licensing deal (May 2025) and then cut affiliate commissions
    (March 2026), shifting the NYT-Amazon financial relationship from primarily transactional
    (affiliate commissions) to primarily strategic (AI licensing).
  source_url: "https://www.adweek.com/media/amazon-associates-affiliate-rate-cuts-publishers/"
  date: "2026-03-09 (US rollout)"

# ===================================================================
# REVENUE RELATIONSHIPS — significantly expanded 2026-06-22
# ===================================================================
revenue_relationships:
  - partner: "Google"
    relationship_type: "advertising + ADVERSARIAL_STRUCTURAL (COMPOUND)"
    estimated_value: "$100M+/yr (programmatic ad revenue via Google ad tech stack)"
    description: >
      COMPOUND ADVERSARIAL RELATIONSHIP — THE MOST STRUCTURALLY COMPLEX IN THE DATASET:
      
      1. PROGRAMMATIC ADVERTISING (ongoing): Google is NYT's major programmatic ad partner.
         NYT digital advertising hit $93M in Q1 2026 alone (+32% YoY per NYT earnings
         May 6, 2026). A significant portion flows through Google's ad tech stack (AdSense,
         Ad Manager, DV360). Annualized, NYT's digital ad business exceeds $350M — Google's
         share is undisclosed but structurally dominant given Google's 90% search market share
         and its ad tech intermediation. NYT depends on Google for revenue while covering
         Google critically, and Google controls the ad tech plumbing NYT runs on.
      
      2. SHOWCASE EXCLUSION + AI PILOT ABSENCE (Jun 2026): Google is phasing out its News
         Showcase content-licensing program (launched 2020, 2,300+ titles, 22 countries) and
         replacing it with a new "News AI pilot program" (announced Dec 2025) that requires
         publishers to grant Google broad rights to use their content for AI training in
         exchange for AI Overviews promotion and direct payments. Initial partners: Washington
         Post, Guardian, Der Spiegel, El País, Folha, Infobae, Kompas, Times of India,
         Washington Examiner. NYT IS NOT IN THE PILOT — consistent with its blocking of
         Google Extended (AI training crawler) and its adversarial-litigant posture. Google
         reportedly warned publishers: decline the new pilot → eventually lose Showcase
         payments too. Jason Kint, CEO of Digital Content Next (whose members include NYT):
         "This is Google's game. They're gonna dominate here." Google spokesperson: "We
         continue to renew Showcase agreements." The transition creates a SQUEEZE:
         publishers must either accept AI training rights or lose content payments.
      
      3. AI OVERVIEWS TRAFFIC COMPRESSION (confirmed in data): Google AI Overviews (2.5B MAU
         as of mid-2026) and AI Mode (1B MAU) are directly compressing publisher traffic.
         Industry data (Press Gazette, Chartbeat, Reuters Institute):
         - Global publisher Google Search traffic: -33% YoY
         - US publisher Google Search traffic: -38% YoY  
         - Google Discover (global): -21% YoY
         - Google Discover (US): -29% YoY
         - Publisher 3-year traffic outlook: median expects -43% decline by 2029
         - Smaller sites: -60% search referrals in 2 years vs -22% for large publishers
         - Google Network ad revenue (third-party pubs): fell 4% YoY to $6.97B (Q1 2026,
           per Alphabet earnings Apr 29, 2026) — direct financial signal of AIO compression
         - People Inc. (IAC): lost 65% of Google referral traffic (Barry Diller, Q1 call)
         - Pew Research: users seeing AI Overviews are HALF as likely to click any link
         NYT CEO Levien (May 6 earnings call): "operating in a media environment dominated
         by a small number of technologies whose moves continue to impact traffic to
         publishers. The Times isn't immune to that impact."
      
      4. UK CMA AI SEARCH OPT-OUT (Jun 2026): UK Competition and Markets Authority forced
         Google to offer publishers an opt-out from AI search features (AI Overviews, AI Mode,
         AI Overviews in Discover) WITHOUT losing regular search position. "World first"
         regulatory intervention. Testing with UK publishers first, then global rollout.
         Google must also provide clear attribution with inline links. This creates a
         regulatory template that could strengthen NYT's negotiating position with Google.
      
      5. NYT-COMMISSIONED AI ACCURACY STUDY: NYT hired AI startup Oumi to study AI Overview
         accuracy. Found 91% accuracy rate — which at Google's scale produces millions of
         inaccurate summaries per hour. NYT used the study in its journalism to bolster its
         narrative about AI's threat to journalism quality.
      
      ANALYTICAL SIGNIFICANCE: Unlike the Amazon relationship ($70-125M+/yr bilateral),
      the Google relationship is structurally adversarial: NYT depends on Google's ad tech
      for revenue while Google's AI products actively erode NYT's traffic, and Google is
      now conditioning content licensing payments on AI training rights that NYT refuses to
      grant. NYT blocks GoogleBot Extended but cannot block regular GoogleBot without losing
      search visibility. The UK CMA opt-out may change this calculus. The Google board
      connection (Manuel Bronstein, 7-year Google veteran) adds governance dimension.
    date_established: "ongoing"
    source_urls:
      - "https://digiday.com/media/media-briefing-publishers-cautiously-count-ai-licensing-as-notable-revenue-amid-programmatic-strain-in-q1-earnings/"
      - "https://nypost.com/2026/06/26/business/google-looks-to-bleed-publishers-with-new-ai-partnerships-that-would-cull-their-content/"
      - "https://inshorts.com/en/news/google-asks-publishers-to-share-their-work-to-train-ai-or-risk-losing-payouts-report"
      - "https://techcrunch.com/2026/06/04/publishers-will-be-able-to-opt-out-of-ai-search-thanks-to-new-regulation/"
      - "https://memeburn.com/google-ai-overview-statistics-2/"
      - "https://searchenginejournal.com/google-preferred-sources-publisher-ai-partnerships/"
      - "https://fastcompany.com/91345271/google-ai-overviews-publisher-inaccuracies"
    last_updated: "2026-07-01"

  - partner: "Amazon"
    relationship_type: "ai_licensing + affiliate_revenue (COMPOUND)"
    estimated_value: "$70-125M+/year (combined AI licensing + Wirecutter affiliate)"
    description: >
      COMPOUND FINANCIAL RELATIONSHIP — THE DEEPEST IN THE DATASET:
      
      1. AI LICENSING ($20-25M/yr): Multi-year agreement signed May 29, 2025. Amazon
         products (Alexa, etc.) can use summaries and short excerpts from NYT stories
         and recipes. Amazon can train proprietary AI models on NYT content (news,
         Cooking, The Athletic). NYT's FIRST AI content licensing deal — chose Amazon
         over OpenAI (suing) and Microsoft (also named in suit).
      
      2. WIRECUTTER AFFILIATE REVENUE ($50-100M+/yr est.): NYT's Wirecutter product
         review site depends heavily on Amazon's Associates affiliate program. FY2025
         "Affiliate, licensing and other revenues" totaled $308.1M. After subtracting
         Amazon AI licensing (~$13-17M partial year) and other licensing, Wirecutter
         affiliate revenue is likely the largest single component at $50-100M+.
      
      3. AMAZON AFFILIATE COMMISSION CUTS (Mar 2026): Amazon slashed Associates rates
         by up to 50% in March 2026, eliminated milestone tiers. This directly reduces
         NYT's Wirecutter affiliate income — potentially by $15-50M/yr. The cut makes
         the AI licensing deal even more strategically important as the growing Amazon
         revenue stream replacing declining affiliate income.
      
      COMBINED EXPOSURE: NYT's total Amazon dependency may exceed $70-125M/yr —
      making Amazon by far the most financially significant tech company relationship
      for NYT. For context, this is 2.5-4.4% of total NYT revenue ($2,824.9M FY2025).
      
      CEO Meredith Kopit Levien: "It aligns with our deliberate approach to ensuring
      that our work is valued appropriately, whether through commercial deals or through
      the enforcement of our IP rights."
    date_established: "2025-05-29 (AI licensing); ongoing (affiliate)"
    source_urls:
      - "https://digiday.com/media/a-timeline-of-the-major-deals-between-publishers-and-ai-tech-companies-in-2025/"
      - "https://www.livemint.com/technology/amazon-to-pay-new-york-times-at-least-20-million-a-year-in-ai-deal-11724443000000.html"
      - "https://www.adweek.com/media/amazon-associates-affiliate-rate-cuts-publishers/"
      - "https://www.sec.gov/Archives/edgar/data/71691/000007169126000008/pressrelease12312025.htm"

  - partner: "OpenAI"
    relationship_type: "litigation"
    estimated_value: "billions (claimed damages)"
    description: >
      NYT sued OpenAI and Microsoft in Dec 2023 for copyright infringement (Case No.
      1:23-cv-11195, S.D.N.Y., Judge Sidney Stein). Claims billions in statutory/actual
      damages plus permanent injunction and destruction of infringing models/datasets.
      Consolidated with Daily News (Tribune Publishing — NY Daily News, Chicago Tribune,
      etc.) as MDL No. 25-md-03143-SHS-OTW. Magistrate Judge Ona T. Wang handles discovery.
      
      KEY RULINGS (chronological):
      - May 13, 2025: Judge Wang orders OpenAI to preserve ALL output log data that would
        otherwise be deleted, affecting 400M+ users' ChatGPT logs.
      - Jul-Aug 2025: NYT moved to compel 120M chat log sample. OpenAI offered 20M
        anonymized logs (plaintiffs agreed).
      - Oct 2025: OpenAI proposed running search terms over the sample instead of producing
        all 20M logs (privacy argument). Plaintiffs moved to compel full sample.
      - Nov 7, 2025: Judge Wang grants motion to compel full 20M chat log production.
      - Dec 5, 2025: Judge Wang affirms on reconsideration.
      - Jan 6, 2026: Judge Stein affirms Wang's orders, rejects OpenAI's privacy objections.
        Notes OpenAI "did not identify any case law requiring a judge to order the least
        burdensome discovery possible." OpenAI complies with production.
      - Mar 26, 2026: Judge Stein issues 3-page order on motion to dismiss.
      - Apr 4, 2026: Full 43-page opinion explaining MTD ruling:
        * DENIED: OpenAI's time-bar defense — Stein rules OpenAI failed to show NYT should
          have discovered infringement before Dec 27, 2020 (3yr statute of limitations).
          "OpenAI fails to explain why the articles, even if their existence had been known
          to plaintiffs at the time of their publishing, are sufficient to put plaintiffs on
          notice of the particular infringing conduct."
        * DENIED: MTD on direct copyright infringement — NYT's 100+ pages of examples of
          ChatGPT reproducing NYT content survive pleading stage.
        * DENIED: MTD on contributory copyright infringement — plaintiffs "plausibly alleged"
          third-party end-user infringement that OpenAI knew or should have known about.
          Court cites "widely publicised" instances of user-driven infringement.
        * DENIED (Daily News): Federal trademark dilution claims survive — court finds
          NY Daily News, Chicago Tribune marks are "famous" under federal law.
        * GRANTED: DMCA distribution claims dismissed — outputs are "merely excerpts" not
          "copies," and allowing DMCA claims for non-identical outputs would risk
          "boundless DMCA liability."
        * GRANTED: Some unfair competition claims dismissed.
      
      OpenAI response: "Our models empower innovation, and are trained on publicly
      available data and grounded in fair use."
      NYT response: "All of our copyright claims will continue against Microsoft and OpenAI
      for their widespread theft of millions of The Times's works."
      
      MUSK v. ALTMAN CROSS-CASE DISCOVERY (May-Jun 2026):
      - May 21, 2026 (Dkt. 1566): Judge Wang orders OpenAI to produce "the deposition
        materials" from four witness depositions in Musk v. Altman (N.D. Cal.,
        No. 4:24-cv-4722 (YGR)) by 5pm EDT May 22, 2026. Court found plaintiffs
        demonstrated relevance and proportionality. Significant because it forces
        disclosure of internal OpenAI testimony from a SEPARATE case (Elon Musk's
        breach-of-contract/fiduciary-duty suit) into the copyright MDL.
      - May 22, 2026: OpenAI produces the four deposition transcripts by deadline but
        OMITS all accompanying deposition exhibits. NYT reaches out asking about
        compliance; receives no response.
      - May 26, 2026: NYT contacts OpenAI again. OpenAI responds by "incorrectly
        asserting that Plaintiffs did not seek the deposition exhibits and that the
        Court's Order did not require or reference the production of deposition exhibits."
        (Dkt. 1574, 1575). NYT files letter notifying court of non-compliance.
      - Jun 2, 2026 (Dkt. 1584/1409): Judge Wang orders OpenAI to produce exhibits
        "FORTHWITH" with $100/day SANCTIONS if not produced by June 3, 2026 at 5pm
        Eastern. "Without prejudice to any future motion or award of sanctions on this
        or any other issue." Filed in associated cases 25-md-3143 and 23-cv-11195.
        Letter motion signed by Davida Brook, Susman Godfrey LLP (counsel for NYT).
      
      ANALYTICAL SIGNIFICANCE: The Musk v. Altman cross-case discovery is a litigation
      multiplier — testimony and exhibits from OpenAI's separate legal battle with its
      own co-founder are now feeding into the copyright MDL. This is particularly
      valuable because the Musk case involves internal communications about OpenAI's
      corporate transformation from nonprofit to for-profit, AI safety commitments,
      and decision-making processes that may illuminate how training data decisions
      (including use of copyrighted content) were made. OpenAI's pattern of minimal
      compliance (producing transcripts but withholding exhibits, then arguing the order
      didn't require them) and the court's escalation to sanctions signals judicial
      frustration with OpenAI's discovery posture.

      CASCADING LEGAL EFFECTS (Jul 2026):
      - Microsoft shareholder derivative suit (Eric Anderson v. Microsoft Corp. et al.,
        W.D. Washington, filed Jul 1, 2026): alleges Microsoft execs/board concealed that
        AI tools were trained on copyrighted material, causing shareholder damage. This
        lawsuit was CAUSED by the NYT copyright litigation.
      - City of St. Clair Shores securities class action (26-cv-02071, W.D. Washington,
        filed June 15, 2026): separate Microsoft securities fraud action re: Copilot/Azure
        misrepresentations. MSFT stock -10% Jan 28-29 (~$357B market cap erasure).
      
      No trial date set. Discovery ongoing. NYT now analyzing preserved output logs for
      evidence of systemic reproduction of copyrighted content. OpenAI approved internally
      by NYT staff via non-ChatGPT API (irony noted).
