  - type: "expanding_coalition"
    description: >
      Richner Communications, Inc. v. Microsoft Corp., S.D.N.Y., No. 1:26-cv-05320,
      filed June 24, 2026. Nearly 400 local and regional newspapers vs. OpenAI + Microsoft.
      Led by Platkin LLP (former NJ AG Matthew Platkin). Claims: copyright infringement +
      DMCA violations. Alleges defendants crawled publisher websites, copied articles onto
      their own systems, removed copyright management information, and reproduced content
      in AI responses without authorization or compensation. Seeks statutory damages +
      injunctive relief. Platkin quoted: 'This lawsuit is not about stopping AI innovation,
      but ensuring that innovation happens fairly and within the bounds of the law.'
      SIGNIFICANCE: This is the LARGEST legal effort by local/regional newspapers. Filed in
      same SDNY court as NYT case. Together with NYT (Dec 2023) + Alden Global Capital
      newspapers (Apr 2024) + CNN v Perplexity (2025) + Britannica/Merriam-Webster v
      OpenAI (2025), the coalition now encompasses 400+ individual newspaper titles. NYT's
      first-mover litigation is validated — local publishers are following its lead rather
      than choosing licensing deals. OpenAI response via Drew Pusateri: models 'trained on
      publicly available data, based on fair use and designed to support innovation.'
