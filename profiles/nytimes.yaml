      FRONT 2 — Perplexity AI (1:25-cv-10106, Judge Preska): Filed Dec 5, 2025. Separate
      from MDL. Discovery opened Mar 25, 2026. Fact discovery through Feb 26, 2027; SJ
      motions Sep 15, 2027. Novel "no volition" defense from Perplexity (based on Cartoon
      Network v. CSC Holdings). Trademark infringement/dilution claims deployed for first
      time in NYT AI litigation (hallucination attribution theory).
      
      NYT is now the most aggressive litigant in the publisher-vs-AI space: suing both
      the largest AI company (OpenAI/Microsoft) and the leading AI search startup
      (Perplexity) in separate proceedings with distinct legal strategies.
