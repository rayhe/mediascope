# ===================================================================
# KNOWN CONFLICTS — expanded 2026-06-22
# ===================================================================
known_conflicts:
  - type: "litigation"
    description: >
      Actively suing OpenAI and Microsoft for copyright infringement (Case 1:23-cv-11195,
      S.D.N.Y., filed Dec 2023). Claims billions in damages. Simultaneously building
      internal AI products (Echo, Stet, Cheat Sheet) and licensing to Amazon for
      $20-25M/yr. Discovery phase ongoing: landmark preservation order forcing
      OpenAI to retain 400M+ users' ChatGPT logs (May 2025, affirmed Jun 2025).
      No trial date set. NYT's legal team is now searching preserved output logs.
    severity: 5
    evidence: "Court filings, SEC disclosures, Mondaq analysis"
    source_urls:
      - "https://nytco-assets.nytimes.com/2023/12/NYT_Complaint_Dec2023.pdf"
      - "https://www.mondaq.com/unitedstates/new-technology/1650832/"
  - type: "competitive"
    description: >
      NYT's dual AI strategy creates structural conflict: suing OpenAI/Microsoft for
      using NYT content without payment, while licensing same content to Amazon ($20-25M/yr)
      and using OpenAI's own non-ChatGPT API internally. Incentive structure: frame
      AI companies as IP thieves (supports lawsuit), while monetizing content through
      'approved' channels. Covers AI industry as plaintiff, not neutral observer.
    severity: 5
    evidence: "Amazon deal announcement May 2025, internal AI tools approval Feb 2025, lawsuit ongoing"
    source_urls:
      - "https://digiday.com/media/nyts-amazon-deal-signals-a-new-wave-of-publisher-partnerships/"
      - "https://techcrunch.com/2025/02/17/the-new-york-times-has-greenlit-ai-tools-for-product-and-edit-staff/"
  - type: "revenue"
    description: >
      Depends on Google for significant programmatic ad revenue (total digital ads
      $93.3M in Q1 2026 alone) while covering Google critically. Google also signed
      AI pilot partnerships with publishers in Dec 2025 — NYT conspicuously absent.
    severity: 3
    evidence: "Q1 2026 10-Q filing, digital advertising revenue reporting"
    source_url: "https://www.zacks.com/stock/news/2473290/the-new-york-times-q1-earnings-beat-on-digital-ads-subscriber-growth"
  - type: "no_meta_counterweight"
    description: >
      Zero financial relationship with Meta — no advertising, no licensing, no partnership.
      Meta signed AI licensing deals with 7 other publishers in Dec 2025 but not NYT.
      This means NYT's critical Meta coverage has absolutely no financial counterweight
      or "client-sparing" incentive. Compare: Amazon ($70-125M+/yr compound) gets softer
