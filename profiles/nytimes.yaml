# ===================================================================
# WIRECUTTER & AFFILIATE REVENUE — new section, 2026-06-24
# ===================================================================
wirecutter_affiliate_revenue:
  description: >
    NYT acquired Wirecutter (product review site) in October 2016 for ~$30M. Wirecutter
    generates revenue primarily through Amazon Associates affiliate links — readers click
    product recommendations, buy on Amazon, and NYT earns a commission. NYT reports this
    as part of "Affiliate, licensing and other revenues" alongside AI licensing deals and
    miscellaneous income.
  acquisition_price: "$30M (October 2016)"
  revenue_history:
    - period: "FY2018"
      affiliate_licensing_other: "~$20M+ from Wirecutter alone (per NYT disclosures, Ahrefs analysis)"
      notes: "Wirecutter generated $20M+ in 2018, paying back the $30M acquisition within ~3 years."
      source_url: "https://ahrefs.com/blog/wirecutter-seo-case-study/"
    - period: "FY2024"
      affiliate_licensing_other: "$291.4M (total Affiliate, licensing and other — includes Wirecutter + all licensing)"
      source_url: "https://www.sec.gov/Archives/edgar/data/71691/000007169126000008/pressrelease12312025.htm"
    - period: "FY2025"
      affiliate_licensing_other: "$308.1M (total, +5.7% YoY)"
      quarterly_breakdown: "Q1: ~$69.9M, Q2: $70.5M, Q3: ~$67.5M, Q4: $100.2M"
      notes: >
        Q4 spike driven by holiday shopping season (affiliate revenue is highly seasonal).
        FY2025 press release states growth driven by "higher Wirecutter affiliate referral
        revenues and licensing revenues." Amazon AI licensing deal ($20-25M/yr, started May
        2025) contributed ~$13-17M in FY2025 (partial year).
      source_url: "https://www.sec.gov/Archives/edgar/data/71691/000007169126000008/pressrelease12312025.htm"
  revenue_share_of_total: "10.9% of total FY2025 revenues ($308.1M / $2,824.9M)"
  amazon_dependency: >
    Wirecutter's revenue is heavily dependent on Amazon's Associates affiliate program.
    While Wirecutter links to multiple retailers (Best Buy, Target, etc.), Amazon has
    historically been the dominant revenue source — the CJR reported that at NY Magazine's
    Strategist (a Wirecutter competitor), "more than 80 percent" of affiliate revenue came
    from Amazon. Wirecutter has diversified more than competitors, but Amazon remains
    the largest single affiliate partner by a wide margin due to Amazon's catalog breadth,
    conversion rates, and (until March 2026) generous commission structure.
  source_urls:
    - "https://www.sec.gov/Archives/edgar/data/71691/000007169126000008/pressrelease12312025.htm"
    - "https://ahrefs.com/blog/wirecutter-seo-case-study/"
    - "https://cjr.org"
    - "https://digiday.com/media/wirecutter-tests-new-content-on-different-platforms-to-increase-affiliate-revenue/"

amazon_affiliate_commission_cuts_2026:
  description: >
    CRITICAL RISK FACTOR: Amazon quietly restructured its Associates program in early 2026,
    slashing commission rates by up to 50%, eliminating milestone-based bonus tiers, and
    degrading reporting tools. Changes began rolling out in Asia-Pacific markets in late 2025
    and hit the U.S. around March 9, 2026. NEVER publicly announced — publishers learned
    from individual Amazon account manager conversations.
  key_changes:
    - "Premium commission rates (up to 10%) reset to 4-5%"
    - "Milestone-based incentive tiers eliminated for most publishers"
    - "Year-over-year performance bonuses gutted in some categories"
    - "Reporting tools degraded (less data for optimization)"
  impact: >
    One deal-site publisher revised its 2026 Amazon revenue forecast down by 50%.
    Seven publishers and partners confirmed the changes to Adweek. Amazon spokesperson:
    "We value our affiliate partnerships and provide highly competitive commissions—these
    changes affect a tiny fraction of associates."
  nyt_exposure: >
    NYT/Wirecutter is among the world's largest Amazon affiliate publishers. If Wirecutter
    generates ~$50-100M+ annually in Amazon affiliate revenue (estimated from the $308.1M
    "Affiliate, licensing and other" line minus licensing), a 30-50% cut in Amazon
    commissions could cost NYT $15-50M+ per year. This would make the Amazon AI licensing
    deal ($20-25M/yr) an even more critical revenue relationship — potentially the ONLY
    growing Amazon revenue stream as affiliate income declines. The timing is notable:
    Amazon signed the AI licensing deal (May 2025) and then cut affiliate commissions
    (March 2026), shifting the NYT-Amazon financial relationship from primarily transactional
    (affiliate commissions) to primarily strategic (AI licensing).
  source_url: "https://www.adweek.com/media/amazon-associates-affiliate-rate-cuts-publishers/"
  date: "2026-03-09 (US rollout)"

# ===================================================================
# REVENUE RELATIONSHIPS — significantly expanded 2026-06-22
# ===================================================================
revenue_relationships:
  - partner: "Google"
    relationship_type: "advertising"
    estimated_value: "significant (programmatic ad revenue)"
    description: >
      Google is major programmatic ad partner. Complex relationship: NYT depends
      on Google for significant ad revenue while covering Google critically.
      NYT digital ad revenue hit $93.3M in Q1 2026 alone (+31.6% YoY),
      significant portion flows through Google's ad tech stack.
    date_established: "ongoing"
    source_url: ""

  - partner: "Amazon"
    relationship_type: "ai_licensing + affiliate_revenue (COMPOUND)"
    estimated_value: "$70-125M+/year (combined AI licensing + Wirecutter affiliate)"
    description: >
      COMPOUND FINANCIAL RELATIONSHIP — THE DEEPEST IN THE DATASET:
      
      1. AI LICENSING ($20-25M/yr): Multi-year agreement signed May 29, 2025. Amazon
         products (Alexa, etc.) can use summaries and short excerpts from NYT stories
         and recipes. Amazon can train proprietary AI models on NYT content (news,
         Cooking, The Athletic). NYT's FIRST AI content licensing deal — chose Amazon
         over OpenAI (suing) and Microsoft (also named in suit).
      
      2. WIRECUTTER AFFILIATE REVENUE ($50-100M+/yr est.): NYT's Wirecutter product
         review site depends heavily on Amazon's Associates affiliate program. FY2025
         "Affiliate, licensing and other revenues" totaled $308.1M. After subtracting
         Amazon AI licensing (~$13-17M partial year) and other licensing, Wirecutter
         affiliate revenue is likely the largest single component at $50-100M+.
      
      3. AMAZON AFFILIATE COMMISSION CUTS (Mar 2026): Amazon slashed Associates rates
         by up to 50% in March 2026, eliminated milestone tiers. This directly reduces
         NYT's Wirecutter affiliate income — potentially by $15-50M/yr. The cut makes
         the AI licensing deal even more strategically important as the growing Amazon
         revenue stream replacing declining affiliate income.
      
      COMBINED EXPOSURE: NYT's total Amazon dependency may exceed $70-125M/yr —
      making Amazon by far the most financially significant tech company relationship
      for NYT. For context, this is 2.5-4.4% of total NYT revenue ($2,824.9M FY2025).
      
      CEO Meredith Kopit Levien: "It aligns with our deliberate approach to ensuring
      that our work is valued appropriately, whether through commercial deals or through
      the enforcement of our IP rights."
    date_established: "2025-05-29 (AI licensing); ongoing (affiliate)"
    source_urls:
      - "https://digiday.com/media/a-timeline-of-the-major-deals-between-publishers-and-ai-tech-companies-in-2025/"
      - "https://www.livemint.com/technology/amazon-to-pay-new-york-times-at-least-20-million-a-year-in-ai-deal-11724443000000.html"
      - "https://www.adweek.com/media/amazon-associates-affiliate-rate-cuts-publishers/"
      - "https://www.sec.gov/Archives/edgar/data/71691/000007169126000008/pressrelease12312025.htm"

  - partner: "OpenAI"
    relationship_type: "litigation"
    estimated_value: "billions (claimed damages)"
    description: >
      NYT sued OpenAI and Microsoft in Dec 2023 for copyright infringement (Case No.
      1:23-cv-11195, S.D.N.Y.). Claims billions in statutory/actual damages. Alleges
      millions of NYT articles used to train GPT models without permission. As of
      mid-2026: discovery phase ongoing, no trial date set. Key rulings: Judge Stein
      denied OpenAI's motion to dismiss (Apr 2025); Magistrate Judge Wang issued
      sweeping preservation order for ChatGPT output logs affecting 400M+ users
      (May 2025); Judge Stein affirmed preservation order (Jun 2025). NYT now
      searching preserved logs for evidence of users generating infringing articles.
      Consolidated with Author Actions (Authors Guild v. OpenAI, etc.) for pretrial.
      OpenAI approved internally by NYT staff via non-ChatGPT API (irony noted).
    date_established: "2023-12"
    source_url: "https://nytco-assets.nytimes.com/2023/12/NYT_Complaint_Dec2023.pdf"
    supplementary_sources:
      - "https://www.mondaq.com/unitedstates/new-technology/1650832/from-copyright-case-to-ai-data-crisis-how-the-new-york-times-v-openai-reshapes-companies-data-governance-and-ediscovery-strategy"
      - "https://www.courtlistener.com/docket/68117049/1/the-new-york-times-company-v-microsoft-corporation/"

  - partner: "Apple"
    relationship_type: "former_partnership_and_ongoing_selective"
    estimated_value: "minimal direct"
    description: >
      NYT ENDED its Apple News partnership in June 2020. Never joined Apple News+.
      COO Levien: "Our relationship with Apple News does not fit within these
      parameters" (re: building direct subscriber relationships). Apple keeps readers
      in-app, unlike Google News which sends them to publisher sites. As of late 2025,
      NYT joined Apple Podcasts subscription program (The Daily, Hard Fork, etc.) —
      paywalling older episodes behind subscription. Only Wirecutter and The Athletic
      available on ad-backed Apple News. Apple approached publishers with multi-year
      $50M AI licensing deals (Dec 2024 per INMA) — unclear if NYT is negotiating.
    date_established: "2015 (original); ended 2020-06-29; podcasts 2025-10"
    source_url: "https://www.thestreet.com/technology/nytimes-ends-partnership-with-apple-news"
    supplementary_source: "https://9to5mac.com/2025/09/24/apple-podcasts-adds-the-new-york-times-to-subscription-program/"

  - partner: "Meta"
    relationship_type: "no_relationship"
    estimated_value: "$0"
    description: >
      Meta has NO revenue relationship with The New York Times. Meta signed AI
      content licensing deals with 7 publishers in Dec 2025 (CNN, Fox News,
      People Inc., USA Today Co., etc.) but NYT was not among them. NYT's
      adversarial editorial posture toward Meta (Sheera Frenkel's "An Ugly Truth,"
      Mike Isaac's deep sourcing) makes a licensing deal unlikely. Zero advertising
      partnership, zero licensing — NYT coverage of Meta has no financial counterweight.
    date_established: "n/a"
    source_url: "https://digiday.com/media/a-timeline-of-the-major-deals-between-publishers-and-ai-tech-companies-in-2025/"
    notes: "Meta signed with 7 publishers Dec 5 2025, NYT conspicuously absent"

