  THE EXPANDING WAVE:
  - Dec 2023: NYT sues (1 publisher)
  - Apr 2024: Alden Global Capital/Daily News papers join (8 publishers)
  - 2024-2025: Individual suits accumulate (Authors Guild, Getty, etc.)
  - 2025: CNN v Perplexity, Britannica/Merriam-Webster v OpenAI
  - Jun 24, 2026: ~400 local/regional newspapers file Richner v. Microsoft (SDNY 1:26-cv-05320)
  - Total: 16 consolidated SDNY cases + expanding coalition = 400+ newspaper titles suing
  
  The publishers that chose licensing are becoming MORE ISOLATED as the litigation wave grows.
  Sources: Reuters (Dec 2025 chat logs), Bloomberg Law (Jun 2026 400-newspaper suit),
