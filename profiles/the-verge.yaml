# AI LICENSING LANDSCAPE — added 2026-07-10 (Type C: Ownership & Funding)
# ===================================================================
ai_licensing_landscape:
  snowflake_cortex_knowledge_extensions:
    description: >
      LANDSCAPE DEVELOPMENT (Digiday, May 29, 2026): Snowflake launched Cortex Knowledge Extensions,
      a monetized RAG pipeline that lets enterprises query publisher content inside Snowflake's AI
      environment. 17 publishers signed on, including The Washington Post, Associated Press (AP),
      People Inc., and USA Today Network. Financial Times and The Economist expressed interest.
      Publishers are closing "six-figure deals" with financial institutions. Contracts structured
      as flat-fee licenses or usage-based access, often paid from enterprise customers' existing
      multi-year Snowflake spending commitments (pre-paid credit pools). Snowflake takes NO revenue
      share — charges on compute/storage only, positioning itself as a no-middleman alternative
      to platforms that skim content fees.

      KEY QUOTES:
      - Ben Srour, Principal Product Manager, Snowflake: "You cannot scrape the data — you can't
        steal it and use it for model training. So that's why the product has really resonated with
        publishers."
      - Prasanna Krishnan, Head of Collaboration and Horizon, Snowflake: Cortex is how enterprises
        combine their own sensitive data with outside news "from outside your own four walls" so
        staff or agents can make better decisions.

      RELEVANCE TO THE VERGE/PMC:
      Neither Condé Nast, PMC, nor any of the 5 MediaScope-tracked publications are among the 17
      named Snowflake Cortex publishers. This is notable because:
      (a) The Verge's parent PMC already has AI licensing relationships via the OpenAI/Vox Media
          content deal (May 2024) and the Azure OpenAI enterprise agreement — both with Meta's
          direct AI competitors. The absence from Snowflake's publisher-neutral marketplace may
          suggest PMC prefers bilateral deals with specific AI companies (OpenAI) over neutral
          marketplace distribution.
      (b) The Snowflake Cortex model is structurally different from the OpenAI/publisher licensing
          model: it's enterprise-to-publisher RAG access, not model training. Publishers retain
          more control, and the marketplace operator (Snowflake) takes no content fee.
      (c) The growing AI licensing marketplace creates a new revenue landscape where publishers
          monetize content for enterprise AI without ceding training rights — a dynamic that will
          increasingly shape how tech publications cover AI companies. Publications that have
          bilateral deals with specific AI companies (like The Verge/PMC with OpenAI) face a
          different incentive structure than those distributing via neutral marketplaces.

      INFRASTRUCTURE CONTEXT: Snowflake agreed to spend $6B over five years on AWS custom chips
      and AI infrastructure (May 2026, CNBC), underscoring how much of its growth story hinges
      on AI workloads.
    source_urls:
      - "https://digiday.com/media/publishers-quietly-cut-six-figure-deals-via-snowflakes-ai-licensing-platform/"
      - "https://www.cnbc.com/snowflake-6-billion-aws-deal/"
    last_updated: "2026-07-10"

