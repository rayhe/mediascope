  - name: "Eldridge Industries, LLC"
    entity_type: "jv_partner"
    description: >
      Private investment firm co-founded by Todd L. Boehly. HQ: 600 Steamboat Road, Floor 2,
      Greenwich, CT 06830. 5,000+ employees. 100+ operating business investments.

      RELATIONSHIP TO PMC:
      Eldridge is PMC's joint venture partner via "Penske Media Eldridge" (PME), a PMC subsidiary.
      PME was formed ~2020 when Boehly and Jay Penske created a JV to manage entertainment media
      publications (Billboard, Rolling Stone, The Hollywood Reporter, Variety, Music Business
      Worldwide). In January 2023, PME acquired Dick Clark Productions from the unwound Valence
      Media/MRC structure. PME also controls SXSW (50%→majority via additional 1% in Aug 2023),
      Life is Beautiful Music & Art Festival, ATX TV Festival, and LA3C.

      This makes Eldridge a structural co-owner of the entertainment infrastructure layer that
      surrounds PMC's editorial brands, including The Verge. While Eldridge does not directly own
      The Verge (which sits in PMX, not PME), the JV creates shared commercial incentives: PME
      events (SXSW, Golden Globes, AMAs, Billboard Music Awards, NYE Rockin' Eve) are promotional
      platforms for PMX editorial brands, and vice versa.

      TODD L. BOEHLY (born ~1975, Co-founder, Chairman, CEO of Eldridge Industries):
      - BBA from College of William & Mary; studied at London School of Economics
      - Previously: President of Guggenheim Partners, founded Guggenheim's credit business
      - Net worth: estimated billions (private, not publicly disclosed)

      SPORTS OWNERSHIP:
      - Chelsea Football Club: Chairman and co-owner (acquired May 30, 2022 for ~$5.3B with
        BlueCo consortium — Mark Walter, Hansjörg Wyss, Clearlake Capital). Boehly was interim
        sporting director Jun-Jan 2023. Chelsea won FIFA Club World Cup 2025.
      - Los Angeles Dodgers: co-owner (part of Guggenheim Baseball Management consortium)
      - Los Angeles Lakers: co-owner and board member
      - Los Angeles Sparks: co-owner (WNBA)
      - Trent Rockets: owner (The Hundred cricket, England)
      - Eldridge Industries + Arctos Partners manage a fund investing in North American sports
        leagues and entertainment companies (as of 2026)

      BOARD SEATS: LA Lakers, Flexjet, PayActiv, CAIS, Chelsea FC, Cain, Vivid Seats (NASDAQ: SEAT).
      Former boards: Truebill (sold to Rocket Mortgage), DraftKings, Kennedy Wilson (NYSE: KW).

      KEY PORTFOLIO HOLDINGS:
      - Security Benefit: Life insurance company, Boehly is Chairman. Eldridge's largest financial
        services asset. Formerly Guggenheim SBC Holdings structure, reorganized under Eldridge 2017.
      - A24: Indie film studio, Eldridge provided seed funding in 2012. Still minority stakeholder
        (after $225M Stripes-led 2022 raise, founders/employees maintain significant majority).
        A24 was valued at $3.5B (New Yorker, 2025). A24's lead investor Thrive Capital is also
        a major backer of OpenAI — A24 courted Thrive specifically for AI connections (A24 Labs
        initiative, head: Scott Belsky). 87 Academy Award nominations, 21 wins. First studio to
        win top 6 Oscars in one year (2023, Everything Everywhere All at Once).
      - Fulwell Entertainment: entertainment production company
      - Gamma: Largest investor in Larry Jackson's music company; followed by A24 and Apple.
        Gamma acquired Vydia (music distribution) and expanded to Africa/Middle East.
      - Vivid Seats (NASDAQ: SEAT): Eldridge-backed SPAC (Horizon Acquisition Corp, $544M IPO)
        brought Vivid Seats public ~2021 at ~$2B enterprise value. Boehly on board.
        Current: $6.75/share, market cap ~$77M (Jul 7, 2026). Q1 2026: revenue $125.8M (down 23%
        YoY), net loss $14.6M. 565 employees (down 26% YoY). Marketplace GOV down 25%.
        Partners include Rolling Stone (PMC property) — circular commercial relationship.
      - Laylo (fan engagement), Viral Nation (influencer marketing), Fixated (content creation)
      - Invested in Dick Clark's New Year's Rockin' Eve (renewed with ABC through 2029)

      MEDIA EXPANSION AMBITIONS:
      - March 2025: Considered bid for National World PLC (publisher of The Scotsman, Yorkshire Post)
        via Eldridge Media Holdings (EMH). Shares rose 4.6% on news. National World had existing
        21p/share offer from Media Concierge.
      - Same period: Reported in talks with David Montgomery about joint offer for Daily Telegraph.
      - Pattern: Boehly is expanding his media empire beyond the PMC JV, specifically targeting
        British newspaper publishers — a market where editorial independence concerns are acute.

      CHELSEA FC × TECH COMPANIES:
      - Infinite Athlete: Chelsea's front-of-shirt sponsor (£40M deal). Parent of Tempus Ex Machina.
        Investors include Clearlake Capital (Chelsea co-owner) and Eldridge (Boehly). Silver Lake
        also invested — Silver Lake holds stake in City Football Group AND Fanatics. Clearlake and
        Eldridge are also major Fanatics investors. Premier League scrutinized these cross-ownership
        ties before approving the deal.
      - Chelsea has 200M+ combined digital reach globally — a significant advertising platform for
        tech companies including Meta (Quest ads, gaming sponsorships, Instagram/Facebook marketing).
      - Twilio: Multi-year fan engagement partnership (announced ~2025)
      - EA Sports: Partnership for Chelsea men's and women's teams

      CONFLICT SIGNIFICANCE:
      Eldridge's cross-holdings create a web of undisclosed conflicts relevant to The Verge's
      editorial coverage:
      1. A24 → Thrive Capital → OpenAI: Eldridge's portfolio company A24 explicitly sought
         OpenAI's backer as investor. This creates an indirect but real financial interest in
         OpenAI ecosystem success — compounding The Verge's existing direct OpenAI licensing deal.
      2. Chelsea FC → advertising relationships with major tech companies The Verge covers.
      3. Vivid Seats → Rolling Stone (PMC property) partnership creates circular commercial flow.
      4. Sports ownership (Dodgers, Lakers, Chelsea) → massive advertising/sponsorship relationships
         with tech companies (streaming, social media, VR) that The Verge covers editorially.
      5. Security Benefit → financial services company whose business intersects with fintech
         companies The Verge covers.
      None of these cross-holdings have been disclosed in any Verge article as of July 2026.
