# ===================================================================
# KNOWN CONFLICTS OF INTEREST
# ===================================================================
known_conflicts:
  - type: "revenue"
    description: >
      Vox Media (The Verge's parent at the time) signed a multi-year content licensing deal with
      OpenAI on May 29, 2024, giving OpenAI access to The Verge's full archives and current content
      for AI model training. OpenAI is Meta's direct competitor in AI (ChatGPT vs Meta AI, Llama).
      The Verge receives financial benefit from OpenAI's success. Meta has NOT signed any AI content
      licensing deal with Vox Media or PMC as of July 2026. This creates the same structural revenue
      asymmetry identified at Condé Nast: every major Meta AI competitor pays The Verge's parent
      for content; Meta does not. No Verge article covering Meta AI has disclosed this financial
      relationship with Meta's competitor.
    severity: 4
    evidence: "Reuters May 29 2024, TechCrunch June 5 2024, Vox Union WGAE statement"
    source_urls:
      - "https://www.reuters.com/technology/openai-signs-content-deals-with-atlantic-vox-media-2024-05-29/"
      - "https://techcrunch.com/2024/06/05/whats-in-it-for-us-journalists-ask-as-publications-sign-content-deals-with-ai-firms/"

  - type: "litigation"
    description: >
      PMC (The Verge's current parent) and Vox Media (prior parent) are both suing Google for ad tech
      antitrust damages. Google competes with Meta in search, advertising, AI, and wearables. The
      Verge disclosed the lawsuit on the Vergecast ("Disclosure is our brand") but the adversarial
      financial relationship with Google creates complex incentive structures. Coverage of Google vs
      Meta dynamics — including smart glasses competition (Android XR vs Meta Ray-Ban) — occurs in the
      context of an active lawsuit against Google. This could cut either direction: adversarial framing
      of Google (litigation opponent) or sympathetic framing of Google as a counterbalance to Meta.
    severity: 3
    evidence: "thecurrent.com Dec 2025, Vergecast Jan 2026 disclosure"
    source_url: "https://thecurrent.com/story/the-atlantic-penske-media-vox-sue-google-ad-auction"

  - type: "political"
    description: >
      Jay Penske's father Roger Penske received the Presidential Medal of Freedom from Trump (2019),
      donated $1.1M+ to Trump-aligned political efforts (2024 cycle), and shifted from anti-Trump
      (2016) to pro-Trump after the medal. Insiders at multiple PMC brands report a "quiet realignment"
      toward more conservative editorial positioning under PMC ownership. At SXSW (PMC-owned), staff
      were reportedly directed to bring more conservative voices. This political dimension is relevant
      to coverage of tech regulation, Section 230, and platform governance — all areas The Verge covers
      extensively. If PMC's political alignment influences editorial direction (as reported at other
      PMC properties), it could modulate The Verge's historically strong editorial voice on regulation.
    severity: 3
    evidence: "Medium/Steve Rosenbaum SXSW analysis, FEC donation records, Medal of Freedom citation"
    source_urls:
      - "https://stevenrosenbaum.medium.com/jay-penske-takes-control-of-sxsw"

  - type: "ownership_transition"
    description: >
      The Verge underwent a major ownership transition in 2026: Vox Media (Jim Bankoff, independent)
      → PMC/PMX (Jay Penske). This is the publication's first ownership change since founding in 2011.
      The transition coincides with the Murdoch/Lupa split that separated New York Magazine, Vox.com,
      and the podcast network from The Verge's new PMX home. The Verge's editorial independence under
      PMC is untested. PMC's track record at other acquisitions (Rolling Stone, Variety, Billboard,
      SXSW) shows a pattern of "editorial independence shrinking, advertiser influence growing"
      (per Medium/Rosenbaum analysis). This is a live variable — The Verge under PMC may editorially
      diverge from The Verge under Vox Media.
    severity: 4
    evidence: "PMC acquisition announcement June 2026, Vox Media press releases"
    source_urls:
      - "https://www.voxmedia.com/2026/6/19/pmc-acquires-vox-media-brands"

  - type: "competitive"
    description: >
      PMC's portfolio includes entertainment trade publications (Variety, Hollywood Reporter, Deadline,
      Rolling Stone, Billboard) that have significant advertising and event relationships with major
      tech companies including Meta. Meta is a major advertiser in the entertainment industry (Meta
      Quest, Ray-Ban Meta campaigns) and sponsors events. PMC's events business (300+ events/year
      including Golden Globes, SXSW) creates commercial relationships with the same companies The
      Verge covers editorially. The separation between PMX editorial and PMC commercial functions
      is untested.
    severity: 3
    evidence: "PMC portfolio, Dick Clark Productions ownership, SXSW ownership"

# ===================================================================
# LITIGATION CONNECTIONS
# ===================================================================
litigation_connections:
  - type: "plaintiff_ai_overviews"
    description: >
      PMC v. Google LLC and Alphabet Inc., No. 1:25-cv-03192-APM (D.D.C.).
      Filed September 13, 2025 — first major US publisher lawsuit targeting Google AI Overviews.
      Six counts under Sherman Act: reciprocal dealing (§1, §2), monopoly leveraging,
      monopolization, attempted monopolization, and common-law unjust enrichment.
      Google filed motion to dismiss January 13, 2026, calling suit "legally defective in every way."
      Google argues: AI Overviews are part of search (not separate product), content is non-rivalrous,
      booming AI licensing market undermines foreclosure claims, no referral traffic guarantees.
      PMC's counsel: Susman Godfrey (Ian Crosby, Davida Brook, Geng Chen).
      Google's counsel: WilmerHale (Sonal Mehta, David Gringer).
      Status as of July 2026: motion to dismiss pending.
    case_reference: "PMC v. Google LLC, 1:25-cv-03192-APM (D.D.C.)"
    source_urls:
