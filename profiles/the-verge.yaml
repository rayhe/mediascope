      2. SPORTS OWNERSHIP → TECH ADVERTISING:
      Boehly's ownership of Chelsea FC, LA Dodgers, LA Lakers, and LA Sparks creates massive
      advertising/sponsorship relationships with tech companies The Verge covers editorially.
      Chelsea alone has 200M+ digital reach. These sports properties are advertising platforms
      for Meta (Quest ads, Instagram/Facebook marketing), Apple (Apple TV+), Google (YouTube TV),
      Amazon (Prime Video Sports), and other tech companies. Coverage of these companies occurs
      in the context of their being advertisers to Boehly's sports properties.

      3. VIVID SEATS (VSEAT) → ROLLING STONE (PMC):
      Boehly sits on Vivid Seats' board. VSEAT is an Eldridge-backed SPAC company. Vivid Seats
      partners with Rolling Stone (a PMC property) for live event promotions. This creates a
      circular commercial relationship: Eldridge → VSEAT → PMC property (Rolling Stone) → PMC/PMX
      (The Verge's parent). Live event ticketing coverage in any PMX publication occurs in this
      context.

      4. CHELSEA FC × INFINITE ATHLETE × CLEARLAKE × SILVER LAKE:
      Chelsea's front-of-shirt sponsor Infinite Athlete (£40M deal) has investors including
      Clearlake Capital (Chelsea co-owner) and Eldridge (Boehly). Silver Lake also invested —
      Silver Lake holds stakes in City Football Group AND Fanatics. Clearlake and Eldridge are
      also major Fanatics investors. The Premier League scrutinized these cross-ownership ties
      before approving the deal. This creates a tightly interconnected sports-tech-finance nexus
      involving The Verge's ultimate beneficial owners.

      DISCLOSURE STATUS: None of these Eldridge cross-holdings have been disclosed in any Verge
      article as of July 2026. The Verge discloses the Google lawsuit ("Disclosure is our brand")
      but not the broader Eldridge/Boehly financial web. This is significant because Eldridge is
      not a passive investor — it is PMC's active JV partner, with shared economic interests in
      SXSW, Dick Clark Productions, and the broader entertainment events business.
    severity: 4
    evidence: >
      eldridgeind.com (Boehly bio), Wikipedia (Todd Boehly), SEC SPAC filings (Horizon Acquisition),
      New Yorker A24 profile (2025, Thrive/OpenAI connection), Sportcal (Infinite Athlete/Clearlake/
      Eldridge cross-ownership), MarketBeat (VSEAT financials), Reuters (National World bid)
    source_urls:
