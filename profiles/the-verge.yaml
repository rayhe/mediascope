# ===================================================================
# LITIGATION CONNECTIONS
# ===================================================================
litigation_connections:
  - type: "plaintiff_ai_overviews"
    description: >
      PMC v. Google LLC and Alphabet Inc., No. 1:25-cv-03192-APM (D.D.C.).
      Filed September 13, 2025 — first major US publisher lawsuit targeting Google AI Overviews.
      Six counts under Sherman Act: reciprocal dealing (§1, §2), monopoly leveraging,
      monopolization, attempted monopolization, and common-law unjust enrichment.
      Google filed motion to dismiss January 13, 2026, calling suit "legally defective in every way."
      Google argues: AI Overviews are part of search (not separate product), content is non-rivalrous,
      booming AI licensing market undermines foreclosure claims, no referral traffic guarantees.
      PMC's counsel: Susman Godfrey (Ian Crosby, Davida Brook, Geng Chen).
      Google's counsel: WilmerHale (Sonal Mehta, David Gringer).
      Status as of July 2026: motion to dismiss pending.
    case_reference: "PMC v. Google LLC, 1:25-cv-03192-APM (D.D.C.)"
    source_urls:
      - "https://www.reuters.com/legal/litigation/google-defends-ai-search-summaries-rolling-stone-publishers-lawsuit-2026-01-13/"
      - "https://techcrunch.com/2025/09/13/rolling-stone-owner-penske-media-sues-google-over-ai-summaries/"
      - "https://www.thefashionlaw.com/google-urges-court-to-toss-pmc-challenge-to-ai-overviews/"

  - type: "plaintiff_ad_tech"
    description: >
      PMC and SheMedia v. Google (S.D.N.Y., filed January 2026).
      Alleges Google illegally monopolized publisher ad-server and ad-exchange markets,
      manipulated real-time ad auctions using "Last Look," "Minimum Bid to Win," and related
      schemes to see rivals' bids before submitting its own, keeping prices artificially low.
      SheMedia operates advertising network for ~1,800 websites, particularly vulnerable as
      they rely heavily on digital ads. Seeks damages and injunctive relief.
      Builds on 2025 EDVA federal court ruling that Google holds unlawful monopolies in two
      ad tech markets (remedies phase ongoing). Part of wave of publisher suits (The Atlantic,
      Business Insider, People Inc., Slate filed separately).
    case_reference: "PMC & SheMedia v. Google (S.D.N.Y., filed Jan 2026)"
    source_urls:
      - "https://www.thewrap.com/penske-media-sues-google-digital-ad-market-manipulation/"
      - "https://thecurrent.com/story/the-atlantic-penske-media-vox-sue-google-ad-auction"

  - type: "related_google_doj_search_antitrust"
    description: >
      US v. Google (D.D.C.) — DOJ search monopoly case. Judge Amit P. Mehta (SAME JUDGE as PMC
      AI Overviews case, No. 1:25-cv-03192-APM) issued remedies ruling September 2, 2025.
      Key holdings:
      - No Chrome divestiture, no Android divestiture (DOJ's most aggressive asks rejected)
      - Banned exclusive contracts for Chrome, Search, Google Assistant, and Gemini app
      - Google must share certain search index and user-interaction data with competitors
      - Google must offer search/ads syndication services to enable rival competition
      - Gemini AI app explicitly covered by exclusive-contract ban (GenAI-forward remedies)
      - Mehta noted GenAI disruption influenced remedies, citing "humility" in changing markets
      - GOOGL +7.2% on ruling; AAPL +3% (Apple default deal continues, just non-exclusively)
      - DOJ under AG Bondi "reviewing options and next steps regarding seeking additional relief"

      SIGNIFICANCE FOR PMC CASE: Judge Mehta has now demonstrated he will: (1) NOT order
      structural breakups absent overwhelming evidence, (2) focus on conduct remedies (contract
      bans, data sharing), (3) explicitly consider GenAI dynamics. If PMC v. Google reaches
      remedies, Mehta is likely to follow the same pattern: targeted conduct relief rather than
      structural separation. His treatment of AI Overviews as subject to antitrust scrutiny
      (via the Gemini ban) may also preview how he views the separate PMC claim that AI Overviews
      constitute a distinct product market. Stanford Law analysis called the remedies "careful,
      detailed, and thoughtful" with a good fit to the specific wrong.
    case_reference: "US v. Google, D.D.C. (remedies ruling Sep 2, 2025)"
    source_urls:
      - "https://www.justice.gov/opa/pr/department-justice-wins-significant-remedies-against-google"
      - "https://www.reuters.com/google-chrome-android-antitrust-ruling-2025-09-02"
      - "https://law.stanford.edu/google-search-antitrust-remedies/"
      - "https://reason.org/commentary/google-avoids-court-ordered-breakup/"

  - type: "related_munich_ai_overviews_liability"
    description: >
      Munich Regional Court (Germany) — landmark ruling (~June 13, 2026) finding Google DIRECTLY
      LIABLE for defamatory content in AI Overviews. Two German publishers sued after AI Overviews
      falsely linked them to scams and "dubious business practices."

      KEY LEGAL HOLDINGS:
      - AI Overviews generate "independent, new, and substantive statements" — NOT mere indexing
      - Google classified as DIRECT infringer (not indirect), overturning prior German precedent
        that search engines were only indirect infringers for autocomplete/results
      - AI Overviews treated as Google's OWN content with full publisher liability
      - "Only Google can adjust the models and the logic" — sole control = sole responsibility
      - Google's disclaimer ("double-check AI results") insufficient to avoid liability
      - Google failed to respond to cease-and-desist (weighed against them)
      - Preliminary injunction issued; Google announced appeal

      DATA ON AI OVERVIEW HARM:
      - Pew Research: when AI Overviews appear, clicks to traditional results drop from ~15% to ~8%
      - NYT analysis: ~90% accuracy rate, but at 5T+ searches/year = hundreds of millions of errors
      - >50% of "accurate" AI Overviews were "ungrounded" (cited sources didn't support claims)

      SIGNIFICANCE FOR PMC CASE: Munich court's classification of AI Overviews as Google's own
      content (distinct from traditional search indexing) directly supports PMC's argument that
      AI Overviews are a SEPARATE product from search. Google's defense in the PMC case hinges
      on AI Overviews being "part of search" and content being "non-rivalrous." The Munich ruling
      rejects both premises: AI Overviews create NEW content (not non-rivalrous) and constitute
      a distinct editorial function (not just search). While German rulings are non-binding in
      D.D.C., they provide persuasive authority and may influence Judge Mehta's analysis.

      US LEGAL COMMENTARY: Alex Shahrestani (Promise Legal): "Section 230 was built for computer
      bulletin boards, not for a model that writes its own answers. Once the AI is the author,
      the company is the publisher." This echoes the Munich court's reasoning.
    case_reference: "Munich Regional Court, preliminary injunction (~Jun 13, 2026)"
    source_urls:
      - "https://www.reuters.com/google-german-ruling-ai-overviews-liable-2026-06"
      - "https://www.malwarebytes.com/blog/ai/2026/06/google-can-be-liable-for-false-ai-overviews-court-rules"
      - "https://canadianlawyermag.com/google-munich-court-ai-overviews/"
      - "https://www.cio.com/article/google-liable-false-information-ai/"

  - type: "related_eu_google_android_fine_confirmed"
    description: >
      EU Court of Justice (CJEU, Luxembourg) — July 2, 2026. Google/Alphabet lost final appeal
      of €4.1B EU antitrust fine (original €4.34B, reduced by General Court in 2022) for abusing
      Android market dominance. Court confirmed Google illegally forced phone manufacturers to
      pre-install Search, Chrome, and Play Store. No further appeal possible.
      Google has now accumulated ~€11B in EU fines in last decade (Android €4.1B + Shopping €2.42B
      in 2017/2021 + AdSense €1.49B in 2019). Google says it "adapted agreements to comply"
      back in 2018.

      SAME WEEK: Swedish court ordered Google to pay ~$1.5B to PriceRunner (Klarna) for favoring
      its own shopping service — largest Swedish competition case award ever (14.3B SEK).

      SIGNIFICANCE: Accumulating Google antitrust losses globally strengthen PMC's litigation
      position by establishing judicial pattern of Google market abuse. Android ruling confirms
      Google's pattern of tying products — directly relevant to PMC's argument that Google ties
      AI Overviews to search indexing.
    case_reference: "Google/Alphabet v. European Commission, CJEU (Jul 2, 2026)"
    source_urls:
      - "https://www.reuters.com/google-eu-android-antitrust-fine-appeal-lost-2026-07"
      - "https://www.nypost.com/google-eu-4-7-billion-antitrust-fine/"
      - "https://www.reuters.com/google-klarna-pricerunner-1-5-billion-damages/"

  - type: "related_ecj_publisher_rights_streamz"
    description: >
      ECJ case (Streamz et al. v. Belgium) — oral hearing July 6-7, 2026. Google, Meta, Spotify,
      and Sony challenging Belgium's implementation of Article 15 DSM Directive (press publishers'
      rights). Denmark intervened in favor of Belgium/publishers, urging ECJ to "clearly define
      the scope of press publishers' rights" and tech giants' obligation to pay for content.
      Culture Minister Stampe: "tech giants should not be allowed to use media content without
      paying for it." Denmark also participates in separate Google AI training copyright case.

      SIGNIFICANCE: If ECJ rules publishers have strong rights under DSM Directive, it creates
      EU-wide legal precedent that content has monetary value — supportive of PMC's US argument
      that Google should pay publishers for AI Overview use. A ruling against publishers could
      weaken the broader publisher rights framework PMC relies on.
    case_reference: "Streamz et al. v. Belgium, ECJ (oral hearing Jul 6-7, 2026)"
    source_urls:
      - "https://www.reuters.com/denmark-eu-publishers-rights-streamz/"

