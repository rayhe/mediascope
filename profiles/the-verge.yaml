      Southwest was definitely not my decision." PMC's response: "Hugh made the decision to leave."
      Insiders: profitability mandates + ideological rebalancing toward conservative speakers.
      NYT reported SXSW did not meet PMC's "ambitious" goals for 2024 or 2025.
      PMC countered: "highest ever sponsorship revenue in the history of the company."
      Austin Convention Center (SXSW's home base) under demolition/reconstruction through 2029.

      PMC LEADERSHIP (Jul 2025):
      George Grobar (PMC President since ~2009) shifted to CEO advisory/board role (Jul 30, 2025).
