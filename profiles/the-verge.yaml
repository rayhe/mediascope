      Markets Group (Q2 2025): PIF US portfolio $23.8B, 57 positions, no Meta.
      WSJ (2018): SRMG-Vice JV talks, "soft power" characterization.
      Guardian (2018): Bloomberg SRMG JV editorial guardrails.
