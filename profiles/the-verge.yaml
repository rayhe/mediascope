      - "https://web.archive.org/web/2025/https://www.newyorker.com/magazine/a24-empire-auteurs"

  - type: "saudi_sovereign_investment"
    description: >
      PMC's $200M+ equity investor SRMG (Saudi Research and Media Group) is majority-owned by
      the Saudi government via the chain: PIF → Saudi National Bank (SNB) → NCB Capital →
      Al Ahli Capital Fund 13 → SRMG. The State Media Monitor classifies SRMG as "Captured
      Public/State-Managed (CaPu)" — the highest state influence category. SRMG's board includes
      Saudi Arabia's sitting Minister of Tourism (Ahmed bin Aqeel Al-Khatib), and its former head
      Prince Badr bin Abdullah is an MBS confidante who became Saudi Arabia's first Culture Minister.

      This sovereign investment creates FIVE distinct conflict dimensions for The Verge:

      1. EDITORIAL INDEPENDENCE: A Saudi sovereign-linked entity holds $200M+ equity in PMC
         with no publicly disclosed editorial guardrails (unlike Bloomberg's SRMG JV, which has
         explicit editorial termination rights). PMC was deliberately opaque about the investor —
         its own publications misidentified SRMG until TheWrap forced disclosure (Jul 2019).

      2. KHASHOGGI NON-DIVESTITURE: After the MBS-ordered murder of WaPo journalist Jamal
         Khashoggi (Oct 2018), Endeavor returned its $400M Saudi PIF investment. PMC did NOT
         return its $200M+ SRMG investment. The Verge covers press freedom and journalist
         safety — doing so while funded by the Saudi government is a profound editorial tension.

      3. PIF ANTI-META PORTFOLIO ALIGNMENT: PIF sold ALL its Meta shares (667,996 Class A,
         ~$380M+) in Q2 2025 while retaining its indirect PMC investment via SRMG. PIF
         simultaneously added positions in Apple, Arm Holdings (~400M share increase), and ASML —
         Meta's semiconductor and hardware competitors. The Verge's ownership chain includes a
         sovereign investor that actively divested from Meta while maintaining its media investment.

      4. SRMG ADVERTISING PARTNERSHIP: Beyond equity, SRMG Media Solutions has an active
         advertising partnership with PMC (May 2025) that routes Saudi "government departments"
         and "mega projects" advertising revenue directly through PMC's editorial properties
         (including The Verge). This means Saudi government ad dollars flow to The Verge's parent.

      5. VISION 2030 COVERAGE: Saudi Arabia's $3.5T+ Vision 2030 involves massive tech
         partnerships (NEOM, AI investments, entertainment). The Verge covers these projects
         editorially while its parent company receives both equity investment and advertising
         revenue from Saudi sovereign-linked entities. PIF's $1.15T AUM makes it the world's
         4th-largest sovereign wealth fund and a major stakeholder in companies The Verge covers.

      DISCLOSURE STATUS: No Verge article has disclosed the SRMG investment, the SRMG
      advertising partnership, or PIF's role in The Verge's ownership chain. The Verge discloses
      the Google lawsuit ("Disclosure is our brand") but not the Saudi sovereign financial
      relationship.
    severity: 5
    evidence: >
      TheWrap (Sharon Waxman, Jul 2019): PMC SRMG investment and opacity investigation.
      State Media Monitor: SRMG classified as Captured Public/State-Managed (CaPu).
      BroadcastPro ME (May 2025): SRMG Media Solutions × PMC advertising partnership.
