ownership_chain:
  - name: "The Verge"
    entity_type: "publisher"
    description: >
      Technology news website launched November 1, 2011, alongside the formation of Vox Media by
      Jim Bankoff and Trei Brundrett. Originally co-founded by Joshua Topolsky (first EIC), who
      departed for Bloomberg in 2014. Nilay Patel became EIC in 2014 and has held the role since.
      Known for in-depth product reviews, tech policy analysis, and the flagship Vergecast podcast.
      The Verge has won multiple Webby Awards and is considered one of the most influential tech
      publications in the US. Monthly reach: tens of millions of unique visitors.
      In May 2025, Vox Media sold Polygon to Valnet (amid union controversy). In May 2026, James
      Murdoch's Lupa Systems acquired New York Magazine, Vox.com, and the Vox Media Podcast Network
      for ~$300M. The Verge was NOT part of the Murdoch deal. In June 2026, PMC acquired the remaining
      Vox Media brands (The Verge, Eater, SB Nation, Popsugar, The Dodo, Punch, Thrillist) and created
      the PMX subsidiary to house them alongside PMC's existing portfolio.
    source_urls:
      - "https://en.wikipedia.org/wiki/The_Verge"
      - "https://www.wsj.com/james-murdoch-buy-new-york-magazine-vox-300-million"

  - name: "PMX Global, LLC"
    entity_type: "operating_subsidiary"
    description: >
      New subsidiary of Penske Media Corporation created June 18, 2026 to house the combined publishing
      portfolio of PMC's existing titles plus the acquired Vox Media brands. Totals 25+ media titles.

      LEADERSHIP:
      - President: Ryan Pauley (former President of Vox Media, joined PMC with the acquisition).
        Reports to Jay Penske (PMC Chairman & CEO) and Craig Perreault (PMC President). Based in New York.
      - COO: Tom Finn (promoted from PMC EVP Strategy & Operations).
      - CFO: Ken DelAlcazar (promoted from PMC EVP Finance; with PMC since ~2017, previously led
        finance automation, multi-brand accounting, and due diligence on PMC's acquisitions).

      PMX also houses Concert (Vox Media's premium ad marketplace) and Forte (Vox Media's first-party
      data platform), giving it significant ad tech infrastructure.

      CONTEXT — MURDOCH/LUPA SPLIT:
      The PMC acquisition followed the Lupa Systems deal (announced May 20, 2026) in which James
      Murdoch acquired New York Magazine (incl. The Cut, Vulture, Intelligencer, The Strategist,
      Curbed, Grub Street), the Vox Media Podcast Network (~40 shows incl. Pivot, Today Explained,
      Criminal, Where Should We Begin?), and Vox.com for ~$300M+ (NYT). Jim Bankoff (Vox Media CEO)
      joined Lupa's new company, which carries the "Vox Media" name. LionTree advised Vox Media.
      Lupa's existing holdings include Art Basel and Tribeca Enterprises (Tribeca Film Festival).
      The Lupa deal was expected to close within 4-6 weeks of May 20 announcement.
      The PMC acquisition of remaining brands (The Verge, Eater, SB Nation, Popsugar, The Dodo,
      Punch, Thrillist) was structured as all-or-nothing and completed June 18, 2026. Existing
      Vox Media shareholders retain minority stake in PMX.

      VALUATION CONTEXT: Vox Media was valued at ~$1B in 2015 (NBCUniversal round). PMC's 2023
      investment valued it at ~$500M. The Lupa deal alone was ~$300M — meaning Vox Media's total
      breakup value may have exceeded the 2023 valuation. BuzzFeed sold for $120M (from $1.7B peak).
    source_urls:
      - "https://www.voxmedia.com/2026/6/19/pmc-acquires-vox-media-brands"
      - "https://www.editorandpublisher.com/stories/pmc-acquires-vox-media-brands"
      - "https://www.adweek.com/media/penske-media-acquires-remaining-vox-media-brands/"
      - "https://www.wsj.com/james-murdoch-buy-new-york-magazine-vox-300-million"
      - "https://www.thewrap.com/james-murdoch-vox-media-new-york-magazine-300-million/"

  - name: "Penske Media Corporation (PMC)"
    entity_type: "parent_company"
    description: >
      Private digital media and publishing company founded in 2003-2004 by Jay Penske. HQ: Los Angeles.
      Chairman, Founder & CEO: Jay Penske. President: Craig Perreault.

      PORTFOLIO (25+ titles): Billboard, Variety, Rolling Stone, WWD (Women's Wear Daily),
      The Hollywood Reporter, Deadline, Robb Report, Artforum, Sportico, SHE Media, StyleCaster,
      ARTnews, FN (Footwear News), IndieWire, VIBE, Billboard Music Charts, BEAUTYINC, plus
      acquired Vox Media brands: The Verge, Eater, SB Nation, Popsugar, The Dodo, Punch, Thrillist.

      OTHER PROPERTIES: Dick Clark Productions (owner of the Golden Globes, American Music Awards,
      New Year's Rockin' Eve), SXSW (majority owner, acquired ~2024).

      REVENUE: Private, no public filings. Described as one of the largest digital media companies
      in the US, reaching "hundreds of millions of people every month" and producing "300+ live events
      each year" (PMC press release, June 2026). SRMG partnership (May 2025) disclosed more specific
      reach metrics: 412M monthly users across 40+ international media brands, 150M social media
      followers, 6B video views. These numbers predate the Vox Media brand acquisition (June 2026),
      which added The Verge's tens of millions of monthly uniques, Eater, SB Nation, etc.

      EXTERNAL INVESTMENT — SRMG (CORRECTED):
      In February 2018, PMC received a $200M+ investment from Saudi Research and Media Group
      (SRMG, Tadawul: 4210), valuing PMC at approximately $700M (WWD, Feb 28, 2018; NYPost).
      An additional $25M was committed via a MENA joint venture (Gulf Business). PMC was
      deliberately opaque about the investor's identity — even its own properties Rolling Stone
      and Variety misidentified the source as "a Saudi fund" or "MBC Group." Only after TheWrap
      investigated and pressured PMC in July 2019 did PMC's WWD.com update its original
      announcement to name SRMG (TheWrap, Sharon Waxman, Jul 2019). SRMG did not respond to
      TheWrap's inquiries and does not list the PMC investment on its website.

      CORRECTION: The original profile identified the investor as "PIF subsidiary MBC Group."
      This was incorrect. MBC Group is a separate Saudi broadcasting conglomerate. The actual
      investor is SRMG, which is linked to PIF through a different chain (see below).

      SRMG OWNERSHIP CHAIN (PIF → SRMG):
      SRMG is a publicly listed joint-stock company on Saudi Tadawul exchange (since 2006).
      Its majority shareholder is **Al Ahli Capital Fund 13**, an investment vehicle managed
      by **NCB Capital** (the asset management arm of **Saudi National Bank / SNB**). SNB is
      itself majority owned by the **Public Investment Fund (PIF)** — Saudi Arabia's $1.15
      trillion sovereign wealth fund. This chain (PIF → SNB → NCB Capital → Al Ahli Capital
      Fund 13 → SRMG → PMC) creates an indirect but institutional linkage between PMC and the
      Saudi government. The State Media Monitor classifies SRMG as "Captured Public/State-Managed
      (CaPu)" — their highest category of state influence.

      SRMG GOVERNANCE & POLITICAL CONNECTIONS:
      - **Prince Badr bin Abdullah** was SRMG's head until becoming Saudi Arabia's first Culture
        Minister — described as a "confidante of Crown Prince Mohammed bin Salman" (TheWrap).
      - **Ahmed bin Aqeel Al-Khatib**, Saudi Arabia's current Minister of Tourism, sits on
        SRMG's board of directors (State Media Monitor).
      - CEO since October 2020: **Jomana Rashed Al-Rashid** (first female CEO of SRMG).
      - Middle East expert Dennis Ross (Washington Institute): "Multiple experts in the region
        regard the company as an arm of 'soft power' of the Saudi government."

      SRMG FINANCIAL DETERIORATION:
      - Share capital: SAR 800M (80M shares at SAR 10 each)
      - Revenue: $996M (FY2023) → $712M (FY2025) → $740M (TTM Mar 2026) — 26% decline
      - EBITDA: $227M (FY2023) → -$9.6M (FY2025) → $14M (TTM) — near-collapse
      - Net Income: +$149M (FY2023) → -$98M (FY2025) → -$97M (TTM) — sustained losses
      - Enterprise Value: $5.89B (FY2024) → $1.95B (TTM) — 67% decline
      - Total Assets: ~$1.93B; Total Debt: $319M (PitchBook)
      Source: PitchBook, Morningstar (publicly traded on Saudi Tadawul).

      SRMG MEDIA ASSETS (State Media Monitor):
      Print: Al Eqtisadiah, Asharq Al-Awsat, Arab News, The Majalla, Urdu News, Sayidaty,
      Al Jamila, Arrajol, Bassim, Heya. Digital: Asharq News. JV: Asharq Business with
      Bloomberg (launched Sep 2017). Also: Billboard Arabia (SRMG × Billboard partnership).
      Subsidiaries: 18+ across KSA, Kuwait, UAE, Morocco, Pakistan. 170M+ global users.

      SRMG VENTURES (corporate VC arm, launched ~2022):
      Invests seed-to-Series-B in digital media, generative AI, immersive/interactive
      entertainment. Investments include: Telfaz11 (Saudi creative media studio), VUZ (VR
      social media app), Anghami (MENA music streaming, Nasdaq-listed — with SRMG board seat),
      Qvest Group JV (2024, media technology services). The AI investment mandate creates an
      additional layer of financial interest in AI ecosystem outcomes relevant to The Verge's
      coverage of AI companies.

      KHASHOGGI NON-DIVESTITURE:
      After the October 2018 murder and dismemberment of Washington Post journalist Jamal
      Khashoggi — ordered by Crown Prince MBS per U.S. intelligence — Endeavor (WME parent)
      returned its $400M Saudi PIF investment in March 2019. PMC did NOT return its $200M+
      SRMG investment. The UK opened a state inquiry into Saudi investment in The Independent
      and Evening Standard. PMC's retention of the Saudi investment, combined with its
      deliberate opacity about the investor's identity, represents a distinct editorial
      independence risk: a media company maintaining sovereign state financial ties while
      declining to disclose them. Dennis Ross: "There has to be transparency. If there's no
      transparency I'd be much less inclined to go along with it."

      PIF TECH PORTFOLIO DYNAMICS (Q2 2025, latest 13F):
      PIF **sold all Meta shares** in Q2 2025 (previously held 667,996 class A shares, ~$380M+).
      Also exited: Shopify, PayPal, Alibaba, Nu Holdings, FedEx. PIF shifted to: semiconductors
      (Arm Holdings position increased ~400M shares, ASML added, Analog Devices), healthcare
      (UnitedHealth, Eli Lilly, Merck), Apple (new position), and Lucid Group (massive increase).
      Total US equity exposure: $23.8B across 57 positions. AUM: $1.15T (2025, Global SWF).
      SIGNIFICANCE: PIF is financially aligned AGAINST Meta (divested) and WITH Meta's
      competitors (Apple, Arm/chip ecosystem). Through SRMG, PIF has a $200M+ stake in PMC
      (The Verge's parent). The Verge's ultimate beneficial ownership chain includes a sovereign
      investor that actively sold Meta stock while retaining its media investment — creating
      structural financial alignment against The Verge's most-covered company.

      AD TECH INFRASTRUCTURE: The June 2026 Vox Media acquisition specifically included Concert
      (Vox Media's premium ad marketplace, competing in the same ecosystem as Google and Meta's
      ad platforms) and Forte (Vox Media's first-party data platform for audience targeting).
      PMC separately operates its own CDP (Customer Data Platform) infrastructure for first-party
      data collection across all PMC brands. Prior to CDP implementation, 95% of PMC's digital
      visitors were unauthenticated (MarTech). PMC's ad tech stack competes directly with the ad
      platforms of the companies The Verge covers editorially — Google and Meta chief among them.

      WORKPLACE: In June 2026, Jay Penske issued a return-to-office mandate requiring all PMC
      employees to be in-office at least four days per week or face termination, with an October 4
      compliance deadline (Midland, Jun 9, 2026). This is relevant as a signal of Penske's
      management style and editorial control posture as The Verge transitions to PMC ownership.

      INVESTMENT HISTORY WITH VOX MEDIA:
      - Feb 2023: PMC invested $100M for 20% stake in Vox Media (NYT, TheWrap). Valuation implied
        ~$500M, down from $1B in 2015 (NBCUniversal round). Jay Penske joined Vox Media board.
      - May 2026: James Murdoch / Lupa Systems bought NY Mag, Vox.com, podcast network for ~$300M.
      - June 2026: PMC acquired remaining brands (The Verge, Eater, SB Nation, etc.) into PMX subsidiary.
        Existing Vox Media shareholders retain minority stake in PMX.
    source_urls:
      - "https://pmc.com"
      - "https://www.thewrap.com/penske-media-corporation-invests-100-million-vox-20-percent-stake/"
      - "https://www.exchange4media.com/media-print-news/penske-media-corporation-to-acquire-major-vox-media-brands"
