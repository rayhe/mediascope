# ===================================================================
# REVENUE RELATIONSHIPS
# ===================================================================
revenue_relationships:
  - partner: "OpenAI"
    relationship_type: "licensing"
    estimated_value: "undisclosed (multi-year)"
    description: >
      Vox Media signed a content licensing and product partnership with OpenAI on May 29, 2024,
      announced same day as The Atlantic's similar deal. OpenAI gets access to Vox Media's current
      content AND entire archive (including The Verge's) to train ChatGPT and other models. Vox
      Media gets OpenAI tech access and licensing fees. Deal was announced without consulting
      Vox Media Union journalists, who expressed "serious concerns" via WGAE statement. Kelsey Piper
      (Vox reporter) publicly expressed frustration on X. The Verge is part of the Vox Union
      (WGAE-represented).

      CONFLICT SIGNIFICANCE: OpenAI is Meta's direct competitor in AI (ChatGPT vs Meta AI). The
      Verge's archives are being used to train a Meta competitor's product. The Verge receives
      financial benefit from OpenAI's success and zero financial benefit from Meta's AI efforts.
      This creates a structural incentive asymmetry in coverage.

      Post-PMC acquisition: unclear if the licensing deal transfers to PMX or needs renegotiation.
    date_established: "2024-05-29"
    source_urls:
      - "https://www.reuters.com/technology/openai-signs-content-deals-with-atlantic-vox-media-2024-05-29/"
      - "https://techcrunch.com/2024/06/05/whats-in-it-for-us-journalists-ask-as-publications-sign-content-deals-with-ai-firms/"

  - partner: "Google"
    relationship_type: "litigation_adversary"
    estimated_value: "damages sought (undisclosed)"
    description: >
      PMC has TWO separate lawsuits against Google:

      1. AI OVERVIEWS (D.D.C., No. 1:25-cv-03192-APM, filed Sep 13, 2025):
      PMC sued Google alleging AI Overviews use publisher journalism without consent to create
      AI-generated search summaries, reducing traffic and revenue. Claims Google conditions search
      indexing on permitting AI use of content — a coercive tie under Sherman Act. Six counts:
      reciprocal dealing (§1 and §2), monopoly leveraging, monopolization, attempted monopolization,
      unjust enrichment. PMC claims ~20% of Google searches linking to its sites show AI Overviews
      (expected to rise), affiliate revenue down >33% from peak by end of 2024.
      Google filed motion to dismiss Jan 13, 2026 ("legally defective in every way"), arguing
      AI Overviews are part of search (not a separate product), content is non-rivalrous, and
      the booming AI licensing market undermines foreclosure claims. Case pending before Judge APM.
      Counsel: Susman Godfrey (PMC) vs WilmerHale (Google).

      2. AD TECH ANTITRUST (S.D.N.Y., filed Jan 2026):
      PMC and subsidiary SheMedia sued Google alleging illegal monopolization of publisher ad-server
      and ad-exchange markets. Claims Google manipulated real-time ad auctions using "Last Look,"
      "Minimum Bid to Win," and related schemes — saw rivals' bids before submitting its own.
      SheMedia operates ad network for ~1,800 websites. Builds on 2025 federal ruling (EDVA) that
      Google holds unlawful monopolies in two ad tech markets (remedies phase ongoing).

      Other publisher plaintiffs in parallel ad-tech suits: The Atlantic, Business Insider, People
      Inc., Slate. Separate from DOJ search and ad antitrust cases.

      CONFLICT SIGNIFICANCE: Google competes with Meta in search, advertising, AI, and wearables
      (Android XR smart glasses vs Meta Ray-Ban). PMC's adversarial financial relationship with
      Google across two lawsuits creates complex coverage incentive structures. The Verge disclosed
      the lawsuit on the Vergecast (Jan 2026): "Disclosure is our brand." But disclosure of the
      lawsuit's existence is different from disclosing how it might shape editorial incentives.
    date_established: "2025-09"
    source_urls:
      - "https://thecurrent.com/story/the-atlantic-penske-media-vox-sue-google-ad-auction"
      - "https://www.reuters.com/legal/litigation/google-defends-ai-search-summaries-rolling-stone-publishers-lawsuit-2026-01-13/"
      - "https://techcrunch.com/2025/09/13/rolling-stone-owner-penske-media-sues-google-over-ai-summaries/"
      - "https://www.thewrap.com/penske-media-sues-google-digital-ad-market-manipulation/"
      - "https://www.thefashionlaw.com/google-urges-court-to-toss-pmc-challenge-to-ai-overviews/"

  - partner: "Meta"
    relationship_type: "advertising"
    estimated_value: "undisclosed"
    description: >
      Meta is a major digital advertiser across the media ecosystem. The Verge/Vox Media/PMC properties
      likely receive Meta advertising revenue (programmatic and direct). Meta is also a significant
      source of referral traffic to The Verge via Facebook and Instagram sharing. However, Meta has
      NOT signed an AI content licensing deal with Vox Media/PMC — unlike OpenAI (which has). This
      creates the same revenue asymmetry seen at Condé Nast: The Verge's parent gets paid by Meta's
      AI competitors but not by Meta itself.

      IMPORTANT: No confirmed AI licensing deal between Meta and PMC/Vox Media as of July 2026.
    date_established: "ongoing"

  - partner: "Concert (ad marketplace)"
    relationship_type: "internal_ad_tech"
    estimated_value: "integral to revenue"
    description: >
      Concert is Vox Media's premium ad marketplace, acquired by PMC as part of the Vox Media brands
      deal. It serves as the programmatic advertising infrastructure for The Verge and other properties.
      Concert competes in the same ad tech ecosystem where Google (sued by PMC/Vox) and Meta operate.
      Forte is Vox Media's first-party data platform, also acquired by PMC.
    date_established: "2016"

# ===================================================================
# LABOR & UNION STATUS
# ===================================================================
labor_union:
  union_name: "Writers Guild of America, East (WGAE)"
  cba_term: "June 13, 2025 – June 12, 2028"
  cba_source: "https://www.wgaeast.org/wp-content/uploads/sites/4/2025/09/Vox-Media-WGAE-CBA-2025-2028.pdf"
  description: >
    The Verge's editorial staff are represented by the Vox Media Union (WGAE). The current CBA
    was ratified September 2025 after a 95% strike authorization vote, covering The Verge, Eater,
    SB Nation, Popsugar, The Dodo, Punch, and Thrillist bargaining unit employees.

    KEY PROVISIONS:
    - Wage increases: Year 1: 5% (under $106K), 4% (over $106K); Years 2-3: 3.25%/2.75%
    - Salary floor: $70,000 (exempt), $68,000 (non-exempt)
    - Layoff protections: 2 weeks paid non-working notice + minimum 12 weeks severance
    - AI protections (§40): No layoffs solely from GAI implementation; GAI-generated content
      requires editorial/legal review and public disclosure; employees may decline credit on
      GAI-assisted content; no digital replicas without consent; no mimicking employee's
      "distinct authorial voice or style" via GAI prompts without consent
    - Anti-surveillance (§41): No real-time keystroke monitoring, camera/microphone surveillance,
      or idle-time tracking
    - DEI: $50K annual DEC budget + $10K conference fund + $50K retention programs
    - PTO: unlimited, with encouragement to take ≥25 days/year (up from 20)

    SUCCESSOR CLAUSE (§39) — critical for PMC acquisition:
    - Equity transaction: CBA binding on successors for its full term
    - Asset transaction: if purchaser hires majority of bargaining unit employees to operate
      acquired assets, purchaser must assume CBA for balance of term as a condition of purchase
    - Exception: does not apply to "sale of individual assets such as podcasts or newsletters"
    - This clause means PMC/PMX is legally bound by the CBA through June 2028, including all
      AI protections, layoff procedures, and wage commitments

    HISTORICAL CONTEXT:
    - May 2025: Vox Media sold Polygon to Valnet; WGAE condemned as union busting; ≥25 laid off,
      many union members. Sale occurred during contract negotiations. Valnet refused to meet
      with union or Group Publisher Chris Grant.
    - June 2025: 95% strike authorization vote; CLC/AFL-CIO solidarity campaign; 3,000+ letters
      sent to CEO Jim Bankoff demanding fair contract
    - September 2025: CBA ratified

    ANALYTICAL SIGNIFICANCE:
    The successor clause is the strongest labor protection in any of the 6 tracked publications.
    It means PMC cannot unilaterally restructure The Verge's editorial workforce (via layoffs
    or AI replacement) without CBA compliance through June 2028. This contrasts with
    non-unionized PMC properties where editorial changes can be made by ownership fiat.
    The AI protections specifically prevent the kind of quiet editorial identity erosion
    reported at Rolling Stone, Variety, and SXSW.
  source_urls:
    - "https://www.wgaeast.org/wp-content/uploads/sites/4/2025/09/Vox-Media-WGAE-CBA-2025-2028.pdf"
    - "https://wgaeast.org/wga-east-members-at-vox-media-ratify-new-union-contract/"
    - "https://www.thewrap.com/wga-slams-polygon-layoffs-valnet-acquisition-vox-media/"
    - "https://nycclc.org/take-action-help-union-members-at-vox-win-a-fair-contract/"

# ===================================================================
# EDITORIAL LEADERSHIP
# ===================================================================
editorial_leadership:
  - name: "Nilay Patel"
    title: "Editor-in-Chief"
    editorial_stance: >
      EIC since July 2014 (succeeded Joshua Topolsky). Former managing editor. JD from Georgetown
      University Law Center. Previously a lawyer at an IP litigation firm before joining Engadget
      (2005), then co-founding The Verge with Topolsky. Host of the Vergecast and Decoder podcasts.
      Known for strong editorial voice on tech antitrust, platform regulation, right to repair, and
      independent journalism. Coined "Google Zero" framing for the impact of AI Overviews on
      publisher traffic. Has been vocal about Vox Media's Google lawsuit on-air. His legal background
      shapes The Verge's emphasis on policy and regulatory coverage.

  - name: "David Pierce"
    title: "Editor-at-Large"
    editorial_stance: >
      Co-host of Vergecast (daily format since ~2025). Previously at Protocol (EIC), Wired, and WSJ.
      Covers consumer tech, gadgets, AI products. Also hosts Version History (deep-dive podcast series).
      KEY MIGRATION: Protocol (failed Politico tech spinoff) → The Verge. His Wired background means
      he brings Condé Nast institutional framing exposure to The Verge's editorial environment.

  - name: "Alex Heath"
    title: "Deputy Editor, Platforms & Emerging Tech"
    editorial_stance: >
      Primary Meta/Facebook reporter at The Verge. Known for exclusive sourcing inside Meta. Previously
      at The Information and Business Insider. Covers Meta's Reality Labs, Quest headsets, social platform
      changes, and internal company dynamics. His reporting on Meta is among the most-cited in the
      industry. KEY for MediaScope analysis: his coverage sets The Verge's institutional tone on Meta
      as a company, distinct from Victoria Song's product-focused wearables coverage.

