# ===================================================================
# OWNERSHIP CHAIN — compiled 2026-07-06 from press releases, SEC filings,
# Wikipedia, news reporting (WSJ, Adweek, TheWrap, Poynter, exchange4media)
# ===================================================================
ownership_chain:
  - name: "The Verge"
    entity_type: "publisher"
    description: >
      Technology news website launched November 1, 2011, alongside the formation of Vox Media by
      Jim Bankoff and Trei Brundrett. Originally co-founded by Joshua Topolsky (first EIC), who
      departed for Bloomberg in 2014. Nilay Patel became EIC in 2014 and has held the role since.
      Known for in-depth product reviews, tech policy analysis, and the flagship Vergecast podcast.
      The Verge has won multiple Webby Awards and is considered one of the most influential tech
      publications in the US. Monthly reach: tens of millions of unique visitors.
      In May 2025, Vox Media sold Polygon to Valnet (amid union controversy). In May 2026, James
      Murdoch's Lupa Systems acquired New York Magazine, Vox.com, and the Vox Media Podcast Network
      for ~$300M. The Verge was NOT part of the Murdoch deal. In June 2026, PMC acquired the remaining
      Vox Media brands (The Verge, Eater, SB Nation, Popsugar, The Dodo, Punch, Thrillist) and created
      the PMX subsidiary to house them alongside PMC's existing portfolio.
    source_urls:
      - "https://en.wikipedia.org/wiki/The_Verge"
      - "https://www.wsj.com/james-murdoch-buy-new-york-magazine-vox-300-million"

  - name: "PMX Global, LLC"
    entity_type: "operating_subsidiary"
    description: >
      New subsidiary of Penske Media Corporation created in mid-2026 to house the combined publishing
      portfolio of PMC's existing titles plus the acquired Vox Media brands. Totals 25+ media titles.
      President: Ryan Pauley (former President of Vox Media, joined PMC with the acquisition).
      Pauley reports to Jay Penske (PMC Chairman & CEO) and Craig Perreault (PMC President).
      PMX also houses Concert (Vox Media's premium ad marketplace) and Forte (Vox Media's first-party
      data platform), giving it significant ad tech infrastructure.
    source_urls:
      - "https://www.voxmedia.com/2026/6/19/pmc-acquires-vox-media-brands"
      - "https://www.editorandpublisher.com/stories/pmc-acquires-vox-media-brands"

  - name: "Penske Media Corporation (PMC)"
    entity_type: "parent_company"
    description: >
      Private digital media and publishing company founded in 2003-2004 by Jay Penske. HQ: Los Angeles.
      Chairman, Founder & CEO: Jay Penske. President: Craig Perreault.

      PORTFOLIO (25+ titles): Billboard, Variety, Rolling Stone, WWD (Women's Wear Daily),
      The Hollywood Reporter, Deadline, Robb Report, Artforum, Sportico, SHE Media, StyleCaster,
      ARTnews, FN (Footwear News), IndieWire, VIBE, Billboard Music Charts, BEAUTYINC, plus
      acquired Vox Media brands: The Verge, Eater, SB Nation, Popsugar, The Dodo, Punch, Thrillist.

      OTHER PROPERTIES: Dick Clark Productions (owner of the Golden Globes, American Music Awards,
      New Year's Rockin' Eve), SXSW (majority owner, acquired ~2024).

      REVENUE: Private, no public filings. Described as one of the largest digital media companies
      in the US, reaching "hundreds of millions of people every month" and producing "300+ live events
      each year" (PMC press release, June 2026).

      INVESTMENT HISTORY WITH VOX MEDIA:
      - Feb 2023: PMC invested $100M for 20% stake in Vox Media (NYT, TheWrap). Valuation implied
        ~$500M, down from $1B in 2015 (NBCUniversal round). Jay Penske joined Vox Media board.
      - May 2026: James Murdoch / Lupa Systems bought NY Mag, Vox.com, podcast network for ~$300M.
      - June 2026: PMC acquired remaining brands (The Verge, Eater, SB Nation, etc.) into PMX subsidiary.
        Existing Vox Media shareholders retain minority stake in PMX.
    source_urls:
      - "https://pmc.com"
      - "https://www.thewrap.com/penske-media-corporation-invests-100-million-vox-20-percent-stake/"
      - "https://www.exchange4media.com/media-print-news/penske-media-corporation-to-acquire-major-vox-media-brands"

  - name: "Penske Family"
    entity_type: "family_office"
    description: >
      Jay Penske (born ~1979, New York City) is the youngest son of Kathy Penske and Roger Penske.
      Wharton School (UPenn) BS in Management of Information Systems and Finance.
      Net worth estimated at $250M (Celebrity Net Worth, 2026). Previously married to Elaine Irwin
      (supermodel, 2012-2024). One daughter.

      Roger Penske (father): Billionaire founder and chairman of Penske Corporation, a diversified
      transportation and automotive empire. Key holdings:
      - Penske Automotive Group (NYSE: PAG) — publicly traded, Roger is Chair & CEO, 10%+ owner.
        PAG is one of the largest US automotive retail groups. Market cap ~$11.8B (Jul 2026).
        367 franchised dealerships (150 US/Puerto Rico, 217 international). 27,700 employees.
        Q2 2025: 16.9% gross margin, 8th consecutive quarter of "strong and stable" margin.
      - Penske Truck Leasing (28.9% stake via PTS) — 350,000+ vehicle fleet, leasing/logistics.
      - Indianapolis Motor Speedway — owner since 2019.
      - IndyCar — owner of the racing series.
      - Team Penske — major racing team (IndyCar, NASCAR, IMSA). 600+ major race wins.

      POLITICAL CONNECTIONS (FEC/OpenSecrets verified, 2024 cycle):
      Penske Corp total contributions: **$4,125,256** in 2024 election cycle (OpenSecrets).
      Roger Penske personal donations (FEC itemized):
      - $1,000,000 → Make America Great Again Inc (Jun 26, 2024)
      - $1,000,000 → Turnout for America (Oct 29, 2024)
      - $500,000 → Great Lakes Conservatives Fund ($250K Jun + $250K Oct 2024)
      - $250,000 → Buckeye Values PAC (May 2023)
      - $200,000 → Committed to America PAC (Oct 2023)
      - $123,900 → National Republican Senatorial Cmte (Sep 11, 2024)
      - $24,597 → Donald Trump (R-PRES) direct (cumulative)
      - $10,000 → Republican Party of Ohio (Oct 2024)
      - $5,600 → Donald Trump (R) ($2,800 × 2, Aug 2, 2019 — first Trump donation)
      Earlier: $250,000 → Right To Rise USA (Jeb Bush, 2015). Also donated to Democrats
      including Brenda Lawrence (D-MI, 2013/2018) and Debbie Stabenow (D-MI, 2016).
      Penske Corp lobbying: $150,000 in 2024, $170,000 in 2023.
      Presidential Medal of Freedom from Trump (2019) — same year as first Trump donation.

      Jay Penske has projected political neutrality publicly, but insiders at multiple PMC brands
      describe a "quiet realignment toward 'balanced' — often more conservative — voices and priorities"
      (Medium/Rosenbaum, SXSW analysis). At SXSW, staff were reportedly "directed to bring more
      conservative voices to the stage" after PMC acquisition.

      SXSW GOVERNANCE (Apr-May 2025):
      PMC took 50% stake in SXSW in 2021; acquired additional 1% for controlling interest (Aug 2023).
      April 2025: 11 people fired/departed including Hugh Forrest (35-year SXSW veteran, president
