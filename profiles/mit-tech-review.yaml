known_conflicts:
  - type: "institutional"
    description: "PARADOX CASE: MIT receives massive funding from every major AI company (Google $500M+, Microsoft, Amazon, Apple, Meta). MIT Tech Review covers these companies' AI work critically. This creates a paradox where the parent institution benefits financially from the industry the publication scrutinizes."
    severity: 3
    evidence: "MIT funding reports, research partnership announcements"
    source_url: ""
  - type: "editorial_bias"
    description: "Karen Hao's 2021 internal Meta AI ethics investigation was a landmark adversarial piece. She departed for The Atlantic, establishing a pipeline of adversarial AI journalists between these publications."
    severity: 2
    evidence: "Published article, career trajectory"
    source_url: ""
  - type: "revenue"
    description: "EmTech conferences generate revenue from tech company sponsorships while the publication covers those companies critically."
    severity: 2
    evidence: "EmTech sponsor lists"
    source_url: ""

litigation_connections: []

ai_crawl_policy:
  blocks_gptbot: true
  blocks_ccbot: true
  blocks_google_extended: true
  notes: "Blocks most AI crawlers. No known AI licensing deals."

target_entities:
  "Meta":
    aliases: ["Meta", "Facebook", "Instagram", "Mark Zuckerberg", "FAIR"]
    regex: "\\b(Meta(?! tag| data)|Facebook|Instagram|Zuckerberg|FAIR(?= research| lab))\\b"
  "Google":
    aliases: ["Alphabet", "Google", "DeepMind", "Google Brain"]
    regex: "\\b(Alphabet|Google|DeepMind|Google Brain)\\b"
  "OpenAI":
    aliases: ["OpenAI", "Sam Altman", "ChatGPT"]
    regex: "\\b(OpenAI|Sam Altman|ChatGPT)\\b"

bias_ratings:
  ad_fontes:
    reliability: 44.82
    bias: -4.21
  allsides: "Center"
  mbfc: "Left-Center Bias"

notes: |
  MIT Technology Review is included as a PARADOX case. Unlike Wired (whose
  parent has competitive/revenue conflicts) or The Guardian (pure editorial
  bias), MIT Tech Review's parent institution directly benefits from the
  AI industry it covers critically. This makes it useful for studying
  editorial independence from institutional interests.
  
  Key signal: Karen Hao's departure from MIT Tech Review to The Atlantic
  represents a pattern of adversarial AI journalists clustering at
  publications with the strongest anti-AI editorial stances.

