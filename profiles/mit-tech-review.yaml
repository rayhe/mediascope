ai_crawl_policy:
  blocks_gptbot: true
  blocks_ccbot: true
  blocks_google_extended: true
  notes: "Blocks most AI crawlers. No known AI licensing deals."

target_entities:
  "Meta":
    aliases: ["Meta", "Facebook", "Instagram", "Mark Zuckerberg", "FAIR"]
    regex: "\\b(Meta(?! tag| data)|Facebook|Instagram|Zuckerberg|FAIR(?= research| lab))\\b"
  "Google":
    aliases: ["Alphabet", "Google", "DeepMind", "Google Brain"]
    regex: "\\b(Alphabet|Google|DeepMind|Google Brain)\\b"
  "OpenAI":
    aliases: ["OpenAI", "Sam Altman", "ChatGPT"]
    regex: "\\b(OpenAI|Sam Altman|ChatGPT)\\b"

bias_ratings:
  ad_fontes:
    reliability: 44.82
    bias: -4.21
  allsides: "Center"
  mbfc: "Left-Center Bias"

notes: |
  MIT Technology Review is included as a PARADOX case. Unlike Wired (whose
  parent has competitive/revenue conflicts) or The Guardian (pure editorial
  bias), MIT Tech Review's parent institution directly benefits from the
  AI industry it covers critically. This makes it useful for studying
  editorial independence from institutional interests.
  
  Key signal: Karen Hao's departure from MIT Tech Review to The Atlantic
  represents a pattern of adversarial AI journalists clustering at
  publications with the strongest anti-AI editorial stances.
