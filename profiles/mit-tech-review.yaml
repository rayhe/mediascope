board_of_directors:
  description: >
    MIT-controlled board. Majority of directors are MIT senior administrators receiving
    compensation from MIT, not from Technology Review Inc. itself. This means MIT's
    institutional interests — including its dependence on tech industry funding — are
    structurally represented in the publication's governance.
    
    CRITICAL UPDATE (FY2025 990, filed May 15, 2026): David Schmittlein (MIT Sloan Dean)
    died March 13, 2025 — board vacancy. Cynthia Barnhart remains Co-Chair despite
    stepping down as MIT Provost on June 30, 2025 (succeeded by Anantha Chandrakasan).
    Barnhart returned to faculty after sabbatical; her continued board role as a professor
    rather than provost changes the governance dynamics — she no longer oversees MIT's
    academic and budget operations but retains her board seat.
  current_members:
    - name: "Alan Spoon"
      role: "Co-Chair"
      mit_compensation: "$0"
      external: true
      notes: "Former president of Polaris Partners. Former president of Washington Post division. Provides external governance perspective."
    - name: "Cynthia Barnhart"
      role: "Co-Chair"
      mit_compensation: "$1,084,227 (FY2025, her final year as provost)"
      external: false
      notes: >
        ROLE CHANGE: Barnhart stepped down as MIT Provost effective June 30, 2025
        (announced Feb 19, 2025). She returned to faculty (Ford Foundation Professor of
        Engineering, Dept of Civil & Environmental Engineering and MIT Sloan) after
        sabbatical. Per FY2025 990 she REMAINS Co-Chair of MIT TR board despite no longer
        being provost. Previously served as MIT Chancellor (2014-2021) and Provost
        (2022-2025). First woman to hold both roles. Her FY2025 MIT compensation
        ($1,084,227) reflects her final year as provost — future 990s will show lower
        faculty-level compensation. Structural governance question: does a former-provost
        Co-Chair still represent MIT's institutional interests as strongly as a sitting
        provost? She no longer controls MIT's budget, research funding relationships,
        or corporate partnership oversight.
    - name: "Glen Shor"
      role: "Director"
      mit_compensation: "$950,529 (FY2025)"
      external: false
      notes: >
        MIT Executive Vice President and Treasurer. Responsible for MIT's financial
        operations, including managing relationships with corporate funders. Manages
        MIT's $27.4B endowment through MITIMCo. Now the HIGHEST-COMPENSATED MIT
        administrator on the board following Schmittlein's death. His role is even more
        critical under the OBBBA 8% endowment tax regime — he must manage MIT's
        investment portfolio to minimize taxable NII while maintaining returns.
    - name: "Josh Macht"
      role: "Director"
      mit_compensation: "$0"
      external: true
      notes: "External board member."
    - name: "Lara Boro"
      role: "Director"
      mit_compensation: "$0"
      external: true
      notes: "External board member."
    - name: "Whitney Espich"
      role: "Director"
      mit_compensation: "$351,240 (FY2025)"
      external: false
      notes: "MIT administrator. On the board since at least FY2017."
    - name: "Peter Caruso"
      role: "Clerk"
      mit_compensation: "$0"
      external: true
      notes: "Legal clerk for the nonprofit."
