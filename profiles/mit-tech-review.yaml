      external: false
      death_date: "2025-03-13"
      notes: >
        MIT Sloan School of Management Dean. Died March 13, 2025 per FY2025 990 filing.
        Board seat now VACANT. Schmittlein was one of the highest-compensated MIT
        administrators on the board ($1.05M FY2024). Sloan has extensive corporate
        partnerships and executive education programs with tech companies. His death
        reduces the board from 8 to 7 members and opens a question about whether MIT
