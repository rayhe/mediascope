    source_url: "https://digiday.com/media/how-mit-technology-review-shifted-its-largest-event-to-streaming/"
  - type: "obbba_royalty_tax_feedback_loop"
    description: >
      The OBBBA's inclusion of "Federally-Subsidized Royalty Income" in the endowment tax
      base creates a novel FEEDBACK LOOP between MIT's corporate research partnerships and
      its tax liability. MIT's bilateral research programs with Google ($130K/project),
      Amazon (MIT-Amazon Science Hub), IBM ($240M Watson Lab), Apple (CSAIL Alliance), and
      others generate patents and IP developed with federal co-funding. Royalties from these
      patents are now TAXED at 8% under the OBBBA. This means the SAME corporate partnerships
      that create editorial conflicts for MIT TR also generate taxable royalty income for MIT.
      MIT now has a financial incentive to either (a) reduce royalty-generating research
      (unlikely), (b) restructure IP ownership (blocked by anti-avoidance regulations), or
      (c) increase enrollment to lower the per-student endowment ratio below $2M (also
      unlikely for MIT). The institutional budget pressure from the ~5.7x tax increase may
      make MIT MORE dependent on corporate research funding and event sponsorship revenue
      (which flows through MIT TR) — potentially DEEPENING existing editorial conflicts rather
      than reducing them. Technology Review Inc. itself is likely a "related organization"
      under the OBBBA, meaning its $6.5M in assets are counted in MIT's endowment calculation.
    severity: 3
    evidence: >
      OBBBA signed July 4, 2025. MIT endowment $27.4B / 11,816 students = $2.32M/student
      (8% tier). "Federally-Subsidized Royalty Income" defined in amended IRC §4968.
      Congressional estimate: $761M over 10 years across all 15 affected institutions.
      MIT patent portfolio generates royalties from inventions co-funded by federal agencies.
    source_urls:
      - "https://www.faegredrinker.com/en/insights/publications/2025/7/college-and-university-endowment-tax-in-the-obbba"
      - "https://www.foley.com/p/102ktmm/changes-to-the-college-and-university-endowment-tax/"
