known_conflicts:
  - type: "institutional_governance"
    description: >
      MIT administrators who control Technology Review Inc.'s board are simultaneously
      responsible for managing MIT's corporate research funding relationships with the
      same companies the publication covers. Following David Schmittlein's death (March 13,
      2025) and Cynthia Barnhart's departure as MIT Provost (June 30, 2025), the board's
      MIT administrator presence shifted: Barnhart retains her Co-Chair seat but now as a
      faculty member without operational authority; Glen Shor ($950K from MIT, FY2025)
      manages MIT's financial operations; Whitney Espich ($351K, FY2025) leads MIT's
      corporate engagement office. Board composition is now 3 MIT-affiliated of 7 members
      (down from 4 of 8), though one external seat has been vacant since Schmittlein's death.
      The NEW provost, Anantha Chandrakasan, does NOT sit on MIT TR's board but holds deeper
      corporate partnership ties than Barnhart — he chairs the MIT-IBM Computing Research Lab,
      co-founded the MIT-Takeda Program, and oversaw the Schwarzman College creation. This
      creates a split: operational corporate partnership authority (Chandrakasan as provost)
      is structurally separated from MIT TR board governance (Barnhart as former provost).
      There is no structural firewall equivalent to the Scott Trust (Guardian) or dual-class
      shares (NYT).
    severity: 4
    evidence: "Form 990 filings FY2024-FY2025 (ProPublica Nonprofit Explorer). FY2025 990 (filed May 15, 2026) shows Schmittlein as 'Director (Deceased 3/13/2025)'. Board composition now 3 MIT-affiliated of 7 members. Barnhart comp $1,084,227 (FY2025, final provost year). Shor comp $950,529 (FY2025). Espich comp $351,240 (FY2025)."
    source_url: "https://projects.propublica.org/nonprofits/organizations/954893200"
  - type: "institutional_funding_paradox"
    description: "MIT receives $174M+ annually from industry research sponsors (23% of total research expenditures). Named bilateral partnerships exist with Google (MIT-Google Program), Amazon (MIT-Amazon Science Hub), IBM ($240M Watson Lab), and others — all companies MIT TR covers critically. The publication claims editorial independence but its parent institution depends structurally on these relationships. Unlike Wired/Condé Nast (where the conflict is competitive — Advance owns Meta's competitor Reddit), MIT TR's conflict is COOPERATIVE — MIT's parent takes money FROM the companies being covered."
