known_conflicts:
  - type: "institutional_governance"
    description: "MIT administrators who control Technology Review Inc.'s board are simultaneously responsible for managing MIT's corporate research funding relationships with the same companies the publication covers. MIT Provost Cynthia Barnhart (board Co-Chair, $987K from MIT) oversees academic relationships including those with Google, Amazon, IBM. MIT EVP/Treasurer Glen Shor ($883K, board Director) manages MIT's financial operations. MIT Sloan Dean David Schmittlein ($1.05M, board Director) leads a school with extensive corporate partnerships. There is no structural firewall equivalent to the Scott Trust (Guardian) or dual-class shares (NYT)."
    severity: 4
    evidence: "Form 990 filings (ProPublica Nonprofit Explorer). Board composition shows 4 of 8 members are MIT administrators compensated $333K-$1.05M by MIT."
    source_url: "https://projects.propublica.org/nonprofits/organizations/954893200"
  - type: "institutional_funding_paradox"
    description: "MIT receives $174M+ annually from industry research sponsors (23% of total research expenditures). Named bilateral partnerships exist with Google (MIT-Google Program), Amazon (MIT-Amazon Science Hub), IBM ($240M Watson Lab), and others — all companies MIT TR covers critically. The publication claims editorial independence but its parent institution depends structurally on these relationships. Unlike Wired/Condé Nast (where the conflict is competitive — Advance owns Meta's competitor Reddit), MIT TR's conflict is COOPERATIVE — MIT's parent takes money FROM the companies being covered."
    severity: 4
    evidence: "MIT Facts FY2020 research expenditures. MIT Schwarzman College industry programs page. MIT-IBM Watson AI Lab announcement."
    source_url: "https://facts.mit.edu"
  - type: "epstein_governance_scandal"
    description: "Three former Technology Review Inc. board members were directly connected to the MIT-Epstein scandal: (1) Joichi Ito (board FY2018-2020) actively solicited $525K from Epstein for Media Lab and $1.2M for personal ventures, resigned Sept 2019; (2) Israel Ruiz (board FY2019-2020) was one of three MIT VPs who approved Epstein's post-conviction donations under an 'informal framework'; (3) Martin Schmidt (Chair through FY2022) was the MIT Provost tasked with investigating the Epstein donations. MIT TR covered the scandal aggressively (Gideon Lichfield was EIC at the time) — but the fact that Ito and Ruiz sat on the publication's own board while the donations were happening is itself a governance failure."
    severity: 3
    evidence: "Form 990 filings show Ito and Ruiz as directors. Goodwin Procter 61-page report. MIT News release (Jan 2020). MIT TR's own coverage by Lichfield."
    source_url: "https://news.mit.edu/2020/mit-releases-results-fact-finding-jeffrey-epstein-0110"
  - type: "sensetime_partnership"
    description: "MIT formed the MIT-SenseTime Alliance on AI in February 2018, funding 27 research projects across all five MIT schools. SenseTime was placed on the US Commerce Department Entity List in October 2019 for enabling human rights violations against Uyghurs in Xinjiang, on the US Treasury CMIC list in December 2021, and on the DoD 'Chinese Military Companies' list (2024 NDAA revision). MIT kept SenseTime's donation but put additional uses on hold and paused new proposals/fellowships. MIT media relations now claims 'MIT does not have any sponsored research collaborations or activities with SenseTime' (present tense). SenseTime has since pivoted to LLMs and joined China's 'Model-Chip Ecosystem Innovation Alliance' alongside Huawei. iFlyTek ('China's Siri') also had a separate 5-year CSAIL collaboration — establishing a pattern of two Chinese AI companies with formal MIT research partnerships."
    severity: 3
    evidence: "MIT News announcement (Feb 2018). US Entity List addition (Oct 2019). US Treasury CMIC list (Dec 2021). DoD CMC list (2024 NDAA). MIT media relations statement on frozen funds. iFlyTek CSAIL collaboration confirmed via Alliance Program page."
    source_url: "https://news.mit.edu/2018/mit-sensetime-announce-effort-advance-artificial-intelligence-research-0228"
  - type: "csail_corporate_affiliates"
    description: "MIT CSAIL Alliance Program members include Apple, Microsoft, Qualcomm, Samsung Ventures, Dell EMC, Red Hat, Lenovo, Northrop Grumman, Raytheon Technologies, Mercedes-Benz, Jane Street, and Khosla Ventures. These companies get research access and recruiting pipelines. MIT TR covers many of these companies — particularly Apple, Microsoft, Samsung, Qualcomm — while MIT's premier CS lab has a paid affiliate relationship with them. Apple's membership is especially notable as it is rarely disclosed as a conflict in MIT TR's Apple coverage."
    severity: 2
    evidence: "CSAIL Alliance Program membership page. Cross-referenced with MIT TR coverage of Apple, Microsoft, Qualcomm, Samsung."
    source_url: "https://www.csail.mit.edu/about/alliance-program"
  - type: "genai_divide_institutional_conflict"
    description: "MIT researchers published 'The GenAI Divide' (Project NANDA, 2025): ~95% of organizations saw no measurable financial return from generative AI despite $30-40B in enterprise spending. This is one of the most significant anti-AI-hype research findings from any institution — and it comes from MIT TR's own parent. MIT TR's AI coverage must navigate between its parent institution's skeptical research findings and the fact that the same parent institution receives hundreds of millions from AI companies (Google, IBM, Amazon, Microsoft, Apple, Meta). The tension between MIT research showing AI underdelivers and MIT's financial dependence on AI industry funding is a unique institutional conflict."
    severity: 2
    evidence: "MIT Project NANDA 'The GenAI Divide' (2025). MIT industry research expenditures. MIT TR AI coverage volume."
    source_url: "https://mitsloan.mit.edu/ideas-made-to-matter/genai-divide"
  - type: "event_sponsorship"
    description: "EmTech conferences generate ~33% of MIT TR's revenue via tech company sponsorships. 2026 partners include HPE, Ascendion, GC Cybersecurity, Box, Samsung Next, Micron. VP of Sales Andrew Hendler ($289K) is the contact for sponsorships AND one of the highest-compensated employees. The publication covers companies that sponsor its events."
    severity: 3
