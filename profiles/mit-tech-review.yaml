  mit_ilp:
    description: >
      MIT Industrial Liaison Program (ILP), founded 1948, is one of the oldest
      university-industry bridge programs in the world. ~240 member companies pay annual
      fees for access to MIT faculty, research, recruiting pipelines, and technology
      transfer. Executive Director: Gayathri Srinivasan (also titled Executive Director
      of MIT Corporate Relations). Operates under the RISE framework — Research,
      Innovation, Students, and Education — that "drives transformative industry
      engagements" (Srinivasan, Union Properties announcement, Feb 2026).
      
      The ILP is a BROAD institutional funding channel — 240 companies across
      industries — that complements the more targeted bilateral partnerships (Google,
      Amazon, IBM) and lab-specific programs (CSAIL Alliance). Many ILP members are
      technology companies whose products and strategies MIT TR covers.
      
      The ILP also connects to MIT Startup Exchange (STEX), which promotes collaboration
      between MIT-connected startups and ILP member companies. Recent events include
      MIT Tokyo Health Science & Semiconductors Symposium (Jun 22, 2026), MIT AI &
      Robotics Conference (Jun 23, 2026, Tokyo), and "Trustworthy AI Agents" webinar
      (Jun 25, 2026). These international events extend MIT's corporate relationships
      globally, including with companies MIT TR covers.
      
      NOTABLE: The UK's HRUC National Innovation Challenge (schools/colleges program)
      partners with MIT ILP. Amazon is platinum sponsor. This extends the ILP brand
      to educational pipeline programs co-branded with companies MIT TR covers.
    founded: "1948"
    member_count: "~240"
    executive_director: "Gayathri Srinivasan"
