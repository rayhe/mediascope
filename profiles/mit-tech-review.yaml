    description: "Mat Honan (EIC since Aug 2021) was a Wired senior writer and columnist before moving to BuzzFeed News. Gideon Lichfield (EIC 2017-2020) LEFT MIT TR to become Wired's EIC — the reverse of Karen Hao's departure path. Will Knight left MIT TR for Wired in 2018 after 13 years. These journalist migrations between MIT TR and Wired create editorial culture connections, though MIT TR's nonprofit/institutional structure is fundamentally different from Condé Nast's."
