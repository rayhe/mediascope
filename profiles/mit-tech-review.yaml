  daf_mit_ai_accelerator:
    description: >
      The Department of the Air Force–MIT AI Accelerator (AIA) is a cooperative
      agreement signed in 2019 between MIT and the U.S. Department of the Air Force.
      Established under Executive Order 13859 (American AI Initiative). The Air Force
      invests approximately $15M per year. The AIA creates interdisciplinary teams of
      MIT researchers, faculty, students, and embedded active-duty military personnel
      (12 active duty + 4 reservists as of 2022) to develop AI for military and
      societal applications. ~140 faculty, researchers, and students from MIT campus +
      Lincoln Laboratory participate. Over 20 research projects.
      
      MIT-SIDE DIRECTOR: Daniela Rus — who also directs MIT CSAIL AND served on the
      Defense Innovation Board advising defense secretaries. This triple role (CSAIL
      director + AI Accelerator director + Defense Innovation Board) represents a
      particularly dense network of defense-AI-academic connections.
      
      RESEARCH AREAS: Autonomous robot collaboration, AI-enhanced air mobility planning
      (CAITT — NLP for military chat analysis), secure networking, disaster response,
      medical readiness, objective performance prediction, test pilot training.
      
      CONFLICT SIGNIFICANCE: The AIA bridges Lincoln Lab's defense mission with MIT
      campus AI research, creating institutional incentives for MIT TR to cover military
      AI favorably. The AIA's explicit mandate includes technology transfer from MIT
      to Air Force/Space Force operations — MIT TR covering AI for military use while
      its parent institution is actively developing and transferring that technology is
      a structural conflict. Cooperative Agreement Number: FA8750-19-2-1000.
    funding: "~$15M/year from Department of the Air Force"
    established: "2019"
    mit_director: "Daniela Rus (also CSAIL director, Defense Innovation Board member)"
    projects: "20+"
    participants: "~140 faculty, researchers, students (MIT campus + Lincoln Lab) + 16 military personnel"
    cooperative_agreement: "FA8750-19-2-1000"
