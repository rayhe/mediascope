name: "The Atlantic"
slug: "atlantic"
url: "https://www.theatlantic.com"

rss_feeds:
  - url: "https://www.theatlantic.com/feed/all/"
    category: "main"
  - url: "https://www.theatlantic.com/feed/channel/technology/"
    category: "technology"

ownership_chain:
  - name: "The Atlantic"
    entity_type: "publisher"
    description: "Founded 1857. Digital-first pivot under current ownership. 1M+ subscribers. Circulation grew 14% in 2023 and 2024; 20%+ readership gain in 2025."
  - name: "Atlantic Media"
    entity_type: "parent_company"
    description: "Majority owned by Emerson Collective since July 2017. David G. Bradley retained minority share initially; Emerson likely acquired full ownership."
  - name: "Emerson Collective"
    entity_type: "holding_company"
    description: "Founded and led by Laurene Powell Jobs. Impact-focused (education, environment, healthcare). 130+ investments, majority in technology. KEY: $1B+ invested in AI startups since 2022."
    investments:
      - entity: "Apple"
        relationship: "Laurene Powell Jobs is Steve Jobs' widow. LPJ Trust holds massive Apple stock (~$16B+). Among Apple's largest individual shareholders."
        competitive_with: ["Meta"]
      - entity: "Mistral AI"
        relationship: "Emerson Collective participated in Mistral's $415M Series A (Dec 2023) and/or $640M Series B (Jun 2024). Mistral is a direct Meta AI competitor (open-source LLMs vs Llama)."
        competitive_with: ["Meta"]
        source_url: "https://siliconangle.com/2023/12/11/open-source-generative-ai-startup-mistral-ai-raises-415m-funding/"
      - entity: "World Labs"
        relationship: "Emerson Collective participated in World Labs' $1B fundraising (2025/2026). World Labs builds 3D AI world models (Marble product)."
        competitive_with: ["Meta"]
        source_url: "https://intellectia.ai/laurene-powell-jobs-invests-in-ai-startups-amid-bubble-fears"
      - entity: "Formation Bio"
        relationship: "Emerson Collective participated in Formation Bio's $372M round. AI-driven pharmaceutical company."
        competitive_with: []
      - entity: "Zap Energy"
        relationship: "Emerson Collective invested in $130M round (2024). Fusion energy startup."
        competitive_with: []
        source_url: "https://techcrunch.com/2024/10/07/zap-energy-investors/"
      - entity: "Axios"
        relationship: "Early Emerson Collective investment in news startup Axios. Axios competes with Atlantic for digital news audience."
        competitive_with: []
  - name: "Laurene Powell Jobs"
    entity_type: "individual"
    description: "Net worth ~$11.5-16B (estimates vary). Apple connection through inheritance. Deep AI investment portfolio through Emerson Collective. Also invested in education, environment, social justice."

revenue_relationships:
  - partner: "Apple"
    relationship_type: "indirect_financial"
    estimated_value: "~$16B+ (stock holdings)"
    description: "Owner LPJ holds massive Apple stock. Apple competes with Meta in hardware (Vision Pro vs Quest), AI (Apple Intelligence vs Meta AI), and privacy positioning. Apple's 'privacy' narrative directly undermines Meta's advertising business."
    date_established: "1997 (Jobs era)"
    source_url: ""
  - partner: "OpenAI"
    relationship_type: "licensing_deal"
    estimated_value: "Undisclosed (News Corp deal was $250M/5yr for reference)"
    description: "Multi-year licensing and product development deal announced May 29, 2024. OpenAI can display Atlantic content in ChatGPT and use archived content for model training. Atlantic gets OpenAI tech access and feedback channel. Also includes 'Atlantic Labs' experimental microsite development. OpenAI is a direct Meta AI competitor."
    date_established: "2024-05"
    source_url: "https://www.thewrap.com/vox-media-atlantic-openai-licensing-partnerships/"
    competitive_with: ["Meta"]

editorial_leadership:
  - name: "Jeffrey Goldberg"
    title: "Editor-in-Chief"
    start: "2016-10"
    editorial_stance: "Anti-AI-hype editorial direction. Focuses on AI threats to democracy, labor, creative industries. Notably backed union demand for OpenAI deal transparency despite greenlighting the deal."
  - name: "Nicholas Thompson"
    title: "CEO"
    start: "2020-12"
    editorial_stance: "CRITICAL: Former Wired EIC (2017-2020). Creates direct Condé Nast → Atlantic editorial pipeline. Wrote two Facebook cover stories cited in Congress while at Wired. At Atlantic: drove profitability, record subscriptions, 3 Pulitzer Prizes, and the OpenAI licensing deal. Co-founded Speakeasy AI. 'I'm absolutely convinced these deals can be beneficial.'"
    source_url: "https://www.weforum.org/people/nicholas-thompson/"
  - name: "Adrienne LaFrance"
    title: "Executive Editor"
    start: "2019-05"
    editorial_stance: "Promoted from staff writer. Known for anti-tech-platforms investigations. Wrote 'Facebook is a Doomsday Machine' (Dec 2020). QAnon coverage. Signals further editorial turn against Big Tech."
  - name: "Peter Lattman"
    title: "Vice Chairman"
    start: "2017-07"
    editorial_stance: "Emerson Collective staffer placed as vice chairman at acquisition. Direct LPJ representative in Atlantic governance."
    source_url: "https://en.wikipedia.org/wiki/The_Atlantic"

key_journalists:
  - name: "Ian Bogost"
    beat: "Technology criticism"
    known_patterns: "Philosophical/cultural criticism of tech industry. Anti-AI-hype stance. Georgia Tech academic background."
  - name: "Charlie Warzel"
    beat: "Technology, media, politics"
    known_patterns: "Former NYT Opinion, BuzzFeed News. Critical of tech platforms, disinformation. Galaxy Brain newsletter. Anti-Big-Tech stance across 3 outlets."
  - name: "Adrienne LaFrance"
    beat: "Technology (exec editor + writer)"
    known_patterns: "Wrote 'Facebook is a Doomsday Machine' (2020), foundational anti-Facebook framing."
  - name: "Karen Hao"
    beat: "AI (from MIT Tech Review)"
    known_patterns: "Highly critical AI coverage. 'How Facebook got addicted to spreading misinformation' (2021) at MIT TR. Tests whether adversarial tone is portable."
  - name: "Matteo Wong"
    beat: "AI and technology"
    known_patterns: "Atlantic's primary AI voice. Covers chatbot harms (Grok, ChatGPT), AI safety tensions (Anthropic), labor displacement. Rose from assistant editor to staff writer. Harvard Crimson → Atlantic pipeline."
  - name: "Alex Reisner"
    beat: "AI training data investigations"
    known_patterns: "Atlantic's AI Watchdog project lead. Broke Books3 story (190K pirated books in Meta/LLaMA training). Built searchable databases for Books3 and YouTube AI training data. Programmer-journalist hybrid. Contributing writer 2023 → staff writer Oct 2025."
  - name: "Kaitlyn Tiffany"
    beat: "Internet culture, online platforms"
    known_patterns: "Covers platform power, fandom, internet culture. Author of 'Everything I Need I Get From You' (2022). Verge → Vox → Atlantic pipeline. Co-writes Famous People newsletter."
  - name: "Ali Breland"
    beat: "Disinformation, extremism, tech-politics"
    known_patterns: "Nick Fuentes specialist. Mother Jones → Atlantic. Covers far-right digital infrastructure, platform manipulation, extremism-technology intersection. Livingston Award finalist."

known_conflicts:
  - type: "investment"
    description: "Owner Laurene Powell Jobs holds ~$16B+ in Apple stock. Apple directly competes with Meta in hardware, AI, and uses 'privacy' narrative that undermines Meta's advertising model."
    severity: 4
    evidence: "Forbes wealth estimates, Apple shareholder records"
    source_url: ""
  - type: "investment"
    description: "Emerson Collective has invested $1B+ in AI startups since 2022, including Mistral AI ($415M round), World Labs ($1B round), and Formation Bio ($372M round). Mistral's open-source LLMs directly compete with Meta's Llama. These investments create financial incentive for Atlantic coverage that benefits OpenAI-alternative/anti-Meta-AI narratives."
    severity: 3
    evidence: "CNBC/Fintrx data, TechCrunch, Intellectia.ai. 9+ AI startup investments since 2022."
    source_url: "https://futurefamilyoffice.net/emerson-collective-fuels-ai-revolution-with-1b-in-startup-backing/"
  - type: "licensing_deal"
    description: "Atlantic has a multi-year licensing deal with OpenAI (May 2024). OpenAI is Meta's direct AI competitor. Financial terms undisclosed but News Corp's comparable deal was $250M/5yr. Creates financial incentive to cover OpenAI favorably and Meta AI negatively."
    severity: 3
    evidence: "VentureBeat, Bloomberg Tax, The Wrap, Axios reporting. Atlantic union demanded transparency on deal terms."
    source_url: "https://www.thewrap.com/the-atlantic-union-demands-transparency-of-openai-deal-terms/"
  - type: "editorial_bias"
    description: "Adrienne LaFrance's 2020 'Facebook is a Doomsday Machine' article established The Atlantic's adversarial editorial posture toward Meta specifically."
    severity: 3
    evidence: "Published article, subsequent editorial direction"
    source_url: "https://www.theatlantic.com/technology/archive/2020/12/facebook-doomsday-machine/617384/"
  - type: "executive_pipeline"
    description: "CEO Nicholas Thompson was Wired EIC (2017-2020) — the same publication with the strongest anti-Meta editorial stance. He wrote two Facebook cover stories cited in Congress while at Wired. Creates a direct Condé Nast → Atlantic editorial culture bridge."
    severity: 2
    evidence: "Thompson career history, Wired Facebook coverage, Congressional citations"
    source_url: "https://www.nytimes.com/2017/01/17/business/media/wired-nicholas-thompson-editor.html"

litigation_connections: []

ai_crawl_policy:
  blocks_gptbot: false
  blocks_ccbot: true
  blocks_google_extended: true
  notes: "Has licensing deal with OpenAI (May 2024). Allows GPTBot. Blocks Common Crawl and Google-Extended. Atlantic union demanded deal transparency; EIC Goldberg backed union's statement."

target_entities:
  "Meta":
    aliases: ["Meta", "Facebook", "Instagram", "WhatsApp", "Mark Zuckerberg"]
    regex: "\\b(Meta(?! tag| data)|Facebook|Instagram|WhatsApp|Zuckerberg)\\b"
  "Apple":
    aliases: ["Apple", "iPhone", "Tim Cook", "Apple Intelligence"]
    regex: "\\b(Apple(?! pie)|iPhone|Tim Cook|Apple Intelligence)\\b"
  "OpenAI":
    aliases: ["OpenAI", "ChatGPT", "Sam Altman", "GPT"]
    regex: "\\b(OpenAI|ChatGPT|Sam Altman|GPT-[0-9])\\b"

bias_ratings:
