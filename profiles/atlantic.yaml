        competitive_with: ["Meta"]
        source_url: "https://siliconangle.com/2023/12/11/open-source-generative-ai-startup-mistral-ai-raises-415m-funding/"
      - entity: "World Labs"
        relationship: >
          Emerson Collective participated in World Labs' $1 BILLION funding round (announced Feb 18,
          2026). World Labs, founded by AI pioneer Fei-Fei Li ("godmother of AI"), builds spatial
          intelligence AI — foundational models that perceive, generate, and interact with 3D worlds.
          Product: Marble world model (generates editable, downloadable 3D environments from image/text
          prompts using Gaussian splatting). Tiered subscription: free → $95/month.
          
          Other investors in the $1B round: AMD, Nvidia, Autodesk ($200M strategic investment + advisor
          role), Fidelity Management & Research, Sea. Valuation ~$5B (Bloomberg, Jan 2026 report).
          Prior: $230M seed (Sep 2024) at $1B valuation. Co-founders: Ben Mildenhall (NeRF co-creator),
          Justin Johnson (real-time style transfer, deployed by Meta/Snap), Christoph Lassner (Pulsar
          renderer pioneer).
          
          CRITICAL META COMPETITION: Fei-Fei Li has explicitly stated spatial intelligence models
          "could be put to use in the future for augmented and virtual reality or robotics" — this
          puts World Labs in DIRECT COMPETITION with Meta's Reality Labs, which is spending $4B+/quarter
          building AR/VR/spatial computing platforms. World Labs' Marble generates 3D environments
          comparable to what Meta is building for Quest/Horizon Worlds. Justin Johnson (co-founder)
          previously deployed style transfer tech AT Meta — he left to compete against them.
          
          ADDITIONAL CONTEXT: Yann LeCun left Meta to launch AMI Labs focusing on world models,
          confirming that spatial/world model AI is a core competitive frontier between Meta and
          AI startups. EC's investment in World Labs positions The Atlantic's owner financially
          on the side of a direct Meta competitor in spatial computing.
        competitive_with: ["Meta"]
        source_urls:
          - "https://reuters.com/technology/ai-pioneer-fei-fei-lis-world-labs-raises-1-billion-funding-2026-02-18/"
          - "https://techcrunch.com/2026/02/18/world-labs-1b-autodesk/"
          - "https://news.crunchbase.com/ai/world-labs-biggest-funding-rounds-weekly/"
          - "https://spectrum.ieee.org/fei-fei-li-world-labs"
        notes: >
          Strengthens the pattern: EC/LPJ now has financial positions in FIVE direct Meta
          competitors — Apple (via LPJ Trust, $16B+ stock), Disney (via LPJ Trust, ~$3.9B+ stock),
          OpenAI (via io Products exit + licensing),
          Mistral (open-source LLMs vs Llama), and World Labs (spatial AI/3D vs Reality Labs). Each
          investment creates editorial incentive for Atlantic coverage that frames Meta's competitive
          position negatively.
