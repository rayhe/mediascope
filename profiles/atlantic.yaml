litigation_connections:
  - type: "strategic_non-litigation"
    description: >
      CRITICAL NEGATIVE FINDING: The Atlantic has ZERO active litigation against AI companies.
      This is analytically significant because: (1) NYT sued OpenAI in Dec 2023 — 5 months later
      Atlantic signed a licensing deal (May 2024), choosing the opposite approach. (2) Atlantic's
      own Alex Reisner exposed that Meta's LLaMA was trained on 190K pirated books (Books3), but
      the publication did not sue Meta — it reported the story while its owner invested in Meta's
      AI competitors. (3) Nearly 400 newspapers sued OpenAI/Microsoft (June 2026, SDNY), but
      Atlantic is conspicuously absent from the plaintiff list. (4) The Atlantic chose revenue
      (OpenAI licensing fees) over enforcement (copyright litigation). This strategic alignment
      with AI companies rather than with fellow publishers shapes the Atlantic's incentive
      structure: it benefits when OpenAI succeeds, unlike litigating publishers.
    evidence: "Bloomberg Law (June 2026 publisher lawsuit), NYT v. OpenAI (Dec 2023), Books3 investigation."
    source_urls:
      - "https://news.bloomberglaw.com/ip-law/openai-microsoft-sued-by-publishers-for-scraping-articles"
  - type: "union_bargaining_dispute"
    description: >
      Atlantic Union (NewsGuild of New York) demanded transparency on OpenAI deal terms (May 30,
      2024). ~60 journalists signed letter to Goldberg and Thompson demanding AI contract
      protections (July 2024). Union statement: 'deeply troubled by the opaque agreement' and
      'management's complete lack of transparency.' Thompson and OpenAI refused to answer questions,
      directing staff to outside reporting. Union demands: make deal terms available immediately,
      address questions 'without spin,' and negotiate contract language protecting jobs from AI.
      EIC Goldberg backed union's transparency demand publicly but the deal proceeded without
      full disclosure to staff.
      
      RESOLUTION (2026): NewsGuild of New York reached a contract deal with The Atlantic after
      2+ years of bargaining. Key AI-specific provisions:
        - Editorial unit gets oversight and limits on AI use in newsroom
        - Transparency and disclosure standards for AI-assisted content
        - Deepfake prohibitions
        - 4 extra weeks severance for AI-related layoffs (beyond standard severance)
        - Salary floors: $66K (Business/Tech unit), $69K (Edit unit)
        - No mandatory four-day RTO until 2026
      This makes the Atlantic one of the first major publications with contractual AI guardrails
      negotiated through collective bargaining.
    evidence: "The Wrap, NYGuild press release, TechCrunch, Ars Technica, NewsGuild contract announcement."
    source_urls:
      - "https://www.thewrap.com/the-atlantic-union-demands-transparency-of-openai-deal-terms/"
      - "https://nyguild.org/news/the-atlantic-union-we-must-have-a-voice-in-how-ai-affects-our-work"
      - "https://techcrunch.com/2024/06/whats-in-it-for-us-journalists-ask-as-publications-sign-content-deals-with-ai-firms/"

