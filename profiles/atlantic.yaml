ownership_chain:
  - name: "The Atlantic"
    entity_type: "publisher"
    description: >
      Founded 1857. Digital-first pivot under current ownership. "Well over 1.4 million"
      subscriptions (Jan 2026), up from 1M+ in mid-2024. Revenue over $100M (2024), profitable
      since March 2024. Subscription revenue up 15% YoY, overall revenue up 10%. 70%+ retention
      rate. 50M+ monthly readership. NPR described it as a "thinkpiece factory."
      
      4 subscription tiers (as of Jan 14, 2026):
        - Digital: $79.99/yr
        - Print+Digital: $89.99/yr  
        - Premium: $120/yr (ad-free, includes 1 gift subscription). Legacy plan.
        - Premium Plus: $199/yr (NEW, launched Jan 14, 2026 — first new tier since 2019).
          Includes ad-free web/app for primary holder + 3 additional digital subscriptions
          for friends/family (most requested feature). Includes keepsake coffee-table book
          and Atlantic tote. Also offers academic rate for students/educators.
      
      Dynamic pricing (introduced early 2024): "smart meter" paywall, behavioral targeting,
      variable pricing $60-100 based on likelihood to subscribe. Has increased ARPU without
      impacting churn/bounce.
      
      EVENTS & PARTNERSHIPS (new revenue streams):
        - AtlanticLIVE (longstanding events line)
        - Atlantic Across America (launched Dec 2025): 3-year initiative bringing Atlantic
          journalists to cities in all 50 states. Part of broader audience engagement push.
        - Seabourn ultra-luxury cruise partnership (announced ~Mar 2026): 3-year deal with
          Seabourn (6-ship fleet). Atlantic programming on select voyages 2026-2027,
          culminating in 12-day Seabourn Quest sailing Montréal→Boston (Oct 4, 2028). Guests
          receive free digital access onboard + complimentary 3-month post-trip subscription.
          Atlantic curates onboard libraries with recent issues and writer books.
        - Atlantic 57 (consulting division)
        - CivicScience advertising partnership (Sep 2025)
        - NewsGuard AI co-marketing partnership (Jun 2026)
      
      Chief Growth Officer: Megha Garibaldi. Chief Product Officer: Jefferson Rabb.
    financial_sources:
      - "https://www.editorandpublisher.com/stories/atlantic-tops-1-million-subscriptions/254812"
      - "https://pugpig.com/the-atlantic-turnaround/"
      - "https://wan-ifra.org/insight/how-the-atlantic-keeps-subscribers/"
      - "https://subscriptioninsider.com/the-atlantic-launches-premium-plus/"
      - "https://subscriptioninsider.com/the-atlantic-builds-beyond-content/"
  - name: "Atlantic Media"
    entity_type: "parent_company"
    description: >
      Majority owned by Emerson Collective since July 2017. David G. Bradley retained minority
      stake; Atlantic Media still holds minority share as of 2020 (per Wikipedia). Bradley remains
      active in media investing: PitchBook shows investments in Semafor (Jan 2026) and Charter
      (Jun 2022, exited Jun 2025).
  - name: "Emerson Collective"
    entity_type: "holding_company"
    description: >
      Founded 2004 by Laurene Powell Jobs. Structured as a Limited Liability Corporation (LLC),
      NOT a 501(c)(3) nonprofit — this is a deliberate legal choice that allows for-profit
      investing, political advocacy, and reduced disclosure compared to a traditional foundation.
      The LLC is owned by the Emerson Collective Foundation (a 501(c)(3)), which in turn operates
      the Waverley Street Foundation as its philanthropic arm (~$2.74B assets as of May 2026).
      This nested LLC-inside-foundation structure means EC's financial activities — including
      for-profit investments and The Atlantic — are shielded from public 990 disclosure.
      Inside Philanthropy named LPJ its "Least Transparent Mega-Giver" of the year (2019).
      Venture team invests across AI, climate, healthcare, fintech, edtech, future of work,
      and media. 130+ investments, majority in technology. $1B+ invested in AI startups since 2022.
    legal_structure:
      type: "LLC (Limited Liability Corporation)"
      parent_entity: "Emerson Collective Foundation (501(c)(3))"
      philanthropic_arm: "Waverley Street Foundation"
      waverley_assets: "$2.74B (May 2026)"
      transparency_note: >
        LLC structure shields investment activities from public disclosure.
        Foundation 990 shows grants but not LLC investment portfolio.
        Named "Least Transparent Mega-Giver" by Inside Philanthropy (2019).
      source_urls:
        - "https://influencewatch.org/non-profit/emerson-collective/"
        - "https://devex.com/news/inside-emerson-collective-s-vision-of-frictionless-support-for-grantees-93745"
        - "https://projects.propublica.org/nonprofits/organizations/954893200"
    investments:
      - entity: "Apple (via LPJ Trust)"
        relationship: >
          Laurene Powell Jobs is Steve Jobs' widow. LPJ Trust holds massive Apple stock.
          Apple (AAPL) at $294.30/share (Jun 24, 2026), market cap ~$4.37T.
          LPJ estimated to hold ~$16B+ in Apple stock. Among Apple's largest individual shareholders.
        competitive_with: ["Meta"]
        notes: "Apple competes with Meta in hardware (Vision Pro vs Quest), AI (Apple Intelligence vs Meta AI), and uses 'privacy' narrative that undermines Meta's advertising model."
      - entity: "Walt Disney Company (via LPJ Trust)"
        relationship: >
          LPJ Trust inherited a massive Disney stake from Steve Jobs' Pixar acquisition (Disney
          acquired Pixar in 2006, making Jobs Disney's largest individual shareholder at ~7%).
          SEC filing history:
            - 2014 (SC 13G): LPJ Trust held 128,566,602 shares = 7.6% of Disney
            - ~2015: Stake reduced to ~64M shares (~4%), dropping below 5% disclosure threshold
            - 2016 (SC 13G/A, Amendment 2): 40,284,667 shares = 2.5% of Disney
            - Post-2016: Below SEC reporting threshold; current holdings unknown but presumed
              to retain some position given no public report of full divestiture.
          Disney (DIS) at ~$95.71/share (Jun 2026), market cap ~$168B.
          Even the reduced 2016 position (40.3M shares) would be worth ~$3.9B at current prices.
        competitive_with: ["Meta"]
        source_urls:
          - "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001540902&type=SC%2013G&dateb=&owner=include&count=40"
          - "https://en.wikipedia.org/wiki/Laurene_Powell_Jobs"
          - "https://www.cultofmac.com/356802/laurene-powell-jobs-slashed-her-disney-stake-in-half/"
        notes: >
          MAJOR UNDOCUMENTED CONFLICT: Disney owns Hulu, Disney+, ABC, ESPN, 20th Century Studios,
          and National Geographic. Disney competes with Meta in: (1) streaming/content vs Meta's
          video platforms (Facebook Watch, Instagram Reels), (2) advertising revenue (Disney's ad-
          supported tiers compete for the same brand budgets), (3) attention economy (Disney parks,
          streaming, sports all compete for consumer time). ESPN's streaming pivot and Disney+'s
          ad tier put Disney in direct competition with Meta's advertising business model. This
          stake is potentially the SECOND-LARGEST financial conflict after Apple — yet it has been
          completely absent from the profile until this iteration.
      - entity: "io Products (Jony Ive / OpenAI)"
        relationship: >
          Emerson Collective was a founding backer of io Products, the AI hardware startup
          co-founded by Jony Ive (former Apple design chief) and Sam Altman. Team included
          former Apple designers Tang Tan and Evans Hankey. OpenAI acquired io Products for
          $6.5 BILLION in 2025 — OpenAI's largest acquisition ever. Other backers: Thrive Capital,
          SV Angel, Sutter Hill Ventures. $5B in equity + $1.5B from prior 23% stake.
          EC's exact investment size undisclosed but exit likely worth hundreds of millions.
          Ive became head of design at OpenAI. First devices slated to debut 2026.
        competitive_with: ["Meta", "Apple"]
        source_urls:
          - "https://pitchbook.com/news/articles/openai-jony-ive-io-products-acquisition"
          - "https://techcrunch.com/2025/04/07/openai-reportedly-mulls-buying-jony-ive-and-sam-altmans-ai-hardware-startup/"
          - "https://thehindubusinessline.com/openai-acquires-jony-ive-ai-device-io-6-5-billion/"
        notes: >
          CRITICAL: This creates a DIRECT FINANCIAL EXIT for Emerson Collective from OpenAI,
          deepening the financial relationship far beyond the content licensing deal. EC profited
          directly from OpenAI's growth. Also puts OpenAI in direct competition with Apple
          (where LPJ holds $16B+ stock) — an internal portfolio tension.
      - entity: "Mistral AI"
        relationship: >
          Emerson Collective participated in Mistral's $415M Series A (Dec 2023) and/or
          $640M Series B (Jun 2024). Mistral is a direct Meta AI competitor (open-source
