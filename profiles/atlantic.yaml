          - "https://macemagazine.com/tech-titans-join-forces-with-san-franciscos-new-mayor-to-revitalize-the-city/"
        competitive_with: ["Meta"]
        notes: >
          Ruth Porat (Alphabet President & CIO) co-chairing with LPJ means The Atlantic's owner
          shares a leadership role with an executive of Meta's #1 advertising competitor. Google
