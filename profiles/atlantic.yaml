    spinoffs:
      - name: "Yosemite"
        founder: "Reed Jobs (LPJ's son)"
        spun_out: "2023-08"
        description: >
          Cancer-focused venture capital firm spun out from Emerson Collective.
          Reed Jobs (title: "Founder and Managing Partner") was Managing Director of Health
          at EC for 8 years before founding. Named for Yosemite National Park where LPJ and
          Steve Jobs married.
          
          Fund I: $263M (closed 2023). Fund II: target $350M, raised $200M+ as of early 2026.
          ~20 portfolio companies including Tune Therapeutics (gene therapy) and Chai Discovery
          (AI drug development). LPs include MIT, Memorial Sloan Kettering, Amgen, John Doerr
          (personal capacity).
          
          PHILANTHROPIC ARM: 2.5% of fund goes to donor-advised charitable vehicle for grants
          (no IP strings attached). As of Feb 12, 2026, Yosemite has deployed $18M+ in grants
          since 2023 launch, supporting early-stage academic cancer research. Key partnership
          with the American Cancer Society for identifying high-impact research areas. Example:
          preclinical research by Craig Crews at Yale → led to formation of Quarry Thera
          (small molecule drugs for cancer/autoimmune diseases). Has supported ~500 labs
          across the academic ecosystem.
          
          Reed Jobs has been investing in health companies at Emerson Collective since ~2015.
          Mission: "make cancer non-lethal in our lifetimes."
        source_urls:
          - "https://techcrunch.com/2023/08/01/reed-jobs-yosemite/"
          - "https://forbesindia.com/article/2024-billionaires/reed-jobs-living-legacy/"
          - "https://www.morningstar.com/news/pr-newswire/20260212ny/yosemite-announces-more-than-18-million-deployed-in-grants"
        notes: >
          MIT is a Yosemite LP AND parent of MIT Technology Review (another tracked publication).
          This creates a cross-publication investment connection between the Atlantic's owner
          family and MIT TR's parent institution.
