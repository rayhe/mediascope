  - entity: "Warner Bros. Discovery (WBD)"
    stake: "~98M shares remaining (~4% after sales, down from 198.18M / ~8%)"
    investment_history: >
      Carried over from Advance's investment in Discovery Communications (1990s). After AT&T spin-off
      and Discovery merger (April 2022), Advance held 198,181,749 shares of WBD Series A Common Stock
      (~8.1% of outstanding). Original Discovery investment valued at ~$10B+ at WBD formation.
      Steven A. Miron and Steven O. Newhouse resigned from WBD board March 29, 2024.
      Advance sold 100M shares in June 2024 at $10.97/share, generating $1.1B. Those shares now worth
