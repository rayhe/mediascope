    stake: >
      42,191,092 shares Class B + 16,182 shares Class A (per Schedule 13G filed Nov 14, 2024,
      reporting ownership as of Sep 30, 2024 — unchanged through 2026 proxy). 83.5% of Class B
      common stock (50,543,398 total Class B as of March 31, 2026). Class B carries 10 votes/share.
      TOTAL VOTING POWER: 65.2% (calculated from 2026 proxy share counts, record date April 13, 2026
      date). VOTING POWER CONCENTRATION TREND: 65.2% (2024) → 62.0% (2025) → 65.2% (2026).
      The rebound occurred because other Class B holders (insiders, Tencent) converted 4.58M Class B
      shares to Class A for open-market sale, shrinking total Class B from 55.1M to 50.5M — while
      Advance kept ALL its Class B shares. Advance's Class B ownership rose from 76.5% to 83.5%
      without buying a single additional share. This automatic concentration effect means the more
      Reddit insiders sell, the tighter Advance's voting control becomes.
      Total outstanding shares as of March 31, 2026: 141,867,916 Class A + 50,543,398 Class B
      = 192,411,314. Combined with Huffman's irrevocable voting proxy over Advance shares and
      Tencent's declining Class B stake, Huffman's proxy-consolidated voting block is ~70%+ —
      but Advance retains full economic ownership and ALL investment/disposition decisions via
      the AP board.
      2026 ANNUAL MEETING (Jun 8, 2026): All 8 directors re-elected including Steven O. Newhouse
      and Robert A. Sauerberg Jr. Stockholders ratified KPMG LLP as auditor and approved
      executive compensation. Both Advance-affiliated board members received 1,714 Class A RSU
      grants (vesting Jun 2027 or before 2027 annual meeting). Per the 2026 proxy, Class A holders
      voted 1 vote/share and Class B holders voted 10 votes/share as a single class on all matters.
