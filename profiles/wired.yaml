  - type: "google_ai_traffic_crisis"
    description: >
      CEO Roger Lynch publicly declared Google search "no longer a meaningful driver" of Condé Nast
      traffic (FT, Feb 27 2026) — from majority of visits to approximately 25% by 2025. Called Google's
      AI-generated summaries "another sort of death blow." Described Google's opt-out arrangement as
      "pernicious" — publishers must opt out of Google Search entirely to prevent content from AI summaries.

      SHOWCASE PHASE-OUT (Jun 25-29, 2026): Per The Information (reported by NY Post, Inshorts), Google
      is phasing out its Showcase program — the annual-payment licensing arrangement — and replacing it
      with the News AI pilot program. The new pilot demands publishers grant Google broad content-use
      rights, potentially including AI model training. Publishers who decline lose Showcase payments.
      Jason Kint (DCN CEO): "This is Google's game. They're gonna dominate here." Google told some
      companies Showcase is being ENDED. This represents a shift from compensating publishers for
      curated news panels to demanding AI training rights — effectively asking publishers to pay
      (via forfeited Showcase fees) for the privilege of NOT training Google's AI.

      Condé Nast has NOT reached a licensing deal with Google (has deals with OpenAI, Amazon, Perplexity,
      Microsoft PCM). Google piloted AI article overviews with Der Spiegel, Guardian, Washington Post
      (Dec 10, 2025) — Condé Nast excluded.

      UK CMA CONDUCT REQUIREMENTS (Jun 4, 2026): "World-first" requirements mandate Google provide
      publishers effective opt-out from AI features (AI Overviews, AI Mode) WITHOUT losing traditional
      search visibility. New toggle in Google Search Console. 9-month implementation deadline. CMA Chief
      Executive Sarah Cardell: "With features like AI Overviews rapidly reshaping online search, it is
      crucial that content publishers, including news organisations, have appropriate bargaining power."
      Google began testing controls with UK publishers subset. CMA requires compliance reports every 6
      months for the first year. Foxglove (civil society group): "Google's AI Overviews are a threat not
      only to an independent news industry, but to an informed democracy."

      AI SEARCH SCALE (Jun 2026): Google AI Overviews = 2.5 billion MAU; AI Mode = 1 billion+ MAU.

      ANALYTICAL SIGNIFICANCE: This creates a three-way exclusion dynamic — Meta excluded from AI
      licensing, Google excluded from AI licensing, while OpenAI/Amazon/Perplexity/Microsoft/Apple all
      pay. When Wired covers Google's AI impact on publishing, it covers a company that is actively
      harming Condé Nast's traffic AND refusing to pay for the privilege — creating an adversarial stance
      that is financially motivated but undisclosed. When Wired covers Meta vs Google competition, both
      competitors have financial conflicts with Condé Nast but for different reasons. EU Commission
      opened formal antitrust probe into Google's AI content practices (Dec 9, 2025). Global industry
      data: NewzDash reports Google Web Search traffic to publishers fell from 51% to 27% (2023-2025).
      Reuters Institute survey (Jan 2026): media leaders expect to lose nearly half remaining traffic
      over 3 years. Perplexity Comet Plus (Oct 1, 2025): 16 Condé Nast titles participating.
    severity: 4
