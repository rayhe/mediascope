known_conflicts:
  - type: "investment"
    description: >
      Parent company Advance Publications holds 33.5% voting power in Reddit (42.2M shares Class B +
      16K shares Class A), currently worth ~$7.0B. Advance has 2 board seats (Steven O. Newhouse,
      Robert A. Sauerberg) plus 1 nonvoting observer, and veto power over board expansion >10 members.
      Reddit is a direct competitor to Meta's social media platforms for user attention, advertiser spend,
      and community engagement. Original investment: $10M in 2006 (5,800%+ return). This is the single
      largest investment in Advance's portfolio and the most direct financial conflict.
    severity: 5
    evidence: "Reddit S-1, proxy statements, SEC Schedule 13D, Advance board representation"
    source_url: "https://www.sec.gov/cgi-bin/browse-edgar?company=reddit&CIK=&type=S-1&dateb=&owner=include&count=40&search_text=&action=getcompany"

  - type: "investment"
    description: >
      Advance holds ~98M shares of Warner Bros. Discovery (WBD), worth ~$2.6B. WBD competes with
      Meta in streaming and content. Advance already realized $1.1B from selling 100M WBD shares
      in June 2024. Steven O. Newhouse and Steven A. Miron resigned from WBD board March 2024.
      Potential Paramount Skydance acquisition could realize remaining value at $19-30/share.
    severity: 2
    evidence: "SEC Schedule 13D/A (April 2024), WBD proxy filings"
    source_url: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&company=advance%2Fnewhouse+programming&CIK=&type=13D&dateb=&owner=include&count=40&search_text=&action=getcompany"

  - type: "revenue"
    description: >
      Condé Nast has multi-year content licensing deals with OpenAI (Aug 2024), Amazon Rufus (Jul 2025),
      and Apple Intelligence (in negotiations) — all Meta competitors in AI, advertising, or hardware.
      Meta has NO such deal with Condé Nast. The financial incentive is clear: companies paying Condé
      Nast get content partnerships; Meta, the only major tech company not paying, gets adversarial
      coverage from a publication whose parent's $7B Reddit stake directly benefits from Meta's struggles.
    severity: 5
    evidence: "Condé Nast press releases, Digiday/Engadget/Adweek reporting, industry sources"
    source_url: "https://www.condenast.com/news/conde-nast-and-openai-announce-partnership"

  - type: "competitive"
    description: >
      Reddit (33.5% owned by Advance) directly competes with Meta for user attention, advertiser spend,
      and community engagement. Reddit FY2025 revenue ~$1.3B, growing rapidly, in direct competition
      for the same performance advertising dollars Meta commands. Reddit's market cap ~$32.8B. Every
      Meta stumble (regulatory, reputational, or financial) potentially benefits Reddit's competitive
      position and therefore Advance's $7B+ stake.
    severity: 4
    evidence: "Reddit S-1, earnings reports, advertising market analysis"
    source_url: ""

  - type: "succession_risk"
    description: >
      Donald Newhouse's death (May 26, 2026) means the third generation now fully controls Advance
      for the first time. Steven O. Newhouse (chairman/co-president) sits on the Reddit board. Any
      estate settlement, tax events, or generational strategic realignment could affect Advance's
      media and investment strategy. The family office serves 100+ family members across 35 households,
      creating potential governance complexity.
    severity: 3
    evidence: "Wikipedia, NYT obituary (May 26, 2026), Forbes wealth estimate"
    source_url: "https://en.wikipedia.org/wiki/Donald_Newhouse"

litigation_connections:
  - type: "connected_party"
    description: >
      Flashlight Capital funds Social Media Victims Law Center (SMVLC), lead counsel in bellwether
      Meta addiction trial. No direct Advance/Condé Nast link confirmed, but unnamed UK PE firm behind
      Flashlight's $250M fund is unidentified. MDL 3047: 2,527+ claims, 42 state AGs active.
      IMPORTANT: Wired's extensive coverage of teen social media harm (Drummond's editorial priority)
      aligns with the litigation narrative. No disclosure of Advance's potential indirect interests
      in Meta's litigation outcomes has ever appeared in Wired coverage.
    case_reference: "MDL 3047, N.D. Cal."

