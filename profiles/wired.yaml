      AI Cheating Wars: Extreme Surveillance, False Accusations, Jarring Confusion" — documenting false
      accusation cases, students deliberately inserting errors to avoid AI detection, and policy chaos.
      Turnitin's own disclaimer: model "may not always be accurate" and "should not be used as the sole basis
      for adverse actions against a student."
      REVENUE DATA: Private (no public financials). Estimated >$200M ARR based on $1.75B acquisition price
      and typical SaaS multiples. Revenue likely growing substantially since 2023 as AI detection became
      a must-have for universities. The $1.75B price was the largest edtech acquisition of 2019 and among
      the largest in the sector's history (EdSurge noted it exceeded total VC raised by all edtech startups
