  - date: "2026-05-27"
    event: >
      FIRED FOUR SETTLEMENT: Three of the four fired workers (Lo, Avalle, Dewey) received combined
      $400K+ in settlement — approximately 2 years' pay each. Terminations converted to voluntary
      resignations with letters of recommendation. Five suspended workers received back pay and had
      disciplinary records expunged. Jake Lahut (Wired) DECLINED settlement as probationary employee,
      instead pursuing NLRB unfair labor practice charge — still pending as of July 2026.
      CWA VINDICATION (Jun 11, 2026): Communications Workers of America declared the settlement a
      "vindication" of the fired and suspended workers, framing it as confirmation that Condé Nast's
      actions were retaliatory and illegal. CWA statement amplified by labor press, reinforcing the
      narrative that Condé Nast management engages in union-busting.
      WIRED EDITORIAL SIGNIFICANCE: Lahut was a senior politics reporter on Drummond's signature
      politics team (the first in Wired history). His firing and ongoing NLRB case means Wired's
      politics desk lost a key staffer in circumstances the NY AG characterized as union-busting.
