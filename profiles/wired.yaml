      stock (converting Class B → Class A), Advance's voting power increases. CEO Huffman sold 36K
      shares and COO Wong sold 39K shares in June 2026 alone (10b5-1 plans), contributing to this
      concentration. The trend means Advance's governance control over a direct Meta competitor is
      STRENGTHENING over time — exactly the opposite of what one might expect from post-IPO dilution.
