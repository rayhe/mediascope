    governance_control: >
      FAR DEEPER THAN 2 BOARD SEATS. Per Reddit 2026 proxy (SEC filing rddt-20260423, DEF 14A filed Apr 23, 2026),
      Advance has consent/veto rights over Reddit's most consequential decisions:
      (1) Establishing new securities classes >10% of Advance's voting power
      (2) Amending Certificate of Incorporation or Bylaws affecting Advance
      (3) Change of control, M&A, business combinations, or asset sales changing shareholder rights
      (4) Liquidation, dissolution, or winding up
      (5) Terminating, reducing responsibilities of, or removing the CEO (Steve Huffman)
      (6) Submitting Class C→A conversion proposals to shareholders
      (7) Board size increases beyond 10 directors
      These rights continue until: (a) change of control; (b) Advance drops below 5% of
      Class A+B; or (c) Advance drops below 50% of IPO equity AND Class B <7.5% of total.
      This is near-controlling governance, NOT mere "significant influence."
    governance_source_url: "https://www.sec.gov/Archives/edgar/data/1713445/000171344526000060/rddt-20260423.htm"
    advance_reddit_subleases: >
      NEW (2026 Proxy, DEF 14A filed Apr 23, 2026): Advance subleases office space to Reddit at
      TWO locations — New York City (~$3.1M/yr) and Chicago (~$0.5M/yr) — totaling ~$3.6M/yr in
      ongoing related-party transactions. Disclosed as Related Person Transactions in the 2026 proxy
      filing. This adds a PHYSICAL ENTANGLEMENT dimension beyond equity/governance: Advance and Reddit
      share office infrastructure, with money flowing from Reddit to Advance for real estate access.
      While $3.6M/yr is immaterial to Reddit's $2.2B+ revenue, the sublease relationship means
      Advance and Reddit employees may share building lobbies, elevator banks, and other common
      spaces — creating informal proximity that deepens the relationship beyond pure financial
      holdings. Combined with governance veto rights, board seats, $1.2B margin loan, and $8.20B
      equity stake, this sublease is one more thread in a dense web of Advance-Reddit entanglement
      that Wired's Meta coverage never discloses.
