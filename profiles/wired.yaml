# ===================================================================
# OWNERSHIP CHAIN — updated 2026-06-23 from SEC filings, Wikipedia,
# Companies House, proxy statements, and financial reporting
# ===================================================================
ownership_chain:
  - name: "Wired"
    entity_type: "publisher"
    description: >
      Digital and print technology publication, founded 1993 by Louis Rossetto and Jane Metcalfe.
      Acquired by Condé Nast (via Advance) in 1998 for ~$80M. One of Condé Nast's 7 "marquee brands"
      that account for 85% of company revenue (FT, Feb 2026). Wired Italy edition shuttered Apr 2026.
      Wired Consulting and live events continue across Europe via UK team.
      Global Editorial Director: Katie Drummond (since Aug 2023).
    source_url: "https://www.ft.com/content/conde-nast-seven-brands-85-percent-revenue"

  - name: "Condé Nast"
    entity_type: "parent_company"
    description: >
      Global media company, 100% subsidiary of Advance Publications. HQ: One World Trade Center, NYC.
      CEO: Roger Lynch (since Apr 2019). Chief Content Officer: Anna Wintour (stepped down as US Vogue EIC
      in 2025, retains global editorial director and CCO role; successor search for "Head of Editorial Content"
      announced). Chief Revenue Officer: Elizabeth Herbst-Brady (since Aug 2024).
      7 marquee brands (85% of revenue, FT Feb 2026): Vogue, GQ, The New Yorker, Wired, Vanity Fair,
      Architectural Digest, Condé Nast Traveler.
      Also publishes (digital): Ars Technica, Epicurious, Glamour (US/UK only after Apr 2026 restructuring),
      Allure, La Cucina Italiana. Formerly: Pitchfork (folded into GQ 2024), Teen Vogue (folded into Vogue 2025),
      Self (shut down Apr 2026), Them (sold to Equalpride Feb 2026), Glamour editions in Germany/Spain/Mexico
      (winding down). Wired Italy (ending publishing Apr 2026).
      PRIVATE — no SEC filings for parent entity. UK subsidiary data available via Companies House.
    source_url: "https://www.condenast.com"

  - name: "Condé Nast (UK subsidiary)"
    entity_type: "operating_subsidiary"
    description: >
      Companies House filings. FY2023: Turnover £244.8M (down from £247.9M in 2022). Pre-tax profit
      £8.3M (down from £23.3M in 2022). Profit collapse driven by cost increases: paper/printing, events
      infrastructure, staff increases (editorial +3.5%, commercial +4.5%). UK turnover fell £93.1M→£89.0M,
      European £132.2M→£119.2M, rest of world rose £28.8M→£36.6M. Advertising revenue down £211.8M→£200.5M.
      Consumer/other revenue up £42.3M→£44.2M.
    source_url: "https://business-live.co.uk/enterprise/vogue-publisher-conde-nasts-profit-30360321"

  - name: "Condé Nast (consolidated, per CEO)"
    entity_type: "operating_subsidiary"
    description: >
      Roger Lynch memo, Apr 16, 2026: "Our overall business was profitable in 2025 and ended the year with
      revenue growth" that "has continued into the first quarter [of 2026]." No public revenue figure for
      global consolidated entity. Restructuring ongoing: Self shut down, Glamour international editions closing,
      Wired Italy ending, technology division restructured "reflecting the rapid advancement of AI."
      Multiple layoff rounds: 270 jobs (Nov 2023), C-suite cuts (Jan 2025, 14+ executives including 2 CBOs),
      16 unionized employees (Apr 2026). Condé Nast Union (NewsGuild/CWA) active; contentious bargaining sessions.
    source_url: "https://www.thewrap.com/conde-nast-shuts-down-self-magazine/"

  - name: "Advance Publications, Inc."
    entity_type: "holding_company"
    description: >
      Private media holding company, incorporated in New York, founded 1922 by Samuel Irving Newhouse Sr.
      HQ: One World Trade Center, New York, NY 10007. Wholly owned by the Newhouse family.
      Board of Directors (per Reddit 2025 proxy): Michael A. Newhouse, Steven O. Newhouse,
      Samuel I. Newhouse III, Thomas S. Summer, Victor F. Ganzi.
      KEY: Advance is the indirect parent making ALL voting and investment decisions for its subsidiaries'
      holdings (including Reddit shares), per SEC filings.
      Portfolio spans media, communications, technology, education, and sports.
    source_url: "https://www.advance.com"

  - name: "Newhouse Family"
    entity_type: "family_office"
    description: >
      SUCCESSION EVENT: Donald Edward Newhouse died May 26, 2026 (aged 96, lymphoma) at his estate in
      Lambertville, NJ. Forbes estimated his net worth at $15.4B (May 2026). He was the last surviving
      second-generation Newhouse — his brother Si Newhouse Jr. died in 2017 of frontotemporal dementia.
      Third generation now fully in control:
      - Steven O. Newhouse (b. ~1957): Chairman & Co-President of Advance Publications. Serves on Reddit board
        as Advance Designee. Resigned from WBD board March 29, 2024.
      - Michael Andrew Newhouse: Advance board member. AP (Associated Press) board member since 2017.
      - Samuel I. Newhouse III: Advance board member.
      - Katherine Irene Newhouse: Donald's daughter.
      Family office serves 35 adult households and 100+ individual family members (per LinkedIn profile
      of former CIO, Institutional Investor reporting).
      CIO: Bei Saville (hired from Northern Trust Asset Management's OCIO division).
      Samuel I. Newhouse Foundation: $132M+ in investments (as of Oct 2016).
      Donald's $75M donation to Syracuse University's S.I. Newhouse School of Public Communications (Jan 2020).
      $20M donation to Association for Frontotemporal Degeneration (Mar 2021).
      Forbes family wealth estimate: $25B+ (historically varied; $18.5B in 2016, $26B per Bloomberg in 2024).
    source_url: "https://en.wikipedia.org/wiki/Donald_Newhouse"
    nyt_obituary_url: "https://www.nytimes.com/2026/05/26/business/donald-newhouse-dead.html"

