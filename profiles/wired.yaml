advance_investments:
  - entity: "Reddit (RDDT)"
    stake: "42,191,092 shares Class B + 16,182 shares Class A = 33.5% voting power"
    board_seats: 2
    board_designees: ["Steven O. Newhouse", "Robert A. Sauerberg"]
    board_observer: 1
    board_veto: "Any increase >10 directors requires Advance's prior written approval"
    voting_agreement: >
      Steven Huffman holds irrevocable proxy to vote all Advance shares on most matters,
      per Voting Agreement dated March 19, 2024 between Advance Magazine Publishers Inc.
      and Huffman (SEC Exhibit 2).
    investment_history: >
      Original $10M investment in 2006. Reddit was part of Condé Nast, moved to Advance
      Publications in 2011, spun off as independent entity in early 2012 (keeping Advance
      ownership stake but allowing VC fundraising). IPO March 21, 2024 at $34/share,
      opened at $47, valued at $6.4B. Return: 5,800%+ (Bloomberg Billionaires Index).
      Advance is the largest single investor; outperformed Sam Altman's funds (6-7x larger
      gains) and Sequoia Capital (17x larger gains).
    current_value_estimate: "~$7.0B at $165.63/share (Jun 23, 2026)"
    competitive_with: ["Meta", "X/Twitter"]
    meta_competition: >
      Reddit is a direct Meta competitor for user attention, advertiser spend, and community
      engagement. Reddit's advertising business (~$1.3B FY2025 rev) competes directly with
      Meta's ad platform for performance advertising dollars.
    sec_filing_url: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&company=advance+magazine&CIK=&type=SC+13D&dateb=&owner=include&count=40&search_text=&action=getcompany"
    source_url: "https://www.thewrap.com/conde-nast-reddit-ipo-advance-publications-nearly-2-billion/"

  - entity: "Charter Communications (CHTR)"
    stake: "~20,635,147 shares beneficially owned (12.3% of Class A, per Oct 2023 13D/A)"
    entity_structure: >
      Held through complex multi-entity structure: Advance/Newhouse Partnership (A/N, NY general
      partnership), Newhouse Broadcasting Corporation (NBCo, NY corp), Advance Publications Inc. (API,
      NY corp), Newhouse Family Holdings L.P. (NFH, DE limited partnership), Advance Long-Term Management
      Trust (NJ trust). A/N grants up to 6% vote proxy to Liberty Broadband for most matters.
    investment_history: >
      Came from Bright House Networks merger into Charter (May 2016). A/N initially held 26.3% of
      Charter Holdings partnership; Class B stock provided as-if-converted voting. Stake has diluted
      from 26.3% (2016) to 12.3% (2023) via share repurchases and conversions.
    current_value_estimate: "~$2.7B at $131.75/share (Jun 23, 2026). Down from $8.7B at 52-week high of $422."
    competitive_with: []
    sec_filing_url: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&company=advance%2Fnewhouse&CIK=&type=13D&dateb=&owner=include&count=40&search_text=&action=getcompany"

  - entity: "Warner Bros. Discovery (WBD)"
    stake: "~98M shares remaining (~4% after sales, down from 198.18M / ~8%)"
    investment_history: >
      Carried over from Advance's investment in Discovery Communications (1990s). After AT&T spin-off
      and Discovery merger (April 2022), Advance held 198,181,749 shares of WBD Series A Common Stock
      (~8.1% of outstanding). Original Discovery investment valued at ~$10B+ at WBD formation.
      Steven A. Miron and Steven O. Newhouse resigned from WBD board March 29, 2024.
      Advance sold 100M shares in June 2024 at $10.97/share, generating $1.1B. Those shares now worth
