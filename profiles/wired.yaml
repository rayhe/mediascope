      over Reddit than at any point since the 2025 proxy, making the undisclosed conflict with
      Wired's Meta coverage increasingly material. The 2026 annual meeting (Jun 8, 2026) confirmed
      both Advance-affiliated directors (Newhouse, Sauerberg) re-elected with no opposition.
    severity: 5
    evidence: >
      2026 proxy share counts: 141,867,916 Class A + 50,543,398 Class B = 192,411,314 total
      (vs 2025: 129,145,465 Class A + 55,121,821 Class B = 184,267,286). Advance voting power
