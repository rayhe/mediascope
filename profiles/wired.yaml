  - type: "strategic_non-litigation"
    description: >
      CRITICAL NEGATIVE FINDING: Condé Nast/Wired has ZERO active copyright litigation against
      AI companies despite being one of the most-scraped publishers on the internet. As of June
      2026, Condé Nast has chosen licensing deals with OpenAI (Aug 2024), Amazon, Apple
      (negotiating), and Perplexity over copyright enforcement.
      CONTEXT: The AI copyright litigation wave is accelerating rapidly:
      - NYT sued OpenAI/Microsoft Dec 2023 (trailblazer, now in advanced discovery, 20M chat logs produced)
      - Alden Global Capital newspapers joined Apr 2024
      - 16 lawsuits consolidated in SDNY MDL
      - CNN sued Perplexity AI (2025)
      - Britannica/Merriam-Webster sued OpenAI (2025)
      - ~400 local/regional newspapers filed Richner v. Microsoft (SDNY 1:26-cv-05320, June 24, 2026)
      EVERY major publisher group is either suing or licensing. Condé Nast chose licensing — and
      conspicuously receives $0 from Meta (the Dec 2025 Meta AI licensing exclusion, documented as
      severity-5 conflict) while receiving revenue from OpenAI, Amazon, Perplexity, Apple — all
      Meta's competitors. The non-litigation posture creates a financial incentive alignment with
      AI companies that also happen to be Meta's competitors.
    source_urls:
      - "https://www.pymnts.com/legal/2026/400-newspapers-sue-microsoft-and-openai-alleging-content-theft-for-ai/"
      - "https://news.bloomberglaw.com/ip-law/openai-microsoft-sued-by-publishers-for-scraping-articles"
      - "https://www.reuters.com/legal/government/openai-loses-fight-keep-chatgpt-logs-secret-copyright-case-2025-12-03/"

  - type: "google_ai_traffic_crisis"
    description: >
      NEW CONFLICT (FT, Feb 27 2026): CEO Roger Lynch publicly declared Google search "no longer a
      meaningful driver" of Condé Nast traffic — from majority of visits to approximately 25% by 2025.
      Called Google's AI-generated summaries "another sort of death blow." Described Google's opt-out
      arrangement as "pernicious" — publishers must opt out of Google Search entirely to prevent content
      from AI summaries. Condé Nast has NOT reached a licensing deal with Google (has deals with OpenAI,
      Amazon, Perplexity). Google piloted AI article overviews with Der Spiegel, Guardian, Washington Post
      (Dec 10, 2025) — Condé Nast excluded. ANALYTICAL SIGNIFICANCE: This creates a three-way exclusion
      dynamic — Meta excluded from AI licensing, Google excluded from AI licensing, while OpenAI/Amazon/
      Perplexity/Apple all pay. When Wired covers Google's AI impact on publishing, it covers a company
      that is actively harming Condé Nast's traffic AND refusing to pay for the privilege — creating an
      adversarial stance that is financially motivated but undisclosed. When Wired covers Meta vs Google
      competition, both competitors have financial conflicts with Condé Nast but for different reasons.
      EU Commission opened formal antitrust probe into Google's AI content practices (Dec 9, 2025).
      UK CMA proposed binding conduct requirements (Jan 28, 2026). Global industry data: NewzDash reports
      Google Web Search traffic to publishers fell from 51% to 27% (2023-2025). Reuters Institute
      survey (Jan 2026): media leaders expect to lose nearly half remaining traffic over 3 years.
      Perplexity Comet Plus (Oct 1, 2025): 16 Condé Nast titles participating — compensates based on
      human engagement, AI-driven interactions, and content usage in training.
    severity: 4
    evidence: "FT interview Feb 27 2026, PPC Land analysis, Adweek, NewzDash, Reuters Institute"
    source_urls:
      - "https://ppc.land/conde-nast-ceo-calls-google-ai-a-death-blow-as-search-traffic-collapses/"
      - "https://www.adweek.com/media/conde-nast-events-revenue-2026/"

  - type: "cnil_enforcement"
    description: >
      France's CNIL fined Condé Nast's French entity €750,000 on November 20, 2025 for cookie consent
      violations on vanityfair.fr, affecting approximately 7.4 million visitors between June and October
