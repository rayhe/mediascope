advance_investments:
  - entity: "Reddit (RDDT)"
    stake: "42,191,092 shares Class B + 16,182 shares Class A = 65.2% total voting power (per 2026 proxy, based on Schedule 13G filed Nov 14, 2024 reporting ownership as of Sep 30, 2024). 83.5% of Class B common stock. Class B carries 10 votes/share."
    board_seats: 2
    board_designees: ["Steven O. Newhouse", "Robert A. Sauerberg"]
    board_observer: 1
    board_veto: "Any increase >10 directors requires Advance's prior written approval"
    voting_agreement: >
      Steven Huffman holds irrevocable proxy to vote all Advance shares on most matters,
      per Voting Agreement dated March 19, 2024 between Advance Magazine Publishers Inc.
      and Huffman (SEC Exhibit 2).
    investment_history: >
      Original $10M investment in 2006. Reddit was part of Condé Nast, moved to Advance
      Publications in 2011, spun off as independent entity in early 2012 (keeping Advance
      ownership stake but allowing VC fundraising). IPO March 21, 2024 at $34/share,
      opened at $47, valued at $6.4B. Return: 5,800%+ (Bloomberg Billionaires Index).
      Advance is the largest single investor; outperformed Sam Altman's funds (6-7x larger
      gains) and Sequoia Capital (17x larger gains).
    current_value_estimate: "~$7.04B at $166.94/share (Jun 26, 2026 close). Reddit now ~57% of Advance's public equity. Market cap $32.1B."
    q1_2026_financials: >
      Q1 2026: Revenue $663.41M (+69.1% YoY), EPS $1.01 (vs $0.13 YoY, +677%).
      Beat consensus: revenue +8.03%, EPS +62.9%. Beat consensus all 4 trailing quarters.
      AD REVENUE DETAIL: Q1 2026 ad revenues $625M (+74% YoY), accounting for the vast majority of
      top-line expansion. Active advertiser count +75% YoY. Retail advertiser investment in Reddit grew
      over 8x between 2023-2025 in EMEA alone.
      FY2026 projected: $3.25B (+47.6%), FY2027: $4.31B (+32.5%).
      Q2 2026 GUIDANCE: $715M-$725M, representing 43-45% YoY revenue growth (~44% at midpoint).
      Market cap ~$32.1B at $166.94/share (Jun 26, 2026 close). 52-week range $119.27-$282.95. Beta 2.06.
      TTM (trailing 12 months): Revenue $2.2B, net income $530M (net margin 24.1%), operating income
      $442M (operating margin 20.1%), gross profit $2.0B (gross margin 91.2%), operating cash flow $690.9M.
      Current ratio 11.56. Reddit is now PROFITABLE at scale with net income of over $500M TTM.
      Total outstanding shares as of March 31, 2026: 141,867,916 Class A + 50,543,398 Class B = 192,411,314.
    source_urls_financials:
      - "https://www.marketbeat.com/stocks/NYSE/RDDT/earnings/"
      - "https://stocktitan.net/stocks/RDDT/"
      - "https://www.zacks.com/stock/news/2478500/reddit-inc-rddt-is-attracting-investor-attention-here-is-what-you-should-know"
      - "https://www.marketbeat.com/stocks/NYSE/RDDT/institutional-ownership/"
      - "https://www.sec.gov/Archives/edgar/data/1713445/000171344526000060/rddt-20260423.htm"
      - "https://www.zacks.com/stock/news/reddit-expands-partnership-shopify-boost-ad-revenue"
      - "https://www.mediapost.com/publications/article/reddit-expands-shopify-integration-all-advertisers/"
    governance_control: >
      FAR DEEPER THAN 2 BOARD SEATS. Per Reddit 2026 proxy (SEC filing rddt-20260423, DEF 14A filed Apr 23, 2026),
      Advance has consent/veto rights over Reddit's most consequential decisions:
      (1) Establishing new securities classes >10% of Advance's voting power
      (2) Amending Certificate of Incorporation or Bylaws affecting Advance
      (3) Change of control, M&A, business combinations, or asset sales changing shareholder rights
      (4) Liquidation, dissolution, or winding up
      (5) Terminating, reducing responsibilities of, or removing the CEO (Steve Huffman)
      (6) Submitting Class C→A conversion proposals to shareholders
      (7) Board size increases beyond 10 directors
      These rights continue until: (a) change of control; (b) Advance drops below 5% of
      Class A+B; or (c) Advance drops below 50% of IPO equity AND Class B <7.5% of total.
      This is near-controlling governance, NOT mere "significant influence."
    governance_source_url: "https://www.sec.gov/Archives/edgar/data/1713445/000171344526000060/rddt-20260423.htm"
    collateralized_lending: >
      NEW FINDING (Bloomberg Law, Nov 22, 2024): Advance Magazine Publishers Inc. established
      a credit facility pledging 7.8M Reddit shares as collateral (~$1.2B at $145.38-$148.54/share,
      ~8% discount to $158.02 market price). Simultaneously purchased derivatives on the same
      shares to maintain economic exposure while borrowing. This means Advance is using Reddit
      as a FINANCIAL INSTRUMENT: its access to capital is directly tied to Reddit's stock price.
      A Reddit share price drop could trigger margin calls or tighter credit terms, creating
      an even more acute incentive for Wired to support narratives that benefit Reddit (and
      harm Meta, Reddit's direct competitor for ad dollars). This also means Advance likely
      has NOT reduced its economic exposure to Reddit despite the share pledge — the derivative
      purchases maintain upside participation.
    collateralized_lending_source_urls:
      - "https://news.bloomberglaw.com/mergers-and-acquisitions/advance-magazine-said-to-seek-1-2-billion-in-reddit-share-sale"
    insider_selling_context: >
      Reddit insiders (excluding Advance) sold 326,144 shares ($48.8M) in last 3 months
      (as of Jun 2026). CEO Huffman sold 18,000 shares May 15 at $157.15 and Feb 27 at
      $145.12. COO Jennifer Wong sold 39,167 shares Apr 16 at $161.47. CTO Christopher Slowe
      sold 15,500 shares Apr 8 at $150.67. Corporate insiders own 34.25% of stock.
      SOURCE: MarketBeat institutional ownership data, SEC Form 144 filings.
    insider_selling_source_url: "https://www.marketbeat.com/stocks/NYSE/RDDT/institutional-ownership/"
    competitive_with: ["Meta", "X/Twitter"]
    meta_competition: >
      Reddit is a direct Meta competitor for user attention, advertiser spend, and community
      engagement. Reddit's advertising business (~$1.3B FY2025 rev, projected $3.25B FY2026)
      competes directly with Meta's ad platform for performance advertising dollars. Reddit's
      69.1% YoY revenue growth means the competitive threat is ACCELERATING.
      SHOPIFY PARTNERSHIP (Mar-May 2026): Reddit announced Shopify integration at Shoptalk (March 25,
      2026), expanded globally to all advertisers (May 29, 2026). Merchants can link Shopify storefronts
      directly to Reddit Ads, with automated product catalog syncing, codeless Reddit Pixel for conversion
      tracking, and Dynamic Product Ads (DPA). Reddit DPAs delivered +91% higher ROAS YoY (Q4 2025).
      Fospha study found Reddit improved cost per purchase by 34% while increasing ROAS and helping
      advertisers scale spend by 2.5x YoY. Reddit also partnered with WooCommerce. COO Jen Wong:
      "We're excited about how this can build a deeper presence with mid-market and SMBs."
      40% YoY boost in high-intent shopping conversations; 84% of Reddit shoppers report feeling more
      secure in purchases after researching on platform. This ecommerce push directly competes with
      Meta's Shops, Marketplace, and Instagram Shopping for merchant ad spend and product discovery.
    sec_filing_url: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&company=advance+magazine&CIK=&type=SC+13D&dateb=&owner=include&count=40&search_text=&action=getcompany"
    source_url: "https://www.thewrap.com/conde-nast-reddit-ipo-advance-publications-nearly-2-billion/"

