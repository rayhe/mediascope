  - entity: "Turnitin"
    stake: "100% subsidiary (acquired April 30, 2019 for ~$1.75B)"
    description: >
      MAJOR SUBSIDIARY: Leading academic integrity SaaS platform. Founded 1998 at UC Berkeley by John M.
      Barrie, Christian Storm, Emmanuel Briand, Melissa Lipscomb (as iParadigms LLC). Previous ownership:
      Warburg Pincus (2008, undisclosed price) → GIC/Insight Venture Partners (2014, $752M) → Advance (2019, ~$1.75B).
      CEO: Chris Caren (since ~2009). HQ: Oakland, CA, 2101 Webster Street Suite 1800.
      SCALE: 16,000+ institutions, 71M+ students enrolled, 1.9B+ paper submissions in database (as of Jun 2025).
      Used in 153 countries. Cashflow positive since 2004.
      PRODUCTS: Turnitin Originality (plagiarism + AI detection), GradeMark (grading), PeerMark (peer review),
      Gradescope (AI-assisted grading, acquired 2018 from Berkeley), iThenticate (publisher plagiarism detection).
      Also runs plagiarism.org informational site.
      ACQUISITIONS UNDER ADVANCE: VeriCite (2018, pre-acquisition), Unicheck (2020), Ouriginal (2021, merger
      of Urkund + PlagScan). Each consolidated Turnitin's global monopoly position in academic integrity software.
      ADDITIONAL SUBSIDIARIES:
      - ExamSoft (exam security): AI-powered remote proctoring via ExamMonitor (facial recognition +
        AI-driven behavior analysis to flag suspicious activity during exams) and ExamID (identity
        verification via biometric facial comparison). Raises civil liberties concerns about AI
        surveillance in education. ExamSoft is widely used by bar exam boards, medical licensing, and
        universities for high-stakes assessments.
      - ProctorExam (Amsterdam): European online proctoring subsidiary, expanding Turnitin's AI
        surveillance footprint internationally.
      These subsidiaries deepen the DUAL-SIDED AI CONFLICT: Advance profits from AI content generation
      (Condé Nast licensing), AI content detection (Turnitin Originality), AND AI-powered human
      surveillance (ExamSoft/ProctorExam) — three sides of the AI arms race, all under one owner.
      AI WRITING DETECTION (launched Apr 2023): Claims <1% false positive rate for documents >20% AI-written.
      Processes 200M+ papers through AI detector. Data shows ~11% of submissions have ≥20% AI writing, ~3% have
      ≥80% AI writing. Higher false positive rates for documents <20% AI-written (asterisk added to those scores).
      CONTROVERSIES: Stanford researchers found AI detectors biased against non-native English speakers (May 2023).
      OpenAI withdrew its own AI detector due to "low rate of accuracy" (26% detection rate). A July 2023 study
      of 14 AI detection tools found none scored above 80% accuracy. LA Times (Jun 21, 2026): "Inside College
      AI Cheating Wars: Extreme Surveillance, False Accusations, Jarring Confusion" — documenting false
      accusation cases, students deliberately inserting errors to avoid AI detection, and policy chaos.
      Turnitin's own disclaimer: model "may not always be accurate" and "should not be used as the sole basis
      for adverse actions against a student."
      REVENUE DATA: Private (no public financials). Estimated >$200M ARR based on $1.75B acquisition price
      and typical SaaS multiples. Revenue likely growing substantially since 2023 as AI detection became
      a must-have for universities. The $1.75B price was the largest edtech acquisition of 2019 and among
      the largest in the sector's history (EdSurge noted it exceeded total VC raised by all edtech startups
      the prior year).
    competitive_with: []
    ai_conflict_note: >
      CRITICAL DUAL-SIDED AI CONFLICT: Advance Publications simultaneously profits from BOTH sides of the
      AI content arms race:
      (1) Condé Nast LICENSES content TO AI companies (OpenAI, Amazon Rufus, Perplexity, Apple Intelligence)
          — generating revenue from AI content generation and training.
      (2) Turnitin DETECTS and flags AI-generated content — generating revenue from the fear of AI writing
          and the institutional response to it.
      This creates a structural financial incentive for Advance to amplify the perceived threat of AI in education
      (benefiting Turnitin's sales) while simultaneously feeding AI models with premium content (benefiting
      Condé Nast's licensing revenue). No Condé Nast publication — including Wired, which covers AI extensively —
      has ever disclosed that its parent company owns the world's dominant AI writing detection platform.
      When Wired covers AI-generated content, AI detection technology, or academic integrity, it is covering
      a market in which its parent company has a $1.75B investment at stake.
