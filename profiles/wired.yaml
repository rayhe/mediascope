    investment_history: >
      Came from Bright House Networks merger into Charter (May 2016). A/N initially held 26.3% of
      Charter Holdings partnership; Class B stock provided as-if-converted voting. Stake has diluted
      from 26.3% (2016) to 12.3% (2023) via share repurchases and conversions.
    deterioration_note: >
      CHTR is in steep long-term decline: -67.99% over 1 year, -81.76% over 5 years (as of Jul 14, 2026).
      Stock down from 52-week high of $413.14 to $127.91 (Jul 14 close) — a 69.0% drop,
      only $3.86 above 52-week low of $124.05. BNP Paribas Exane cut target to $120 (Jul 14) — first
      analyst target BELOW the 52-week low, signaling expectation of further new lows. Wall Street
      consensus rating is "Reduce" (6 sell, 8 hold, 5 buy out of 19 analysts). Q1 2026 earnings
      missed: EPS $9.17 vs consensus $10.01 (missed by $0.84), revenue down 1.0% YoY at $13.60B.
      Q2 2026 earnings due July 24 (before market open). Market cap now ~$17.71B (Robinhood, Jul 14).
      Charter faces structural headwinds from cord-cutting, fiber overbuilds, and fixed wireless competition.
      JUL 15 BOUNCE: CHTR +2.53% to $131.15 intraday (Finnhub). Likely a technical bounce off the
      52W low zone ($124.05) rather than a structural reversal — no positive catalyst identified.
      Three analysts (BNP $120, Goldman $125, Barclays $130) all targeting AT or BELOW current price.
    buyback_program: >
      AGGRESSIVE BUYBACK PROGRAM (Seeking Alpha, Jun 23, 2026): Charter executed $963M in share
      repurchases in Q1 2026, retiring ~4% of its market cap in a single quarter. Additionally,
      Charter agreed to repurchase $100M of its own stock MONTHLY from Liberty Broadband until
      their merger closes. This creates a steady, mechanical bid floor for CHTR shares.
      ADVANCE IMPLICATION: If buybacks reduce total CHTR shares by ~20% in 2026 (as projected by
      Seeking Alpha), Advance's 12.3% beneficial ownership stake (20.6M shares per Oct 2023 13D/A)
      could increase to ~15.4% on a dilution-adjusted basis WITHOUT Advance buying any new shares.
      This is counterintuitive: Advance's PERCENTAGE stake is rising even as the DOLLAR value collapses.
      The buyback concentration effect means Advance's voting power and per-share economics improve
      as Charter shrinks its share count, partially offsetting the price decline's portfolio impact.
      Combined with the Cox merger (post-close entity rebrands as Cox Communications, largest US
      broadband provider with 38M+ subscribers), Charter is executing a dual strategy of
      consolidation (Cox) + concentration (buybacks) to arrest the structural decline.
      Source: Seeking Alpha (Jun 23, 2026) — "Charter Communications Is A Buy With Big Accelerating
      Buybacks In 2026."
      COX MERGER PROGRESS (updated Jul 14, 2026): Charter-Cox $34.5B merger in final regulatory
      stretch. >99% stockholder approval obtained. NY PSC approved Mar 20, 2026 ($100M network
      upgrade commitment + replace 500+ outdoor Wi-Fi access points + $3M broadband/shelter
      investment). FCC approved Mar 9, 2026. DOJ cleared Sep 2025 (HSR expires Sep 15, 2026).
      Connecticut approved. ALL local, state, and federal approvals secured EXCEPT California CPUC.
      CA SETTLEMENT AGREEMENTS (May 28, 2026): Charter reached settlements with CalAdvocates
      (CPUC consumer advocacy office) and California Emerging Technology Fund (CETF). Terms:
      $275M in CA network upgrades + low-income price locks for 5 years (Lifeline Pilot
      participants get $20/mo 100×20 Mbps plan). Both CalAdvocates and CETF asked CPUC to
      approve the deal. Parties asked CPUC to approve at its **August 13, 2026 meeting** —
      Charter said Sep 2 meeting would be too late to close before HSR expiration. If CPUC
      misses the window, companies must refile HSR ($2.5M fee + new 30-day review period).
      Charter spokesperson (Jul 10): "We're very pleased to now have all local, state, and
      federal regulatory approvals other than California."
      Post-merger governance: Advance/Newhouse retains 2 board nominees on 13-member board.
      Cox Enterprises gets 23% of combined entity (via $4B cash + $6B convertible preferred units +
      ~$11.9B in partnership units). Liberty Broadband merger expected to close simultaneously;
      3 Liberty directors resign at closing. Combined entity to rebrand as Cox Communications
      within 1 year. Mobile momentum bright spot: Spectrum Mobile +368K lines in Q1, total 12.1M
      (+17.1% YoY), mobile service revenue +15.1% to $1.1B. Combined entity will pass 43.2M locations.
      Source: Advanced Television, IEEE ComSoc, PBN, NY PSC (Jul 2026).
      SPACEX MOBILE PARTNERSHIP (Bloomberg News, Jun 26, 2026): SpaceX and Charter have held
      EXECUTIVE-LEVEL talks about partnering on a consumer mobile phone offering in the US. Under the
      discussed arrangement, Charter would route SpaceX's phone traffic through its ground-based
      internet infrastructure. Charter merged with Cox Communications (2025) and now passes 43.2M
      locations — more than any US internet provider. SpaceX President Gwynne Shotwell (June 2026):
      "Starlink Mobile will far exceed Starlink broadband" in user numbers. SpaceX already has a
      direct-to-cell connectivity deal with T-Mobile ($10/mo add-on). SpaceX acquired AWS-3 mobile
      spectrum rights via FCC auction and purchased spectrum assets from EchoStar. AT&T, T-Mobile, and
      Verizon have said they aren't interested in signing an MVNO deal with SpaceX — making Charter a
      practical path to becoming a direct-to-consumer mobile phone provider. If realized, this could
      represent a strategic inflection point for Charter, potentially reversing part of the decline by
      adding a new mobile revenue stream leveraging SpaceX's satellite technology.
      ADVANCE PORTFOLIO IMPACT: This represents a significant potential wealth story for
      Advance. Despite Charter's 82% 5-year decline, a SpaceX mobile partnership could re-rate the
      stock. Advance's ~$2.75B stake (at $133.54) could see meaningful upside if Charter pivots from
      declining cable to space-enabled mobile connectivity.
