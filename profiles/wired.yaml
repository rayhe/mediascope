  - type: "advance_trademark_enforcement_ipec_cornucopia"
    description: >
      IPEC JUDGMENT [2026] EWHC 1488 (IPEC) (June 23, 2026): Advance Magazine Publishers Inc. (AMPI)
      and The Condé Nast Publications Limited (UK licensee) v Cornucopia Entertainment Limited and
      Minesh Vohra (founder/director). AMPI won on ALL four grounds:
      (1) s10(1) TMA — double identity infringement of Vanity Fair and GQ marks through advertising
          ticket resale for exclusive events (GQ Man of the Year Awards, Vanity Fair Oscar Party).
          Judge rejected "informational use" defense; advertising alone constitutes infringement.
      (2) s10(2) TMA — likelihood of confusion established via website, mock invitations, social media.
      (3) s10(3) TMA — unfair advantage of marks' reputation. Cornucopia charged inflated prices
          leveraging the exclusivity and glamour of the marks.
      (4) Passing off — strong reputation, misrepresentation of commercial connection, damage to goodwill.
      PERSONAL LIABILITY: Vohra found jointly liable under s10(3) for authorizing infringing conduct
      after receiving cease-and-desist letters. Not jointly liable under s10(1)/s10(2) because
      insufficient evidence he appreciated the confusion risk.
      Miss Recorder Amanda Michaels presided. Key precedent cited: Iconix Luxembourg Holdings v Dream
      Pairs Europe (infringement from advertising alone) and BMW v Deenik (informative vs. misleading use).
      ANALYTICAL SIGNIFICANCE: This is the SECOND UK trademark enforcement action by AMPI in 3 months
      (after the "Ever in Vogue" UK IPO opposition in March 2026). Demonstrates systematic international
      IP enforcement through AMPI — the SAME entity holding the Reddit shares and the $1.2B margin loan
      credit facility. AMPI simultaneously operates as: (a) IP enforcement arm for Condé Nast brands,
      (b) holder of 42.2M Reddit shares ($8.5B), (c) borrower on $1.2B margin loan against Reddit shares.
      This triple function is unique and not commonly disclosed.
    severity: 2
    evidence: "[2026] EWHC 1488 (IPEC), D Young & Co analysis, Jun 23 2026"
