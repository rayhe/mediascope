      Remaining ~98M shares worth ~$2.65B at $26.98/share (Jun 25, 2026).
    pending_acquisition: >
      MAJOR PORTFOLIO REALIZATION EVENT: Paramount Skydance has an all-cash tender offer at $30/share for
      100% of WBD, including Global Networks segment. Timeline:
      - Nov 13, 2025: WBD Board initiates Strategic Review of alternatives.
      - Dec 4, 2025: WBD signs Agreement and Plan of Merger with Netflix ($23.25 cash + ~$4.50 in Netflix
        stock per share = ~$27.75 total; WBD would separate Streaming & Studios from Global Networks/SpinCo,
        Netflix acquires the Streaming & Studios side).
      - Dec 2025 (post-Netflix announcement): Paramount Skydance commences unsolicited all-cash tender offer
        at $30/share. WBD Board unanimously recommends shareholders REJECT Paramount's offer in favor of Netflix.
      - Feb 27, 2026: Netflix officially declines to raise its bid and withdraws. WBD Board then deems
        Paramount's $30/share offer as "superior."
      - Jun 2026 (early): DOJ approves the Paramount-WBD acquisition.
      - Jun 24, 2026: Paramount submits formal EU antitrust remedy proposal — divesting Universal Pictures
        film distribution JV to clear EU concerns. EU Commission Phase I decision deadline is July 7, 2026.
        If no decision by then, deal moves into full-scale Phase II investigation (adds months).
      - Jun 25, 2026: NY and California state AGs preparing separate lawsuit to block the merger.
        WSJ reports Oracle co-founder Larry Ellison privately told Trump that Paramount could "remake"
        CNN post-acquisition. Paramount denies any CNN editorial commitments. Gerry Cardinale (RedBird
        Capital, Skydance partner): "huge believer" in CNN, praises CEO Mark Thompson.
      - REGULATORY STATUS (Jun 26): DOJ cleared. EU Phase I deadline July 7. SEPARATE EU Foreign
        Subsidies Regulation investigation (Saudi PIF, Abu Dhabi L'imad, Qatar IA backing the bid).
        Also cleared by South Africa, China, Australia, NZ, Saudi Arabia, Ukraine, Serbia, North
        Macedonia + FDI authorities in Spain, Germany, Slovenia, Belgium, Czechia, Italy, France, Romania.
        Canada: no statutory impediment after Competition Act waiting period expired.
      - DEAL PROTECTIONS: If transaction does not close by Sept 30, 2026, WBD shareholders receive
        $0.25/share "ticking fee" per quarter until closing. If deal fails due to regulatory matters,
        Paramount pays WBD a $7B termination fee.
      IF PARAMOUNT CLOSES AT $30/SHARE: Advance realizes ~$2.94B from remaining ~98M shares + $1.1B already
      realized from June 2024 sale = ~$4.04B total from WBD investment. This would be Advance's largest
