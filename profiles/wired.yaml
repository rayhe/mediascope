# ===================================================================
# REVENUE RELATIONSHIPS — Condé Nast AI licensing deals
# ===================================================================
revenue_relationships:
  - partner: "OpenAI"
    relationship_type: "licensing"
    estimated_value: "undisclosed, multi-year"
    date_established: "2024-08-20"
    description: >
      Multi-year content licensing partnership announced Aug 20, 2024. Gives OpenAI license to display
      content from ALL Condé Nast brands (Wired, The New Yorker, Vogue, GQ, Vanity Fair, Architectural
      Digest, Bon Appétit, Condé Nast Traveler) within ChatGPT and SearchGPT products. Condé Nast
      receives access to OpenAI technology for publishing operations and content creation. CEO Roger
      Lynch memo to staff: "crucial that we meet audiences where they are and embrace new technologies
      while also ensuring proper attribution and compensation for use of our intellectual property."
      OpenAI is Meta's direct AI competitor (ChatGPT vs Meta AI, GPT vs Llama).
    competitive_with: ["Meta"]
    source_url: "https://www.condenast.com/news/conde-nast-and-openai-announce-partnership"
    secondary_sources:
      - "https://siliconangle.com/2024/08/20/openai-agrees-content-licensing-deal-conde-nast-feed-searchgpt-chatgpt/"
      - "https://www.adweek.com/media/conde-nast-openai-multiyear-partnership/"
      - "https://www.thewrap.com/conde-nast-openai-multiyear-deal/"

  - partner: "Amazon (Rufus)"
    relationship_type: "licensing"
    estimated_value: "undisclosed, multi-year"
    date_established: "2025-07-10"
    description: >
      Multi-year agreement for Amazon's Rufus AI shopping assistant to access Condé Nast's content
      archive. Rufus is Amazon's LLM-powered shopping assistant trained on product catalog, customer
      reviews, and web content. The strong commerce angle in Condé Nast content (fashion, home, gear)
      makes it a natural match. First activations expected summer 2025. Amazon competes with Meta in
      digital advertising (~$50B+ Amazon ad rev vs Meta's ~$160B+) and AI (Alexa/Rufus vs Meta AI).
    competitive_with: ["Meta"]
    source_url: "https://digiday.com/media/conde-nast-and-hearst-strike-amazon-ai-licensing-deals-for-rufus/"
    secondary_sources:
      - "https://engadget.com/ai/amazon-strikes-ai-licensing-deal-with-hearst-and-conde-nast-194535641.html"
      - "https://glossy.co/fashion/conde-nast-and-hearst-strike-amazon-ai-licensing-deals-for-rufus/"

  - partner: "Apple"
    relationship_type: "licensing (negotiations)"
    estimated_value: "~$50M+ (archive negotiations, per industry reporting)"
    date_established: "2024-2025 (negotiations ongoing)"
    description: >
      Apple Intelligence archive access negotiations reported 2024-2025. Apple competes with Meta
      in hardware (Vision Pro vs Quest), AI (Apple Intelligence vs Meta AI), and privacy positioning.
      Status unclear — no formal announcement as of Jun 2026. If completed, Condé Nast would have
      revenue relationships with OpenAI, Amazon, AND Apple — all Meta competitors.
    competitive_with: ["Meta"]
    source_url: ""

  - partner: "Meta"
    relationship_type: "none"
    estimated_value: "$0"
    date_established: "n/a"
    description: >
      NO revenue relationship exists between Condé Nast and Meta. Meta is the one major tech company
      NOT paying Condé Nast for content licensing. OpenAI, Amazon, and Apple (in negotiations) all pay.
      This creates a structural financial incentive for adversarial Meta coverage: companies that pay
      Condé Nast receive favorable content licensing relationships; the one that doesn't receives
      coverage from a publication whose parent company's largest single investment ($7B+ Reddit) is
      a direct Meta competitor. The absence of a Meta deal is the most important single data point
      in the entire Wired conflict-of-interest analysis.
    source_url: ""

editorial_leadership:
  - name: "Katie Drummond"
    title: "Global Editorial Director"
    start_date: "2023-08-28"
    editorial_stance: "Explicitly adversarial toward Big Tech's political alignment. Self-described philosophy: 'Right and wrong is a big one for me. If you do wrong, I want to find out, and then I want the world to know.' Described tech industry as engaging in 'increasingly grotesque displays of submission' to political power. Career arc (Gizmodo EIC → Vice SVP → Wired GED) represents an adversarial-journalism pipeline. Created first-ever Wired politics team Nov 2023. DOGE coverage drove 62,500 new US subs in 2 weeks (Feb 2025), won Sidney Hillman Prize. 'Story Zero' newsroom ethos — break stories that set news agendas globally. Launched Uncanny Valley podcast, KQED radio partnership. Freedom of the Press Foundation board (2024). Reports to Anna Wintour."
  - name: "Leah Feiger"
    title: "Director of Politics & Science"
    start_date: "2023-11-13"
    editorial_stance: "First-ever Wired politics editor. Built politics team from scratch under Drummond. Recruited from Vice News where she overlapped with Drummond. Hosts WIRED Politics Lab podcast. Drove DOGE coverage strategy. Promoted from 'senior politics editor' to 'Director of Politics & Science' by 2025."
  - name: "Brian Barrett"
    title: "Executive Editor, News"
    editorial_stance: "10+ year Wired veteran. Oversees news desk. Covers DOGE, government tech. Co-hosts Uncanny Valley podcast."
  - name: "Zoë Schiffer"
    title: "Director of Business & Industry"
    editorial_stance: "Joined from Platformer/The Verge 2024. Tech labor specialist. Co-hosts Uncanny Valley podcast."
  - name: "Meg Marco"
    title: "Executive Editor of News"
    editorial_stance: "Leah Feiger's politics team reports to her. Oversees news operation."

