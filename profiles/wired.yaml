      Remaining ~98M shares worth ~$2.6B at $26.88/share (Jun 23, 2026).
      WBD under potential Paramount Skydance acquisition (bids at $19-$30/share range).
    current_value_estimate: "~$2.6B remaining stake + $1.1B realized = ~$3.7B total"
