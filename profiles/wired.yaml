    credit_facility_monetization: >
      REDDIT MARGIN LOAN (reported Jun 12, 2026, Bloomberg Law): Advance Magazine Publishers Inc.
      — the specific Advance subsidiary that directly holds the Reddit shares — is establishing
      a credit facility using 7.8 million Reddit shares (~18.5% of its 42.2M Reddit holding)
      as collateral. Share offering price range: $145.38 to $148.54 each, valued at up to $1.2B.
      This represents an ~8% discount to Reddit's then-closing price of $158.02.
      DERIVATIVES COMPONENT: Advance is simultaneously purchasing derivatives on the same shares.
      This is a classic variable prepaid forward (VPF) / collar structure — Advance receives
      upfront cash while retaining economic exposure to Reddit upside (via the derivatives)
      AND retaining voting control (shares are pledged as collateral, not sold). The VPF allows
      Advance to monetize $1.2B of its Reddit position without triggering a taxable sale event
      and without reducing its 42.2M share count or its 65.2% voting power.
      TIMING SIGNIFICANCE: The credit facility was reported ~17 days after Donald Newhouse's death
      (May 26, 2026). While it may have been in planning before his passing, the timing suggests
      third-generation Newhouse leadership is actively managing liquidity. Combined with the
      $1.1B WBD share sale (Jun 2024), Advance has extracted or collateralized ~$2.3B from its
      public equity holdings within 12 months — a notable acceleration of monetization activity
      for a historically conservative family office. The derivatives purchase is particularly
      noteworthy: it suggests Advance is NOT bearish on Reddit (they'd simply sell if they were)
      but rather needs current liquidity while maintaining long-term upside exposure.
      CONFLICT IMPLICATION: The margin loan deepens Advance's financial entanglement with Reddit.
      A Reddit stock decline would trigger margin calls, creating pressure to either inject more
      collateral or sell shares. This makes Advance MORE sensitive to Reddit's stock price,
      not less — intensifying the undisclosed conflict when Wired covers Meta (Reddit's competitor).
