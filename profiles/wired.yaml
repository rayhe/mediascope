ownership_chain:
  - name: "Wired"
    entity_type: "publisher"
    description: >
      Digital and print technology publication, founded 1993 by Louis Rossetto and Jane Metcalfe.
      Acquired by Condé Nast (via Advance) in 1998 for ~$80M. One of Condé Nast's 7 "marquee brands"
      that account for 85% of company revenue (FT, Feb 2026). Wired Italy edition shuttered Apr 2026.
      WIRED UK PRINT ENDED (early 2026): Winter 2025 was the final print issue of Wired UK, ending
      a run that began in 2009. Seven London-based editorial staff left at end of 2025; team rebuilt
      to focus on audience development and UK/Europe-focused digital reporting (Press Gazette, Apr 2, 2026).
      EIC Katie Drummond: "Creating a sustainable and growing subscription business is the future of Wired...
      I don't want Wired to be at the whims of anything that I can't control the way I can control the
      journalism." Digital-only subscribers doubled in 2025; direct-to-publisher subscribers up 20%.
      Print had already reduced from bimonthly (2017) to quarterly (2024) before full cessation.
      Wired Consulting and live events continue across Europe via UK team.
      NEWSLETTER EXPANSION (2026): Drummond launched 5 new subscriber-only weekly newsletters, each
      written by a Wired journalist; audio versions of articles; bimonthly subscriber livestream AMAs
      with Wired reporters; and subscriber-only comment sections. This represents the most significant
      digital product expansion in Wired's history and deepens the subscription-first business model.
      Global Editorial Director: Katie Drummond (since Aug 2023).
    source_url: "https://www.ft.com/content/conde-nast-seven-brands-85-percent-revenue"

  - name: "Condé Nast"
    entity_type: "parent_company"
    description: >
      Global media company, 100% subsidiary of Advance Publications. HQ: One World Trade Center, NYC.
      CEO: Roger Lynch (since Apr 2019). Chief Content Officer: Anna Wintour (stepped down as US Vogue EIC
      in 2025, retains global editorial director and CCO role; successor search for "Head of Editorial Content"
      announced). Chief Revenue Officer: Elizabeth Herbst-Brady (since Aug 2024).
      Chief Product & Technology Officer: Vasanth Williams (started Dec 8, 2025). Hired from Major League
      Baseball where he was CPO and EVP of Engineering. Prior: Amazon, Microsoft, Yodle. Mandate: advance
      Condé Nast's digital ecosystem with AI-driven personalization, new tools and platforms, and editorial
      product integration. Reports to Lynch. Appointment announced alongside Microsoft Copilot licensing pilot.
      7 marquee brands (85% of revenue, FT Feb 2026): Vogue, GQ, The New Yorker, Wired, Vanity Fair,
      Architectural Digest, Condé Nast Traveler.
      Also publishes (digital): Ars Technica, Epicurious, Glamour (US/UK only after Apr 2026 restructuring),
      Allure, La Cucina Italiana. Formerly: Pitchfork (folded into GQ 2024), Teen Vogue (folded into Vogue 2025),
      Self (shut down Apr 2026), Them (sold to Equalpride Feb 2026), Glamour editions in Germany/Spain/Mexico
      (winding down). Wired Italy (ending publishing Apr 2026).
      PRIVATE — no SEC filings for parent entity. UK subsidiary data available via Companies House.
    source_url: "https://www.condenast.com"

  - name: "Condé Nast (UK subsidiary)"
    entity_type: "operating_subsidiary"
    description: >
      Companies House filings. FY2023: Turnover £244.8M (down from £247.9M in 2022). Pre-tax profit
      £8.3M (down from £23.3M in 2022). Profit collapse driven by cost increases: paper/printing, events
      infrastructure, staff increases (editorial +3.5%, commercial +4.5%). UK turnover fell £93.1M→£89.0M,
      European £132.2M→£119.2M, rest of world rose £28.8M→£36.6M. Advertising revenue down £211.8M→£200.5M.
      Consumer/other revenue up £42.3M→£44.2M.
    source_url: "https://business-live.co.uk/enterprise/vogue-publisher-conde-nasts-profit-30360321"

  - name: "Condé Nast (consolidated, per CEO)"
    entity_type: "operating_subsidiary"
    description: >
      Roger Lynch memo, Apr 16, 2026: "Our overall business was profitable in 2025 and ended the year with
      revenue growth" that "has continued into the first quarter [of 2026]."

      REVENUE ESTIMATE (FT, Feb 27, 2026): WSJ previously reported 2021 revenue was nearly $2 billion.
      Lynch told FT that 2025 revenue was "similar to 2021 levels" but the company is "far more profitable
      now." Gross margins climbed approximately 3 percentage points over the past 2-3 years. Operating
      expenses "relatively flat." The New Yorker reached record revenue, profits, and subscribers in 2025.
      Digital operations now generate majority of revenue — a benchmark that "took years of structural work
      to reach." This implies Condé Nast global revenue is approximately $1.9-2.0B.

      GOOGLE TRAFFIC COLLAPSE (FT, Feb 27, 2026): Lynch told Financial Times that Google search is "no
      longer a meaningful driver" of traffic to Condé Nast websites. Google accounted for a majority of
      visits "just a few years ago" — that share fell to approximately 25% by 2025. Lynch called Google's
      introduction of AI-generated summaries in search results "another sort of death blow" to search
      traffic. Expects "very dramatic continued declines in search traffic, to the point where in a couple
      of years it's just not a meaningful driver of our traffic." Called Google's opt-out arrangement
      "pernicious" — publishers must opt out of Google Search entirely to prevent content from being used
      in AI summaries. No mechanism exists to remain indexed in traditional organic search while excluding
      content from AI Overviews. Condé Nast has NOT reached a licensing deal with Google (in contrast to
      OpenAI and Amazon deals). This is the ONLY major AI company whose content Condé Nast is NOT being
      compensated for — creating a unique adversarial dynamic between Condé Nast and Google.
      
      "GOOGLE ZERO" PLANNING DIRECTIVE (May 2026, TBPN): Lynch escalated beyond the Feb 2026 FT
      rhetoric. At the TBPN technology show, he disclosed that he has "instructed his internal sales
      teams to plan as if search traffic will disappear in the near future." This represents a
      CORPORATE OPERATIONAL DIRECTIVE, not just a forecast — Condé Nast is now building revenue
      projections assuming zero Google search traffic. Context: Condé Nast is restructuring around
      events, subscriptions, commerce, and AI licensing precisely because it expects the Google traffic
      relationship to collapse entirely. The timing of this directive (May 2026) is significant —
      it came weeks after the Self/Glamour/Wired Italy closures (Apr 16), suggesting the portfolio
      pruning is part of the same strategic response to Google traffic zeroing out.
      VENUE CONFLICT: TBPN was acquired by OpenAI in April 2026 (confirmed Search Engine Journal).
      Lynch chose to announce his anti-Google strategy on a show OWNED by OpenAI — while Condé Nast
      has a multiyear AI licensing deal with OpenAI (since Aug 2024). This creates a circular dynamic:
      OpenAI's platform amplifies the narrative that Google search is dying → publishers abandon Google →
      publishers become more dependent on AI licensing deals (including with OpenAI) for replacement
      revenue. Lynch's three appearances on TBPN/Channels constitute executive-level platform alignment
      with the company's largest AI licensing partner.
      VERGE AMPLIFICATION: Nilay Patel (The Verge EIC) explicitly shared and endorsed Lynch's TBPN
      interview on Decoder podcast, adopting the term "Google Zero" — which Patel says HE coined. Patel
      said: "that's what I've been calling Google Zero." The Verge's EIC is editorially aligning with
      the parent company's commercial anti-Google posture, propagating it through PMC-owned (formerly
      Vox Media) podcast infrastructure. This blurs editorial independence from commercial strategy.
      THIRD-PARTY VALIDATION (cited by Lynch): Chartbeat found 60% drop in search referral traffic for
      small publishers over 2 years. Pew Research (Jul 2025): when Google AI Overview is featured, only
      1% of users click on cited links, and only 8% click organic blue links below AIO (vs 15% when no
      AIO present). Reuters Institute projects 40%+ further decline over next 3 years. Google I/O 2026
      redesigned search with "information agents" that monitor the web for users without requiring
      click-through.
      CHRONOLOGY: MediaPost (Mar 3, 2026) was earliest public report of Lynch's FT comments. Lynch
      called AI Overviews "another sort of death blow" in search traffic. He confirmed Condé Nast
      "increased its revenue last year" despite worse-than-expected search traffic declines, attributing
      growth to subscriptions and non-search revenue. He criticized Google's opt-out arrangement but has
      NOT reached an AI licensing deal with Google (the only major tech platform excluded alongside Meta).
      Source: Adweek (May 2026) — https://www.adweek.com/media/conde-nast-events-revenue-2026/
      Source: Search Engine Journal (May 12, 2026) — https://www.searchenginejournal.com/conde-nast-ceo-plan-as-if-search-traffic-will-be-zero/
      Source: MediaPost (Mar 3, 2026) — https://www.mediapost.com/publications/article/407108/
      Source: Pew Research Center (Jul 2025) — cited in MediaPost

      REGULATORY CONTEXT: European Commission opened formal antitrust probe into Google's AI content
      practices (Dec 9, 2025). UK CMA proposed binding conduct requirements under Digital Markets,
      Competition and Consumers Act 2024 (Jan 28, 2026), including a requirement that Google provide
      publishers ability to opt out of AI Overviews without losing search visibility. Google responded
      by announcing it was "exploring updates" to its controls — undefined. Google's Sulina Connal told
      a publishing conference (Feb 11, 2026) that allowing publishers to exclude content from AI Overviews
      without affecting traditional search was "a huge engineering project."

      CNIL ENFORCEMENT (Nov 20, 2025): France's CNIL fined Condé Nast's French entity €750,000 for
      cookie consent violations on vanityfair.fr, affecting approximately 7.4 million visitors (Jun-Oct 2023).

      DATA BREACH — "LOVELY" INCIDENT (Dec 20-25, 2025): A hacker operating under the alias "Lovely"
      breached Condé Nast's subscriber database systems and leaked 2,366,576 records (2,366,574 unique
      email addresses) from Wired.com subscribers, with timestamps ranging from April 26, 1996 to
      September 9, 2025. Data includes subscriber IDs, emails, and optional fields: first/last names
      (~285,000 records), phone numbers (~32,000), physical addresses (~108,000), gender, and birthday.
      Some entries also included last session dates and IP addresses, indicating the database contained
      live session data, not a static marketing repository.
      The data was dumped on BreachForums and Breach Stars hacking forums on Dec 20, posted publicly
      on Christmas Day. BleepingComputer validated 20 records as legitimate Wired subscribers. Troy Hunt
      incorporated the leak into Have I Been Pwned.
      Lovely accused Condé Nast of ignoring vulnerability reports for a month: "Condé Nast does not
      care about the security of their users' data. It took us an entire month to convince them to fix
      the vulnerabilities on their websites. We will leak more of their users' data (40+ million) over
      the next few weeks. Enjoy!" The hacker also shared record counts for other Condé Nast properties
      they claimed to have stolen from, including The New Yorker, Epicurious, SELF, Vogue, Allure,
      Vanity Fair, Glamour, Men's Journal, Architectural Digest, Golf Digest, Teen Vogue, Style.com,
      and Condé Nast Traveler — threatening up to 40M total records.
      Ars Technica (also Condé Nast-owned) reported on the breach noting it was NOT affected because
      it runs its own separate tech stack — confirming the vulnerability was in Condé Nast's shared
      subscriber infrastructure. DataBreaches.net initially acted as intermediary but later concluded
      Lovely was "a cybercriminal seeking a payout," not a legitimate security researcher.
      Condé Nast never issued an official public statement confirming or denying the breach. Reported
      by BleepingComputer, The Register, Security Affairs, TechRadar, PYMNTS, Editor & Publisher.
      ANALYTICAL SIGNIFICANCE: The breach exposed the subscriber infrastructure that underpins Condé
      Nast's subscription revenue pivot (the very strategy replacing declining ad revenue). The shared
      database vulnerability across brands (Wired, Vogue, TNY, VF) reveals a single-point-of-failure
      architecture for the subscriber data that CEO Lynch has called the foundation of the company's
      future. Potential GDPR, CCPA, and other regulatory exposure for a breach of this scale. The
      company's CPTO Vasanth Williams (hired Dec 2025, same month as the breach) inherited this
      security debt on arrival.
      Sources: BleepingComputer, The Register, Security Affairs, TechRadar, PYMNTS, Editor & Publisher.

      Restructuring ongoing: Self shut down, Glamour international editions closing,
      Wired Italy ending, technology division restructured "reflecting the rapid advancement of AI."
      Multiple layoff rounds: 270 jobs (Nov 2023), C-suite cuts (Jan 2025, 14+ executives including 2 CBOs),
      16 unionized employees (Apr 2026). Condé Nast Union (NewsGuild/CWA) active; contentious bargaining sessions.
    data_breach_source_urls:
      - "https://www.bleepingcomputer.com/news/security/hacker-claims-to-leak-wired-database-with-23-million-records/"
      - "https://www.theregister.com/2025/12/28/conde_nast_wired_data_breach/"
      - "https://securityaffairs.com/172561/data-breach/conde-nast-wired-data-breach.html"
      - "https://www.techradar.com/pro/security/hackers-say-they-have-stolen-40-million-conde-nast-records"
      - "https://www.pymnts.com/cybersecurity/2025/conde-nast-hack-exposes-40-million-users-data/"
      - "https://www.editorandpublisher.com/stories/conde-nast-data-breach-lovely-hacker/"
    commercial_pivot: >
      STRATEGIC REVENUE SHIFT (Adweek, May 2026): Condé Nast is executing a fundamental pivot away from
      advertising as a growth engine. CEO Lynch (Oct 2025): advertising is "no longer expected to be a
      growth engine." Strategy now centers on four non-ad pillars:
      1. EVENTS: Revenue grew 40% in 2025, projecting +22% in 2026. Marquee franchise growth:
         Vanity Fair Oscars Party +65% YoY, The New Yorker Festival +86% YoY, Vogue World +48% YoY
         (heading to Milan for 5th edition). Client event at The Metropolitan Museum of Art (May 2026).
         CRO Herbst-Brady: events are "a differentiator for us."
      2. AI LICENSING: Deals with OpenAI (Aug 2024), Amazon Rufus (Jul 2025), Perplexity (2025),
         Microsoft Copilot (Dec 2025 pilot), Apple Intelligence (in negotiations). Lynch explicitly
         named these as strategic revenue pillars. Microsoft partnership announced alongside CPTO
         Vasanth Williams hire — signals AI licensing is now a C-suite priority, not just legal/BD.
         AI MARKETPLACE EVOLUTION (WSJ, Jul 3, 2026): AI content licensing is moving beyond bilateral
         deals to marketplace models. Microsoft launched a pilot marketplace with 8 publishers (People,
         AP, Hearst) with Yahoo and Copilot as buyers, investing $10M+. Amazon Factiva also building
         marketplace infrastructure. Condé Nast named among "large publishers" with existing bilateral
         deals (OpenAI, Amazon). This structural shift has conflict implications: marketplace models
         could make Condé Nast's AI licensing revenue MORE dependent on platform health (Meta is
         conspicuously absent as an AI licensing buyer — unlike OpenAI, Amazon, Apple, and Microsoft).
         Source: https://www.wsj.com/business/media/marketplaces-are-the-next-frontier-in-publisher-deals-with-ai-companies-11515b00
      3. COMMERCE: $600M in product sales in 2024 via editorial affiliate content.
      4. SUBSCRIPTIONS: DOGE coverage drove 62,500 new US subs in 2 weeks (Feb 2025).
      Also: 28 billion video views in 2024 across longform, shortform, and film.
      2025 REVENUE BREAKDOWN (Adweek, May 2026): Subscription revenue +10% YoY, commerce +13% YoY,
      events +40% YoY. Events "in the center" of the business per CRO Herbst-Brady. No further
      paring of portfolio planned per Herbst-Brady: "We have no plans. It's all about focus and
      building opportunity where we see the largest potential."
      CRO Herbst-Brady (Thread Podcast, 2026): "AI didn't kill premium media — it made it more valuable."
      Herbst-Brady career: Yahoo → Snap → Viacom → Condé Nast (joined Aug 2024).
    source_urls:
      - "https://www.adweek.com/how-conde-nast-grew-events-revenue/"
      - "https://www.thewrap.com/conde-nast-shuts-down-self-magazine/"
      - "https://ppc.land/conde-nast-ceo-calls-google-ai-a-death-blow-as-search-traffic-collapses/"
      - "https://www.adweek.com/media/conde-nast-events-revenue-2026/"

  - name: "Advance Publications, Inc."
    entity_type: "holding_company"
    description: >
      Private media holding company, incorporated in New York, founded 1922 by Samuel Irving Newhouse Sr.
      HQ: One World Trade Center, New York, NY 10007. Wholly owned by the Newhouse family.
      Board of Directors (per Reddit 2025 proxy, DEF 14A filed Apr 28, 2025): Michael A. Newhouse,
      Steven O. Newhouse, Samuel I. Newhouse III, Thomas S. Summer, Jamie Miller, and Victor F. Ganzi.
      NEW (2025): Jamie Miller added to AP board between 2024 and 2025 proxy filings. Likely Jamie S.
      Miller — former GE CFO (Nov 2017–Feb 2020), GE Transportation President & CEO (Oct 2015–Nov 2017),
      GE CIO (Apr 2013–Oct 2015). Now CFO of Cargill, Inc. (since Mar 2021). Also serves on Qualcomm
      board (since May 2020) and International Paper board (since 2024). Brings heavy
      financial/audit/tech industry expertise to the AP board that makes ALL voting and investment
      decisions regarding Advance's Reddit shares.
      KEY: Advance is the indirect parent making ALL voting and investment decisions for its subsidiaries'
      holdings (including Reddit shares), per SEC filings.
      Portfolio spans media, communications, technology, education, and sports.
    source_url: "https://www.advance.com"

  - name: "Newhouse Family"
    entity_type: "family_office"
    description: >
      SUCCESSION EVENT: Donald Edward Newhouse died May 26, 2026 (aged 96, lymphoma) at his estate in
      Lambertville, NJ. Forbes estimated his net worth at $15.4B (May 2026). He was the last surviving
      second-generation Newhouse — his brother Si Newhouse Jr. died in 2017 of frontotemporal dementia.
      Third generation now fully in control:
      - Steven O. Newhouse (b. ~1957): Chairman & Co-President of Advance Publications. Serves on Reddit board
        as Advance Designee. Resigned from WBD board March 29, 2024.
      - Michael Andrew Newhouse: Advance board member. AP (Associated Press) board member since 2017.
        Syracuse University trustee.
      - Samuel I. Newhouse III: Advance board member. Advance Long-Term Trust trustee.
      - Katherine Irene Newhouse: Donald's daughter.
      Family office serves 35 adult households and 100+ individual family members (per LinkedIn profile
      of former CIO, Institutional Investor reporting).
      CIO: Bei Saville (hired from Northern Trust Asset Management's OCIO division).
      Samuel I. Newhouse Foundation: $132M+ in investments (as of Oct 2016).
      Donald's $75M donation to Syracuse University's S.I. Newhouse School of Public Communications (Jan 2020).
      $20M donation to Association for Frontotemporal Degeneration (Mar 2021).
      Forbes family wealth estimate: $25B+ (historically varied; $18.5B in 2016, $26B per Bloomberg in 2024).
      LEGAL OWNERSHIP STRUCTURE (per Charter Communications DEF 14A, Reddit 2025 proxy, SEC filings):
      Newhouse Family Holdings, L.P. ("NFH") owns 100% of Advance Publications, Inc. ("API").
      Advance Long-Term Trust Management Trust is the SOLE GENERAL PARTNER of NFH — meaning this trust
      makes all control decisions for the entire Advance empire. Trustees: Samuel I. Newhouse III,
      Steven O. Newhouse, Michael A. Newhouse, Victor F. Ganzi, and Peter C. Gould. These 5 individuals
      collectively control the trust that controls the LP that controls API that controls Condé Nast,
      Reddit stake, Charter stake, WBD stake, and all other Advance assets. NOTE: The trust structure
      means Donald's death does NOT trigger any change in the legal GP or trustees — succession was
      already completed at the trust level. No probate-driven disruption to corporate control.
      SUCCESSION ANALYSIS: Donald was president of Advance Publications (per Wikipedia, AP obituary) but
      the Advance Long-Term Trust already had third-gen trustees in place. His death removes the final
      patriarchal oversight but does NOT change the trust's composition. Steven O. Newhouse has been the
      operational leader since at least 2017 (when Si died). The Reddit credit facility (reported 17 days
      after Donald's death) and the accelerated monetization of WBD shares suggest the third generation
      is more financially active than their father's generation.
    source_urls:
      - "https://en.wikipedia.org/wiki/Donald_Newhouse"
      - "https://www.nytimes.com/2026/05/26/business/donald-newhouse-dead.html"
      - "https://www.thewrap.com/culture-lifestyle/culture/donald-newhouse-dies-advance-publications-conde-nast-owner/"
      - "https://www.barchart.com/story/news/newspaper-publisher-ap-board-chairman-donald-newhouse-dies-96"
      - "https://news.syr.edu/2026/05/university-mourns-passing-donald-newhouse/"
      - "https://www.editorandpublisher.com/stories/donald-e-newhouse-low-profile-heir-to-a-media-empire-dies-at-96/"

