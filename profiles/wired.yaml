    description: >
      Flashlight Capital funds Social Media Victims Law Center (SMVLC), lead counsel in bellwether
      Meta addiction trial. No direct Advance/Condé Nast link confirmed, but unnamed UK PE firm behind
      Flashlight's $250M fund is unidentified. MDL 3047: 2,527+ claims, 42 state AGs active.
      IMPORTANT: Wired's extensive coverage of teen social media harm (Drummond's editorial priority)
      aligns with the litigation narrative. No disclosure of Advance's potential indirect interests
      in Meta's litigation outcomes has ever appeared in Wired coverage.
