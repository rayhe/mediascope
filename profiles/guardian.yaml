ownership_chain:
  - name: "The Guardian"
    entity_type: "publisher"
    description: "Founded 1821. Reader-funded model. No paywall. Print circulation 105,134 (Jul 2021). 1.3M recurring digital supporters (FY2024-25). Readership over 23M UK adults/month."
  - name: "Guardian News & Media (GNM)"
    entity_type: "operating_company"
    description: "Core operating subsidiary. Publisher of theguardian.com — one of the largest English-speaking quality news websites. UK, US (2011), Australian (2013), European (2023), and International editions."
  - name: "Guardian Media Group (GMG)"
    entity_type: "parent_company"
    description: "Media company. CEO: Anna Bateson. CFO/COO: Keith Underwood. Sold The Observer to Tortoise Media in 2024-25. Previously also operated GMG Ventures (now Mercuri)."
  - name: "Scott Trust Limited"
    entity_type: "holding_company"
    description: "Non-profit limited company (converted from trust in 2008). Purpose: 'to secure the financial and editorial independence of The Guardian in perpetuity and to safeguard the journalistic freedom and liberal values of The Guardian free from commercial or political interference.' Profits reinvested in journalism, not distributed. No shareholders, no corporate parent."
  - name: "Scott Trust Endowment Ltd (STEL)"
    entity_type: "endowment_fund"
    description: "Became independent subsidiary of Scott Trust in 2023/24 (previously part of GMG). Value: £1,245.6M as of 31 March 2025 (up from £1.01B in 2018). Investment objective: CPI + 5% annual return over 10+ years, net of fees. 10-year return: 6.3% (below 8.2% target, below 6.7% benchmark). 1-year return: 1.5% (FY2024-25). Advisors: Cardano (SAA, public markets), Cambridge Associates (private investments), Redington (environmental sustainability). Diversified across global public equity, emerging markets, PE & VC (£276M NAV, £352M committed across 28 managers), diversifiers (£47M NAV, £125M committed across 11 managers), hedge funds (reducing), credit, gold, government bonds, cash."
    source_url: "https://uploads.guim.co.uk/2025/09/11/Scott_Trust_Endowment_performance_report_24_25_%281%29.pdf"

