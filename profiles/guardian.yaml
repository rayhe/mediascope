ownership_chain:
  - name: "The Guardian"
    entity_type: "publisher"
    description: "Founded 1821. Reader-funded model. No paywall. Print circulation 105,134 (Jul 2021). 1.3M recurring digital supporters (FY2024-25). Readership over 23M UK adults/month."
  - name: "Guardian News & Media (GNM)"
    entity_type: "operating_company"
    description: "Core operating subsidiary. Publisher of theguardian.com — one of the largest English-speaking quality news websites. UK, US (2011), Australian (2013), European (2023), and International editions."
  - name: "Guardian Media Group (GMG)"
    entity_type: "parent_company"
    description: "Media company. CEO: Anna Bateson. CFO/COO: Keith Underwood (note: terminated as GMG director Jan 30, 2026 per Companies House, but may retain executive role). Sold The Observer to Tortoise Media in 2024-25. Previously also operated GMG Ventures (now Mercuri). B Corp certified since Oct 2019 (Companies House company 00094531)."
  - name: "Scott Trust Limited"
    entity_type: "holding_company"
    description: "Non-profit limited company (converted from trust in 2008). Purpose: 'to secure the financial and editorial independence of The Guardian in perpetuity and to safeguard the journalistic freedom and liberal values of The Guardian free from commercial or political interference.' Profits reinvested in journalism, not distributed. No shareholders, no corporate parent."
  - name: "Scott Trust Endowment Ltd (STEL)"
    entity_type: "endowment_fund"
    description: "Became independent subsidiary of Scott Trust in 2023/24 (previously part of GMG). Value: £1,245.6M as of 31 March 2025 (up from £1.01B in 2018). Investment objective: CPI + 5% annual return over 10+ years, net of fees. 10-year return: 6.3% (below 8.2% target, below 6.7% benchmark). 1-year return: 1.5% (FY2024-25). Advisors: Cardano (SAA, public markets), Cambridge Associates (private investments), Redington (environmental sustainability). Diversified across global public equity, emerging markets, PE & VC (£276M NAV, £352M committed across 28 managers), diversifiers (£47M NAV, £125M committed across 11 managers), hedge funds (reducing), credit, gold, government bonds, cash."
    source_url: "https://uploads.guim.co.uk/2025/09/11/Scott_Trust_Endowment_performance_report_24_25_%281%29.pdf"

# ===================================================================
# GMG PLC BOARD — Companies House filing history (company 00094531)
# Significant board turnover in early 2026: 4 directors departed Jan-Mar
# ===================================================================
gmg_board:
  description: >
    Board of Guardian Media Group plc. Companies House filings show major board turnover
    in early 2026: four directors terminated between January and March 2026, only two
    new appointments (Patricia Cobian Sep 2025, James Goode May 2026). The departure of
    Matthew Brittin — former Google EMEA president — to become BBC Director-General is
    especially significant for tech-media revolving door analysis.
  recent_changes:
    - name: "James Richard Goode"
      action: "appointed"
      date: "2026-05-21"
      filing_date: "2026-05-22"
      role: "Chief Financial Officer (executive director)"
      notes: >
        NEW CFO OF GMG. James Goode joins as CFO and executive director, reporting directly to
        CEO Anna Bateson. Responsible for GMG's global financial strategy and operations.
        CAREER: PA Media Group (formerly Press Association — UK's national news agency) — Group
        CFO and executive director for 6 years (2018-2025). At PA Group, he replaced Ed Ethelston
        as CFO and was appointed to the board of directors alongside Paul Dacre (Chairman &
        Editor-in-Chief of Associated Newspapers/Daily Mail). Before PA Group, Goode had
        "background in strategic investments and acquisitions across a variety of public, private
        and international organisations" per PA Group CEO Clive Marshall.
        SIGNIFICANCE: Goode replaces Keith Underwood (terminated as GMG director Jan 30, 2026)
        as the CFO figure on the GMG board. His PA Media Group background is analytically relevant:
        PA Media (formerly Press Association) is the UK's largest domestic multimedia news agency,
        owned by a consortium of UK newspaper publishers. Goode thus has deep insider knowledge
        of the UK news industry's economics, distribution, and publisher relationships — including
        how publishers negotiate with tech platforms.
        Anna Bateson on appointment: "James brings extensive experience in the media sector and
        has a proven track record of driving revenue growth and strengthening operational capabilities."
      source_urls:
        - "https://find-and-update.company-information.service.gov.uk/company/00094531/filing-history"
        - "https://editorandpublisher.com/stories/the-guardian-appoints-james-goode-as-chief-finance-officer"
        - "https://pamediagroup.com/james-goode-paul-dacre-added-to-board-of-directors/"
    - name: "Matthew John Brittin"
      action: "terminated"
      date: "2026-03-24"
      filing_date: "2026-03-25"
      role: "Senior Independent Director (most senior governance role after Chair)"
      notes: >
        MAJOR FINDING — TECH-MEDIA REVOLVING DOOR + SENIOR GOVERNANCE ROLE: Brittin was
        specifically recruited as the SENIOR INDEPENDENT DIRECTOR of GMG — confirmed by the
        Green Park executive search case study. This is the most senior governance position after
        the Chair, responsible for serving as an intermediary between the Chair and board, leading
        the Chair's performance evaluation, and being the board's voice of independence. Green Park
        conducted a "global search" spanning both US coasts, Continental Europe, and Australia.
        GMG Chair Charles Gurassa: "We successfully appointed Matt Brittin (former President of
        Google EMEA), as our Senior Independent Director. His expertise will be a welcome addition
        to the Board and management as we build out our strategy as a global, digital news media
        organisation."
        CAREER: Google EMEA President (2014-2025, 18 years at Google total). Joined GMG board
        ~2025 as SID. Left GMG board Mar 24, 2026 to become BBC Director-General (BBC board
        approved Mar 23, 2026; confirmed at £565,000 salary; started May 18, 2026). Previously
        NED at Sainsbury's (9 years). CBE in 2026 New Year's Honours for services to technology.
        ANALYTICAL SIGNIFICANCE (UPGRADED): Brittin's role as SID means he had the HIGHEST
        independent governance oversight of GMG, not just a regular board seat. During his tenure
        (~2025 to Mar 2026) he overlapped with: (1) Guardian's Google News AI pilot launch (Dec
        2025), (2) SPUR coalition founding (Feb 2026), (3) OpenAI licensing deal (already in place).
        As SID, Brittin would have been the board member most responsible for ensuring governance
        independence — yet he was simultaneously a former 18-year Google executive while the
        Guardian was negotiating AI content terms with Google. The irony: the person tasked with
        ensuring independent governance was himself the most significant potential source of
        conflicted governance. Google→Guardian→BBC represents a triple revolving door through
        the SID position, not just a routine NED appointment.
        Jane Martinson (Scott Trust board member): Brittin is "razor sharp" with "real experience
        managing the challenges of an unknown future."
      source_urls:
        - "https://find-and-update.company-information.service.gov.uk/company/00094531/filing-history"
        - "https://www.prolificnorth.co.uk/news/bbc-board-confirms-former-google-exec-and-guardian-board-member-matt-brittin-will-step-into-565k-director-general-role/"
        - "https://www.computing.co.uk/news/ex-google-executive-matt-brittin-confirmed-as-bbcs-new-director-general"
        - "https://green-park.co.uk/case-studies/how-the-guardian-media-group-secured-googles-european-president-for-its-board/"
    - name: "Rene Efraim Rechtman"
      action: "terminated"
      date: "2026-03-17"
      filing_date: "2026-03-18"
      notes: >
        Co-founder and CEO of Moonbug Entertainment (CoComelon, Blippi, Little Baby Bum —
        second-most subscribed YouTube channel). Danish entrepreneur. Moonbug acquired by
        Candle Media (Kevin Mayer/Tom Staggs, backed by Blackstone) in 2021. Also board member
        of Better Collective (digital sports media, since 2023) and previously JP/Politikens Hus.
        Joined GMG board March 2020. 6-year tenure focused on digital transformation.
        Career: Tradedoubler (IPO 2005) → GoViral (sold to AOL for ~$100M, 2011) → AOL BeOn
        CEO/SVP → Maker Studios President International (Disney acquisition $500M, 2014) →
        Disney Head of Non-Linear Media → Moonbug (founded 2018, raised $285M+).
      source_urls:
        - "https://find-and-update.company-information.service.gov.uk/company/00094531/filing-history"
        - "https://en.wikipedia.org/wiki/Ren%C3%A9_Rechtman"
        - "https://inpublishing.co.uk/articles/anders-jensen-and-ren%C3%A9-rechtman-join-guardian-board"
    - name: "Keith Robert Underwood"
      action: "terminated"
      date: "2026-01-30"
      filing_date: "2026-02-03"
      notes: >
        Was CFO/COO of Guardian Media Group. Quoted on the OpenAI deal (Feb 2025). Director
        termination may indicate departure from executive role as well, or transition to
        non-director executive position. Underwood was key to the Guardian's AI licensing
        strategy and was the business-side counterpart to Anna Bateson (CEO). If this represents
        a full departure, it would be a significant loss of institutional knowledge on AI
        licensing negotiations at a critical time (Google pilot escalation, SPUR expansion).
        Research needed: confirm whether Underwood retained any executive role post-Jan 2026.
      source_url: "https://find-and-update.company-information.service.gov.uk/company/00094531/filing-history"
    - name: "Coram Williams"
      action: "terminated"
      date: "2026-01-26"
      filing_date: "2026-01-28"
      role: "Non-Executive Director"
      notes: >
        FULL CAREER PROFILE: NED on GMG board from January 2017 to January 26, 2026 (9-year
        tenure). Career: Autocar magazine (news reporter and road tester — a motoring journalist)
        → Arthur Andersen (consulting, then Arthur Andersen Business Consulting and Arthur
        Andersen Worldwide) → Pearson Education (financial strategy & planning manager → finance
        & operations director ELT EMA → interim president Pearson Education Italia → head of
        financial planning & analysis) → Penguin Group CFO (from Apr 2008) → Penguin Random
        House CFO (managing 800-person finance team across 22 markets, ~$3.9B revenue joint
        venture between Bertelsmann and Pearson) → Pearson plc Group CFO (Aug 2015-May 2020)
        → Adecco Group CFO (May 2020-Jan 2026, SIX: ADEN, Switzerland-based global staffing
        company) → CFO at an unnamed German automotive company (Jan 2026+).
        BA (Hons) from Christ Church, Oxford. MBA from London Business School. WEF Agenda
        Contributor. British born, based in Germany since Adecco (Zurich then Germany).
        Adecco CEO Denis Machuel: "We wish him all the best as he assumes a role that connects
        to his deep passion for cars." Williams on LinkedIn: "to return to my roots in the
        automotive sector in my adopted home of Germany."
        BOARD COMPOSITION: Appointed by then-chair Neil Berkett (Jan 2017). On the board when
        Guardian pivoted from losses to profit. His financial expertise (FTSE 100 CFO, major
        publishing groups) was instrumental during GMG's turnaround. 9-year tenure makes him
        one of the longest-serving modern GMG NEDs.
        TIMELINE: Departed GMG board Jan 26, 2026, 4 days before Keith Underwood (Jan 30).
        Both departures coincide with board restructuring around Google News AI pilot (Dec 2025)
        and SPUR coalition founding (Feb 2026). Adecco departure announced Nov 6, 2025.
      source_urls:
        - "https://find-and-update.company-information.service.gov.uk/company/00094531/filing-history"
        - "https://inpublishing.co.uk/articles/coram-williams-joins-guardian-media-group-board"
        - "https://weforum.org/people/coram-williams/"
        - "https://morningstar.com/news/pr-newswire/20251106la63345b/the-adecco-group-announces-new-chief-financial-officer"
        - "https://lse.co.uk/news/PSON/directorate-change-2015"
    - name: "Patricia Cobian"
      action: "appointed"
      date: "2025-09-29"
      filing_date: "2025-10-02"
      role: "Non-Executive Director"
      notes: >
        FULL CAREER PROFILE: Senior telecoms CFO with deep TMT M&A experience. Career:
        Hewlett-Packard (early career) → McKinsey & Company (7 years in London, New York, Madrid,
        TMT and corporate finance focus) → O2 UK/Telefónica UK (joined 2006, European Strategy,
        Business Development, Chief of Staff; Strategy and Transformation Director and O2 UK
        Executive Committee from 2014; CFO from 2016) → Supervisory Board of Telefónica
        Deutschland (2012-2020, led multiple M&A transactions and strategic partnerships) →
        CFO of Virgin Media O2 (June 2021-2025, created via £31B 50-50 joint venture between
        Liberty Global and Telefónica; UK's second-largest integrated communications provider
        with £11B annual turnover; drove 4.3% top-line CAGR and 10.0% operating cash flow CAGR;
        delivered £6B synergies 18 months ahead of schedule) → BT Group CFO (announced Jul 24,
        2025, starting summer 2026; joining BT Board and Executive Committee).
        MSc Industrial Engineering, ICAI - Comillas Pontifical University. Deloitte Media &
        Telecoms 2025 conference speaker.
        ANALYTICAL SIGNIFICANCE: Cobian brings extensive UK telecoms and digital infrastructure
        expertise to GMG governance. BT is the UK's biggest broadband and mobile services
        provider (£20B+ market cap). Her presence on the GMG board while serving as incoming
        BT Group CFO creates a governance link between the UK's largest telecom and its most
        prominent reader-funded news publisher. BT's interests in digital infrastructure and
        content distribution create potential alignment or tension with GMG's AI licensing and
        content strategy.
        Charles Gurassa: "Patricia's commercial acumen, international experience and leadership
        skills will be crucial as we continue to build our global operation and respond to rapid
        transformation in the news media industry."
      source_urls:
        - "https://find-and-update.company-information.service.gov.uk/company/00094531/filing-history"
        - "https://inpublishing.co.uk/articles/patricia-cobian-to-join-guardian-media-group-board"
        - "https://newsroom.bt.com/simon-lowth-to-retire-as-bts-group-cfo-with-patricia-cobian-appointed-as-successor/"
        - "https://investegate.co.uk/bt-group-plc/rns/patricia-cobian-to-join-bt-as-group-cfo/"
        - "https://deloitte.co.uk/media-telecoms-2025/speakers/patricia-cobian"
  analytical_notes: >
    BOARD TURNOVER SIGNIFICANCE: Four directors departed GMG board between Jan 26 and Mar 24,
    2026. This represents significant governance churn during a period of critical AI negotiations
    (Google pilot launched Dec 2025, SPUR expansion Jun 2026, UK CMA ruling Jun 2026). The
    Brittin departure is analytically most important: he bridged Google and GMG governance for
    ~1 year AS THE SENIOR INDEPENDENT DIRECTOR (not just a regular NED), overlapping with the
    Guardian's Google News AI pilot launch. His subsequent appointment as BBC DG extends the
    Google→media governance revolving door to the UK's largest public broadcaster. Rechtman's
    departure removes digital entertainment expertise (Moonbug, Disney). Underwood's departure
    may affect AI licensing negotiation continuity. Coram Williams' 9-year tenure ending
    coincides with the Adecco-to-automotive career move announced Nov 2025.
    REPLACEMENTS: Patricia Cobian (NED, telecoms CFO) and James Goode (new GMG CFO, ex-PA Media
    Group) restore financial/media expertise. Debbie Klein (NED, ex-Sky/Comcast) adds media
    sector marketing expertise. Trei Brundrett (NED, ex-Vox Media) adds US digital media
    operational knowledge. Net: the board lost its Google-connected SID and two long-tenured
    directors, gaining telecoms, news agency, and digital media operations expertise.

  other_current_board_members:
    - name: "Debbie Klein"
      role: "Non-Executive Director (appointed Sep 2023)"
      notes: >
        Over 20 years in media and advertising. Group Chief Marketing, Corporate Affairs and
        People Officer at Sky (2018-2023, Comcast-owned), overseeing HR, diversity, communications,
        public affairs and brand work across Europe. Previously CEO for Europe and Asia Pacific
        at Engine Group (20 years), leading brand and creative work for clients including Sky.
        Earlier career at Saatchi & Saatchi and Nielsen. Also NED at Nationwide Building Society.
        CONFLICT RELEVANCE: Sky is owned by Comcast Corporation, which competes with Meta and
        other tech platforms in streaming, news media, and digital advertising. Klein's Comcast/Sky
        background adds another media-industry governance link.
      source_urls:
        - "https://editorandpublisher.com/stories/debbie-klein-to-join-guardian-media-group-board"
        - "https://inpublishing.co.uk/articles/debbie-klein-to-join-gmg-board"
        - "https://uk.themedialeader.com/debbie-klein-joins-guardian-media-group-board/"
    - name: "Trei Brundrett"
      role: "Non-Executive Director (appointed Sep 2023)"
      notes: >
        Digital media operations executive. Former COO and President of Vox Media, one of the
        largest US digital media companies (The Verge, Vox, New York Magazine, Vulture, Eater).
        Joined Vox Media in 2011 as CTO. Brings deep US digital media market knowledge.
        Charles Gurassa: "expertise in digital media, and impressive knowledge of the US media
        market at a national and local level." Brundrett joined alongside Debbie Klein as part
        of a board refresh in Sept 2023.
      source_url: "https://editorandpublisher.com/stories/trei-brundrett-to-join-guardian-media-group-board"
    - name: "Emily Bell"
      role: "Non-Executive Director"
      notes: "Director, Tow Center for Digital Journalism at Columbia University. Former Director of Digital Content at Guardian News & Media."
    - name: "Ete Davies"
      role: "Non-Executive Director"
      notes: "Digital and marketing executive."
