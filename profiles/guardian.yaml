    estimated_value: "Significant (programmatic)"
    description: "Google is major ad revenue source via programmatic advertising and serves as their ad server. Guardian seeing 'less demand coming through Google's pipes' as of late 2024/early 2025. Programmatic revenue overall up 25%+ YoY. Integrated with The Trade Desk's OpenPath for direct programmatic access."
