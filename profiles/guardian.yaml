spur_coalition:
  description: >
    Guardian is a FOUNDING member of SPUR (Standards for Publisher Usage Rights), launched Feb
    2026. MAJOR EXPANSION announced June 3, 2026 at WAN-IFRA World News Media Congress in
    Marseille: 30 new members joined, bringing total to 36 publishers and affiliate organizations.
    Developing technical standards, licensing frameworks, and a telemetry standard (usage
    tracking) for real-time monitoring of how AI systems use publisher content. SPUR expects
    to launch the telemetry standard "soon" as of June 2026.
  founding_members: ["BBC", "Financial Times", "Guardian Media Group", "Sky News", "Telegraph Media Group", "CMA Media (France, joined Jun 2026 as founding member)", "Mediahuis"]
  eight_work_streams: "The project now working on eight work streams with input and advice from members, participants and the Coalition team."
  standard_members_jun_2026:
    canadian: ["The Globe and Mail", "Quebecor", "Postmedia", "Torstar", "CBC/Radio-Canada", "La Presse", "TVO Media Education Group"]
    european: ["SIPA Ouest-France Group", "Ringier (Switzerland)", "Citywire (UK)", "Sanoma Media Finland", "Der Standard (Austria)", "Bonnier News (Sweden)", "FD Mediagroep (Netherlands)"]
  associate_members: ["Times Higher Education", "RNZ (New Zealand)", "AML Intelligence"]
  affiliate_members: ["WAN-IFRA/FIPP", "European Publishers Council (EPC)", "Digital Content Next (DCN)", "Association of Online Publishers (AOP)", "Independent Publishers Alliance", "Newsworks", "News/Media Alliance (NMA US)", "Independent Media Association (IMA)", "News Media Canada", "Hungarian Publishers' Association", "Hebdos Québec", "PPA (Professional Publishers Association)", "PPA Magnetic"]
  guardian_signatory: "Anna Bateson, CEO"
  bateson_quote: "Welcoming 30 new members, including our first founding member from France, gives SPUR the scale required to turn its mission into a global mandate. This collective strength will help legitimise the standards we create, safeguarding the intellectual property of publishers and providing AI developers with a route to scalable, sustainable licensing."
  purpose: "Shape 'the rules, standards and infrastructure that enable publishers and AI platforms to do business.' Create shared technical standards, streamline licensing, identify IP protection gaps, promote transparent rights-cleared access."
  telemetry_standard:
    status: "PUBLISHED FOR PUBLIC COMMENT (June 12, 2026)"
    comment_period: "June 12 – July 10, 2026"
    revised_versions_due: "August 10, 2026"
    spec_version: "0.1 (preview)"
    technical_lead: "Alex Springer (alex@spurcoalition.org)"
    github_standard: "https://github.com/SPUR-Coalition/telemetry"
    github_profile: "https://github.com/SPUR-Coalition/telemetry-profile"
    license_standard: "Apache License 2.0"
    license_profile: "Creative Commons Attribution-ShareAlike 4.0 International"
    description: >
      The Content Telemetry standard defines five event types tracking content through an AI
      system: (1) content_retrieved — content fetched over HTTP, (2) content_grounded — content
      loaded into the agent's generation context, (3) content_cited — content explicitly
      referenced in the response, (4) content_displayed — user saw a reference or embedded
      content, (5) content_engaged — user clicked, copied, shared, or directed the agent to act.
      Events are tied together by a session ID. The gaps between stages reveal how content was
      used: retrieval without grounding = fetched but not used; grounding without citation =
      influenced the answer but no credit; citation without engagement = cited but user didn't
      click through.
    spur_profile:
      tier: "Compliant (single tier)"
      requirements:
        - "Conformance to the standard (Conforming emitter at Retrieval, Grounding, or Citation level)"
        - "Event-level delivery — discrete events per fetch/grounding/citation/display/engagement, no aggregation, no sampling"
        - "Real-time delivery — events dispatched as they occur; alternative cadence by per-publisher negotiation"
        - "Publisher-designated endpoint — telemetry routed to a destination the publisher chooses"
      consumer_requirements: "Telemetry consumers meet parallel requirements: standard consumer conformance, publisher resolution and isolation, and onward delivery to publisher-designated endpoint"
    design_principles:
      - "Post-hoc, not pre-declared: events report what actually happened, not what the agent said it would do"
      - "Observable boundaries, not agent internals: five event types mark boundary crossings only"
      - "Multiple observers, one event: Content-Telemetry-ID header correlates events across CDN, origin server, and AI agent"
    open_questions:
      - "Grounding boundary: where exactly content 'enters' generation context in multi-stage pipelines (re-ranking, summarisation)"
      - "Event volume at scale: single deep-research query can produce 100+ retrieval events"
      - "Verification: grounding/citation events are SELF-REPORTED by the agent (the party that may owe compensation) — no independent observer for grounding, citation, display, or engagement"
      - "Reporting granularity: SPUR profile requires event-level delivery, but scaling is an open question"
    related_protocols: ["Really Simple Licensing (RSL)", "peek-then-pay", "IAB CoMP", "x402 (crypto-based)"]
    analytical_significance: >
      CRITICAL: The self-reporting gap is the most analytically significant finding. Grounding,
      citation, display, and engagement events have NO independent observer — they are reported
      by the AI agent, which is the same party that may owe compensation under a license. The
      only corroboration mechanism in v0.1 covers retrieval only (via Content-Telemetry-ID header
      matching between agent and origin server). Signed events are deferred to a future version.
      This means the standard as currently drafted relies on AI companies honestly reporting
      their content usage. For the Guardian's analytical position: SPUR co-developed this standard
      while the Guardian simultaneously participates in Google's News AI pilot, which presumably
      does NOT require this telemetry protocol. The dual positioning becomes sharper: the Guardian
      helps build the industry verification tool while engaging in bilateral deals that bypass it.
    source_urls:
      - "https://www.spurcoalition.org/updates/spur-telemetry-standard-published-for-public-comment-the-spur-coalition"
      - "https://github.com/SPUR-Coalition/telemetry"
      - "https://github.com/SPUR-Coalition/telemetry-profile"
  wan_ifra_partnership: "WAN-IFRA formed a strategic partnership with SPUR at the June 2026 Congress in Marseille."
  bbc_spur_revolving_door:
    description: >
      BBC-GUARDIAN SPUR CO-FOUNDING CREATES MULTI-LAYERED REVOLVING DOOR (NEW FINDING Jul 5):
      BBC and Guardian are both SPUR founding members. The BBC founding letter was signed by
      Tim Davie (then DG), but Brittin replaced Davie as BBC DG on May 18, 2026. Brittin came
      to the BBC FROM the GMG board (where he served as Senior Independent Director until
      Mar 24, 2026). This creates a unique governance pathway: Google EMEA President (18 years)
      → GMG Senior Independent Director (~2025-Mar 2026) → BBC Director-General (May 2026+).
      The BBC and Guardian are now co-founding SPUR members sharing a governance connection
      through Brittin, who simultaneously has deep Google relationships. Both organisations are
      developing the same telemetry standard that will govern how AI companies (including Google)
      report content usage — and both have pre-existing relationships with Google (Guardian:
      Google News AI pilot; BBC: Google has historically been a major digital partner).
      BRITTIN'S AI VIEWS: In the Implement AI Podcast (#81, ~May 2026), Brittin described AI
      as experiencing a "vertical takeoff moment," said the biggest barriers are "cultural, not
      technical," and urged organisations to "start small, experiment, and move now." TVBEurope
      analysis: "the BBC has been super conservative on adopting AI — expect that to change
      big time under Brittin." This suggests the BBC under Brittin will pursue MORE aggressive
      AI adoption, potentially including content licensing deals similar to the Guardian's.
      If the BBC strikes its own Google or OpenAI content licensing deal under Brittin's
      leadership, the revolving door pathway becomes commercially significant, not just
      governance-significant.
    analytical_significance: >
      This finding extends hypothesis #12 (Guardian Google coverage during Brittin's board tenure)
      to the BBC: does the BBC's AI policy under Brittin (an 18-year Google executive) differ
      from the BBC's AI policy under Davie? The BBC's SPUR co-founding membership creates a
      structural tension: SPUR advocates collective standards while Brittin's "experiment and
      move now" AI philosophy may favor bilateral deals. Monitor for any BBC AI content licensing
      announcements that bypass the SPUR framework.
    source_urls:
