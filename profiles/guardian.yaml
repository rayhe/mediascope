name: "The Guardian"
slug: "guardian"
url: "https://www.theguardian.com"

rss_feeds:
  - url: "https://www.theguardian.com/technology/rss"
    category: "technology"
  - url: "https://www.theguardian.com/business/rss"
    category: "business"
  - url: "https://www.theguardian.com/world/rss"
    category: "world"

ownership_chain:
  - name: "The Guardian"
    entity_type: "publisher"
    description: "Founded 1821. Reader-funded model. No paywall."
  - name: "Guardian Media Group"
    entity_type: "parent_company"
    description: "Media company. Also operates The Observer."
  - name: "Scott Trust Limited"
    entity_type: "holding_company"
    description: "Non-profit trust. Purpose: secure financial and editorial independence of The Guardian in perpetuity. No corporate parent with tech/AI interests."

revenue_relationships:
  - partner: "Meta"
    relationship_type: "none"
    estimated_value: "$0"
    description: "No significant revenue relationship. Guardian has been critical of Facebook's impact on journalism since 2016."
    date_established: "n/a"
    source_url: ""
  - partner: "Google"
    relationship_type: "advertising"
    estimated_value: "significant (programmatic)"
    description: "Google is major ad revenue source via programmatic advertising."
    date_established: "ongoing"
    source_url: ""

editorial_leadership:
  - name: "Katharine Viner"
    title: "Editor-in-Chief"
    editorial_stance: "Strong editorial stance on AI threats to journalism, labor, and democracy. The Guardian style guide explicitly warns about tech industry framing."

key_journalists:
  - name: "Alex Hern"
    beat: "UK technology editor"
    known_patterns: "Critical of Big Tech, surveillance, AI hype. 12+ year tenure."
  - name: "Dan Milmo"
    beat: "Global technology editor"
    known_patterns: "EU tech regulation, social media harms, AI policy"
  - name: "Blake Montgomery"
    beat: "US technology editor"
    known_patterns: "US tech news editing. Previously at Gizmodo, Daily Beast, BuzzFeed News. Stanford BA."
  - name: "Johana Bhuiyan"
    beat: "Tech accountability, surveillance of marginalized communities"
    known_patterns: "Investigative work on surveillance tech used against BIPOC, Muslim, immigrant communities. ICE surveillance investigations. Previously at LA Times, Recode, BuzzFeed News."
  - name: "Julia Carrie Wong"
    beat: "Technology and society (former, left tech beat 2021)"
    known_patterns: "Facebook criticism, whistleblowers (Sophie Zhang), misinformation, Myanmar genocide coverage. Still at Guardian on other beats."
  - name: "Kari Paul"
    beat: "Technology (former, departed 2024)"
    known_patterns: "Meta, Elon Musk, AI, social media, privacy. West Coast bureau. Left for art school in Paris."

known_conflicts:
  - type: "editorial_bias"
    description: "CONTROL CASE: No significant corporate conflicts. Editorial bias is purely ideological/editorial, not financial. Useful baseline for distinguishing financial conflicts from editorial stance."
    severity: 1
    evidence: "Scott Trust non-profit structure eliminates corporate interest conflicts"
    source_url: ""
  - type: "competitive"
    description: "Guardian's reader-funded model is threatened by social media platforms that capture attention and advertising. Structural incentive to frame social media negatively."
    severity: 2
    evidence: "Guardian reader fundraising campaigns explicitly cite Big Tech as threat to journalism"
    source_url: ""

litigation_connections: []

ai_crawl_policy:
  blocks_gptbot: true
  blocks_ccbot: true
  blocks_google_extended: true
  notes: "Blocks most AI crawlers. Has not entered licensing deals with AI companies."

target_entities:
  "Meta":
    aliases: ["Meta", "Facebook", "Instagram", "WhatsApp", "Mark Zuckerberg"]
    regex: "\\b(Meta(?! tag| data)|Facebook|Instagram|WhatsApp|Zuckerberg)\\b"
  "Google":
    aliases: ["Alphabet", "Google", "YouTube", "DeepMind"]
    regex: "\\b(Alphabet|Google|YouTube|DeepMind)\\b"

bias_ratings:
  ad_fontes:
    reliability: 40.23
    bias: -6.89
  allsides: "Lean Left"
  mbfc: "Left-Center Bias"

notes: |
  The Guardian is included as a CONTROL case. Its non-profit ownership structure
  means editorial bias stems from ideological/editorial choices rather than
  financial conflicts. Comparing Wired (financial conflicts) to Guardian (pure
  editorial bias) helps isolate the financial incentive signal.
  
  Research note: Bunz & Braghieri 2021 found Guardian had only 29% positive AI
  coverage vs 49% for WSJ, making it a useful benchmark for editorial AI skepticism
  independent of ownership conflicts.

editorial_history:
  leadership_changes:
    - position: "eic"
      outgoing: "Alan Rusbridger"
      incoming: "Katharine Viner"
      date: "2015-06"
      notes: "CONTROL: Viner has been EIC since 2015 — exceptional stability. Useful baseline."

  notable_arrivals:
    - journalist: "Dan Milmo"
      from: "Guardian business desk"
      date: "2021-01"
      role: "editor"
      beat: "global technology"
      notes: "Internal promotion to global tech editor."
    - journalist: "Johana Bhuiyan"
      from: "Los Angeles Times"
      date: "2021-08"
      role: "senior_editor"
      beat: "tech accountability, surveillance"
      notes: "Senior tech reporter and editor, Guardian US. Specializes in surveillance of marginalized communities."
    - journalist: "Blake Montgomery"
      from: "Gizmodo"
      date: "2023-09"
      role: "editor"
      beat: "US technology"
      notes: "US tech editor. Previously deputy editor/tech news editor at Gizmodo, reporter at Daily Beast and BuzzFeed News."
    - journalist: "Samantha Oltman"
      from: "Good Luck Media"
      date: "2026-02"
      role: "editor"
      beat: "AI, future of work"
      notes: "Led 'Reworked' AI/work series. Former Recode EIC, Vox editorial director. Very brief tenure — left for Bloomberg June 2026."

  notable_departures:
    - journalist: "Julia Carrie Wong"
      to: "Guardian (other beats)"
      date: "2021-06"
      notes: "Left tech beat to cover other topics. 6-year tech tenure. Known for Facebook whistleblower/Sophie Zhang coverage."
    - journalist: "Kari Paul"
      to: "Paris College of Art (MFA)"
      date: "2024-06"
      notes: "Left journalism for art school. 5-year tenure as West Coast tech reporter."
    - journalist: "Hibaq Farah"
      to: "New York Times (Opinion, audience editor)"
      date: "2024-01"
      notes: "Brief UK tech reporter stint (~6 months). Led TikTok moderation investigation. Scott Trust Bursary recipient."
    - journalist: "Samantha Oltman"
      to: "Bloomberg (editor, AI/VC/startups)"
      date: "2026-06"
      notes: "Left after only ~4 months to join Bloomberg under Sarah Frier. Started June 15, 2026. Guardian's Reworked AI series left without its founding editor."

  notes: |
    The Guardian tech desk has experienced significant turnover 2021-2026: Julia Carrie Wong
    left tech beat (2021), Kari Paul departed entirely (2024), Hibaq Farah left for NYT (2024),
    and Samantha Oltman's "Reworked" AI series lost its founding editor after only 4 months (2026).
    Core stability comes from Alex Hern (UK, since 2013) and Dan Milmo (global, since 2021).
    Blake Montgomery (US editor, since 2023) and Johana Bhuiyan (US reporter, since 2021) now
    anchor the US desk. NOTE: Kiran Stacey is the Guardian's UK POLICY editor covering British
    politics — NOT a tech reporter. Previously incorrectly listed as "US tech policy."
