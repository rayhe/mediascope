notes: |
  ⚠️ REVISED: The Guardian is NO LONGER a clean control case.

  PREVIOUS ASSUMPTION: No corporate conflicts. Only ideological/editorial bias.
  Scott Trust non-profit = clean. Useful baseline for isolating financial incentive signals.

  NEW REALITY (updated Jun 22, 2026):
  1. OpenAI licensing deal (Feb 2025) — direct commercial relationship with Meta's #1 AI competitor
  2. ProRata licensing deal — additional AI revenue stream from Meta competitor ecosystem
  3. Mercuri/GMG Ventures — Scott Trust has direct VC investments in AI media-tech startups (£42M + £50M funds)
  4. Vivian Schiller — board member with Twitter (Meta competitor) + extensive tech industry history
  5. SPUR coalition — Guardian actively shaping AI licensing ecosystem, structural opposition to non-licensing AI companies (which includes Meta)

  However, Guardian's conflicts DIFFER IN KIND from the other publications:
  - Wired/Condé Nast: Advance Publications owns 33.5% of Reddit (direct Meta competitor)
  - Atlantic: Emerson Collective holds $16B+ Apple stock + Mistral AI investment
  - NYT: Amazon AI deal ($20-25M/yr) + actively suing OpenAI/Microsoft
  - MIT TR: Parent MIT receives $174M/yr from industry including Meta itself
  - Guardian: Licensing deals with AI companies (same direction as Wired/Atlantic — OpenAI is a Meta competitor) but NO equity ownership in competitors. The £1.2B endowment is diversified across 28+ PE/VC managers, not concentrated in specific Meta competitors.

  Guardian is STILL the closest thing to a control case among the 5 publications:
  - Non-profit trust structure genuinely eliminates shareholder profit motive
  - No single corporate owner with concentrated competitive interests
  - No $16B Apple stake (Atlantic), no 33.5% Reddit stake (Wired), no MIT research funding dependency
  - Conflicts are INDUSTRY-LEVEL (publisher vs AI companies) not COMPANY-SPECIFIC (we want Meta to lose)

  RECLASSIFICATION: Partial control. Financial conflicts exist but are smaller, more diffuse, and more industry-structural than entity-specific. Still the best comparator for isolating financial vs editorial bias signals, but with a documented caveat. For pure editorial baseline, pre-Feb 2025 Guardian coverage is cleaner than post-Feb 2025 coverage.

  KEY TESTABLE HYPOTHESES:
  1. Did Guardian coverage of OpenAI change after Feb 2025 deal? Compare pre-deal vs post-deal sentiment.
  2. Does Guardian cover Meta differently from non-licensing AI companies vs licensing AI companies?
  3. Did the SPUR coalition (Feb 2026) change editorial framing of AI companies generally?

  Research note: Bunz & Braghieri 2021 found Guardian had only 29% positive AI coverage vs 49% for WSJ,
  making it still useful as benchmark for editorial AI skepticism independent of ownership conflicts.

