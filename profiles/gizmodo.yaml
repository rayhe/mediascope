ai_crawl_policy:
  blocks_gptbot: false
  blocks_ccbot: false
  blocks_google_extended: false
  notes: "G/O Media has not publicly announced AI crawler restrictions. Likely permits indexing for search visibility."

# ===================================================================
# TARGET ENTITIES
# ===================================================================
target_entities:
  "Meta":
    aliases: ["Meta", "Meta Platforms", "Facebook", "Instagram", "WhatsApp", "Meta AI", "Meta Quest", "Ray-Ban Meta", "Meta Fury", "Llama"]
    regex: "\\b(Meta(?:Quest|\\sAI)?|Facebook|Instagram|WhatsApp|Llama)\\b"

  "Google":
    aliases: ["Google", "Alphabet", "YouTube", "Gemini", "Android"]
    regex: "\\b(Google|Alphabet|YouTube|Gemini|Android)\\b"

  "Apple":
    aliases: ["Apple", "iPhone", "iPad", "MacBook", "Apple Vision", "Apple Intelligence"]
    regex: "\\bApple(?!\\s+(?:pie|cider|sauce|tree|juice))\\b"

  "Amazon":
    aliases: ["Amazon", "AWS", "Alexa", "Rufus", "Kindle"]
    regex: "\\b(Amazon|AWS|Alexa|Rufus|Kindle)\\b"

  "Microsoft":
    aliases: ["Microsoft", "MSFT", "Azure", "Copilot", "Windows", "LinkedIn"]
    regex: "\\b(Microsoft|Azure|Copilot|Windows|LinkedIn)\\b"

  "OpenAI":
    aliases: ["OpenAI", "ChatGPT", "GPT-4", "GPT-5", "DALL-E"]
    regex: "\\b(OpenAI|ChatGPT|GPT-\\d|DALL-?E)\\b"

# ===================================================================
# BIAS RATINGS
# ===================================================================
bias_ratings:
  ad_fontes:
    reliability: 32
    bias: -8
  allsides: "Lean Left"
  mbfc: "Left-Center"
